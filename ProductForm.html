<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>龍潭進銷存系統 - 批次新增商品</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8f9fb;
      --surface: #ffffff;
      --surface2: #f1f5f9;
      --border: #e2e8f0;
      --accent: #475569;
      --accent-hover: #334155;
      --text: #1e293b;
      --text2: #64748b;
      --danger: #c53030;
      --warning: #b7791f;
      --blue: #0e7490;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans TC', system-ui, sans-serif;
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }

    /* ===== Header ===== */
    .header-bar {
      flex: 0 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
      padding: 0 24px;
      height: 56px;
      box-shadow: 0 2px 4px rgba(30,41,59,0.07);
      border-bottom: 3px solid var(--accent);
      z-index: 10;
    }
    .header-title { font-size: 18px; font-weight: 700; color: var(--accent); display: flex; align-items: center; gap: 12px; }
    .counter-badge { background: var(--blue); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }

    /* ===== Shared bar ===== */
    .shared-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .shared-bar .field-label { font-size: 12px; font-weight: 600; color: var(--text2); white-space: nowrap; }
    .shared-bar input {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      background: var(--surface);
      min-width: 150px;
    }
    .shared-bar input:focus { border-color: var(--accent); }
    .shared-hint { font-size: 11px; color: var(--text2); }

    /* ===== Table ===== */
    .table-wrap {
      flex: 1;
      overflow-x: auto;
      padding: 16px 24px 0;
    }
    table {
      width: 100%;
      min-width: 1150px;
      border-collapse: collapse;
      background: var(--surface);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(30,41,59,0.07);
    }
    thead tr { background: #f5f7fa; }
    th {
      padding: 10px 6px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
    }
    th.req::after { content: ' *'; color: var(--danger); }
    td {
      padding: 4px 4px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #f9fffe; }
    td input, td select {
      width: 100%;
      padding: 5px 7px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 12px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      background: var(--surface);
    }
    td input:focus, td select:focus { border-color: var(--accent); background: #fff; }
    td input.f-name { font-weight: 600; }
    .row-num {
      display: inline-block;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      font-size: 11px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      text-align: center;
      min-width: 26px;
    }
    .btn-del-row {
      background: none;
      border: none;
      color: #ccc;
      cursor: pointer;
      font-size: 15px;
      padding: 4px 6px;
      border-radius: 4px;
      line-height: 1;
      transition: 0.2s;
      display: block;
      margin: 0 auto;
    }
    .btn-del-row:hover { color: var(--danger); background: #fed7d7; }

    /* ===== Bottom bar ===== */
    .bottom-bar {
      position: sticky;
      bottom: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 5;
      box-shadow: 0 -2px 8px rgba(30,41,59,0.07);
      flex-wrap: wrap;
    }
    .spacer { flex: 1; }
    .btn {
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid transparent;
      border-radius: 4px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
      font-family: inherit;
    }
    .btn-success  { background: var(--accent); color: white; }
    .btn-success:hover  { background: var(--accent-hover); }
    .btn-add      { background: #f0f9eb; color: var(--accent); border: 1px dashed var(--accent); }
    .btn-add:hover      { background: #e1f3d8; }
    .btn-secondary{ background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover{ border-color: var(--text2); }
    .btn-danger   { background: #fed7d7; color: var(--danger); border: 1px solid #fbc4c4; }
    .btn-danger:hover   { background: var(--danger); color: white; }

    .loading-overlay {
      position: fixed; inset: 0; background: rgba(255,255,255,0.9);
      display: flex; justify-content: center; align-items: center;
      z-index: 2000; font-size: 16px; color: var(--accent); font-weight: 700;
      flex-direction: column; gap: 12px;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay hidden">
  <div>🔄 儲存中，請稍候...</div>
</div>

<!-- Header -->
<div class="header-bar">
  <div class="header-title">
    📦 <span id="pageTitle">批次新增商品</span>
    <span class="counter-badge" id="counterBadge">本次已新增: <span id="counter">0</span></span>
  </div>
  <button type="button" class="btn btn-secondary" onclick="closeWindow()">❌ 關閉頁面</button>
</div>

<datalist id="categoryList">
  <option value="包子饅頭">
  <option value="團購商品">
  <option value="港式點心">
  <option value="生鮮肉品">
  <option value="自有商品">
</datalist>

<!-- Table -->
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th style="width:34px;">#</th>
        <th class="req" style="min-width:130px;">商品名稱</th>
        <th style="width:95px;">商品編號</th>
        <th style="width:95px;">類別</th>
        <th style="width:100px;">規格</th>
        <th style="width:68px;">單位</th>
        <th style="width:88px;">售價</th>
        <th style="width:88px;">分店價</th>
        <th style="width:88px;">批發價</th>
        <th style="width:88px;">團購價</th>
        <th style="width:88px;">成本</th>
        <th style="width:68px;">最低庫存</th>
        <th style="width:115px;">供應商</th>
        <th style="width:75px;">備註</th>
        <th style="width:34px;"></th>
      </tr>
    </thead>
    <tbody id="rowList"></tbody>
  </table>
</div>

<!-- Bottom bar -->
<div class="bottom-bar">
  <button type="button" class="btn btn-add" id="btnAddRow" onclick="addRow()">➕ 新增一行</button>
  <button type="button" class="btn btn-secondary" id="btnClear" onclick="clearAll()">🧹 清空全部</button>
  <span class="spacer"></span>
  <button type="button" class="btn btn-danger hidden" id="btnDelete" onclick="deleteProduct()">🗑️ 刪除此商品</button>
  <button type="button" class="btn btn-success" onclick="saveAll()">💾 立即批次儲存</button>
</div>

<script>
  const SB_URL = 'https://gkuwoandmsgvlsxzmrjj.supabase.co/rest/v1';
  const SB_KEY = 'sb_publishable_7K0w9Z8-Wv1dOgLsZkI0rA_WfNei_AS';
    const AUTH_TOKEN = sessionStorage.getItem('sb_auth_token') || SB_KEY;
  const HEADERS = {
    'apikey': SB_KEY,
    'Authorization': `Bearer ${AUTH_TOKEN}`,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation'
  };

  const UNITS = ['個','包','箱','瓶','罐','袋','盒','公斤','台斤','組','份','條','片','顆','杯'];
  const UNIT_DATALIST = UNITS.map(u => `<option value="${u}">`).join('');

  // 格式：1英文 + YYMMDD + 2英文 = 9碼，例 A260303BK
  function generateId() {
    const now = new Date();
    const yy = String(now.getFullYear()).slice(2);
    const mm = String(now.getMonth() + 1).padStart(2, '0');
    const dd = String(now.getDate()).padStart(2, '0');
    const L = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const r = () => L[Math.floor(Math.random() * 26)];
    return r() + yy + mm + dd + r() + r();
  }

  let savedCount = 0;
  let rowCounter = 0;
  let isEditMode = false;
  let editProductId = null;

  window.onload = function() {
    const p = new URLSearchParams(window.location.search);
    editProductId = p.get('id');
    if (editProductId) {
      isEditMode = true;
      document.getElementById('pageTitle').textContent = `編輯商品 #${editProductId}`;
      document.getElementById('counterBadge').classList.add('hidden');
      document.getElementById('btnAddRow').classList.add('hidden');
      document.getElementById('btnClear').classList.add('hidden');
      document.getElementById('btnDelete').classList.remove('hidden');
      loadProductForEdit(editProductId);
    } else {
      addRow();
    }
  };

  // ===== 新增一列 =====
  function addRow() {
    rowCounter++;
    const n = rowCounter;
    const tbody = document.getElementById('rowList');
    const tr = document.createElement('tr');
    tr.id = `row-${n}`;
    tr.innerHTML = `
      <td style="text-align:center;"><span class="row-num">${tbody.children.length + 1}</span></td>
      <td><input type="text" class="f-name"     placeholder="商品名稱 *" autocomplete="off"></td>
      <td><input type="text" class="f-id"       placeholder="自動產生"></td>
      <td><input type="text" class="f-cat"      list="categoryList" placeholder="類別"></td>
      <td><input type="text" class="f-spec"     placeholder="規格(選填)"></td>
      <td><input type="text" class="f-unit" list="unitList-${n}" placeholder="可自訂"><datalist id="unitList-${n}">${UNIT_DATALIST}</datalist></td>
      <td><input type="number" class="f-price"        value="0" min="0"></td>
      <td><input type="number" class="f-price-branch" value="0" min="0"></td>
      <td><input type="number" class="f-price-store"  value="0" min="0"></td>
      <td><input type="number" class="f-price-rest"   value="0" min="0"></td>
      <td><input type="number" class="f-cost"         value="0" min="0"></td>
      <td><input type="number" class="f-alert"        value="10" min="0"></td>
      <td><input type="text"   class="f-supplier" placeholder="供應商"></td>
      <td><input type="text"   class="f-note"     placeholder="備註"></td>
      <td><button type="button" class="btn-del-row" title="移除此列" onclick="removeRow(${n})">✕</button></td>
    `;
    tbody.appendChild(tr);
    updateRowNums();
    tr.querySelector('.f-name').focus();
  }

  function removeRow(n) {
    const row = document.getElementById(`row-${n}`);
    if (row) row.remove();
    updateRowNums();
    if (document.getElementById('rowList').children.length === 0) addRow();
  }

  function updateRowNums() {
    document.querySelectorAll('#rowList tr').forEach((tr, i) => {
      const b = tr.querySelector('.row-num');
      if (b) b.textContent = i + 1;
    });
  }

  function clearAll() {
    document.getElementById('rowList').innerHTML = '';
    rowCounter = 0;
    addRow();
  }

  // ===== 儲存 =====
  async function saveAll() {
    const rows = document.querySelectorAll('#rowList tr');
    let payload = [];

    rows.forEach((tr) => {
      const name = tr.querySelector('.f-name').value.trim();
      if (!name) return; // 跳過空列

      const manualId = tr.querySelector('.f-id').value.trim();
      const id = manualId || generateId();

      payload.push({
        id,
        name,
        category:     tr.querySelector('.f-cat').value.trim()      || '未分類',
        spec:         tr.querySelector('.f-spec').value.trim(),
        unit:         tr.querySelector('.f-unit').value,
        price:        Number(tr.querySelector('.f-price').value)        || 0,
        price_branch: Number(tr.querySelector('.f-price-branch').value) || 0,
        price_wholesale:  Number(tr.querySelector('.f-price-store').value)  || 0,
        price_group:   Number(tr.querySelector('.f-price-rest').value)   || 0,
        cost:         Number(tr.querySelector('.f-cost').value)         || 0,
        supplier:     tr.querySelector('.f-supplier').value.trim(),
        alert_stock:  Number(tr.querySelector('.f-alert').value)        || 10,
        note:         tr.querySelector('.f-note').value.trim(),
        status:       '啟用',
        created_at:   new Date().toISOString()
      });
    });

    if (payload.length === 0) {
      Swal.fire({ icon: 'warning', title: '提醒', text: '請至少填寫一筆商品名稱' });
      return;
    }

    // ── 防呆 1：批次內編號重複 ──
    const batchIdSet = new Set();
    const dupIds = [];
    payload.forEach(p => {
      if (batchIdSet.has(p.id)) dupIds.push(p.id);
      batchIdSet.add(p.id);
    });
    if (dupIds.length > 0) {
      Swal.fire({ icon: 'error', title: '批次內商品編號重複', text: `重複的編號：${dupIds.join(', ')}，請修正後再儲存` });
      return;
    }

    // ── 防呆 2：批次內名稱重複 ──
    const batchNameSet = new Set();
    const dupNames = [];
    payload.forEach(p => {
      if (batchNameSet.has(p.name)) dupNames.push(p.name);
      batchNameSet.add(p.name);
    });
    if (dupNames.length > 0) {
      Swal.fire({ icon: 'error', title: '批次內商品名稱重複', text: `重複的名稱：${dupNames.join(', ')}，請修正後再儲存` });
      return;
    }

    if (!isEditMode) {
      // ── 防呆 3：DB 已有相同編號 ──
      const ids = payload.map(p => `"${p.id}"`).join(',');
      const idCheckRes = await fetch(`${SB_URL}/products?id=in.(${ids})&select=id`, { headers: HEADERS }).catch(() => null);
      if (idCheckRes && idCheckRes.ok) {
        const existIds = await idCheckRes.json();
        if (existIds.length > 0) {
          const list = existIds.map(e => e.id).join(', ');
          const r = await Swal.fire({
            icon: 'warning', title: '商品編號已存在',
            html: `以下編號已存在於資料庫：<br><b>${list}</b><br>是否略過重複項目，繼續儲存其餘商品？`,
            showCancelButton: true, confirmButtonText: '略過並繼續', cancelButtonText: '取消，返回修改'
          });
          if (!r.isConfirmed) return;
          const existSet = new Set(existIds.map(e => e.id));
          payload = payload.filter(p => !existSet.has(p.id));
          if (payload.length === 0) {
            Swal.fire({ icon: 'info', title: '無新商品', text: '所有商品編號均已存在，無可儲存項目' });
            return;
          }
        }
      }

      // ── 防呆 4：DB 已有相同名稱 ──
      const names = payload.map(p => `"${p.name}"`).join(',');
      const nameCheckRes = await fetch(`${SB_URL}/products?name=in.(${names})&select=name`, { headers: HEADERS }).catch(() => null);
      if (nameCheckRes && nameCheckRes.ok) {
        const existNames = await nameCheckRes.json();
        if (existNames.length > 0) {
          const list = existNames.map(e => e.name).join(', ');
          const r = await Swal.fire({
            icon: 'warning', title: '商品名稱已存在',
            html: `以下名稱已存在於資料庫：<br><b>${list}</b><br>是否略過重複項目，繼續儲存其餘商品？`,
            showCancelButton: true, confirmButtonText: '略過並繼續', cancelButtonText: '取消，返回修改'
          });
          if (!r.isConfirmed) return;
          const existSet = new Set(existNames.map(e => e.name));
          payload = payload.filter(p => !existSet.has(p.name));
          if (payload.length === 0) {
            Swal.fire({ icon: 'info', title: '無新商品', text: '所有商品名稱均已存在，無可儲存項目' });
            return;
          }
        }
      }
    }

    document.getElementById('loadingOverlay').classList.remove('hidden');
    try {
      if (isEditMode) {
        const updateData = { ...payload[0] };
        delete updateData.id;
        delete updateData.status;
        const res = await fetch(`${SB_URL}/products?id=eq.${editProductId}`, {
          method: 'PATCH', headers: HEADERS, body: JSON.stringify(updateData)
        });
        if (!res.ok) throw new Error('更新失敗');
        await Swal.fire({ icon: 'success', title: '修改成功！', timer: 1500, showConfirmButton: false });
        closeWindow();
      } else {
        const res = await fetch(`${SB_URL}/products`, {
          method: 'POST', headers: HEADERS, body: JSON.stringify(payload)
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.message || err.details || '儲存失敗');
        }
        savedCount += payload.length;
        document.getElementById('counter').textContent = savedCount;
        Swal.fire({ icon: 'success', title: `成功新增 ${payload.length} 筆！`, timer: 1500, showConfirmButton: false });
        setTimeout(() => clearAll(), 1500);
      }
    } catch (err) {
      Swal.fire('❌ 儲存失敗', err.message, 'error');
    } finally {
      document.getElementById('loadingOverlay').classList.add('hidden');
    }
  }

  // ===== 編輯模式：載入資料 =====
  async function loadProductForEdit(id) {
    document.getElementById('loadingOverlay').classList.remove('hidden');
    try {
      const res = await fetch(`${SB_URL}/products?id=eq.${id}`, { headers: HEADERS });
      if (!res.ok) throw new Error('無法讀取商品資料');
      const data = await res.json();
      if (!data || data.length === 0) throw new Error('找不到此商品');
      const p = data[0];

      addRow();
      const tr = document.querySelector('#rowList tr');
      tr.querySelector('.f-name').value         = p.name         || '';
      tr.querySelector('.f-id').value           = p.id           || '';
      tr.querySelector('.f-id').disabled        = true;
      tr.querySelector('.f-cat').value          = p.category     || '';
      tr.querySelector('.f-spec').value         = p.spec         || '';
      tr.querySelector('.f-unit').value         = p.unit         || '';
      tr.querySelector('.f-price').value        = p.price        || 0;
      tr.querySelector('.f-price-branch').value = p.price_branch || 0;
      tr.querySelector('.f-price-store').value  = p.price_wholesale  || 0;
      tr.querySelector('.f-price-rest').value   = p.price_group   || 0;
      tr.querySelector('.f-cost').value         = p.cost         || 0;
      tr.querySelector('.f-alert').value        = p.alert_stock  || 10;
      tr.querySelector('.f-supplier').value     = p.supplier     || '';
      tr.querySelector('.f-note').value         = p.note         || '';
      tr.querySelector('.btn-del-row').classList.add('hidden');
    } catch (err) {
      Swal.fire('讀取失敗', err.message, 'error');
    } finally {
      document.getElementById('loadingOverlay').classList.add('hidden');
    }
  }

  // ===== 刪除商品 =====
  async function deleteProduct() {
    const r = await Swal.fire({
      icon: 'warning',
      title: '確定要刪除此商品嗎？',
      text: '此操作無法復原！若此商品已有進銷貨紀錄，建議改為「停用」。',
      showCancelButton: true,
      confirmButtonColor: '#c53030',
      confirmButtonText: '確定刪除',
      cancelButtonText: '取消'
    });
    if (!r.isConfirmed) return;

    document.getElementById('loadingOverlay').classList.remove('hidden');
    try {
      const res = await fetch(`${SB_URL}/products?id=eq.${editProductId}`, {
        method: 'DELETE', headers: HEADERS
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || '刪除失敗，可能已有紀錄綁定此商品');
      }
      await Swal.fire({ icon: 'success', title: '已刪除！', timer: 1200, showConfirmButton: false });
      closeWindow();
    } catch (err) {
      Swal.fire('❌ 刪除失敗', err.message, 'error');
    } finally {
      document.getElementById('loadingOverlay').classList.add('hidden');
    }
  }

  function closeWindow() {
    window.location.href = 'ProductList.html';
  }
</script>
</body>
</html>
