    // 從開團資料（localStorage）同步到訂貨追蹤
    async function syncOrderTrackingData() {
      const publishedList = JSON.parse(localStorage.getItem('branchOrderList') || '[]');
      const branchOrders = JSON.parse(localStorage.getItem('branchOrders') || '{}');
      if (publishedList.length === 0) return; // 無匯入資料，用 mock

      publishedList.forEach(item => {
        const itemKey = item.id; // branchOrderList 的 id (可能含 _dateKey)
        const displayId = item.productId || item.id; // 純商品編號
        const existing = mockConsolidatedOrders.find(o => o.id === itemKey || o.id === displayId);
        if (existing) {
          // 更新名稱、日期、總量、廠商
          existing.name = item.name || existing.name;
          existing.startDate = item.startDate || existing.startDate;
          existing.endDate = item.endDate || existing.endDate;
          // 商品建檔的 supplier 作為預設，但不覆蓋訂貨追蹤手動修改的值
          if (!existing.supplier && item.supplier) existing.supplier = item.supplier;
          if (item.price !== undefined) existing.price = item.price;
          // 重算總需求量
          const allStoreNames = JSON.parse(localStorage.getItem('importedStoreNames') || '[]');
          const allPersonalNames = JSON.parse(localStorage.getItem('importedPersonalNames') || '[]');
          const allNames = [...allStoreNames, ...allPersonalNames];
          const total = allNames.reduce((s, n) => s + ((branchOrders[n] && branchOrders[n][itemKey]) || 0), 0);
          if (total > 0) existing.totalQty = total;
          existing.productId = displayId;
        } else {
          // 新增項目
          const allStoreNames = JSON.parse(localStorage.getItem('importedStoreNames') || '[]');
          const allPersonalNames = JSON.parse(localStorage.getItem('importedPersonalNames') || '[]');
          const allNames = [...allStoreNames, ...allPersonalNames];
          const total = allNames.reduce((s, n) => s + ((branchOrders[n] && branchOrders[n][itemKey]) || 0), 0);
          const today = new Date().toISOString().split('T')[0];
          const isExpired = item.endDate && item.endDate < today;
          mockConsolidatedOrders.push({
            id: itemKey,
            productId: displayId,
            name: item.name,
            temp: item.temp || '',
            category: item.category || '',
            totalQty: total || 0,
            startDate: item.startDate || '',
            endDate: item.endDate || '',
            status: isExpired ? 'closed' : 'open',
            procStatus: 'pending',
            eta: '',
            supplier: item.supplier || '',
            price: item.price || ''
          });
        }
      });

      // 讀取小瀾在 supplier_xiaolan 勾選的「已叫貨」，自動更新 procStatus
      try {
        const otOrdered = new Set(JSON.parse(localStorage.getItem('xiaolan_ot_ordered') || '[]'));
        if (otOrdered.size > 0) {
          mockConsolidatedOrders.forEach(item => {
            const pid = item.productId || item.id;
            if (otOrdered.has(pid) && item.procStatus === 'pending') {
              item.procStatus = 'ordered';
            }
          });
        }
      } catch {}

      // 陸貨到貨清單：出貨日期+10天已過，且完整商品編號一樣 → 自動改為「貨已到倉」
      try {
        const arrRes = await fetch(`${SB_URL}/xiaolan_arrivals?select=product_id,ship_date&product_id=not.is.null&ship_date=not.is.null&limit=1000`, { headers: HEADERS });
        const arrivals = arrRes.ok ? await arrRes.json() : [];
        if (arrivals.length > 0) {
          const today = new Date();
          today.setHours(0,0,0,0);
          const arrivedCodes = new Set();
          arrivals.forEach(a => {
            if (!a.ship_date || !a.product_id) return;
            const sd = new Date(a.ship_date.replace(/\//g, '-'));
            if (isNaN(sd)) return;
            sd.setDate(sd.getDate() + 10);
            if (sd <= today) arrivedCodes.add(String(a.product_id));
          });
          if (arrivedCodes.size > 0) {
            mockConsolidatedOrders.forEach(item => {
              const pid = String(item.productId || item.id);
              if (arrivedCodes.has(pid) && (item.procStatus === 'pending' || item.procStatus === 'ordered')) {
                item.procStatus = 'arrived';
              }
            });
          }
        }
      } catch {}
    }

    function batchUpdateOrderStatus(newStatus) {

      Swal.fire({
        title: `確定要批次${actionText}？`,
        text: `已勾選 ${checkboxes.length} 筆商品。分店前台將立刻同步此狀態！`,

      }).then((result) => {

          const selectedIds = Array.from(checkboxes).map(cb => cb.value);

    function renderProcurementTable(page) {
      const dateType = document.getElementById('procDateType')?.value || 'start';
      const dateVal = document.getElementById('procDateVal')?.value || '';
      const filterStatus = document.getElementById('procFilterStatus').value;
      const searchKw = document.getElementById('procSearchKw').value.trim().toLowerCase();
      const tbody = document.getElementById('procurementTableBody');

      let filtered = [...mockConsolidatedOrders];
      const hasFilter = dateVal || searchKw || filterStatus !== 'all';

      if (hasFilter) {
        procShowAll = false;
        if (dateVal) {
          if (dateType === 'start') filtered = filtered.filter(i => (i.startDate || '') === dateVal);
          else filtered = filtered.filter(i => (i.endDate || '') === dateVal);
        }
        if (filterStatus === 'open') filtered = filtered.filter(i => i.status === 'open');
        else if (filterStatus === 'closed') filtered = filtered.filter(i => i.status === 'closed');
        else if (['pending','ordered','arrived','out_of_stock','supplier_shortage'].includes(filterStatus)) filtered = filtered.filter(i => i.procStatus === filterStatus);
        if (searchKw) filtered = filtered.filter(i => i.name.toLowerCase().includes(searchKw) || i.id.toLowerCase().includes(searchKw));
      }

      filtered.sort((a, b) => (b.startDate || '').localeCompare(a.startDate || ''));

      // 分頁
      const totalPages = Math.max(1, Math.ceil(filtered.length / PROC_PER_PAGE));
      if (page !== undefined) procPageNum = page;
      if (procPageNum < 1) procPageNum = 1;
      if (procPageNum > totalPages) procPageNum = totalPages;
      const start = (procPageNum - 1) * PROC_PER_PAGE;
      const pageData = filtered.slice(start, start + PROC_PER_PAGE);

      if (pageData.length === 0) {
        tbody.innerHTML = `<tr><td colspan="12" style="text-align:center; padding: 30px; color: var(--text2);">查無符合條件的訂單紀錄</td></tr>`;
      } else {
        tbody.innerHTML = pageData.map((item) => {
          const isOpen = item.status === 'open';
          const statusLabel = isOpen
            ? `<span style="color:#276749; font-size:12px; font-weight:bold;">🟢開</span>`
            : `<span style="color:#c53030; font-size:12px; font-weight:bold;">🔴結</span>`;
          const rowBg = isOpen ? 'background: white;' : 'background: #eef1f5;';

          return `
            <tr style="border-bottom: 1px solid #e2e8f0; ${rowBg}">
              <td style="text-align:center;"><input type="checkbox" class="proc-checkbox" data-id="${item.id}"></td>
              <td style="text-align:center;">${statusLabel}</td>
              <td style="color:#718096; font-size:13px; text-align:center;">${item.startDate}</td>
              <td style="font-family:monospace; font-weight:bold; color:#2b6cb0; font-size:13px;">${item.productId || item.id}</td>
              <td style="font-weight:bold; color:#2d3748; font-size:14px;">${item.name}</td>
              <td style="text-align:center; font-size:16px; font-weight:bold; color:#b7791f;">${item.totalQty}</td>
              <td style="text-align:center; font-size:13px; font-weight:bold; color:#2d3748;">${item.price ? '$' + item.price : ''}</td>
              <td>
                <select onchange="updateProcItem('${item.id}', 'procStatus', this.value)" style="width:100%; padding:6px; border:1px solid var(--border); border-radius:4px; font-size:13px; font-family:inherit;">
                  <option value="pending" ${item.procStatus === 'pending' ? 'selected' : ''}>⏳ 待處理</option>
                  <option value="ordered" ${item.procStatus === 'ordered' ? 'selected' : ''}>🚚 已向廠商叫貨</option>
                  <option value="arrived" ${item.procStatus === 'arrived' ? 'selected' : ''}>📦 貨已到倉</option>
                  <option value="out_of_stock" ${item.procStatus === 'out_of_stock' ? 'selected' : ''}>❌ 廠商斷貨</option>
                  <option value="supplier_shortage" ${item.procStatus === 'supplier_shortage' ? 'selected' : ''}>⚠️ 廠商短缺</option>
                </select>
                ${getShortageByOrderKey(item.id) ? '<button onclick="openShortageStatusModal(\x27' + item.id + '\x27)" style="margin-top:4px;padding:3px 8px;font-size:11px;background:#fef3c7;color:#b7791f;border:1px solid #fbbf24;border-radius:4px;cursor:pointer;font-weight:700;white-space:nowrap;">📋 協調</button>' : ''}
              </td>
              <td>
                <input type="date" value="${item.eta}" onchange="updateProcItem('${item.id}', 'eta', this.value)" style="width:100%; padding:4px; font-size:12px; border: 1px solid var(--border); border-radius: 4px;">
              </td>
              <td>
                <input type="text" value="${item.supplier}" placeholder="填寫廠商..." onchange="updateProcItem('${item.id}', 'supplier', this.value)" style="width:100%; padding:4px; font-size:13px; border: 1px solid var(--border); border-radius: 4px;">
              </td>
              <td style="color:#718096; font-size:13px; text-align:center;">${item.endDate}</td>
            </tr>
          `;
        }).join('');
      }

      // 分頁列
      const pgBox = document.getElementById('procPagination');
      if (!pgBox) return;
      if (totalPages <= 1) { pgBox.innerHTML = `<span style="font-size:12px; color:#718096;">共 ${filtered.length} 筆</span>`; return; }
      const bs = (a) => `padding:4px 10px; border:1px solid ${a ? '#047857' : '#dde3ec'}; background:${a ? '#047857' : 'white'}; color:${a ? 'white' : '#374151'}; border-radius:4px; cursor:pointer; font-size:12px; font-weight:${a ? '700' : '500'}; font-family:inherit;`;
      pgBox.innerHTML = `
        <button onclick="renderProcurementTable(1)" style="${bs(false)}" ${procPageNum===1?'disabled':''}>⏮ 首頁</button>
        <button onclick="renderProcurementTable(${procPageNum-1})" style="${bs(false)}" ${procPageNum===1?'disabled':''}>◀ 上頁</button>
        <span style="font-size:12px; color:#718096;">第 ${procPageNum} / ${totalPages} 頁（共 ${filtered.length} 筆）</span>
        <button onclick="renderProcurementTable(${procPageNum+1})" style="${bs(false)}" ${procPageNum===totalPages?'disabled':''}>下頁 ▶</button>
        <button onclick="renderProcurementTable(${totalPages})" style="${bs(false)}" ${procPageNum===totalPages?'disabled':''}>末頁 ⏭</button>
        <span style="margin-left:6px; font-size:12px;">到第 <input id="procJumpPage" type="number" min="1" max="${totalPages}" value="${procPageNum}" style="width:48px; padding:3px; text-align:center; border:1px solid #dde3ec; border-radius:4px; font-size:12px;"> 頁</span>
        <button onclick="renderProcurementTable(parseInt(document.getElementById('procJumpPage').value)||1)" style="${bs(false)}">跳轉</button>
      `;
    }

    // 同步開/結單狀態至分店前台 branchOrderList
    function syncOrderStatusToPortal() {
      const saved = JSON.parse(localStorage.getItem('branchOrderList') || '[]');
      mockConsolidatedOrders.forEach(item => {
        const entry = saved.find(p => p.id === item.id);
        if (entry) entry.status = item.status; // 'open' or 'closed'
      });
      localStorage.setItem('branchOrderList', JSON.stringify(saved));
      cloudSave('branchOrderList');

    function updateProcItem(id, field, value) {
      const item = mockConsolidatedOrders.find(i => i.id === id);
      if (item) {
        item[field] = value;
        // 廠商修改也回寫 branchOrderList，確保重新進入頁面不會遺失
        if (field === 'supplier') {
          const saved = JSON.parse(localStorage.getItem('branchOrderList') || '[]');
          const entry = saved.find(p => p.id === id);
          if (entry) { entry.supplier = value; localStorage.setItem('branchOrderList', JSON.stringify(saved)); cloudSave('branchOrderList'); }
        }
        syncProcurementToPortal();
        if (field === 'procStatus' && value === 'supplier_shortage') {
          openShortageNegotiationModal(id);
        }
      }

      else if (filterStatus === 'closed') filtered = filtered.filter(i => i.status === 'closed');
      else if (['pending','ordered','arrived','out_of_stock','supplier_shortage'].includes(filterStatus)) filtered = filtered.filter(i => i.procStatus === filterStatus);

    function batchUpdateProcStatus() {
      const checked = document.querySelectorAll('.proc-checkbox:checked');
      const newStatus = document.getElementById('batchProcStatusSelect').value;
      const statusMap = { pending: '⏳ 待處理', ordered: '🚚 已向廠商叫貨', arrived: '📦 貨已到倉', out_of_stock: '❌ 廠商斷貨', supplier_shortage: '⚠️ 廠商短缺' };

      // 有勾選→改勾選的，沒勾選→改當前篩選結果全部
      let targetIds;
      let countText;
      if (checked.length > 0) {
        targetIds = Array.from(checked).map(cb => cb.dataset.id);
        countText = `勾選的 <b>${targetIds.length}</b> 筆`;
      } else {
        const filtered = getFilteredProcItems();
        if (filtered.length === 0) { Swal.fire('提示','目前篩選結果沒有資料','info'); return; }
        targetIds = filtered.map(i => i.id);
        countText = `篩選結果 <b>${targetIds.length}</b> 筆`;
      }

      Swal.fire({
        title: `批次更新採購進度`,
        html: `確定將${countText}項目的採購進度改為<br><b>${statusMap[newStatus]}</b>？`,
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: '確定更新',
        cancelButtonText: '取消',
        confirmButtonColor: '#805ad5'
      }).then(r => {
        if (!r.isConfirmed) return;
        targetIds.forEach(id => {
          const item = mockConsolidatedOrders.find(i => i.id === id);
          if (item) item.procStatus = newStatus;
        });
        syncProcurementToPortal();
        logActivity('批次更新採購進度', 'PROCUREMENT', `${checked.length} 筆改為 ${statusMap[newStatus]}`);
        renderProcurementTable();
        Swal.fire({ title: '更新完成', text: `已將 ${checked.length} 筆採購進度更新為「${statusMap[newStatus]}」`, icon: 'success', confirmButtonColor: '#2b6cb0' });
      });
    }

    function saveAllProcurement() {
      // 同步採購進度到分店前台 localStorage
      syncProcurementToPortal();
      // 同步開/結單狀態

    // 最大餘數法分配：確保總和 = avail
    function largestRemainderAlloc(stores, avail, totalDemand) {
      if (totalDemand <= 0) return stores.map(() => 0);
      const raw = stores.map(s => avail * s / totalDemand);
      const floored = raw.map(v => Math.floor(v));
      let remainder = avail - floored.reduce((a, b) => a + b, 0);
      const fracs = raw.map((v, i) => ({ i, frac: v - floored[i] }));
      fracs.sort((a, b) => b.frac - a.frac);
      for (let k = 0; k < remainder; k++) floored[fracs[k].i]++;
      return floored;
    }

    function calcShortageProportional(totalDemand) {
      const avail = parseInt(document.getElementById('shortageAvailQty').value) || 0;
      document.getElementById('shortageGap').textContent = Math.max(0, totalDemand - avail);
      const inputs = document.querySelectorAll('.proportional-input');
      const origs = Array.from(inputs).map(c => parseInt(c.dataset.orig) || 0);
      const alloc = largestRemainderAlloc(origs, avail, totalDemand);
      inputs.forEach((inp, i) => { inp.value = alloc[i]; });
      calcShortageRemaining();
    }

    function calcShortageRemaining() {
      const avail = parseInt(document.getElementById('shortageAvailQty').value) || 0;
      const inputs = document.querySelectorAll('.proportional-input');
      const assigned = Array.from(inputs).reduce((s, inp) => s + (parseInt(inp.value) || 0), 0);
      const remain = avail - assigned;
      const el = document.getElementById('shortageRemaining');
      if (el) {
        el.textContent = remain;
        el.style.color = remain === 0 ? '#047857' : '#c53030';
      }
    }

    function createShortageNegotiation(orderKey, availableQty, storesWithQty, allocations) {
      const item = mockConsolidatedOrders.find(i => i.id === orderKey);
      if (!item) return;

      const totalDemand = storesWithQty.reduce((s, x) => s + x.originalQty, 0);

      // 找同系列商品：9碼貨號，前7碼相同（尾2碼=顏色/細項）
      const baseCode = (item.productId || '').replace(/_.*$/, '');
      const prefix = baseCode.length === 9 ? baseCode.slice(0, 7) : '';
      const sameGroupProducts = prefix ? mockConsolidatedOrders
        .filter(o => {
          if (o.id === orderKey) return false;
          const oCode = (o.productId || '').replace(/_.*$/, '');
          return oCode.length === 9 && oCode.slice(0, 7) === prefix && oCode !== baseCode;
        })
        .map(o => ({ id: o.id, name: o.name })) : [];

      const negoId = 'SHT' + Date.now();
      const nego = {
        id: negoId,
        productName: item.name,
        orderKey: orderKey,
        startDate: item.startDate || '',
        endDate: item.endDate || '',
        totalDemand: totalDemand,
        availableQty: availableQty,
        shortageQty: totalDemand - availableQty,
        status: 'negotiating',
        createdAt: new Date().toISOString(),
        finalizedAt: null,
        storeDetails: storesWithQty.map((s, i) => ({
          storeName: s.storeName,
          originalQty: s.originalQty,
          proportionalQty: allocations ? (allocations.find(a => a.store === s.storeName)?.qty || 0) : Math.floor(availableQty * s.originalQty / totalDemand),
          choice: null,
          swapProductId: null,
          swapProductName: null,
          swapQty: null,
          repliedAt: null
        })),
        sameGroupProducts: sameGroupProducts
      };

      // 存入 localStorage（同 orderKey 舊的非 finalized 先刪）
      let list = JSON.parse(localStorage.getItem('shortageNegotiations') || '[]');
      list = list.filter(n => !(n.orderKey === orderKey && n.status !== 'finalized'));
      list.push(nego);
      localStorage.setItem('shortageNegotiations', JSON.stringify(list));

      syncProcurementToPortal();
    }

    function finalizeShortageNegotiation(negoId) {
      let list = JSON.parse(localStorage.getItem('shortageNegotiations') || '[]');
      const nego = list.find(n => n.id === negoId);
      if (!nego) return;

      const branchOrders = JSON.parse(localStorage.getItem('branchOrders') || '{}');

      nego.storeDetails.forEach(s => {
        if (!branchOrders[s.storeName]) branchOrders[s.storeName] = {};

        const choice = s.choice || 'keep'; // 未回覆視為維持
        if (choice === 'keep') {
          branchOrders[s.storeName][nego.orderKey] = s.proportionalQty;
        } else if (choice === 'swap') {
          branchOrders[s.storeName][nego.orderKey] = 0;
          if (s.swapProductId) {
            branchOrders[s.storeName][s.swapProductId] = (branchOrders[s.storeName][s.swapProductId] || 0) + (s.swapQty || 0);
          }
        } else if (choice === 'cancel') {
          branchOrders[s.storeName][nego.orderKey] = 0;
        }
      });

      localStorage.setItem('branchOrders', JSON.stringify(branchOrders));
      cloudSave('branchOrders');

      nego.status = 'finalized';
      nego.finalizedAt = new Date().toISOString();
      localStorage.setItem('shortageNegotiations', JSON.stringify(list));

      // 重新同步追蹤資料

      syncProcurementToPortal();
      renderProcurementTable();

      Swal.fire({

  // 從撿貨歷史掃描所有異常（少給/多給），整合修正數量的標記
  function computeAnomalies() {
    const anomalies = [];
    mockSavedWaves.forEach(wave => {
      const corr = waveCorrections[wave.id] || {};
      wave.matrix.forEach(row => {
        const diff = row.actualSum - row.expectedSum;
        if (diff === 0) return;
        const prodCorr = corr[row.id] || {};
        const branchAnomalies = [];
        // 使用所有出現在 branchData 中的店名
        const allStores = row.branchData ? Object.keys(row.branchData) : [];
        allStores.forEach(b => {
          const bd = row.branchData[b];
          if (!bd) return;
          const exp = bd.expected || 0;
          const act = bd.actual ?? exp;
          const d = act - exp;
          if (d !== 0) {
            const corrAction = prodCorr[b] ? prodCorr[b].action : null;
            branchAnomalies.push({
              store: b, expected: exp, actual: act, diff: d,
              action: corrAction // 'oversell' | 'pending' | 'noRestock' | null
            });
          }
        });
        // 判斷此品項是否有待補項
        const hasPending = branchAnomalies.some(b => b.action === 'pending' || (!b.action && b.diff < 0));
        const allNoRestock = branchAnomalies.filter(b => b.diff < 0).every(b => b.action === 'noRestock');
        anomalies.push({
          key: `${wave.id}-${row.id}`,
          waveId: wave.id, waveDate: wave.date,
          productId: row.id, productName: row.name, temp: row.temp,
          expectedSum: row.expectedSum, actualSum: row.actualSum, diff,
          type: diff < 0 ? 'shortage' : 'overage',
          branchAnomalies,
          hasPending,
          allNoRestock
        });
      });
    });
    return anomalies;
  }

          <div style="font-size:11px; color:#b7791f; font-weight:bold; margin-bottom:4px;">待處理</div>
          <div style="font-size:22px; font-weight:bold; color:#b7791f;">${pending.length} <span style="font-size:12px; color:#718096;">筆</span></div>

    `;

  function refreshBackorderTable() {
    renderBackorderSummary();
    const filter = document.getElementById('backorderFilter')?.value || 'all';
    let anomalies = computeAnomalies();
    if (filter === 'shortage') anomalies = anomalies.filter(a => a.type === 'shortage');
    else if (filter === 'overage') anomalies = anomalies.filter(a => a.type === 'overage');
    else if (filter === 'pending') anomalies = anomalies.filter(a => (mockBackorderMeta[a.key]?.status || 'pending') !== 'done');
    else if (filter === 'done') anomalies = anomalies.filter(a => mockBackorderMeta[a.key]?.status === 'done');

    const tbody = document.getElementById('backorderTableBody');
    if (!tbody) return;
    if (anomalies.length === 0) {
      tbody.innerHTML = '<tr><td colspan="9" style="text-align:center; padding:40px; color:#718096;">目前無符合條件的異常紀錄</td></tr>';
      return;
    }

    const statusColorMap = { pending:'#b7791f', received:'#2b6cb0', shipped:'#047857', out_of_stock:'#c53030', done:'#718096' };

    tbody.innerHTML = anomalies.map(a => {
      const meta   = mockBackorderMeta[a.key] || {};
      const status = meta.status || 'pending';
      const reason = meta.reason || '';
      const isDone = status === 'done' || status === 'out_of_stock';
      const isShortage = a.type === 'shortage';
      const isNoRestock = isShortage && a.allNoRestock;
      const rowBg = isDone || isNoRestock ? 'background:#eef1f5; opacity:0.7;' : isShortage ? 'background:#fff5f5;' : 'background:#fdf4ff;';

      const branchHtml = a.branchAnomalies.length > 0
        ? a.branchAnomalies.map(b => {
            let label = '';
            let color = '#c53030'; let bg = '#fef2f2';
            const sign = b.diff > 0 ? '+' : '';
            if (b.action === 'oversell') { color = '#7c3aed'; bg = '#faf5ff'; label = ' 超賣'; }
            else if (b.action === 'pending') { color = '#b7791f'; bg = '#fef3c7'; label = ' 待補'; }
            else if (b.action === 'noRestock') { color = '#718096'; bg = '#eef1f5'; label = ' 不補'; }
            else if (b.diff > 0) { color = '#8b5cf6'; bg = '#faf5ff'; }
            return `<span style="display:inline-block; font-size:11px; padding:1px 6px; margin:1px; border-radius:3px; background:${bg}; color:${color}; white-space:nowrap;">${b.store} <b>${sign}${b.diff}</b>${label}</span>`;
          }).join('')
        : `<span style="color:#718096; font-size:12px;">整批差異</span>`;

      const statusOptions = isShortage
        ? `<option value="pending"       ${status==='pending'?'selected':''}>⏳ 待處理</option>
           <option value="received"      ${status==='received'?'selected':''}>📦 貨已到</option>
           <option value="shipped"       ${status==='shipped'?'selected':''}>✅ 已補發</option>
           <option value="out_of_stock"  ${status==='out_of_stock'?'selected':''}>❌ 斷貨</option>
           <option value="done"          ${status==='done'?'selected':''}>🎉 已完成</option>`
        : `<option value="pending" ${status==='pending'?'selected':''}>⏳ 待確認</option>
           <option value="done"    ${status==='done'?'selected':''}>🎉 已完成</option>`;

      const canBuild = isShortage && !isDone && !isNoRestock;
      const operationBtn = isShortage
        ? (isNoRestock
          ? `<span style="font-size:11px; color:#718096;">不補</span>`
          : `<button class="btn" style="padding:4px 8px; font-size:11px; white-space:nowrap; ${!canBuild?'background:#718096;':'background:#c53030;'}"
             onclick="loadShortageToPickingStation('${a.waveId}','${a.productId}')" ${!canBuild?'disabled':''}>➕ 建立補發</button>`)
        : `<span style="font-size:12px; color:#718096;">—</span>`;

      return `<tr style="border-bottom:1px solid #e2e8f0; ${rowBg}">
        <td style="padding:8px 12px; white-space:nowrap;">
          <div style="font-family:monospace; color:#2b6cb0; font-size:12px;">${a.waveId}</div>
          <div style="color:#718096; font-size:11px; margin-top:2px;">${a.waveDate}</div>
        </td>
        <td style="padding:8px 12px;">
          <div style="color:#2b6cb0; font-family:monospace; font-size:11px;">${a.productId}</div>
          <div style="font-weight:bold; color:#2d3748;">${a.productName}</div>
        </td>
        <td style="padding:8px; text-align:center; font-weight:bold; color:#718096;">${a.expectedSum}</td>
        <td style="padding:8px; text-align:center; font-weight:bold; color:#718096;">${a.actualSum}</td>
        <td style="padding:8px; text-align:center;">
          <span style="font-weight:bold; font-size:15px; color:${isShortage?'#c53030':'#8b5cf6'};">${isShortage?'':'+'}${a.diff}</span>
          ${isNoRestock ? '<div style="font-size:10px; color:#718096;">全部不補</div>' : a.hasPending ? '<div style="font-size:10px; color:#b7791f;">待補</div>' : ''}
        </td>
        <td style="padding:8px 12px;">${branchHtml}</td>
        <td style="padding:8px 12px;">
          <input type="text" value="${reason}" placeholder="輸入原因..."
            onchange="updateBackorderMeta('${a.key}','reason',this.value)"
            style="width:100%; padding:4px 6px; border:1px solid #e2e8f0; border-radius:4px; font-size:12px; font-family:inherit;">
        </td>
        <td style="padding:8px; text-align:center;">
          <select onchange="updateBackorderMeta('${a.key}','status',this.value)"
            style="padding:4px 6px; border:1px solid #e2e8f0; border-radius:4px; font-size:12px; font-family:inherit; color:${statusColorMap[status]}; font-weight:bold; width:100%;">
            ${statusOptions}
          </select>
        </td>
        <td style="padding:8px; text-align:center;">${operationBtn}</td>
      </tr>`;
    }).join('');
  }

  function updateBackorderMeta(key, field, value) {
    if (!mockBackorderMeta[key]) mockBackorderMeta[key] = {};
    mockBackorderMeta[key][field] = value;
    refreshDemandBackorderTable();

  // 從店家需求建立補發 → 跳轉分貨站並預填該店需求數量
  function buildDemandSupply(inqId) {
    const inq = mockInquiries.find(i => i.id === inqId);
    if (!inq) return;

    Swal.fire({
      title: '建立補發揀貨單',
      html: `<b>${inq.storeId}</b> 需求 <b>${inq.productName}</b> × <b style="color:#b7791f;">${inq.qty}</b> 件<br><small style="color:#718096;">將跳轉至新增揀貨單，預填該店需求數量。</small>`,
      icon: 'info', showCancelButton: true,
      confirmButtonText: '前往新增揀貨單', cancelButtonText: '取消', confirmButtonColor: '#2b6cb0'
    }).then(res => {
      if (!res.isConfirmed) return;

      // 確保分店資料已初始化
      initPickingData();

      // 檢查是否已在大表中
      if (activePickingMatrix.some(r => r.id === inq.productId)) {
        Swal.fire('提示', '此商品已在分貨站大表中，請直接修改數量。', 'info')
          .then(() => switchTab('picking'));
        return;
      }

      // 建立 branchData：只有該需求店有數量
      const branchData = {};
      pickingStoreNames.forEach(b => {
        const qty = (b === inq.storeId) ? inq.qty : 0;
        branchData[b] = { expected: qty, actual: qty };
      });
      const expectedSum = inq.qty;

      // 找到對應的到貨資料（如果有）
      const arrival = pickingArrivals.find(a => a.id === inq.productId);

      currentEditingWaveId = null;
      activePickingMatrix.push({
        id: inq.productId,
        name: inq.productName,
        temp: arrival ? arrival.temp : '',
        purchasedQty: arrival ? arrival.purchasedQty : 0,
        pickedQty: arrival ? arrival.pickedQty : 0,
        alloc: arrival ? arrival.alloc : {},
        pickingHistory: arrival ? arrival.pickingHistory : [],
        price: arrival ? arrival.price : 0,
        storePrice: arrival ? arrival.storePrice : 0,
        cost: arrival ? arrival.cost : 0,
        expectedSum: expectedSum,
        actualSum: expectedSum,
        branchData: branchData
      });

      // 標記需求為已回覆
      inq.status = 'replied';
      inq.reply = '已建立補發揀貨單';
      const now = new Date();
      inq.repliedAt = now.getFullYear() + '/' + String(now.getMonth()+1).padStart(2,'0') + '/' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
      syncReplyToPortal(inq);

      switchTab('picking');
    });
  }

  // 從欠品紀錄建立補發 → 跳轉新增揀貨單並預填各店欠品數量
  function loadShortageToPickingStation(waveId, productId) {
    const wave = mockSavedWaves.find(w => w.id === waveId);
    if (!wave) { Swal.fire('錯誤', '找不到該揀貨單紀錄。', 'error'); return; }
    const row = wave.matrix.find(r => r.id === productId);
    if (!row) { Swal.fire('錯誤', '找不到該商品紀錄。', 'error'); return; }

    // 確保分店資料已初始化
    initPickingData();

    // 計算各店欠品數量（使用 wave 自身的 branchData keys）
    let expectedSum = 0;
    const branchData = {};
    const allStores = new Set([...pickingStoreNames, ...Object.keys(row.branchData || {})]);
    allStores.forEach(b => {
      const bd = row.branchData && row.branchData[b];
      const shortage = bd ? Math.max(0, bd.expected - bd.actual) : 0;
      branchData[b] = { expected: shortage, actual: shortage };
      expectedSum += shortage;
    });

    if (expectedSum === 0) {
      Swal.fire('無欠品', '此筆紀錄各店數量已正確，無需補發。', 'info');
      return;
    }

    const arrival = pickingArrivals.find(a => a.id === productId);
    Swal.fire({
      title: '建立補發揀貨單',
      html: `<b>${row.name}</b><br>補發數量：<b style="color:#c53030;">${expectedSum} 件</b><br><small style="color:#718096;">將跳轉至新增揀貨單，已預填各店欠品數量。</small>`,
      icon: 'info', showCancelButton: true,
      confirmButtonText: '前往新增揀貨單', cancelButtonText: '取消', confirmButtonColor: '#2b6cb0'
    }).then(res => {
      if (!res.isConfirmed) return;
      if (activePickingMatrix.some(r => r.id === productId)) {
        Swal.fire('提示', '此商品已在分貨站大表中，請直接修改數量。', 'info')
          .then(() => switchTab('picking'));
        return;
      }
      currentEditingWaveId = null;
      activePickingMatrix.push({
        id: row.id, name: row.name, temp: row.temp,
        purchasedQty: row.purchasedQty,
        pickedQty: arrival ? arrival.pickedQty : 0,
        alloc: arrival ? arrival.alloc : {},
        pickingHistory: arrival ? arrival.pickingHistory : [],
        price: arrival ? arrival.price : 0,
        storePrice: arrival ? arrival.storePrice : 0,
        cost: arrival ? arrival.cost : 0,
        expectedSum, actualSum: expectedSum, branchData
      });
      switchTab('picking');
    });
  }

  let mockTransfers = [];

  function syncTransfersFromPortal() {
    try {
      const raw = localStorage.getItem('portalTransferList');
      if (!raw) { mockTransfers = []; return; }
      const list = JSON.parse(raw);
      mockTransfers = list.map(t => ({
        id: t.id,
        fromStore: t.fromStore || '',
        toStore: t.toStore || '',
        items: (t.items || []).map(i => ({ code: i.code||'', name: i.name||'', qty: i.qty||0, temp: i.temp||'', price: i.price||0, expiry: i.note||'' })),
        tempNote: t.tempNote || '常溫',
        note: t.note || '',
        status: t.adminStatus || 'pending',
        warehouseNote: t.warehouseNote || '',
        confirmed: t.confirmed || false,
        createdAt: t.createdAt ? new Date(t.createdAt).toLocaleString('zh-TW', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : ''
      }));
    } catch(e) { console.error('syncTransfers error:', e); mockTransfers = []; }
  }

  function syncTransferToPortal(id, updates) {
    try {
      const raw = localStorage.getItem('portalTransferList');
      if (!raw) return;
      const list = JSON.parse(raw);
      const t = list.find(t => t.id === id);
      if (t) {
        Object.assign(t, updates);
        localStorage.setItem('portalTransferList', JSON.stringify(list));
        cloudSave('portalTransferList');
      }
    } catch(e) { console.error('syncTransferToPortal error:', e); }
  }

  function refreshTransferTable() {

    const data = filter === 'all' ? mockTransfers : mockTransfers.filter(t => t.status === filter);

    const tbody = document.getElementById('transferTableBody');
    if (!tbody) return;
    if (data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="9" style="text-align:center; padding:40px; color:#718096;">目前無符合條件的單據</td></tr>';
      return;

    const statusLabel = { pending:'⏳ 待審核', arrived:'📦 已到總倉', shipped:'🚚 已配送', received:'✅ 已收到' };

    const statusBg    = { pending:'#fef3c7', arrived:'#f0f7ff', shipped:'#f0f7ff', received:'#eef1f5' };
    const tempColor   = { '冷凍':'#2b6cb0', '冷藏':'#0891b2', '常溫':'#b7791f', '混合':'#7c3aed' };

    tbody.innerHTML = [...data].reverse().map(t => {

        actionBtn = `<span style="font-size:12px; color:#718096;">已完成</span>`;

      return `<tr style="border-bottom:1px solid #e2e8f0; ${t.status==='pending'?'background:#fffdf0;':''}">

    Swal.fire({
      title: `確認更新狀態？`,

      if (!res.isConfirmed) return;
      t.status = newStatus;

      logActivity('更新店轉店狀態', id, { status: labelMap[newStatus], from: t.fromStore, to: t.toStore });

      refreshTransferTable();
    });
  }

  let adminAidProductDB = [];
  async function loadAdminProductDB() {
    if (adminAidProductDB.length > 0) return; // 已載入過就跳過
    try {
      let all = [], offset = 0, limit = 1000, hasMore = true;
      while (hasMore) {
        const res = await fetch(`${SB_URL}/products?status=eq.啟用&order=id.asc&limit=${limit}&offset=${offset}`, { headers: HEADERS });
        if (!res.ok) break;
        const data = await res.json();
        all = all.concat(data);
        if (data.length < limit) hasMore = false;
        else offset += limit;
      }
      adminAidProductDB = all.map(p => ({
        code: p.id,
        name: p.name,
        temp: p.category || '',
        price: p.price_branch || p.price || 0
      }));
      console.log('[總倉商品資料庫] 已載入 ' + adminAidProductDB.length + ' 筆商品');
    } catch(e) {
      console.error('loadAdminProductDB error:', e);
    }
  }

  function renderAdminAidBoard() {

    const fulfilledCount = board.filter(a => a.status === 'fulfilled').length;
    const sumEl = document.getElementById('adminAidSummary');
    if (sumEl) {
      sumEl.innerHTML = '<div style="display:flex; gap:10px; flex-wrap:wrap;">' +
        '<div style="background:#dbeafe; border:1px solid #93c5fd; border-radius:8px; padding:10px 16px; min-width:100px; text-align:center;">' +
          '<div style="font-size:11px; color:#2b6cb0; font-weight:bold;">需求中</div>' +

          '<div style="font-size:11px; color:#2b6cb0; font-weight:bold;">釋出中</div>' +
          '<div style="font-size:22px; font-weight:bold; color:#2b6cb0;">' + offerCount + '</div></div>' +
        '<div style="background:#f3f4f6; border:1px solid #e5e7eb; border-radius:8px; padding:10px 16px; min-width:100px; text-align:center;">' +
          '<div style="font-size:11px; color:#718096; font-weight:bold;">已滿足</div>' +
          '<div style="font-size:22px; font-weight:bold; color:#718096;">' + fulfilledCount + '</div></div>' +

    const el = document.getElementById('adminAidList');
    if (!el) return;
    if (list.length === 0) {
      el.innerHTML = '<div style="text-align:center; padding:40px; color:#718096; font-size:14px;">目前沒有互助交流貼文</div>';

    el.innerHTML = list.map(function(post) {

        : '<span style="background:#fef3c7; color:#b7791f; padding:3px 10px; border-radius:12px; font-size:12px; font-weight:700;">⏳ 進行中</span>';
      const safeId = post.id.replace(/'/g, '');

        ? " <button class=\"btn\" style=\"padding:3px 8px; font-size:11px; background:#c53030;\" onclick=\"adminCancelAidPost('" + safeId + "')\">取消</button>"
        : '';
      const itemsHtml = post.items.map(function(item, itemIdx) {
        const remaining = item.qty - (item.fulfilledQty || 0);
        const pct = item.qty > 0 ? Math.round((item.fulfilledQty || 0) / item.qty * 100) : 0;

          '<div style="display:flex; align-items:center; gap:8px;">' + typeBadge + ' ' + statusBadge +
            ' <b style="font-size:14px;">' + post.posterStore + '</b>' +
            ' <span style="font-size:12px; color:#718096;">' + post.posterEmployee + '</span>' +
          '</div>' +
          '<div style="display:flex; align-items:center; gap:8px;">' +
            '<span style="font-size:12px; color:#718096;">' + post.createdAt + '</span>' + cancelBtn +

  // 總倉發文用的商品暫存
  let adminAidItems = [{ code: '', name: '', temp: '', qty: '' }];

  function adminPostAid(type) {
    const title = type === 'need' ? '📢 總倉求助' : '📦 總倉釋出庫存';
    adminAidItems = [{ code: '', name: '', temp: '', qty: '' }];

      title: title,
      html: '<div id="adminAidItemsWrap"></div>' +
        '<button onclick="adminAddAidItem()" style="margin-top:8px; padding:5px 14px; background:#f0f7ff; color:#2b6cb0; border:1px solid #2b6cb0; border-radius:4px; font-size:12px; cursor:pointer; font-family:inherit;">＋ 新增商品</button>',
      width: 520,
      showCancelButton: true,
      confirmButtonText: '發布',
      cancelButtonText: '取消',
      confirmButtonColor: '#2b6cb0',
      didOpen: function() { renderAdminAidItems(); },
      preConfirm: function() {
        // 從 DOM 讀回數量
        adminAidItems.forEach(function(item, idx) {
          var qtyEl = document.getElementById('adminAidQty-' + idx);
          if (qtyEl) item.qty = qtyEl.value;
        });
        var valid = adminAidItems.filter(function(i) { return i.name && i.name.trim() && parseInt(i.qty) > 0; });
        if (valid.length === 0) { Swal.showValidationMessage('請至少填寫一項商品並輸入數量'); return false; }
        return valid;
      }
    }).then(function(result) {
      if (!result.isConfirmed) return;
      var now = new Date();
      var ts = now.getFullYear() + '/' + String(now.getMonth()+1).padStart(2,'0') + '/' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
      var board = JSON.parse(localStorage.getItem('portalMutualAidBoard') || '[]');
      var maxId = board.length > 0 ? Math.max.apply(null, board.map(function(a) { return parseInt(a.id.replace('MA','')) || 0; })) : 0;
      var newPost = {
        id: 'MA' + String(maxId + 1).padStart(3, '0'),
        type: type,
        posterStore: '總倉',
        posterEmployee: currentUser ? (currentUser.full_name || currentUser.username) : '總倉',
        createdAt: ts,
        status: 'open',
        items: result.value.map(function(i) {
          return { code: i.code || '', name: i.name.trim(), temp: i.temp || '', price: 0, qty: parseInt(i.qty), fulfilledQty: 0, responses: [] };
        })
      };
      board.unshift(newPost);
      localStorage.setItem('portalMutualAidBoard', JSON.stringify(board));
      cloudSave('portalMutualAidBoard');
      Swal.fire({ icon:'success', title:'發布成功！', text:'編號 ' + newPost.id, timer:1500, showConfirmButton:false });
      renderAdminAidBoard();
    });
  }

    adminAidItems.splice(idx, 1);

  window.onAdminAidSearch = function(idx, keyword) {
    adminAidItems[idx].searchKeyword = keyword;
    if (!keyword.trim()) { adminAidItems[idx].code = ''; adminAidItems[idx].name = ''; adminAidItems[idx].temp = ''; }
    var drop = document.getElementById('adminAidDrop-' + idx);
    if (!drop) return;
    var kw = keyword.trim().toLowerCase();
    if (!kw) { drop.style.display = 'none'; return; }
    var products = window._adminAidProducts || [];
    var results = products.filter(function(p) { return p.name.toLowerCase().includes(kw) || p.code.toLowerCase().includes(kw); });
    if (results.length === 0) {
      drop.innerHTML = '<div style="padding:10px; color:#718096; font-size:13px;">找不到商品</div>';
    } else {
      drop.innerHTML = results.slice(0, 20).map(function(p) {
        var tc = p.temp === '冷凍' ? '#2b6cb0' : p.temp === '冷藏' ? '#06b6d4' : '#b7791f';
        var safeCode = (p.code || '').replace(/'/g, '');
        var safeName = (p.name || '').replace(/'/g, '');
        var safeTemp = (p.temp || '').replace(/'/g, '');
        return "<div onclick=\"selectAdminAidProd(" + idx + ", '" + safeCode + "', '" + safeName + "', '" + safeTemp + "')\" style=\"padding:8px 12px; cursor:pointer; font-size:13px; border-bottom:1px solid #f3f4f6;\" onmouseover=\"this.style.background='#f0f7ff'\" onmouseout=\"this.style.background=''\">" +
          '<b style="color:#718096; margin-right:6px;">' + p.code + '</b>' + p.name +
          (p.temp ? ' <span style="background:' + tc + '20; color:' + tc + '; padding:1px 5px; border-radius:4px; font-size:11px; font-weight:700;">' + p.temp + '</span>' : '') +
        '</div>';
      }).join('');
    }
    drop.style.display = 'block';
  };

  window.selectAdminAidProd = function(idx, code, name, temp) {
    adminAidItems[idx].code = code;
    adminAidItems[idx].name = name;
    adminAidItems[idx].temp = temp;
    renderAdminAidItems();
    setTimeout(function() { var el = document.getElementById('adminAidQty-' + idx); if (el) el.focus(); }, 50);

  window.showAdminAidDrop = function(idx) {
    var kw = (adminAidItems[idx].searchKeyword || '').trim();
    if (kw) onAdminAidSearch(idx, kw);

  window.hideAdminAidDrop = function(idx) {
    var drop = document.getElementById('adminAidDrop-' + idx);

  function adminRespondAid(postId, itemIdx) {
    var board = JSON.parse(localStorage.getItem('portalMutualAidBoard') || '[]');
    var post = board.find(function(a) { return a.id === postId; });
    if (!post || !post.items[itemIdx]) return;
    var item = post.items[itemIdx];
    var remaining = item.qty - (item.fulfilledQty || 0);
    if (remaining <= 0) { Swal.fire('已滿足', '此品項已全數滿足', 'info'); return; }
    var label = post.type === 'need' ? '提供' : '認領';
    Swal.fire({
      title: '總倉' + label + '：' + item.name,
      html: '<div style="font-size:13px; color:#718096; margin-bottom:8px;">剩餘需求：<b style="color:#c53030;">' + remaining + '</b> 件</div>' +
        '<input type="number" id="adminRespondQty" min="1" max="' + remaining + '" value="' + remaining + '" style="width:100px; padding:8px; text-align:center; font-size:16px; font-weight:700; border:1px solid #718096; border-radius:4px;">',
      showCancelButton: true,
      confirmButtonText: '確認' + label,
      cancelButtonText: '取消',
      confirmButtonColor: '#2b6cb0',
      preConfirm: function() {
        var q = parseInt(document.getElementById('adminRespondQty').value);
        if (!q || q <= 0) { Swal.showValidationMessage('請輸入有效數量'); return false; }
        if (q > remaining) { Swal.showValidationMessage('不可超過剩餘 ' + remaining + ' 件'); return false; }
        return q;
      }
    }).then(function(result) {
      if (!result.isConfirmed) return;
      var qty = result.value;
      var board2 = JSON.parse(localStorage.getItem('portalMutualAidBoard') || '[]');
      var p = board2.find(function(a) { return a.id === postId; });
      if (!p || !p.items[itemIdx]) return;
      var it = p.items[itemIdx];
      var now = new Date();
      var ts = now.getFullYear() + '/' + String(now.getMonth()+1).padStart(2,'0') + '/' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
      if (!it.responses) it.responses = [];
      it.responses.push({
        store: '總倉',
        employee: currentUser ? (currentUser.full_name || currentUser.username) : '總倉',
        qty: qty,
        transferId: '',
        respondedAt: ts
      });
      it.fulfilledQty = (it.fulfilledQty || 0) + qty;
      var allFulfilled = p.items.every(function(x) { return (x.fulfilledQty || 0) >= x.qty; });
      if (allFulfilled) p.status = 'fulfilled';
      localStorage.setItem('portalMutualAidBoard', JSON.stringify(board2));
      cloudSave('portalMutualAidBoard');
      Swal.fire({ icon:'success', title:'已回應' + label + ' ' + qty + ' 件', timer:1500, showConfirmButton:false });
      renderAdminAidBoard();
    });
  }

  function adminCreateAidTransfer(postId, itemIdx, respIdx) {
    var board = JSON.parse(localStorage.getItem('portalMutualAidBoard') || '[]');
    var post = board.find(function(a) { return a.id === postId; });
    if (!post || !post.items[itemIdx]) return;
    var item = post.items[itemIdx];
    var resp = (item.responses || [])[respIdx];
    if (!resp || resp.transferId) return;

    // 決定方向：need=總倉提供給發文者, offer=發文者提供給總倉
    var fromStore, toStore;
    if (post.type === 'need') {
      fromStore = '總倉'; toStore = post.posterStore;
    } else {
      fromStore = post.posterStore; toStore = '總倉';
    }

    var transferList = JSON.parse(localStorage.getItem('portalTransferList') || '[]');
    var maxTf = transferList.length > 0 ? Math.max.apply(null, transferList.map(function(t) { return parseInt(t.id.replace('TF','')) || 0; })) : 0;
    var tfId = 'TF' + String(maxTf + 1).padStart(3, '0');
    var now = new Date();
    var ts = now.getFullYear() + '/' + String(now.getMonth()+1).padStart(2,'0') + '/' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

    var tfRecord = {
      id: tfId,
      fromStore: fromStore,
      toStore: toStore,
      createdBy: currentUser ? (currentUser.full_name || currentUser.username) : '總倉',
      createdAt: ts,
      status: '待出貨',
      adminStatus: '待確認',
      aidPostId: post.id,
      items: [{ code: item.code || '', name: item.name, temp: item.temp || '', qty: resp.qty, price: item.price || 0 }]
    };
    transferList.push(tfRecord);
    localStorage.setItem('portalTransferList', JSON.stringify(transferList));
    cloudSave('portalTransferList');

    resp.transferId = tfId;
    localStorage.setItem('portalMutualAidBoard', JSON.stringify(board));
    cloudSave('portalMutualAidBoard');
    Swal.fire({ icon:'success', title:'已建立店轉店單', text: tfId + '（' + fromStore + ' → ' + toStore + '）', timer:2000, showConfirmButton:false });
    renderAdminAidBoard();
  }

  function adminCancelAidPost(postId) {
    Swal.fire({
      title: '取消此貼文？',
      text: '已有的回應和轉貨單不受影響',
      icon: 'warning', showCancelButton: true,
      confirmButtonText: '確定取消', cancelButtonText: '返回',
      confirmButtonColor: '#c53030'
    }).then(result => {
      if (!result.isConfirmed) return;
      const board = JSON.parse(localStorage.getItem('portalMutualAidBoard') || '[]');
      const post = board.find(a => a.id === postId);
      if (post) {
        post.status = 'cancelled';
        localStorage.setItem('portalMutualAidBoard', JSON.stringify(board));
        cloudSave('portalMutualAidBoard');
        renderAdminAidBoard();
      }
    });
  }

  let mockSalesOrders = [];

  function syncSalesOrdersToPortal() {
    localStorage.setItem('portalSalesOrders', JSON.stringify(mockSalesOrders));

  function syncSalesOrdersFromPortal() {
    try {
      const portalData = JSON.parse(localStorage.getItem('portalSalesOrders') || '[]');
      portalData.forEach(po => {
        const local = mockSalesOrders.find(o => o.id === po.id);
        if (!local) return;
        let hasNewReturn = false;
        po.items.forEach((pi, idx) => {
          if (local.items[idx] && pi.returnStatus === 'requested' && local.items[idx].returnStatus === 'none') {
            local.items[idx].returnQty = pi.returnQty;
            local.items[idx].returnStatus = 'requested';
            local.items[idx].returnReason = pi.returnReason || '';
            local.items[idx].reportType = pi.reportType || 'return';
            hasNewReturn = true;
          }
        });
        // 有新退貨申請時，自動將狀態改為退貨處理中
        if (hasNewReturn && local.status === 'issued') {

  // 匯入需求 CSV（格式：日期,店家,商品分類,商品編號,商品名稱,數量,處理經過,是否完成）
  function importDemandCSV(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const text = e.target.result;
        const lines = parseCSV(text);
        // 找到表頭行（含「商品編號」）
        let headerIdx = -1;
        for (let i = 0; i < Math.min(lines.length, 10); i++) {
          if (lines[i].some(c => c.includes('商品編號'))) { headerIdx = i; break; }
        }
        if (headerIdx === -1) { Swal.fire('錯誤', '找不到表頭（需含「商品編號」欄位）', 'error'); return; }

        // 篩選未完成的項目（是否完成 != TRUE，且有商品編號）
        const existing = JSON.parse(localStorage.getItem('portalAllRequests') || '[]');
        const existingIds = new Set(existing.map(r => r.id));
        let imported = 0, skipped = 0;

        for (let i = headerIdx + 1; i < lines.length; i++) {
          const row = lines[i];
          if (row.length < 8) continue;
          const [date, store, cat, pid, pname, qty, progress, done] = row;
          if (!pid || !pid.trim()) continue;
          if (done && done.trim() === 'TRUE') continue; // 已完成，跳過

          // 判斷類型
          let category = '追加商品';
          if (cat && cat.includes('詢問')) category = '詢問到貨日';

          // 產生唯一 ID（避免重複匯入）
          const idBase = 'CSV' + (date || '').replace(/[^0-9]/g, '') + '_' + pid.trim();
          const id = idBase + '_' + store;
          if (existingIds.has(id)) { skipped++; continue; }

          // 狀態映射
          let status = 'pending';
          const prog = (progress || '').trim();
          if (prog === '已完成' || prog === '已取消') continue;

          existing.push({
            id,
            storeId: (store || '').trim(),
            code: pid.trim(),
            name: (pname || '').trim(),
            qty: parseInt(qty) || 0,
            note: prog || '',
            category,
            createdAt: parseDateFromCSV(date),
            status,
            reply: ''
          });
          existingIds.add(id);
          imported++;
        }

        localStorage.setItem('portalAllRequests', JSON.stringify(existing));
        cloudSave('portalAllRequests');
        Swal.fire('匯入完成', `成功匯入 ${imported} 筆未完成需求${skipped > 0 ? `（${skipped} 筆已存在跳過）` : ''}`, 'success');
        renderDemandBackorderStation();
      } catch(err) {
        console.error('CSV import error:', err);
        Swal.fire('錯誤', '匯入失敗：' + err.message, 'error');
      }
    };
    reader.readAsText(file, 'UTF-8');
    input.value = '';
  }

  // 簡易 CSV 解析（處理引號內逗號）
  function parseCSV(text) {
    const results = [];
    const lines = text.split(/\r?\n/);
    for (const line of lines) {
      if (!line.trim()) continue;
      const row = [];
      let cur = '', inQuote = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (inQuote) {
          if (ch === '"' && line[i+1] === '"') { cur += '"'; i++; }
          else if (ch === '"') { inQuote = false; }
          else { cur += ch; }
        } else {
          if (ch === '"') { inQuote = true; }
          else if (ch === ',') { row.push(cur); cur = ''; }
          else { cur += ch; }
        }
      }
      row.push(cur);
      results.push(row);
    }
    return results;
  }

  // 解析 CSV 日期（如 "2/24( 周二)" → ISO 日期）
  function parseDateFromCSV(dateStr) {
    if (!dateStr) return new Date().toISOString();
    const m = dateStr.match(/(\d{1,2})\/(\d{1,2})/);
    if (!m) return new Date().toISOString();
    const month = parseInt(m[1]);
    const day = parseInt(m[2]);
    const year = month >= 11 ? 2025 : 2026; // 11月、12月是2025年
    return new Date(year, month - 1, day).toISOString();
  }

  // 總倉回覆後直接寫回共用 key
  function syncReplyToPortal(inq) {
    try {
      const raw = localStorage.getItem('portalAllRequests');
      if (!raw) return;
      const list = JSON.parse(raw);
      const target = list.find(r => r.id === inq.id);
      if (target) {
        target.status = 'done';
        target.reply = inq.reply || '';
        target.repliedAt = inq.repliedAt || '';
        target.newEta = inq.newEta || '';
        localStorage.setItem('portalAllRequests', JSON.stringify(list));
        cloudSave('portalAllRequests');
      }
    } catch(e) { console.error('syncReplyToPortal error:', e); }
  }

  // 計算訂單實際金額（扣除已確認退貨/壞損數量）
  function calcOrderAmount(order) {
    return order.items.reduce((sum, item) => {
      let deduct = 0;
      if (item.returnStatus === 'received') deduct = item.adminReturnQty || item.returnQty;
      else if (item.returnStatus === 'waived') deduct = item.returnQty;
      // requested / accepted / rejected → 尚未扣或不扣
      return sum + (item.qty - deduct) * item.unitPrice;
    }, 0);
  }

  // 是否可開立（已開立的不能再開）
  function isOrderReady(order) {
    if (order.status === 'issued') return false;
    return true;
  }

  // 是否在3天可修改期內
  function isEditable(createdAt) {
    const d = new Date(createdAt.replace(/\//g,'-').replace(' ','T'));
    return (Date.now() - d.getTime()) < 3 * 24 * 60 * 60 * 1000;
  }

  function printSalesOrderDetail(id) {
    const o = mockSalesOrders.find(s => s.id === id);
    if (!o) return;
    const amount = o.status === 'issued' ? o.finalAmount : calcOrderAmount(o);

    const itemRows = o.items.map((it, i) => {
      let deduct = 0;
      if (it.returnStatus === 'received') deduct = it.adminReturnQty || it.returnQty;
      else if (it.returnStatus === 'waived') deduct = it.returnQty;
      const effective = it.qty - deduct;
      const subtotal = effective * it.unitPrice;
      return `<tr>
        <td style="text-align:center;">${i + 1}</td>
        <td style="font-family:monospace; font-size:11px;">${it.productId}</td>
        <td>${it.name}${it.note ? ' <span style="color:#888; font-size:10px;">(' + it.note + ')</span>' : ''}</td>
        <td style="text-align:center;">${effective}</td>
        <td style="text-align:right;">$${it.unitPrice.toLocaleString()}</td>
        <td style="text-align:right;">$${subtotal.toLocaleString()}</td>
      </tr>`;
    }).join('');

    const html = `<html><head><title>${o.id}</title><style>
      body{font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif; padding:15px 20px; font-size:13px; color:#333; margin:0;}
      .title{text-align:center; font-size:18px; font-weight:bold; margin-bottom:10px; border-bottom:2px solid #333; padding-bottom:6px;}
      .info-row{display:flex; justify-content:space-between; margin-bottom:3px; font-size:13px;}
      table{width:100%; border-collapse:collapse; margin-top:6px;}
      th{border:1px solid #999; padding:4px 8px; background:#f0f0f0; font-size:12px; white-space:nowrap;}
      td{border:1px solid #ccc; padding:3px 8px; font-size:12px; line-height:1.4;}
      @media print { .no-print { display:none; } }
    </style></head><body>
      <div class="title">龍潭總倉 - 銷貨單</div>
      <div class="info-row"><span><b>分店：</b>${o.storeName}</span><span><b>單號：</b>${o.id}</span><span><b>日期：</b>${o.createdAt?.slice(0,10) || ''}</span></div>
      <div class="info-row"><span><b>揀貨單：</b>${o.waveId}</span><span><b>狀態：</b>${o.status === 'closed' ? '已結案' : o.status === 'disputed' ? '退貨處理中' : '已開立'}</span></div>
      <table>
        <thead><tr><th width="8%">項次</th><th width="18%">商品編號</th><th width="34%">商品名稱</th><th width="10%">數量</th><th width="14%">單價</th><th width="16%">小計</th></tr></thead>
        <tbody>${itemRows}</tbody>
        <tfoot>
          <tr style="border-top:2px solid #333; font-weight:bold; font-size:14px;">
            <td colspan="5" style="text-align:right; padding:6px 8px;"><b>合計</b></td>
            <td style="text-align:right; padding:6px 8px;"><b>$${amount.toLocaleString()}</b></td>
          </tr>
        </tfoot>
      </table>
      <script>window.onload=function(){ setTimeout(()=>{ window.print(); window.close(); }, 500); }<\/script>
    </body></html>`;

    const win = window.open('', '_blank');
    win.document.write(html);
    win.document.close();
  }

  function adminAcceptReturn(orderId, itemIdx) {
    const o = mockSalesOrders.find(s => s.id === orderId);
    if (!o) return;
    const item = o.items[itemIdx];
    Swal.fire({
      title: '接受退回',
      html: `品項：<b>${item.name}</b>　分店申請退 <b>${item.returnQty}</b> 件<br>
        <div style="margin-top:12px; text-align:left;">
          <label style="font-size:13px;">實際接受退貨件數：</label>
          <input id="swal-adminQty" type="number" min="1" max="${item.returnQty}" value="${item.returnQty}"
            style="width:80px; padding:5px; border:1px solid #718096; border-radius:4px; font-size:14px; margin-left:8px;">
          <label style="font-size:13px; display:block; margin-top:10px;">預計退回日：</label>
          <input id="swal-returnDate" type="date" style="padding:5px; border:1px solid #718096; border-radius:4px; font-size:13px; margin-top:4px; width:100%;">
        </div>`,
      showCancelButton: true, confirmButtonText: '確認接受', cancelButtonText: '取消',
      preConfirm: () => ({
        qty: parseInt(document.getElementById('swal-adminQty').value) || item.returnQty,
        date: document.getElementById('swal-returnDate').value
      })
    }).then(res => {
      if (!res.isConfirmed) return;
      item.returnStatus = 'accepted';
      item.adminReturnQty = res.value.qty;
      item.expectedReturnDate = res.value.date || '待確認';
      syncSalesOrdersToPortal();
      showSalesOrderDetail(orderId);
    });
  }

  function adminWaiveReturn(orderId, itemIdx) {
    const o = mockSalesOrders.find(s => s.id === orderId);
    if (!o) return;
    const item = o.items[itemIdx];
    Swal.fire({
      title: '接受，免退回（壞損認定）',
      html: `品項：<b>${item.name}</b><br>確認接受退 <b>${item.returnQty}</b> 件，但不需退回實體商品，直接從銷貨金額扣除？`,
      icon: 'warning', showCancelButton: true,
      confirmButtonText: '確認免退', cancelButtonText: '取消'
    }).then(res => {
      if (!res.isConfirmed) return;
      item.returnStatus = 'waived';
      syncSalesOrdersToPortal();
      showSalesOrderDetail(orderId);
    });
  }

  function adminRejectReturn(orderId, itemIdx) {
    const o = mockSalesOrders.find(s => s.id === orderId);
    if (!o) return;
    const item = o.items[itemIdx];
    Swal.fire({
      title: '不接受退回',
      html: `品項：<b>${item.name}</b>　分店申請原因：${item.returnReason}<br>
        <div style="margin-top:12px; text-align:left;">

        </div>`,
      showCancelButton: true, confirmButtonText: '確認不接受', cancelButtonText: '取消',
      confirmButtonColor: '#c53030',
      preConfirm: () => document.getElementById('swal-rejectReason').value.trim() || '無說明'
    }).then(res => {

  function adminMarkReturnReceived(orderId, itemIdx) {
    const o = mockSalesOrders.find(s => s.id === orderId);
    if (!o) return;
    const item = o.items[itemIdx];
    Swal.fire({
      title: '確認已收到退貨？',
      html: `品項：<b>${item.name}</b><br>實際收到 <b>${item.adminReturnQty}</b> 件，金額將扣除。`,

    }).then(res => {
      if (!res.isConfirmed) return;
      item.returnStatus = 'received';
      syncSalesOrdersToPortal();
      showSalesOrderDetail(orderId);

  }

  let asPageNum = 1;
  const AS_PER_PAGE = 30;

  function filterAdminSummary(showAll, page) {
    const publishedList = JSON.parse(localStorage.getItem('branchOrderList') || '[]');
    const branchOrders  = JSON.parse(localStorage.getItem('branchOrders') || '{}');
    const importedStores = JSON.parse(localStorage.getItem('importedStoreNames') || 'null');
    const importedPersonals = JSON.parse(localStorage.getItem('importedPersonalNames') || 'null');
    const summaryStoreNames = importedStores || branchNames;
    const summaryPersonalNames = importedPersonals || [];
    const allColumnNames = [...summaryStoreNames, ...summaryPersonalNames];

    const kw  = (document.getElementById('asKw')?.value || '').trim().toLowerCase();
    const dateType = document.getElementById('asDateType')?.value || 'start';
    const dateVal  = document.getElementById('asDateVal')?.value || '';

    let data = publishedList.length > 0 ? publishedList : ADMIN_MOCK_SUMMARY;
    if (!showAll && (dateVal || kw)) {
      if (dateVal) {
        if (dateType === 'start') data = data.filter(i => (i.startDate || '') === dateVal);
        else data = data.filter(i => (i.endDate || '') === dateVal);
      }
      if (kw) data = data.filter(i =>
        i.name.toLowerCase().includes(kw) || (i.productId || i.id || '').toLowerCase().includes(kw)
      );
    }
    // 依開團日新到舊排序
    data.sort((a, b) => (b.startDate || '').localeCompare(a.startDate || '') || (a.name || '').localeCompare(b.name || ''));

    // 分頁
    const totalPages = Math.max(1, Math.ceil(data.length / AS_PER_PAGE));
    if (page !== undefined) asPageNum = page;
    if (asPageNum < 1) asPageNum = 1;
    if (asPageNum > totalPages) asPageNum = totalPages;
    const start = (asPageNum - 1) * AS_PER_PAGE;
    const pageData = data.slice(start, start + AS_PER_PAGE);

    const tbody = document.getElementById('adminSummaryBody');
    if (!tbody) return;

    const N = allColumnNames.length;
    const tdFix  = 'border:1px solid #e2e8f0; padding:6px 6px; font-size:12px; white-space:nowrap; position:sticky; background:#fff; z-index:1;';
    const tdCell = 'border:1px solid #e2e8f0; padding:5px 3px; font-size:13px; text-align:center;';

    if (pageData.length === 0) {
      tbody.innerHTML = `<tr><td colspan="${N+6}" style="text-align:center; padding:60px; color:#718096;">無符合條件的商品</td></tr>`;
    } else {
      tbody.innerHTML = pageData.map((item, idx) => {
        const bg = idx % 2 === 1 ? '#fafafa' : '#fff';
        const isClosed = item.status === 'closed';
        const total = allColumnNames.reduce((s, n) => s + ((branchOrders[n] && branchOrders[n][item.id]) || 0), 0);
        const statusBtn = isClosed
          ? `<button onclick="toggleSummaryStatus('${item.id}')" style="background:#fef2f2; color:#c53030; border:1px solid #c53030; padding:3px 8px; border-radius:4px; font-size:11px; cursor:pointer; font-weight:bold; white-space:nowrap;">🔴結</button>`
          : `<button onclick="toggleSummaryStatus('${item.id}')" style="background:#f0fdf4; color:#276749; border:1px solid #276749; padding:3px 8px; border-radius:4px; font-size:11px; cursor:pointer; font-weight:bold; white-space:nowrap;">🟢開</button>`;
        const storeCells = summaryStoreNames.map(n => {
          const qty = (branchOrders[n] && branchOrders[n][item.id]) || 0;
          const filled = qty > 0;
          const cellBg = isClosed ? (filled ? '#e0f2fe' : '#fef2f2') : (filled ? '' : '');
          const cellColor = filled ? 'color:#2b6cb0; font-weight:600;' : (isClosed ? 'color:#fca5a5;' : 'color:#d1d5db;');
          return `<td style="${tdCell} ${cellColor} ${cellBg ? 'background:'+cellBg+';' : ''}">${filled ? qty : (isClosed ? '✕' : '-')}</td>`;
        }).join('');
        const personalCells = summaryPersonalNames.map(n => {
          const qty = (branchOrders[n] && branchOrders[n][item.id]) || 0;
          return `<td style="${tdCell} ${qty > 0 ? 'color:#92400e; font-weight:600; background:#fef3c7;' : 'color:#718096;'}">${qty > 0 ? qty : '-'}</td>`;
        }).join('');
        return `<tr style="background:${bg}; ${isClosed ? 'opacity:0.7;' : ''}">
          <td style="${tdFix} left:0; text-align:center; width:36px;"><input type="checkbox" class="as-checkbox" value="${item.id}" style="width:15px; height:15px; cursor:pointer;"></td>
          <td style="${tdFix} left:36px; text-align:center; width:56px;">${statusBtn}</td>
          <td style="${tdFix} left:${36+56}px; text-align:center; width:${_SC.d1}px;">${item.startDate || '-'}</td>
          <td style="${tdFix} left:${36+56+_SC.d1}px; text-align:center; width:${_SC.d2}px; color:#e11d48; font-weight:500;">${item.endDate || '-'}</td>
          <td class="as-name-td" style="${tdFix} left:${36+56+_SC.d1+_SC.d2}px; width:${_SC.nm}px; max-width:${_SC.nm}px; overflow:hidden; text-overflow:ellipsis;">
            <span style="font-size:11px; color:#718096;">${item.productId || item.id || ''}</span>
            <span style="font-weight:600; color:#2d3748;">${item.name}</span>
          </td>
          ${storeCells}
          ${personalCells}
          <td style="${tdCell} font-weight:700; background:#f0f7ff; color:#2b6cb0;">${total || '-'}</td>
        </tr>`;
      }).join('');
    }
    const c = document.getElementById('asSummaryCount');
    if (c) c.innerText = `共 ${data.length} 件`;

    // 分頁列
    const pgBox = document.getElementById('asPagination');
    if (!pgBox) return;
    if (totalPages <= 1) { pgBox.innerHTML = ''; return; }

  function toggleAllAsCheckboxes(source) {
    document.querySelectorAll('.as-checkbox').forEach(cb => { cb.checked = source.checked; });
  }

  function batchSummaryStatus(newStatus) {
    const checked = [...document.querySelectorAll('.as-checkbox:checked')].map(cb => cb.value);
    if (checked.length === 0) {
      Swal.fire('請先勾選', '請勾選要操作的商品', 'info');
      return;
    }
    const label = newStatus === 'closed' ? '結單' : '開放';
    Swal.fire({
      title: `批次${label}`,
      text: `確定將 ${checked.length} 筆商品設為「${label}」？`,
      icon: 'question',
      showCancelButton: true,
      confirmButtonText: `確定${label}`,
      cancelButtonText: '取消',
      confirmButtonColor: newStatus === 'closed' ? '#c53030' : '#2b6cb0'
    }).then(r => {
      if (!r.isConfirmed) return;
      const saved = JSON.parse(localStorage.getItem('branchOrderList') || '[]');
      checked.forEach(id => {
        const entry = saved.find(p => p.id === id);
        if (entry) entry.status = newStatus;
        const procItem = mockConsolidatedOrders.find(i => i.id === id);
        if (procItem) procItem.status = newStatus;
      });
      localStorage.setItem('branchOrderList', JSON.stringify(saved));
      cloudSave('branchOrderList');
      logActivity(`批次${label}`, 'SUMMARY', { count: checked.length });
      filterAdminSummary(false, asPageNum);
      Swal.fire({ title: `已${label}`, text: `共 ${checked.length} 筆`, icon: 'success', timer: 1500, showConfirmButton: false });
    });
  }

  function toggleSummaryStatus(itemId) {
    // 1. 更新 branchOrderList
    const saved = JSON.parse(localStorage.getItem('branchOrderList') || '[]');
    const entry = saved.find(p => p.id === itemId);
    if (!entry) return;
    entry.status = entry.status === 'closed' ? 'open' : 'closed';
    localStorage.setItem('branchOrderList', JSON.stringify(saved));
    cloudSave('branchOrderList');

    // 2. 同步到訂貨追蹤的 mockConsolidatedOrders
    const procItem = mockConsolidatedOrders.find(i => i.id === itemId);
    if (procItem) procItem.status = entry.status;

    logActivity(entry.status === 'closed' ? '結單' : '重新開放', itemId, entry.name);
    syncProcurementToPortal();

    // 3. 刷新開團總表（保持當前頁）
    filterAdminSummary(false, asPageNum);
  }

  // ===== 品名欄拖曳調整寬度 =====
  let _resizing = false, _startX = 0, _startW = 0;
  function startResizeName(e) {
    e.preventDefault();
    _resizing = true;
    _startX = e.clientX;
    const th = document.getElementById('asNameTh');
    _startW = th.offsetWidth;
    document.addEventListener('mousemove', doResizeName);
    document.addEventListener('mouseup', stopResizeName);
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  }
  function doResizeName(e) {
    if (!_resizing) return;
    const diff = e.clientX - _startX;
    const newW = Math.max(120, Math.min(600, _startW + diff));
    const th = document.getElementById('asNameTh');
    if (!th) return;
    th.style.width = newW + 'px';
    // 同步更新 tbody 裡的品名 td
    document.querySelectorAll('.as-name-td').forEach(td => {
      td.style.width = newW + 'px';
      td.style.maxWidth = newW + 'px';
      td.style.left = (36 + 56 + _SC.d1 + _SC.d2) + 'px';
    });
  }
  function stopResizeName() {
    _resizing = false;
    document.removeEventListener('mousemove', doResizeName);
    document.removeEventListener('mouseup', stopResizeName);
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }

  function refreshServiceTable() {
    const monthFilter  = document.getElementById('svc-filter-month')?.value  || '';
    const storeFilter  = document.getElementById('svc-filter-store')?.value  || '';
    const statusFilter = document.getElementById('svc-filter-status')?.value || 'all';
    let data = [...mockInquiries].sort((a,b) => b.createdAt.localeCompare(a.createdAt));
    if (monthFilter)  data = data.filter(i => i.createdAt.startsWith(monthFilter));
    if (storeFilter)  data = data.filter(i => i.storeId === storeFilter);
    if (statusFilter !== 'all') data = data.filter(i => i.status === statusFilter);
    const tbody = document.getElementById('serviceTableBody');
    if (!tbody) return;
    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="8" style="padding:40px; text-align:center; color:#718096;">沒有符合條件的詢問記錄</td></tr>`;
      return;
    }
    tbody.innerHTML = data.map((inq, idx) => {
      const order = mockConsolidatedOrders.find(o => o.id === inq.productId);
      const eta = order && order.eta ? order.eta : '—';
      const isPending = inq.status === 'pending';
      const rowBg = idx % 2 === 0 ? '#fff' : '#fafafa';
      const isAddon = inq.category === '追加商品';
      const catBadge = isAddon
        ? `<span style="display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:bold; background:#fef3c7; color:#b7791f; border:1px solid #ecc94b;">追加商品</span>`
        : `<span style="display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:bold; background:#f0f7ff; color:#2b6cb0; border:1px solid #93c5fd;">詢問到貨日</span>`;
      const processText = `<div style="font-weight:bold; font-size:12px; color:#2d3748; margin-bottom:2px;">${inq.productName}</div>
        <div style="color:#718096; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:200px;" title="${inq.message}">「${inq.message}」</div>
        ${inq.status==='replied' ? `<div style="font-size:11px; color:#2b6cb0; margin-top:2px;">↩ ${inq.reply.substring(0,30)}${inq.reply.length>30?'…':''}</div>` : ''}`;
      const statusBadge = isPending
        ? `<span style="display:inline-block; padding:3px 9px; border-radius:12px; font-size:11px; font-weight:bold; background:#fef2f2; color:#c53030; border:1px solid #fecaca;">⚡ 待回覆</span>`
        : `<span style="display:inline-block; padding:3px 9px; border-radius:12px; font-size:11px; font-weight:bold; background:#f0f7ff; color:#2b6cb0; border:1px solid #bbf7d0;">✓ 已回覆</span>`;
      return `
        <tr style="background:${rowBg}; cursor:pointer;" onclick="openInquiryDetail('${inq.id}')" title="點擊查看詳情${isPending ? ' / 回覆' : ''}">

          <td style="padding:10px 12px;"><span style="background:#2b6cb0; color:white; border-radius:3px; padding:2px 7px; font-size:12px; font-weight:bold;">${inq.storeId}</span></td>

  function closeSalesOrder(id) {
    const o = mockSalesOrders.find(s => s.id === id);
    if (!o || o.status === 'closed') return;
    const finalAmt = calcOrderAmount(o);
    const returnLog = o.items.filter(i => i.returnStatus !== 'none')
      .map(i => {
        if (i.returnStatus==='received') return `• ${i.name} 已收到退貨 ${i.adminReturnQty||i.returnQty} 件`;
        if (i.returnStatus==='waived')   return `• ${i.name} 壞損免退 ${i.returnQty} 件`;
        if (i.returnStatus==='rejected') return `• ${i.name} 不接受退回`;
        return `• ${i.name} 退貨申請 ${i.returnQty} 件`;
      }).join('<br>');
    Swal.fire({
      title: '確認結案？',
      html: `分店：<b>${o.storeName}</b>　最終金額：<b style="color:#2b6cb0; font-size:16px;">$${finalAmt.toLocaleString()}</b>
        ${returnLog ? `<hr style="margin:10px 0;"><div style="text-align:left; font-size:12px; color:#718096;">退貨處理紀錄：<br>${returnLog}</div>` : ''}
        <div style="margin-top:10px; font-size:12px; color:#718096;">結案後此銷貨單將不可再修改。</div>`,
      icon: 'question', showCancelButton: true,
      confirmButtonText: '確認結案', cancelButtonText: '再看看',
      confirmButtonColor: '#047857'
    }).then(res => {
      if (!res.isConfirmed) return;
      o.status = 'closed';
      o.finalAmount = finalAmt;
      o.closedAt = new Date().toISOString();
      syncSalesOrdersToPortal();
      logActivity('銷貨單結案', id, { store: o.storeName, finalAmount: finalAmt });
      Swal.fire({ title:'已結案', html:`📁 <b>${id}</b> 已結案<br>最終金額 $${finalAmt.toLocaleString()}`, icon:'success', timer:2000, showConfirmButton:false })
        .then(() => renderAccountingStation());
    });
  }

  async function toggleEmployeeStatus(empId, newStatus) {
    const emp = employeeList.find(e => e.username === empId);
    if (!emp) return;
    const action = newStatus === 'active' ? '啟用' : '停用';
    const confirmed = await Swal.fire({
      title: `確定${action}此帳號？`,
      html: `帳號：<b>${emp.username}</b>（${emp.full_name || ''}）`,
      icon: 'warning', showCancelButton: true,
      confirmButtonText: `確定${action}`, cancelButtonText: '取消',
      confirmButtonColor: newStatus === 'active' ? '#047857' : '#c53030'
    });
    if (!confirmed.isConfirmed) return;
    try {
      // 停用時刪除 Auth 帳號，啟用時用 signUp 重建
      if (newStatus === 'inactive') {
        await fetch(`${SB_URL}/rpc/admin_delete_auth_user`, {
          method: 'POST', headers: { ...HEADERS, 'Content-Type': 'application/json' },
          body: JSON.stringify({ p_username: emp.username })
        });
      } else {
        const pw = emp.password || '123456';
        const reCreateResp = await fetch(`${SB_URL}/rpc/admin_create_auth_user`, {
          method: 'POST', headers: { ...HEADERS, 'Content-Type': 'application/json' },
          body: JSON.stringify({ p_username: emp.username, p_password: pw, p_full_name: emp.full_name || '', p_role: emp.role || 'staff', p_store: emp.store || '' })
        });
        if (!reCreateResp.ok) { const err = await reCreateResp.json(); throw new Error(err.message || '重建帳號失敗'); }
      }
      const resp = await fetch(`${SB_URL}/employees?username=eq.${emp.username}`, {
        method: 'PATCH',
        headers: { ...HEADERS, 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: newStatus })
      });
      if (!resp.ok) { const err = await resp.json(); throw new Error(err.message || '操作失敗'); }
      Swal.fire({ icon:'success', title:`已${action}`, timer:1200, showConfirmButton:false })
        .then(() => renderEmployeeManagement());
    } catch(e) {
      Swal.fire('操作失敗', e.message, 'error');
    }
  }

  function addBranch() {
    Swal.fire({
      title: '➕ 新增',
      html: `
        <div style="text-align:left; font-size:13px;">
          <div style="margin-bottom:10px;">
            <label style="font-weight:bold; color:#718096; font-size:12px;">名稱</label>
            <input id="branch-name" type="text" placeholder="輸入名稱" style="width:100%; padding:8px; border:1px solid #dde3ec; border-radius:6px; font-size:13px; margin-top:4px;">
          </div>
          <div>
            <label style="font-weight:bold; color:#718096; font-size:12px;">類型</label>
            <select id="branch-type" style="width:100%; padding:8px; border:1px solid #dde3ec; border-radius:6px; font-size:13px; margin-top:4px;">
              <option value="store">🏪 分店</option>
              <option value="wholesale">📦 批發</option>
            </select>
          </div>
        </div>`,
      showCancelButton: true,
      confirmButtonText: '新增',
      cancelButtonText: '取消',
      confirmButtonColor: '#2b6cb0',
      preConfirm: () => {
        const name = (document.getElementById('branch-name')?.value || '').trim();
        const type = document.getElementById('branch-type')?.value || 'store';
        if (!name) { Swal.showValidationMessage('請輸入名稱'); return false; }
        if (branchNames.includes(name)) { Swal.showValidationMessage('此名稱已存在'); return false; }
        return { name, type };
      }
    }).then(res => {
      if (res.isConfirmed) {
        branchData.push(res.value);
        saveBranchData();
        renderBranchManagement();
        Swal.fire({ icon:'success', title:'已新增', text:res.value.name, timer:1200, showConfirmButton:false });
      }
    });
  }

  function renameBranch(idx) {
    const old = branchData[idx];
    Swal.fire({
      title: '✏️ 修改名稱',
      input: 'text',
      inputValue: old.name,
      showCancelButton: true,
      confirmButtonText: '儲存',
      cancelButtonText: '取消',
      confirmButtonColor: '#2b6cb0',
      inputValidator: (val) => {
        if (!val || !val.trim()) return '請輸入名稱';
        if (val.trim() !== old.name && branchNames.includes(val.trim())) return '此名稱已存在';
      }
    }).then(res => {
      if (res.isConfirmed) {
        branchData[idx].name = res.value.trim();
        saveBranchData();
        renderBranchManagement();
        Swal.fire({ icon:'success', title:'已更新', timer:1000, showConfirmButton:false });
      }
    });
  }

  function toggleBranchType(idx) {
    const b = branchData[idx];
    const newType = b.type === 'store' ? 'wholesale' : 'store';
    const label = newType === 'store' ? '🏪 分店' : '📦 批發';
    b.type = newType;
    saveBranchData();
    renderBranchManagement();
    Swal.fire({ icon:'success', title:`${b.name} → ${label}`, timer:1000, showConfirmButton:false });
  }

  function deleteBranch(idx) {
    const b = branchData[idx];
    Swal.fire({
      title: '確定刪除？',
      html: `<b>${b.name}</b>（${b.type === 'store' ? '分店' : '批發'}）`,
      icon: 'warning',
      showCancelButton: true,
      confirmButtonText: '刪除',
      cancelButtonText: '取消',
      confirmButtonColor: '#c53030'
    }).then(res => {
      if (res.isConfirmed) {
        branchData.splice(idx, 1);
        saveBranchData();
        renderBranchManagement();
        Swal.fire({ icon:'success', title:'已刪除', timer:1000, showConfirmButton:false });
      }
    });
  }

  function resetBranches() {
    Swal.fire({
      title: '還原為預設清單？',
      text: '將覆蓋目前的自訂清單，恢復為系統預設的 ' + DEFAULT_BRANCH_DATA.length + ' 間。',
      icon: 'warning',
      showCancelButton: true,
      confirmButtonText: '確定還原',
      cancelButtonText: '取消',
      confirmButtonColor: '#b7791f'
    }).then(res => {
      if (res.isConfirmed) {
        branchData = JSON.parse(JSON.stringify(DEFAULT_BRANCH_DATA));
        saveBranchData();
        renderBranchManagement();
        Swal.fire({ icon:'success', title:'已還原', timer:1200, showConfirmButton:false });
      }
    });
