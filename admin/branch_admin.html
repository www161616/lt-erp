    // 當開團日改變時，結單日自動往後推算 2 天
    function updateDefaultEndDate() {
      const startInput = document.getElementById('fastStartDate').value;
      if (!startInput) return;
      const startDate = new Date(startInput);
      startDate.setDate(startDate.getDate() + 2); 
      document.getElementById('fastEndDate').value = startDate.toISOString().split('T')[0];
    }


    function fastFieldEnter(e) {
      if (e.key !== 'Enter') return;
      e.preventDefault();
      const nextId = e.target.dataset.next;
      if (nextId === 'SUBMIT') { generateProductCode(); return; }
      const nextEl = document.getElementById(nextId);
      if (nextEl) { nextEl.focus(); nextEl.select(); }
    }

    function addCustomCategory() {
      Swal.fire({
        title: '新增自訂分類',
        input: 'text',
        inputPlaceholder: '輸入分類名稱',
        showCancelButton: true,
        confirmButtonText: '新增',
        cancelButtonText: '取消',
        confirmButtonColor: '#2b6cb0'
      }).then(result => {
        if (result.isConfirmed && result.value?.trim()) {
          const name = result.value.trim();
          if (productCategories.includes(name)) {
            Swal.fire('提醒', '此分類已存在', 'warning');
            return;
          }
          productCategories.push(name);
          saveCategories();
          const sel = document.getElementById('fastCategory');
          if (sel) {
            sel.innerHTML = productCategories.map(c => `<option value="${c}">${c}</option>`).join('');
            sel.value = name;
          }
          Swal.fire({ icon: 'success', title: `已新增分類「${name}」`, timer: 1200, showConfirmButton: false });
        }
      });
    }

    function generateProductCode() {
      const nameInput = document.getElementById('fastName');
      const priceInput = document.getElementById('fastPrice');
      const storePriceInput = document.getElementById('fastStorePrice');
      
      const name = nameInput.value.trim();
      const price = priceInput.value;
      const storePrice = storePriceInput.value || 0;
      const wholesalePrice = document.getElementById('fastWholesalePrice').value || 0;
      const groupPrice = document.getElementById('fastGroupPrice').value || 0;
      const cost = document.getElementById('fastCost').value || 0;
      const supplier = document.getElementById('fastSupplier').value.trim();
      const startDate = document.getElementById('fastStartDate').value;
      const endDate = document.getElementById('fastEndDate').value;
      const category = document.getElementById('fastCategory').value;
      // 分類對應編號前綴（向下相容舊溫層編碼）
      const CAT_PREFIX = { '冷凍':'1', '冷藏':'2', '常溫':'3', '漂漂館':'N' };
      const tempVal = CAT_PREFIX[category] || String(productCategories.indexOf(category) + 1);
      const variantsRaw = document.getElementById('fastVariants').value.trim();

      let hasError = false;
      if (!name) { nameInput.style.borderColor = 'red'; hasError = true; } else { nameInput.style.borderColor = 'var(--border)'; }
      if (!price) { priceInput.style.borderColor = 'red'; hasError = true; } else { priceInput.style.borderColor = 'var(--border)'; }
      
      if (hasError) {
        Swal.fire('提醒', '請填寫打紅框的必填欄位！', 'error');
        return;
      }

      // 支援多種分隔符號
      const variants = variantsRaw ? variantsRaw.split(/[,，、/／]+/).map(v => v.trim()).filter(v => v) : [];
      const itemsToAdd = [];
      const manualCode = document.getElementById('fastCode').value.trim();

      if (manualCode) {
        // 手動輸入編號：直接使用，有規格時以前 8 碼為底加尾碼
        const base = manualCode.substring(0, 8);
        if (variants.length === 0) {
          itemsToAdd.push({ code: manualCode, name: name, temp: tempVal, category: category, price: price, storePrice: storePrice, wholesalePrice: wholesalePrice, groupPrice: groupPrice, cost: cost, supplier: supplier, startDate: startDate, endDate: endDate });
        } else {
          variants.forEach((v, index) => {
            itemsToAdd.push({ code: base + (index + 1), name: `${name}-${v}`, temp: tempVal, category: category, price: price, storePrice: storePrice, wholesalePrice: wholesalePrice, groupPrice: groupPrice, cost: cost, supplier: supplier, startDate: startDate, endDate: endDate });
          });
        }
      } else {
        const dateObj = new Date(document.getElementById('fastStartDate').value);
        const datePart = String(dateObj.getFullYear()).slice(-1) + 
                         String(dateObj.getMonth() + 1).padStart(2, '0') + 
                         String(dateObj.getDate()).padStart(2, '0');
        const seqPart = String(dailySequence).padStart(2, '0');
        const base = tempVal + datePart + seqPart;

        if (variants.length === 0) {
          itemsToAdd.push({ code: base + '0', name: name, temp: tempVal, category: category, price: price, storePrice: storePrice, wholesalePrice: wholesalePrice, groupPrice: groupPrice, cost: cost, supplier: supplier, startDate: startDate, endDate: endDate });
        } else {
          variants.forEach((v, index) => {
            itemsToAdd.push({ code: base + (index + 1), name: `${name}-${v}`, temp: tempVal, category: category, price: price, storePrice: storePrice, wholesalePrice: wholesalePrice, groupPrice: groupPrice, cost: cost, supplier: supplier, startDate: startDate, endDate: endDate });
          });
        }
        dailySequence++; 
      }

      itemsToAdd.forEach(item => {
        stagingList.push(item);
        renderStagingList();
      });

      nameInput.value = '';
      document.getElementById('fastCode').value = '';
      document.getElementById('fastVariants').value = '';
      priceInput.value = '';
      document.getElementById('fastWholesalePrice').value = '0';
      document.getElementById('fastGroupPrice').value = '0';
      document.getElementById('fastSupplier').value = '';
      nameInput.focus();
    }

    function renderStagingList() {
      const tbody = document.getElementById('stagingListBody');
      if(!tbody) return; 

      tbody.innerHTML = stagingList.map((item, index) => `
        <tr style="border-bottom:1px solid #f3f4f6;">
          <td style="font-family:monospace; font-weight:bold; color:#2b6cb0; font-size:12px;">${item.code}</td>
          <td>
            <input type="text" value="${item.name.replace(/"/g,'&quot;')}" onchange="updateStagingItem(${index}, 'name', this.value)" style="width:100%; padding:3px; font-size:12px; font-weight:bold; border:1px solid #e2e8f0; border-radius:3px;">
          </td>
          <td style="text-align:center; font-size:11px; color:#718096;">${item.category || TEMP_CAT[item.temp] || ''}</td>

          <td style="text-align:right;">
            <input type="number" value="${item.price}" onchange="updateStagingItem(${index}, 'price', this.value)" style="width:100%; padding:4px; font-size:12px; color:#2b6cb0; font-weight:bold; text-align:right;">
          </td>
          <td style="text-align:right;">
            <input type="number" value="${item.storePrice}" onchange="updateStagingItem(${index}, 'storePrice', this.value)" style="width:100%; padding:4px; font-size:12px; text-align:right;">
          </td>
          <td style="text-align:right;">
            <input type="number" value="${item.wholesalePrice||0}" onchange="updateStagingItem(${index}, 'wholesalePrice', this.value)" style="width:100%; padding:4px; font-size:12px; text-align:right;">
          </td>
          <td style="text-align:right;">
            <input type="number" value="${item.groupPrice||0}" onchange="updateStagingItem(${index}, 'groupPrice', this.value)" style="width:100%; padding:4px; font-size:12px; text-align:right;">
          </td>
          <td style="text-align:right;">
            <input type="number" value="${item.cost||0}" onchange="updateStagingItem(${index}, 'cost', this.value)" style="width:100%; padding:4px; font-size:12px; text-align:right;">
          </td>
          <td>
            <input type="text" value="${(item.supplier||'').replace(/"/g,'&quot;')}" onchange="updateStagingItem(${index}, 'supplier', this.value)" style="width:100%; padding:4px; font-size:12px;">
          </td>
          <td>
            <input type="date" value="${item.endDate}" onchange="updateStagingItem(${index}, 'endDate', this.value)" style="width:100%; padding:4px; font-size:12px;">
          </td>
          <td style="text-align:center;">
            <button class="btn btn-danger" onclick="removeStagingItem(${index})">✕</button>
          </td>
        </tr>
      `).join('');
    }

    function updateStagingItem(index, field, newValue) {
      if (['price','storePrice','wholesalePrice','groupPrice','cost'].includes(field)) {
        stagingList[index][field] = Number(newValue) || 0;
      } else {
        stagingList[index][field] = newValue;
      }
    }

    // 開團日 = ProductList 建立日期，寫入 ERP 時帶入 created_date


    function removeStagingItem(index) {
      stagingList.splice(index, 1);
      renderStagingList();
    }

    async function syncToERP() {
      if (stagingList.length === 0) {
        Swal.fire('提醒', '清單內沒有商品', 'warning');
        return;
      }

      // ① 查 Supabase 哪些編號已存在
      const ids = stagingList.map(i => `"${i.code}"`).join(',');
      let existingIds = new Set();
      try {
        const chk = await fetch(`${SB_URL}/products?id=in.(${ids})&select=id`, { headers: HEADERS });
        if (chk.ok) {
          const rows = await chk.json();
          rows.forEach(r => existingIds.add(r.id));
        }
      } catch(e) { /* 查詢失敗不擋，讓後面 POST 的錯誤自然浮現 */ }

      const newItems = stagingList.filter(i => !existingIds.has(i.code));
      const skipped  = stagingList.filter(i =>  existingIds.has(i.code));

      // ② POST 新品到 Supabase products
      let savedCount = 0;
      if (newItems.length > 0) {
        const payload = newItems.map(item => ({
          id:              item.code,
          name:            item.name,
          category:        item.category || TEMP_CAT[item.temp] || '未分類',
          unit:            '個',
          price:           Number(item.price)          || 0,
          price_branch:    Number(item.storePrice)     || 0,
          price_wholesale:     Number(item.wholesalePrice) || 0,
          price_group:      Number(item.groupPrice)     || 0,
          cost:            Number(item.cost)            || 0,
          supplier:        item.supplier || '',
          created_at:      item.startDate || null,
          status:          '啟用'
        }));

        const res = await fetch(`${SB_URL}/products`, {
          method: 'POST', headers: HEADERS, body: JSON.stringify(payload)
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          Swal.fire('❌ 寫入失敗', err.message || err.details || '請確認 Supabase 連線', 'error');
          return;
        }
        savedCount = newItems.length;
        
        // ✨ 紀錄操作：商品同步 ERP
        await logActivity('商品建檔同步 ERP', 'PRODUCTS', { 
          count: savedCount, 
          items: newItems.map(i => i.code).join(','),
          skipped: skipped.length
        });
      }

      // ③ 同步至 branch_portal localStorage（結單填表用）
      const saved = JSON.parse(localStorage.getItem('branchOrderList') || '[]');
      stagingList.forEach(item => {
        const entry = {
          id: item.code, name: item.name,
          price: Number(item.price), storePrice: Number(item.storePrice),
          wholesalePrice: Number(item.wholesalePrice) || 0,
          groupPrice: Number(item.groupPrice) || 0,
          cost: Number(item.cost), temp: item.temp,
          category: item.category || TEMP_CAT[item.temp] || '',
          supplier: item.supplier || '',
          startDate: item.startDate, endDate: item.endDate,
          status: 'open'
        };
        const idx = saved.findIndex(p => p.id === item.code);
        if (idx >= 0) saved[idx] = entry;
        else saved.push(entry);
      });
      localStorage.setItem('branchOrderList', JSON.stringify(saved));
      cloudSave('branchOrderList');

      // ④ 結果提示
      let msg = '';
      if (savedCount)      msg += `✅ 寫入 ERP 商品主檔：<b>${savedCount}</b> 件新品<br>`;
      if (skipped.length)  msg += `⏭️ 編號已存在跳過：<b>${skipped.length}</b> 件<br>`;
      msg += `📤 已同步 <b>${stagingList.length}</b> 件至分店結單填表`;

      // 匯入後同步訂貨追蹤給分店
      syncOrderTrackingData().then(() => syncProcurementToPortal());

      Swal.fire({ title: '寫入完成！', html: msg, icon: 'success' }).then(() => {
        stagingList = [];
        renderStagingList();
      });
    }

// ============================
    // 功能一：批次揀貨與分貨站 (極速直入大表版)
    // ============================

    // 模擬：今日廠商到貨，準備要分派的商品清單
    const mockArrivals = [];

    const DEFAULT_BRANCH_DATA = [
      { name:'三峽', type:'store' }, { name:'中和', type:'store' }, { name:'文山', type:'store' },
      { name:'四號', type:'store' }, { name:'永和', type:'store' }, { name:'忠順', type:'store' },
      { name:'淡水', type:'store' }, { name:'環球', type:'store' }, { name:'平鎮', type:'store' },
      { name:'古華', type:'store' }, { name:'林口', type:'store' }, { name:'南平', type:'store' },
      { name:'泰山', type:'store' }, { name:'萬華', type:'store' }, { name:'板橋', type:'store' },
      { name:'湖口', type:'store' }, { name:'經國', type:'store' }, { name:'松山', type:'store' },
      { name:'龍潭', type:'wholesale' }, { name:'買上隱', type:'wholesale' },
      { name:'山張', type:'wholesale' }, { name:'全民', type:'wholesale' }, { name:'大溪', type:'wholesale' }
    ];
    let branchData = JSON.parse(localStorage.getItem('branchDataList') || 'null') || [...DEFAULT_BRANCH_DATA];
    // branchNames 保持向下相容：所有名稱（不分類型）
    let branchNames = branchData.map(b => b.name);
    function saveBranchData() {
      localStorage.setItem('branchDataList', JSON.stringify(branchData));
      cloudSave('branchDataList');
      branchNames = branchData.map(b => b.name);
      // 同步類型資訊給 portal 讀取
      const typeMap = {};
      branchData.forEach(b => { typeMap[b.name] = b.type; });
      localStorage.setItem('branchTypeMap', JSON.stringify(typeMap));
      cloudSave('branchTypeMap');
    }
    // 初始化時也寫一次 typeMap
    saveBranchData();

    // === 動態揀貨資料來源（優先使用匯入的開團資料）===
    let pickingStoreNames = branchNames;
    let pickingArrivals = mockArrivals;

    function initPickingData() {
      try {
        const orderList = JSON.parse(localStorage.getItem('branchOrderList') || '[]');
        const branchOrdersData = JSON.parse(localStorage.getItem('branchOrders') || '{}');
        const importedStores = JSON.parse(localStorage.getItem('importedStoreNames') || 'null');
        const importedPersonal = JSON.parse(localStorage.getItem('importedPersonalNames') || 'null');

        if (orderList.length > 0 && importedStores && importedStores.length > 0) {
          // 合併店家 + 個人買家，全部納入揀貨欄位
          pickingStoreNames = [...importedStores];
          if (importedPersonal && importedPersonal.length > 0) {
            pickingStoreNames = pickingStoreNames.concat(importedPersonal);
          }
          pickingArrivals = orderList.map(item => {
            const alloc = {};
            let totalAllocQty = 0;
            pickingStoreNames.forEach(store => {
              const qty = (branchOrdersData[store] && branchOrdersData[store][item.id]) || 0;
              alloc[store] = qty;
              totalAllocQty += qty;
            });
            return {
              id: item.id,
              productId: item.productId || item.id,
              name: item.name,
              temp: item.temp || '',
              category: item.category || '',
              startDate: item.startDate ? item.startDate.replace(/-/g, '/') : '',
              endDate: item.endDate ? item.endDate.replace(/-/g, '/') : '',
              purchasedQty: item.totalQty || totalAllocQty,
              pickedQty: 0,
              alloc: alloc,
              pickingHistory: [],
              price: item.price || 0,
              storePrice: item.storePrice || item.price || 0
            };
          });
          console.log(`[揀貨站] 已載入匯入資料：${pickingArrivals.length} 筆商品，${pickingStoreNames.length} 家店`);
        } else {
          pickingStoreNames = branchNames;
          pickingArrivals = mockArrivals;
        }
      } catch(e) {
        console.error('initPickingData error:', e);
        pickingStoreNames = branchNames;
        pickingArrivals = mockArrivals;
      }

      // 從已建立的揀貨單（mockSavedWaves）回算每個商品的已分發量
      // 初次呼叫時 mockSavedWaves 尚未宣告，跳過回算
      try { if (!mockSavedWaves) return; } catch(e) { return; }
      pickingArrivals.forEach(arrival => {
        arrival.pickedQty = 0;
        arrival.pickingHistory = [];
        mockSavedWaves.forEach(wave => {
          const matchRow = wave.matrix.find(r => r.id === arrival.id);
          if (!matchRow) return;
          const qty = matchRow.actualSum || 0;
          arrival.pickedQty += qty;
          const snapshot = {};
          pickingStoreNames.forEach(b => {
            const bd = matchRow.branchData && matchRow.branchData[b];
            snapshot[b] = bd ? (bd.actual ?? bd.expected ?? 0) : 0;
          });
          arrival.pickingHistory.push({
            waveId: wave.id, date: wave.date, qty: qty, branchData: snapshot
          });
        });
      });
    }
    initPickingData();

    let activePickingMatrix = []; // 當前直接操作的揀貨大表
    let currentEditingWaveId = null; // 紀錄目前是否正在編輯歷史單據
    let hideZeroCols = false; // 是否隱藏數量全為 0 的欄位
    let waveCorrections = {}; // 修正數量：waveId → { productId → { storeName → { diff, action } } }
    let openCorrectionWaveId = null; // 目前展開修正面板的 waveId

    // 取得目前可見的店名欄位（根據 hideZeroCols 過濾）
    function getVisibleStoreNames() {
      if (!hideZeroCols || activePickingMatrix.length === 0) return pickingStoreNames;
      return pickingStoreNames.filter(name => {
        // 只看大表裡已加入的商品，任一筆有量就顯示該欄
        return activePickingMatrix.some(row => {
          const bd = row.branchData && row.branchData[name];
          if (bd) return (bd.expected || 0) > 0 || (bd.actual || 0) > 0;
          return false;
        });
      });
    }

    function toggleZeroCols() {
      hideZeroCols = !hideZeroCols;
      const btn = document.getElementById('btnToggleZero');
      if (btn) {
        btn.innerHTML = hideZeroCols ? '👁️ 顯示全部欄位' : '🔍 只顯示有量欄位';
        btn.style.background = hideZeroCols ? '#047857' : '#718096';
      }
      renderMatrixTable();
    }
    let mockSavedWaves = []; // 歷史紀錄
    let mockBackorderMeta = {}; // key: waveId-productId，存原因/處理/狀態

    function renderPickingStation() {
      initPickingData(); // 重新載入最新匯入資料
      let html = `
        <div style="display: flex; flex-direction: column; gap: 15px; height: 100%;">
          
          <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 10px;">
            <div style="font-size: 16px; font-weight: bold; color: #2d3748;">
              當前狀態：<span id="waveStatusLabel" style="color: #047857;">🆕 建立全新撿貨單</span>
            </div>
            <div style="display: flex; gap: 10px;">
              <button class="btn" style="background:#f1f5f9; color:#718096; border:1px solid #718096;" onclick="resetToNewWave()">🧹 清空畫面 (開新單)</button>
            </div>
          </div>

          <div style="display: flex; gap: 20px; flex: 1; overflow: hidden;">
            
            <div class="panel" style="width: 320px; flex-shrink: 0; background: #eef1f5; display: flex; flex-direction: column;">
              <div class="panel-title" style="color:#b7791f; border-color:#b7791f;">1. 搜尋商品並加入大表</div>
              
              <div style="margin-bottom: 10px;">
                <select id="pickTempFilter" style="padding: 6px; border: 1px solid var(--border); border-radius: 4px; width: 100%; margin-bottom: 8px;">
                  <option value="all">全部分類</option>
                  ${productCategories.map(c => '<option value="' + c + '">' + c + '</option>').join('')}
                </select>
                <div style="display: flex; gap: 5px;">
                  <input type="text" id="pickSearchKw" placeholder="商編或品項 (Enter搜尋)" onkeypress="if(event.key==='Enter') searchArrivals()" style="flex: 1; padding: 6px; border: 1px solid var(--border); border-radius: 4px;">
                  <button class="btn" style="background:#718096; padding: 6px 10px;" onclick="searchArrivals()">🔍</button>
                </div>
              </div>

              <div id="pickSearchResults" style="flex: 1; overflow-y: auto; border: 1px solid #e2e8f0; background: white; border-radius: 4px; padding: 5px;">
                <div style="color: var(--text2); font-size: 13px; text-align: center; padding: 20px;">輸入關鍵字尋找到貨商品</div>
              </div>
            </div>

            <div class="panel" style="flex: 1; display: flex; flex-direction: column; min-width: 0;">
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 6px;">
                <div class="panel-title" style="margin: 0; color:#2d3748; border-color:#2d3748;">2. 分發作業大表</div>
                <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                  <button class="btn" id="btnToggleZero" style="background:#718096; padding: 6px 12px; font-size: 12px;" onclick="toggleZeroCols()">${hideZeroCols ? '👁️ 顯示全部欄位' : '🔍 只顯示有量欄位'}</button>
                  <button class="btn" style="background:#276749; padding:6px 12px; font-size:12px;" onclick="downloadBroadcastText()">📢 下載播報單</button>
                  <button class="btn btn-print" onclick="printPickingMatrix()">🖨️ 列印紙本</button>
                  <button class="btn" id="btnSaveMatrix" style="background:#2b6cb0;" onclick="savePickingMatrix()">💾 ${currentEditingWaveId ? '更新揀貨單' : '建立揀貨單'}</button>
                </div>
              </div>

              <div style="overflow: auto; flex: 1; border: 1px solid var(--border); border-radius: 8px;">
                <div id="pickingTableContainer"></div>
              </div>
            </div>

          </div>
        </div>
      `;
      document.getElementById('mainContainer').innerHTML = html;
      
      // 編輯模式處理
      if (currentEditingWaveId) {
        document.getElementById('waveStatusLabel').innerHTML = `📝 正在編輯歷史紀錄：<span style="color:#2b6cb0;">${currentEditingWaveId}</span>`;
        document.getElementById('btnSaveMatrix').innerHTML = '💾 儲存修改';
      }
      // 永遠渲染大表（因為表頭也由 renderMatrixTable 動態產生）
      renderMatrixTable();
    }

    // 清空畫面重置
    function resetToNewWave() {
      if(activePickingMatrix.length > 0) {
        Swal.fire({
          title: '確定清空畫面？',
          text: '目前大表上的進度將會遺失。',
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#c53030'
        }).then((res) => {
          if(res.isConfirmed) {
            currentEditingWaveId = null;
            activePickingMatrix = [];
            renderPickingStation();
          }
        });
      } else {
        currentEditingWaveId = null;
        activePickingMatrix = [];
        renderPickingStation();
      }
    }

    // 1. 搜尋商品
    function searchArrivals() {
      const tempF = document.getElementById('pickTempFilter').value;
      const kw = document.getElementById('pickSearchKw').value.trim().toLowerCase();
      const resContainer = document.getElementById('pickSearchResults');

      let matches = pickingArrivals.filter(item => {
        let tMatch = tempF === 'all' ? true : (item.category || item.temp || '') === tempF;
        let kMatch = kw === '' ? true : ((item.productId || item.id || '').toLowerCase().includes(kw) || item.name.toLowerCase().includes(kw));
        return tMatch && kMatch;
      });

      if (matches.length === 0) {
        resContainer.innerHTML = `<div style="color: var(--text2); font-size: 13px; text-align: center; padding: 20px;">查無符合商品</div>`;
        return;
      }

      resContainer.innerHTML = matches.map(m => {
        let remainQty = m.purchasedQty - m.pickedQty;
        let rowBg = remainQty <= 0 ? '#fef2f2' : m.pickedQty > 0 ? '#fef3c7' : '#ffffff';

        // 欠品店家清單（只列有欠的店名）
        const shortageStores = pickingStoreNames.filter(b => {
          const distributed = (m.pickingHistory || []).reduce((s, h) => s + (h.branchData[b] || 0), 0);
          return (m.alloc[b] || 0) - distributed > 0;
        });
        const shortageRow = shortageStores.length > 0
          ? `<div style="margin-top:4px; padding-top:4px; border-top:1px dashed #e2e8f0; font-size:11px; color:#718096;">
               欠品店家（${shortageStores.length} 家）：<b style="color:#c53030;">${shortageStores.join('、')}</b>
               <span onclick="switchTab('demandBackorder')" style="cursor:pointer; color:#c53030; text-decoration:underline; margin-left:8px;">→ 需求與欠品</span>
             </div>`
          : '';

        const isAdded = activePickingMatrix.some(row => row.id === m.id);
        const cardBg = isAdded ? '#dbeafe; border-left: 4px solid #2b6cb0;' : `${rowBg};`;
        const addedBadge = isAdded ? `<span style="font-size:11px; color:#2b6cb0; font-weight:bold;">✔ 已加入</span>` : '';

        return `
        <div id="pickCard-${m.id}" style="padding: 10px; border-bottom: 1px solid #e2e8f0; background: ${cardBg} cursor:pointer; transition: background 0.15s;" onclick="addToMatrix('${m.id}')" onmouseenter="this.style.opacity='0.85'" onmouseleave="this.style.opacity='1'">
          <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px;">
            <div>
              <div style="color:#2b6cb0; font-family:monospace; font-size:12px;">${m.productId || m.id} ${addedBadge}</div>
              <b style="font-size:14px; color:#2d3748;">${m.name}</b>
            </div>
            <button class="btn" style="padding: 4px 8px; font-size: 12px; background:${isAdded ? '#718096' : '#2b6cb0'}; flex-shrink:0; margin-left:6px;" onclick="event.stopPropagation(); addToMatrix('${m.id}')">${isAdded ? '✔ 已加入' : '➕ 加入'}</button>
          </div>
          <div style="font-size:12px; padding: 5px 6px; background: rgba(255,255,255,0.7); border-radius: 4px; border: 1px dashed #718096;">
            <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
              ${m.startDate ? `<span style="color:#718096;">開團 <b>${m.startDate}</b></span><span style="color:#b7791f;">結單 <b>${m.endDate}</b></span>` : ''}
              <span>叫貨：<b style="color:#0369a1;">${m.purchasedQty}</b></span>
              <span>已分：<span onclick="event.stopPropagation(); showProductPickingDetail('${m.id}')" style="cursor:pointer; color:#2b6cb0; font-weight:bold; text-decoration:underline;" title="點擊查看各次分發明細">${m.pickedQty} 件 🔍</span></span>
              <span>剩餘：<b style="color:${remainQty > 0 ? '#047857' : '#c53030'};">${remainQty <= 0 ? '0（已全部分發）' : remainQty}</b></span>
            </div>
            ${shortageRow}
          </div>
        </div>
      `}).join('');
    }

    // 2. 直入大表 (核心修改：拔掉待揀區，直接把商品轉成矩陣列)
    function addToMatrix(id) {
      if (activePickingMatrix.some(row => row.id === id)) {
        Swal.fire({ title: '已存在', text: '此商品已經在右側大表中囉！', icon: 'info', timer: 1200, showConfirmButton: false });
        return;
      }
      
      const item = pickingArrivals.find(i => i.id === id);

      let expectedSum = 0;
      let branchData = {};

      // 計算各店歷次已分總量，本次只帶入「尚欠」數量
      pickingStoreNames.forEach(bName => {
        const totalAlloc = item.alloc[bName] || 0;
        const alreadyDistributed = (item.pickingHistory || []).reduce((s, h) => s + (h.branchData[bName] || 0), 0);
        const remaining = Math.max(0, totalAlloc - alreadyDistributed);
        branchData[bName] = { expected: remaining, actual: remaining };
        expectedSum += remaining;
      });

      if (expectedSum === 0) {
        // 各店為 0 仍允許加入，可在大表修正數量（店家需求）
        doAddToMatrix(item, branchData, expectedSum);
        Swal.fire({ title: '已加入（數量為 0）', html: `<b>${item.name}</b> 各店數量為 0，可在右側大表手動修正數量。`, icon: 'info', timer: 1800, showConfirmButton: false });
        return;
      }

      doAddToMatrix(item, branchData, expectedSum);
    }

    function doAddToMatrix(item, branchData, expectedSum) {
      activePickingMatrix.push({
        ...item,
        expectedSum: expectedSum,
        actualSum: expectedSum,
        branchData: branchData
      });

      // 更新左側卡片狀態（標記已加入）
      const card = document.getElementById(`pickCard-${item.id}`);
      if (card) {
        card.style.background = '#dbeafe';
        card.style.borderLeft = '4px solid #2b6cb0';
        const btn = card.querySelector('button');
        if (btn) { btn.innerHTML = '✔ 已加入'; btn.style.background = '#718096'; }
        const idDiv = card.querySelector('div div div');
        if (idDiv && !idDiv.innerHTML.includes('已加入')) {
          idDiv.innerHTML += ' <span style="font-size:11px; color:#2b6cb0; font-weight:bold;">✔ 已加入</span>';
        }
      }

      renderMatrixTable();
    }

    // 3. 渲染右側大表（含表頭，支援動態欄位過濾）
    function renderMatrixTable() {
      const container = document.getElementById('pickingTableContainer');
      const visibleNames = getVisibleStoreNames();
      const colCount = visibleNames.length + 4;

      if (activePickingMatrix.length === 0) {
        container.innerHTML = `
          <table style="width: 100%; border-collapse: collapse;">
            <thead style="position: sticky; top: 0; z-index: 1; box-shadow: 0 1px 2px rgba(0,0,0,0.1);">
              <tr>
                <th style="width: 36px; text-align: center; position:sticky; left:0; background:#eef1f5; z-index:2;"></th>
                <th style="text-align:left; padding: 10px 12px; min-width:200px;">商品名稱</th>
                ${visibleNames.map(n => `<th style="text-align:center; min-width:58px; white-space:nowrap; font-size:12px;">${n}</th>`).join('')}
                <th style="width: 70px; text-align: center; background:#fef3c7; color:#92400e;">合計</th>
              </tr>
            </thead>
            <tbody>
              <tr><td colspan="${colCount - 1}" style="text-align:center; padding: 60px; color: var(--text2);">👈 請從左側搜尋並加入商品</td></tr>
            </tbody>
          </table>`;
        return;
      }

      const rows = activePickingMatrix.map((row, rowIndex) => {
        const arrival = pickingArrivals.find(a => a.id === row.id);

        const histTotalByBranch = {};
        pickingStoreNames.forEach(b => {
          histTotalByBranch[b] = (arrival && arrival.pickingHistory || []).reduce((s, h) => s + (h.branchData[b] || 0), 0);
        });
        const histTotal = Object.values(histTotalByBranch).reduce((s, v) => s + v, 0);
        const histLine = histTotal > 0
          ? `<div style="font-size:11px; color:#718096; margin-top:3px;">歷次已分：<b style="color:#0369a1;">${histTotal}</b> 件</div>`
          : `<div style="font-size:11px; color:#718096; margin-top:3px;">尚無分發紀錄</div>`;

        const dateTag = (arrival && arrival.startDate)
          ? `<div style="font-size:11px; color:#b7791f; margin-top:2px;">📅 開團 ${arrival.startDate}　結單 ${arrival.endDate}</div>`
          : '';

        const branchCells = visibleNames.map(b => {
          const expected = row.branchData && row.branchData[b] ? row.branchData[b].expected : 0;
          return `<td style="text-align:center; padding:4px; font-size:13px; font-weight:${expected > 0 ? 'bold; color:#2d3748' : 'normal; color:#dde3ec'};">${expected}</td>`;
        }).join('');

        return `
          <tr style="border-bottom: 1px solid #e2e8f0;">
            <td style="text-align:center; padding:4px; position:sticky; left:0; background:#fff; z-index:1;">
              <button style="background:none; border:none; cursor:pointer; font-size:16px; color:#c53030; padding:2px 4px; opacity:0.5; line-height:1;" onclick="removeMatrixRow(${rowIndex})" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.5" title="移除此品項">✕</button>
            </td>
            <td style="padding: 8px 12px;">
              <div style="font-weight:bold; color:#2d3748; font-size:14px;">${row.name}</div>
              <div style="font-size:11px; color:#2b6cb0; font-family:monospace;">${row.productId || row.id}</div>
              ${dateTag}
            </td>
            ${branchCells}
            <td style="text-align:center; font-weight:bold; color:#92400e; font-size:15px; background:#fef3c7;">${row.expectedSum}</td>
          </tr>`;
      }).join('');

      const hiddenCount = pickingStoreNames.length - visibleNames.length;
      const filterHint = hideZeroCols && hiddenCount > 0
        ? `<div style="text-align:center; padding:6px; font-size:12px; color:#718096; background:#eef1f5; border-top:1px solid #e2e8f0;">已隱藏 ${hiddenCount} 個無量欄位</div>`
        : '';

      container.innerHTML = `
        <table style="width: 100%; border-collapse: collapse;">
          <thead style="position: sticky; top: 0; z-index: 1; box-shadow: 0 1px 2px rgba(0,0,0,0.1);">
            <tr>
              <th style="width: 36px; text-align: center; position:sticky; left:0; background:#eef1f5; z-index:2;"></th>
              <th style="text-align:left; padding: 10px 12px; min-width:200px;">商品名稱</th>
              ${visibleNames.map(n => `<th style="text-align:center; min-width:58px; white-space:nowrap; font-size:12px;">${n}</th>`).join('')}
              <th style="width: 70px; text-align: center; background:#fef3c7; color:#92400e;">合計</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
        ${filterHint}`;
    }

    // 列印揀貨大表（精簡版：只列內容清單，欄高緊湊）
    function printPickingMatrix() {
      if (activePickingMatrix.length === 0) {
        Swal.fire('無資料', '請先加入商品到大表再列印。', 'info');
        return;
      }
      const visibleNames = getVisibleStoreNames();
      const headers = visibleNames.map(n => `<th>${n}</th>`).join('');
      const rows = activePickingMatrix.map(row => {
        const cells = visibleNames.map(b => {
          const val = row.branchData && row.branchData[b] ? (row.branchData[b].expected || 0) : 0;
          return `<td style="text-align:center;${val > 0 ? 'font-weight:bold;' : 'color:#ccc;'}">${val}</td>`;
        }).join('');
        return `<tr><td style="white-space:nowrap;">${row.name}</td>${cells}<td style="text-align:center;font-weight:bold;">${row.expectedSum}</td></tr>`;
      }).join('');

      const now = new Date();
      const ts = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

      const win = window.open('', '_blank', 'width=900,height=600');
      win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
        <title>揀貨分發表</title>
        <style>
          body { font-family: 'Noto Sans TC', sans-serif; font-size: 12px; margin: 10px; }
          table { border-collapse: collapse; width: 100%; }
          th, td { border: 1px solid #999; padding: 2px 5px; line-height: 1.2; }
          th { background: #f0f0f0; font-size: 11px; }
          .title { font-size: 14px; font-weight: bold; margin-bottom: 4px; }
          .sub { font-size: 11px; color: #666; margin-bottom: 6px; }
          @media print { button { display: none; } }
        </style></head><body>
        <div class="title">揀貨分發表</div>
        <div class="sub">列印時間：${ts}　品項數：${activePickingMatrix.length}</div>
        <button onclick="window.print()" style="margin-bottom:6px;padding:4px 14px;background:#2b6cb0;color:white;border:none;border-radius:4px;cursor:pointer;font-size:12px;">列印</button>
        <table>
          <thead><tr><th style="text-align:left;">品名</th>${headers}<th>合計</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <\/body><\/html>`);
      win.document.close();
    }

    // 下載播報文件（純文字）
    function downloadBroadcastText() {
      if (activePickingMatrix.length === 0) {
        Swal.fire('無資料', '請先加入商品到大表再下載。', 'info');
        return;
      }
      const lines = [];
      const now = new Date();
      const dateStr = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
      lines.push(`播報單　${dateStr}`);
      lines.push('');

      activePickingMatrix.forEach(row => {
        const parts = [];
        pickingStoreNames.forEach(b => {
          const qty = row.branchData && row.branchData[b] ? (row.branchData[b].expected || 0) : 0;
          if (qty > 0) parts.push(`${b}${qty}`);
        });
        if (parts.length > 0) {
          lines.push(`${row.name}，${parts.join('，')}。`);
        }
      });

      const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `播報單_${dateStr.replace(/\//g,'')}.txt`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function updateMatrixQty(rowIndex, branchName, newValue) {
      const val = parseInt(newValue) || 0;
      if (!activePickingMatrix[rowIndex].branchData[branchName]) {
        activePickingMatrix[rowIndex].branchData[branchName] = { expected: 0, actual: 0 };
      }
      if (!activePickingMatrix[rowIndex].branchData) activePickingMatrix[rowIndex].branchData = {};
      if (!activePickingMatrix[rowIndex].branchData[branchName]) activePickingMatrix[rowIndex].branchData[branchName] = { expected: 0, actual: 0 };
      activePickingMatrix[rowIndex].branchData[branchName].actual = val;
      let newSum = 0;
      pickingStoreNames.forEach(b => { newSum += activePickingMatrix[rowIndex].branchData && activePickingMatrix[rowIndex].branchData[b] ? activePickingMatrix[rowIndex].branchData[b].actual : 0; });
      activePickingMatrix[rowIndex].actualSum = newSum;
      renderMatrixTable();
    }

    function removeMatrixRow(index) {
      activePickingMatrix.splice(index, 1);
      renderMatrixTable();
    }

    // 4. 儲存資料並建立銷貨單
    function savePickingMatrix() {
      if (activePickingMatrix.length === 0) return;

      const now = new Date();
      const todayStr = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

      if (currentEditingWaveId) {
        // ========== 修改歷史紀錄模式 ==========
        const targetWave = mockSavedWaves.find(w => w.id === currentEditingWaveId);
        
        // 1. 先從全域到貨資料 (pickingArrivals) 扣除舊的數據，避免重複累計
        targetWave.matrix.forEach(oldRow => {
          const arrivalItem = pickingArrivals.find(a => a.id === oldRow.id);
          if (arrivalItem) {
            arrivalItem.pickedQty -= oldRow.actualSum;
            // 移除舊的歷史明細
            if (arrivalItem.pickingHistory) {
              arrivalItem.pickingHistory = arrivalItem.pickingHistory.filter(h => h.waveId !== currentEditingWaveId);
            }
          }
        });

        // 2. 更新該單據的矩陣資料
        targetWave.matrix = JSON.parse(JSON.stringify(activePickingMatrix));

        // 3. 將新的數據加回全域到貨資料
        activePickingMatrix.forEach(newRow => {
          const arrivalItem = pickingArrivals.find(a => a.id === newRow.id);
          if (arrivalItem) {
            arrivalItem.pickedQty += newRow.actualSum;
            if (!arrivalItem.pickingHistory) arrivalItem.pickingHistory = [];
            const snapshot = {};
            pickingStoreNames.forEach(b => { snapshot[b] = (newRow.branchData && newRow.branchData[b]) ? newRow.branchData[b].actual : 0; });
            arrivalItem.pickingHistory.push({ waveId: currentEditingWaveId, date: targetWave.date, qty: newRow.actualSum, branchData: snapshot });
          }
        });

        // ✨ 紀錄操作：修改歷史揀貨單
        logActivity('修改歷史揀貨單', currentEditingWaveId, { items: activePickingMatrix.length });

        const updatedWaveId = currentEditingWaveId;
        Swal.fire({
          title: '更新完成',
          html: `揀貨單 <b>${updatedWaveId}</b> 已更新。`,
          icon: 'success',
          timer: 1500,
          showConfirmButton: false
        });

      } else {
        // ========== 建立全新紀錄模式 ==========
        const newWaveId = 'PICK-' + new Date().getTime().toString().slice(-6);

        mockSavedWaves.push({
          id: newWaveId,
          date: todayStr,
          status: 'pending', // ⚡️ 狀態：pending(待結案), completed(已開銷貨單)
          salesOrderGenerated: false,
          salesOrderDate: null,
          matrix: JSON.parse(JSON.stringify(activePickingMatrix))
        });

        // ✨ 紀錄操作：建立揀貨單
        logActivity('建立全新揀貨單', newWaveId, { items: activePickingMatrix.length });

        // 更新主檔已分發數，並寫入 pickingHistory
        activePickingMatrix.forEach(row => {
          const arrivalItem = pickingArrivals.find(a => a.id === row.id);
          if(arrivalItem) {
            arrivalItem.pickedQty += row.actualSum;
            if(!arrivalItem.pickingHistory) arrivalItem.pickingHistory = [];
            const snapshot = {};
            pickingStoreNames.forEach(b => { snapshot[b] = (row.branchData && row.branchData[b]) ? (row.branchData[b].actual ?? row.branchData[b]) : 0; });
            arrivalItem.pickingHistory.push({ waveId: newWaveId, date: todayStr, qty: row.actualSum, branchData: snapshot });
          }
        });

        // 建立完成，留在原頁，進入編輯模式
        currentEditingWaveId = newWaveId;
        const saveBtn = document.getElementById('btnSaveMatrix');
        if (saveBtn) saveBtn.innerHTML = '💾 更新揀貨單';
        Swal.fire({
          title: '揀貨單已建立！',
          html: `單號：<b>${newWaveId}</b><br>可繼續增減品項，按「更新揀貨單」儲存變更。<br>如需修正數量，請至「揀貨紀錄」操作。`,
          icon: 'success',
          confirmButtonText: '了解',
          confirmButtonColor: '#2b6cb0'
        });
      }
    }

    // 4b. 列印揀貨單（與 printPickingMatrix 同樣精簡橫向表格）
    function printPickingWave(waveId) {
      const wave = mockSavedWaves.find(w => w.id === waveId);
      if (!wave) return;

      // 收集此單所有出現的店名，過濾掉全為 0 的欄位
      const allNames = pickingStoreNames;
      const visibleNames = allNames.filter(name => {
        return wave.matrix.some(r => {
          const bd = r.branchData && r.branchData[name];
          if (!bd) return false;
          return (bd.actual ?? bd) > 0;
        });
      });

      const headers = visibleNames.map(n => `<th>${n}</th>`).join('');
      const rows = wave.matrix.map(r => {
        const cells = visibleNames.map(b => {
          const bd = r.branchData && r.branchData[b];
          const val = bd ? (bd.actual ?? bd) : 0;
          return `<td style="text-align:center;${val > 0 ? 'font-weight:bold;' : 'color:#ccc;'}">${val}</td>`;
        }).join('');
        return `<tr><td style="white-space:nowrap;">${r.name}</td>${cells}<td style="text-align:center;font-weight:bold;">${r.expectedSum}</td><td style="text-align:center;font-weight:bold;">${r.actualSum}</td></tr>`;
      }).join('');

      const win = window.open('', '_blank', 'width=900,height=600');
      win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
        <title>揀貨單 ${waveId}</title>
        <style>
          body { font-family: 'Noto Sans TC', sans-serif; font-size: 12px; margin: 10px; }
          table { border-collapse: collapse; width: 100%; }
          th, td { border: 1px solid #999; padding: 2px 5px; line-height: 1.2; }
          th { background: #f0f0f0; font-size: 11px; }
          .title { font-size: 14px; font-weight: bold; margin-bottom: 4px; }
          .sub { font-size: 11px; color: #666; margin-bottom: 6px; }
          @media print { button { display: none; } }
        </style></head><body>
        <div class="title">揀貨分發表</div>
        <div class="sub">單號：${waveId}　建立時間：${wave.date}　品項數：${wave.matrix.length}</div>
        <button onclick="window.print()" style="margin-bottom:6px;padding:4px 14px;background:#2b6cb0;color:white;border:none;border-radius:4px;cursor:pointer;font-size:12px;">列印</button>
        <table>
          <thead><tr><th style="text-align:left;">品名</th>${headers}<th>合計</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <\/body><\/html>`);
      win.document.close();
    }

    function refreshHistoryTable() {
      const tempMap = { '1': '❄️', '2': '🧊', '3': '🌡️' };
      const filterEl = document.getElementById('historyMonthFilter');
      const countEl = document.getElementById('historyCount');
      const tbody = document.getElementById('historyTableBody');
      if (!tbody) return;
      const filter = filterEl ? filterEl.value : '';
      const data = filter ? mockSavedWaves.filter(w => w.date.startsWith(filter)) : mockSavedWaves;
      if (countEl) countEl.innerText = data.length;
      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:40px; color:#718096;">查無符合紀錄</td></tr>';
        return;
      }
      tbody.innerHTML = [...data].reverse().map(wave => {
        // 摘要：品項數、應發總計、實分總計、差異說明
        const itemCount = wave.matrix.length;
        const totalExpected = wave.matrix.reduce((s, r) => s + (r.expectedSum || 0), 0);
        const totalActual = wave.matrix.reduce((s, r) => s + (r.actualSum || 0), 0);
        const totalDiff = totalActual - totalExpected;

        // 修正數量統計
        const corr = waveCorrections[wave.id];
        let corrSummary = '';
        if (corr) {
          let osCnt = 0, pdCnt = 0, nrCnt = 0;
          Object.values(corr).forEach(prod => Object.values(prod).forEach(s => {
            if (s.action === 'oversell') osCnt++;
            if (s.action === 'pending') pdCnt++;
            if (s.action === 'noRestock') nrCnt++;
          }));
          const parts = [];
          if (osCnt) parts.push(`<span style="color:#7c3aed;">超發${osCnt}店</span>`);
          if (pdCnt) parts.push(`<span style="color:#b7791f;">待補${pdCnt}店</span>`);
          if (nrCnt) parts.push(`<span style="color:#c53030;">不補${nrCnt}店</span>`);
          corrSummary = parts.length ? `<div style="font-size:11px; margin-top:4px; padding-top:4px; border-top:1px dashed #e2e8f0;">${parts.join(' / ')}</div>` : '';
        }

        const summaryHtml = `
          <div style="font-size:13px; text-align:center;">
            <b>${itemCount}</b> 品項
            <span style="margin:0 6px; color:#718096;">|</span>
            應發 <b style="color:#92400e;">${totalExpected}</b>
            <span style="margin:0 6px; color:#718096;">|</span>
            實分 <b style="color:${totalDiff !== 0 ? '#c53030' : '#0369a1'};">${totalActual}</b>
            ${totalDiff !== 0 ? `<span style="font-size:12px; color:${totalDiff > 0 ? '#7c3aed' : '#c53030'}; font-weight:bold; margin-left:4px;">(${totalDiff > 0 ? '+' : ''}${totalDiff})</span>` : '<span style="font-size:12px; color:#059669; margin-left:4px;">✓ 正確</span>'}
          </div>
          ${corrSummary}`;

        let salesCell = '';
        if (wave.status === 'completed') {
          // 找出該揀貨單對應的銷貨單
          const relatedSOs = mockSalesOrders.filter(so => so.waveId === wave.id);
          const soList = relatedSOs.length > 0
            ? relatedSOs.map(so => {
                const sColor = so.status === 'closed' ? '#718096' : so.status === 'disputed' ? '#c53030' : '#047857';
                const sIcon = so.status === 'closed' ? '📁' : so.status === 'disputed' ? '⚠️' : '✅';
                return `<div style="display:flex; justify-content:space-between; align-items:center; padding:3px 0; border-bottom:1px solid #f1f5f9;">
                  <span style="font-size:11px; cursor:pointer; color:#2b6cb0; text-decoration:underline;" onclick="switchTab('accounting');setTimeout(()=>showSalesOrderDetail('${so.id}'),100)">${so.storeName}</span>
                  <span style="font-size:10px; color:${sColor};">${sIcon}</span>
                </div>`;
              }).join('')
            : '<div style="font-size:11px; color:#718096;">無對應銷貨單</div>';
          salesCell = `<div>
            <div style="color:#2b6cb0; font-size:12px; font-weight:bold; margin-bottom:4px;">✅ 已開立 ${relatedSOs.length} 張銷貨單</div>
            <details style="cursor:pointer;">
              <summary style="font-size:11px; color:#2b6cb0;">展開查看</summary>
              <div style="margin-top:4px; max-height:120px; overflow-y:auto;">${soList}</div>
            </details>
            ${currentUser && currentUser.role === 'admin' ? `<button class="btn" style="padding:4px 8px; font-size:11px; background:#c53030; margin-top:4px; width:100%;" onclick="deletePickingWaveWithSO('${wave.id}')">🗑️ 刪除整筆</button>` : ''}
          </div>`;
        } else {
          salesCell = `<div style="display:flex; flex-direction:column; gap:4px; justify-content:center; align-items:center;">
               <button class="btn btn-print" style="padding:5px 10px; font-size:12px; background:#2b6cb0; width:100%;" onclick="generateSalesOrder('${wave.id}')">開立銷貨單</button>
               <button class="btn btn-print" style="padding:5px 10px; font-size:12px; width:100%;" onclick="printPickingWave('${wave.id}')">🖨️ 列印</button>
               <button class="btn" style="padding:5px 10px; font-size:12px; background:#c53030; width:100%;" onclick="deletePickingWave('${wave.id}')">🗑️ 刪除</button>
             </div>`;
        }

        const statusBadge = wave.status === 'completed'
          ? `<span style="background:#f0f7ff; color:#166534; font-size:11px; padding:2px 6px; border-radius:12px; border:1px solid #bbf7d0;">已開立</span>`
          : corr
            ? `<span style="background:#f0f7ff; color:#166534; font-size:11px; padding:2px 6px; border-radius:12px; border:1px solid #bbf7d0;">已修正</span>`
            : `<span style="background:#fff7ed; color:#9a3412; font-size:11px; padding:2px 6px; border-radius:12px; border:1px solid #fed7aa;">待修正</span>`;

        const corrBtn = wave.status === 'completed'
          ? `<button class="btn" style="background:#718096; padding:5px 10px; font-size:12px;" onclick="openCorrectionPanel('${wave.id}')">📋 檢視修正</button>`
          : corr
            ? `<button class="btn" style="background:#059669; padding:5px 10px; font-size:12px;" onclick="openCorrectionPanel('${wave.id}')">✅ 已修正</button>`
            : `<button class="btn" style="background:#b7791f; padding:5px 10px; font-size:12px;" onclick="openCorrectionPanel('${wave.id}')">✏️ 修正數量</button>`;

        return `<tr style="border-bottom:1px solid #e2e8f0; ${wave.status==='completed'?'background:#eef1f5;':''}">
          <td style="padding:10px 12px; color:#718096; font-size:13px; white-space:nowrap;">${wave.date}</td>
          <td style="padding:10px 12px; font-family:monospace; color:#2b6cb0; font-weight:bold; font-size:13px;">
            ${wave.id}<br>${statusBadge}
          </td>
          <td style="padding:8px 12px;">${summaryHtml}</td>
          <td style="padding:10px 12px; text-align:center;">${corrBtn}</td>
          <td style="padding:10px 12px; text-align:center;">${salesCell}</td>
        </tr>`;
      }).join('');
    }

    // === 修正數量面板（大視窗彈出） ===
    function openCorrectionPanel(waveId) {
      const wave = mockSavedWaves.find(w => w.id === waveId);
      if (!wave) return;
      openCorrectionWaveId = waveId;

      const panelHTML = buildCorrectionPanelHTML(wave);

      Swal.fire({
        html: panelHTML,
        width: '98vw',
        padding: '12px',
        showConfirmButton: false,
        showCloseButton: true,
        customClass: { popup: 'correction-popup' },
        didOpen: () => {
          const popup = Swal.getPopup();
          popup.style.maxWidth = '98vw';
        },
        willClose: () => {
          openCorrectionWaveId = null;
          refreshHistoryTable();
        }
      });
    }

    function buildCorrectionPanelHTML(wave) {
      const waveId = wave.id;
      if (!waveCorrections[waveId]) waveCorrections[waveId] = {};
      const corr = waveCorrections[waveId];

      // 收集有量的店名（橫向排列用）
      const visibleStores = pickingStoreNames.filter(name => {
        return wave.matrix.some(r => {
          const bd = r.branchData && r.branchData[name];
          if (!bd) return false;
          return (bd.expected || 0) > 0 || (bd.actual ?? 0) > 0;
        });
      });

      const storeHeaders = visibleStores.map(n => `<th style="padding:4px 6px; text-align:center; border:1px solid #e2e8f0; font-size:11px; min-width:52px; white-space:nowrap;">${n}</th>`).join('');

      const productRows = wave.matrix.map((row, ri) => {
        if (!corr[row.id]) corr[row.id] = {};
        const prodCorr = corr[row.id];

        // 應發行
        const expectedCells = visibleStores.map(s => {
          const bd = row.branchData && row.branchData[s];
          const exp = bd ? (bd.expected || 0) : 0;
          return `<td style="text-align:center; padding:3px; border:1px solid #e2e8f0; font-size:12px; color:#718096;">${exp}</td>`;
        }).join('');

        // 實分行（未開立可修改，已開立純顯示）
        const actualCells = visibleStores.map(s => {
          const bd = row.branchData && row.branchData[s];
          const act = bd ? (bd.actual ?? bd.expected ?? 0) : 0;
          const exp = bd ? (bd.expected || 0) : 0;
          const diff = act - exp;
          const borderColor = diff > 0 ? '#8b5cf6' : diff < 0 ? '#c53030' : '#e2e8f0';
          const bg = diff !== 0 ? (diff > 0 ? '#f5f3ff' : '#fef2f2') : '#fff';
          if (wave.converted) {
            return `<td style="text-align:center; padding:3px; border:2px solid ${borderColor}; background:${bg}; font-size:12px; font-weight:bold;">${act}</td>`;
          }
          return `<td style="text-align:center; padding:2px; border:2px solid ${borderColor}; background:${bg};">
            <input type="number" min="0" value="${act}" style="width:42px; text-align:center; font-size:12px; font-weight:bold; padding:2px; border:none; background:transparent; font-family:inherit;" onchange="updateCorrectionQty('${waveId}',${ri},'${s}',this.value)">
          </td>`;
        }).join('');

        // 差異狀態行
        const statusCells = visibleStores.map(s => {
          const bd = row.branchData && row.branchData[s];
          const exp = bd ? (bd.expected || 0) : 0;
          const act = bd ? (bd.actual ?? bd.expected ?? 0) : 0;
          const diff = act - exp;
          if (diff === 0) return `<td style="text-align:center; padding:2px; border:1px solid #e2e8f0; font-size:10px; color:#718096;">—</td>`;

          if (diff > 0) {
            if (!prodCorr[s]) prodCorr[s] = { diff, action: 'oversell' };
            return `<td style="text-align:center; padding:2px; border:1px solid #e2e8f0; background:#f5f3ff;"><span style="color:#7c3aed; font-size:10px; font-weight:bold;">+${diff} 超賣</span></td>`;
          } else {
            const existing = prodCorr[s];
            if (wave.converted) {
              // 已開立：純顯示，不可操作
              const actionText = existing && existing.action === 'pending' ? '待補' : existing && existing.action === 'noRestock' ? '不補' : '未標記';
              const actionBg = existing && existing.action === 'pending' ? '#fef3c7' : existing && existing.action === 'noRestock' ? '#fee2e2' : '#f1f5f9';
              const actionColor = existing && existing.action === 'pending' ? '#92400e' : existing && existing.action === 'noRestock' ? '#c53030' : '#718096';
              return `<td style="text-align:center; padding:2px; border:1px solid #e2e8f0; background:${actionBg};"><span style="font-size:10px; color:${actionColor}; font-weight:bold;">${diff} ${actionText}</span></td>`;
            }
            if (!existing || !existing.action) {
              if (!prodCorr[s]) prodCorr[s] = { diff, action: null };
              return `<td style="text-align:center; padding:2px; border:1px solid #e2e8f0; background:#fef3c7;">
                <div style="font-size:10px; color:#c53030; font-weight:bold;">${diff}</div>
                <div style="display:flex; gap:2px; justify-content:center; margin-top:2px;">
                  <button style="padding:1px 4px; font-size:9px; border-radius:3px; cursor:pointer; font-family:inherit; background:#fef3c7; color:#92400e; border:1px solid #ecc94b;" onclick="setCorrectionAction('${waveId}','${row.id}','${s}','pending')">待補</button>
                  <button style="padding:1px 4px; font-size:9px; border-radius:3px; cursor:pointer; font-family:inherit; background:#fee2e2; color:#c53030; border:1px solid #fca5a5;" onclick="setCorrectionAction('${waveId}','${row.id}','${s}','noRestock')">不補</button>
                </div>
              </td>`;
            } else if (existing.action === 'pending') {
              return `<td style="text-align:center; padding:2px; border:1px solid #e2e8f0; background:#fef3c7; cursor:pointer;" onclick="setCorrectionAction('${waveId}','${row.id}','${s}',null)"><span style="font-size:10px; color:#92400e; font-weight:bold;">${diff} 待補</span></td>`;
            } else {
              return `<td style="text-align:center; padding:2px; border:1px solid #e2e8f0; background:#fee2e2; cursor:pointer;" onclick="setCorrectionAction('${waveId}','${row.id}','${s}',null)"><span style="font-size:10px; color:#c53030; font-weight:bold;">${diff} 不補</span></td>`;
            }
          }
        }).join('');

        const totalExp = visibleStores.reduce((s, n) => { const bd = row.branchData && row.branchData[n]; return s + (bd ? (bd.expected || 0) : 0); }, 0);
        const totalAct = visibleStores.reduce((s, n) => { const bd = row.branchData && row.branchData[n]; return s + (bd ? (bd.actual ?? bd.expected ?? 0) : 0); }, 0);

        return `
          <tr style="background:#f0f4ff; border-top:2px solid #718096;">
            <td rowspan="3" style="padding:6px 8px; border:1px solid #e2e8f0; font-weight:bold; font-size:13px; vertical-align:middle; background:#fff; min-width:120px;">
              <div style="display:flex; align-items:center; justify-content:space-between; gap:4px;">
                <span>${row.name}</span>
                ${!wave.converted ? `<button title="移除此品項" style="background:none; border:none; cursor:pointer; font-size:14px; color:#c53030; padding:2px; opacity:0.6; line-height:1;" onclick="removeProductFromWave('${wave.id}',${ri})" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.6">✕</button>` : ''}
              </div>
              <div style="margin-top:4px; display:flex; align-items:center; gap:4px;">
                <span style="font-size:10px; color:#718096; font-weight:normal;">$</span>
                ${!wave.converted ? `<input type="number" min="0" value="${row.storePrice || row.price || 0}" style="width:60px; padding:2px 4px; font-size:12px; border:1px solid #dde3ec; border-radius:3px; text-align:right; font-family:inherit;" onchange="updateWaveItemPrice('${wave.id}',${ri},this.value)">` : `<span style="font-size:12px; color:#2b6cb0; font-weight:bold;">${row.storePrice || row.price || 0}</span>`}
              </div>
            </td>
            <td style="padding:2px 4px; border:1px solid #e2e8f0; font-size:10px; color:#718096; white-space:nowrap;">應發</td>
            ${expectedCells}
            <td style="text-align:center; border:1px solid #e2e8f0; font-weight:bold; color:#92400e; font-size:12px;">${totalExp}</td>
          </tr>
          <tr>
            <td style="padding:2px 4px; border:1px solid #e2e8f0; font-size:10px; color:#2d3748; font-weight:bold; white-space:nowrap;">實分</td>
            ${actualCells}
            <td style="text-align:center; border:1px solid #e2e8f0; font-weight:bold; color:#0369a1; font-size:12px;">${totalAct}</td>
          </tr>
          <tr>
            <td style="padding:2px 4px; border:1px solid #e2e8f0; font-size:10px; color:#718096; white-space:nowrap;">狀態</td>
            ${statusCells}
            <td style="text-align:center; border:1px solid #e2e8f0; font-size:11px; font-weight:bold; color:${totalAct - totalExp !== 0 ? '#c53030' : '#059669'};">${totalAct - totalExp === 0 ? '✓' : (totalAct - totalExp > 0 ? '+' : '') + (totalAct - totalExp)}</td>
          </tr>`;
      }).join('');

      return `
        <div style="background:#eef1f5; padding:0;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; padding-bottom:8px; border-bottom:2px solid #2b6cb0; flex-wrap:wrap; gap:8px;">
            <div style="font-size:16px; font-weight:bold; color:#2d3748;">📋 修正數量：${wave.id}　${wave.date}</div>
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
              ${!wave.converted ? `<button class="btn" style="background:#2b6cb0; padding:6px 16px; font-size:13px;" onclick="addProductToWaveFromPanel('${wave.id}')">＋ 新增品項</button>` : ''}
              <button class="btn" style="background:#718096; padding:6px 16px; font-size:13px;" onclick="printPickingWave('${wave.id}')">🖨️ 列印</button>
              ${!wave.converted ? `<button class="btn" style="background:#2b6cb0; padding:6px 16px; font-size:13px;" onclick="confirmCorrection('${wave.id}')">✅ 確認修正完成</button>` : ''}
            </div>
          </div>
          <div style="overflow:auto; max-height:70vh;">
            <table style="width:100%; border-collapse:collapse; font-size:12px;">
              <thead style="position:sticky; top:0; z-index:1; background:#eef1f5;">
                <tr>
                  <th style="padding:4px 8px; text-align:left; border:1px solid #e2e8f0; min-width:120px;">品名</th>
                  <th style="padding:4px 6px; border:1px solid #e2e8f0; width:35px;"></th>
                  ${storeHeaders}
                  <th style="padding:4px 6px; text-align:center; border:1px solid #e2e8f0; min-width:45px;">合計</th>
                </tr>
              </thead>
              <tbody>${productRows}</tbody>
            </table>
          </div>
        </div>`;
    }

    // 修正面板：更新單價
    function updateWaveItemPrice(waveId, rowIndex, newValue) {
      const wave = mockSavedWaves.find(w => w.id === waveId);
      if (!wave || wave.converted) return;
      const row = wave.matrix[rowIndex];
      if (!row) return;
      row.storePrice = parseFloat(newValue) || 0;
      row.price = row.storePrice;
    }

    // 修正面板：更新實際數量
    function updateCorrectionQty(waveId, rowIndex, storeName, newValue) {
      const wave = mockSavedWaves.find(w => w.id === waveId);
      if (!wave || wave.converted) return;
      const row = wave.matrix[rowIndex];
      if (!row || !row.branchData) return;
      if (!row.branchData[storeName]) row.branchData[storeName] = { expected: 0, actual: 0 };
      const oldActual = row.branchData[storeName].actual ?? row.branchData[storeName].expected ?? 0;
      row.branchData[storeName].actual = parseInt(newValue) || 0;

      // 重算 actualSum
      let newSum = 0;
      pickingStoreNames.forEach(b => {
        const bd = row.branchData[b];
        if (bd) newSum += (bd.actual ?? bd.expected ?? 0);
      });
      row.actualSum = newSum;

      // 更新 correction 差異
      const diff = row.branchData[storeName].actual - (row.branchData[storeName].expected || 0);
      if (!waveCorrections[waveId]) waveCorrections[waveId] = {};
      if (!waveCorrections[waveId][row.id]) waveCorrections[waveId][row.id] = {};
      if (diff === 0) {
        delete waveCorrections[waveId][row.id][storeName];
      } else if (diff > 0) {
        waveCorrections[waveId][row.id][storeName] = { diff, action: 'oversell' };
      } else {
        const existing = waveCorrections[waveId][row.id][storeName];
        waveCorrections[waveId][row.id][storeName] = { diff, action: existing ? existing.action : null };
      }

      refreshCorrectionPopup(waveId);
    }

    function setCorrectionAction(waveId, productId, storeName, action) {
      const checkWave = mockSavedWaves.find(w => w.id === waveId);
      if (checkWave && checkWave.converted) return;
      if (!waveCorrections[waveId]) waveCorrections[waveId] = {};
      if (!waveCorrections[waveId][productId]) waveCorrections[waveId][productId] = {};
      const existing = waveCorrections[waveId][productId][storeName];
      waveCorrections[waveId][productId][storeName] = { diff: existing ? existing.diff : 0, action: action };
      refreshCorrectionPopup(waveId);
    }

    // 刷新修正面板彈窗內容
    function refreshCorrectionPopup(waveId) {
      const wave = mockSavedWaves.find(w => w.id === waveId);
      if (!wave) return;
      const popup = Swal.getPopup();
      if (popup) {
        const container = popup.querySelector('.swal2-html-container');
        if (container) container.innerHTML = buildCorrectionPanelHTML(wave);
      }
    }

    function confirmCorrection(waveId) {
      const corr = waveCorrections[waveId];
      let unhandled = 0;
      if (corr) {
        Object.values(corr).forEach(prod => Object.values(prod).forEach(s => {
          if (s.diff < 0 && !s.action) unhandled++;
        }));
      }
      if (unhandled > 0) {
        Swal.fire({ title: '尚有未處理', html: `還有 <b>${unhandled}</b> 個少貨項目未選擇「待補」或「不補」，請先完成標記。`, icon: 'warning' });
        return;
      }
      openCorrectionWaveId = null;
      Swal.fire({ title: '修正數量完成', text: `揀貨單 ${waveId} 已完成對帳。`, icon: 'success', timer: 1500, showConfirmButton: false });
      refreshHistoryTable();
    }

    function removeProductFromWave(waveId, rowIndex) {
      const wave = mockSavedWaves.find(w => w.id === waveId);
      if (!wave || wave.converted) return;
      const row = wave.matrix[rowIndex];
      if (!row) return;
      Swal.fire({
        title: '移除品項',
        html: `確定從揀貨單 <b>${waveId}</b> 移除<br>「<b>${row.name}</b>」？`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: '確定移除',
        cancelButtonText: '取消',
        confirmButtonColor: '#c53030'
      }).then(result => {
        if (result.isConfirmed) {
          wave.matrix.splice(rowIndex, 1);
          // 清除該品項的修正紀錄
          if (waveCorrections[waveId] && waveCorrections[waveId][row.id]) {
            delete waveCorrections[waveId][row.id];
          }
          // 重算 wave 總量
          wave.totalExpected = wave.matrix.reduce((s, r) => s + (r.expectedSum || 0), 0);
          wave.totalActual = wave.matrix.reduce((s, r) => s + (r.actualSum || 0), 0);
          if (wave.matrix.length === 0) {
            const idx = mockSavedWaves.indexOf(wave);
            if (idx !== -1) mockSavedWaves.splice(idx, 1);
            openCorrectionWaveId = null;
            Swal.fire({ title: '揀貨單已刪除', text: `${waveId} 品項為空，已移除整張單。`, icon: 'info', timer: 1500, showConfirmButton: false });
            refreshHistoryTable();
          } else {
            // 重新開啟修正面板
            openCorrectionPanel(waveId);
          }
        }
      });
    }

    // 刪除未開立的揀貨單
    function deletePickingWave(waveId) {
      Swal.fire({
        title: '刪除揀貨單',
        html: `確定刪除 <b>${waveId}</b>？<br><span style="color:#c53030;">此操作無法復原。</span>`,
        icon: 'warning', showCancelButton: true,
        confirmButtonText: '確定刪除', cancelButtonText: '取消',
        confirmButtonColor: '#c53030'
      }).then(res => {
        if (!res.isConfirmed) return;
        const idx = mockSavedWaves.findIndex(w => w.id === waveId);
        if (idx !== -1) mockSavedWaves.splice(idx, 1);
        if (waveCorrections[waveId]) delete waveCorrections[waveId];
        logActivity('刪除揀貨單', waveId, {});
        Swal.fire({ title: '已刪除', icon: 'success', timer: 1200, showConfirmButton: false });
        refreshHistoryTable();
      });
    }

    // 刪除已開立的揀貨單（連同對應銷貨單）— 僅管理員
    function deletePickingWaveWithSO(waveId) {
      if (!currentUser || currentUser.role !== 'admin') {
        Swal.fire('權限不足', '已開立銷貨單的揀貨單僅管理員可刪除。', 'error');
        return;
      }
      const relatedSOs = mockSalesOrders.filter(so => so.waveId === waveId);
      Swal.fire({
        title: '刪除揀貨單與銷貨單',
        html: `確定刪除 <b>${waveId}</b> 及其 <b>${relatedSOs.length}</b> 張銷貨單？<br><span style="color:#c53030;">此操作無法復原。</span>`,
        icon: 'warning', showCancelButton: true,
        confirmButtonText: '確定全部刪除', cancelButtonText: '取消',
        confirmButtonColor: '#c53030'
      }).then(res => {
        if (!res.isConfirmed) return;
        // 刪除對應銷貨單
        relatedSOs.forEach(so => {
          const soIdx = mockSalesOrders.indexOf(so);
          if (soIdx !== -1) mockSalesOrders.splice(soIdx, 1);
        });
        // 刪除揀貨單
        const idx = mockSavedWaves.findIndex(w => w.id === waveId);
        if (idx !== -1) mockSavedWaves.splice(idx, 1);
        if (waveCorrections[waveId]) delete waveCorrections[waveId];
        logActivity('刪除揀貨單與銷貨單', waveId, { deletedSOs: relatedSOs.length });
        Swal.fire({ title: '已刪除', html: `揀貨單及 ${relatedSOs.length} 張銷貨單已移除。`, icon: 'success', timer: 1500, showConfirmButton: false });
        refreshHistoryTable();
      });
    }

    // 刪除單張銷貨單
    function deleteSalesOrder(soId) {
      const so = mockSalesOrders.find(o => o.id === soId);
      if (!so) return;
      Swal.fire({
        title: '刪除銷貨單',
        html: `確定刪除 <b>${soId}</b>（${so.storeName}）？<br><span style="color:#c53030;">此操作無法復原。</span>`,
        icon: 'warning', showCancelButton: true,
        confirmButtonText: '確定刪除', cancelButtonText: '取消',
        confirmButtonColor: '#c53030'
      }).then(res => {
        if (!res.isConfirmed) return;
        const idx = mockSalesOrders.indexOf(so);
        if (idx !== -1) mockSalesOrders.splice(idx, 1);
        logActivity('刪除銷貨單', soId, { store: so.storeName, waveId: so.waveId });
        Swal.fire({ title: '已刪除', icon: 'success', timer: 1200, showConfirmButton: false });
        refreshAccountingTable();
      });
    }

    function addProductToWaveFromPanel(waveId) {
      const wave = mockSavedWaves.find(w => w.id === waveId);
      if (!wave || wave.converted) return;
      // 找出尚未加入此單的到貨商品
      const existingIds = wave.matrix.map(r => r.id);
      const available = pickingArrivals.filter(a => !existingIds.includes(a.id));
      if (available.length === 0) {
        Swal.fire({ title: '無可加入品項', text: '所有到貨商品已在此單中。', icon: 'info' });
        return;
      }
      const options = {};
      available.forEach(a => { options[a.id] = a.name; });
      Swal.fire({
        title: '新增品項至揀貨單',
        input: 'select',
        inputOptions: options,
        inputPlaceholder: '選擇商品',
        showCancelButton: true,
        confirmButtonText: '加入',
        cancelButtonText: '取消',
        confirmButtonColor: '#2b6cb0'
      }).then(result => {
        if (result.isConfirmed && result.value) {
          const arrival = pickingArrivals.find(a => a.id === result.value);
          if (!arrival) return;
          const branchData = {};
          pickingStoreNames.forEach(name => {
            const qty = arrival.alloc[name] || 0;
            branchData[name] = { expected: qty, actual: qty };
          });
          const expectedSum = pickingStoreNames.reduce((s, n) => s + (branchData[n].expected || 0), 0);
          wave.matrix.push({
            id: arrival.id,
            name: arrival.name,
            expectedSum: expectedSum,
            actualSum: expectedSum,
            branchData: branchData
          });
          wave.totalExpected = wave.matrix.reduce((s, r) => s + (r.expectedSum || 0), 0);
          wave.totalActual = wave.matrix.reduce((s, r) => s + (r.actualSum || 0), 0);
          openCorrectionPanel(waveId);
        }
      });
    }

    async function generateSalesOrder(waveId) {
      const wave = mockSavedWaves.find(w => w.id === waveId);
      if (!wave) return;
      
      const storeCount = new Set();
      wave.matrix.forEach(r => { if (r.branchData) Object.entries(r.branchData).forEach(([b, d]) => { if ((d.actual ?? 0) > 0) storeCount.add(b); }); });

      const confirmResult = await Swal.fire({
        title: '確認開立銷貨單？',
        html: `揀貨單：<b>${waveId}</b><br>共 <b>${wave.matrix.length}</b> 項商品，<b>${storeCount.size}</b> 間分店<br><br><span style="color:#2b6cb0; font-size:13px; font-weight:bold;">✅ 將直接開立正式銷貨單並寫入 ERP。</span><br><span style="font-size:12px; color:#718096;">開立後如有退貨問題，請至「銷貨單管理」處理。</span>`,
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: '確認開立',
        confirmButtonColor: '#2b6cb0',
        cancelButtonText: '再檢查一下'
      });

      if (!confirmResult.isConfirmed) return;

      Swal.fire({ title: '處理中...', allowOutsideClick: false });
      Swal.showLoading();

      try {
        // 1. 按分店分組需要開單的商品 (數量 > 0)
        const branchBundles = {};
        wave.matrix.forEach(row => {
          if (row.branchData) {
            Object.entries(row.branchData).forEach(([bName, data]) => {
              const qty = data.actual ?? (typeof data === 'number' ? data : 0);
              if (qty > 0) {
                if (!branchBundles[bName]) branchBundles[bName] = [];
                // 帶入修正數量備註
                let note = `來自揀貨單 ${waveId}`;
                const corrItem = waveCorrections[waveId] && waveCorrections[waveId][row.id] && waveCorrections[waveId][row.id][bName];
                if (corrItem && corrItem.action === 'oversell') note += `｜超發 +${corrItem.diff} 請超賣`;
                else if (corrItem && corrItem.action === 'pending') note += `｜少貨 ${corrItem.diff} 待補`;
                else if (corrItem && corrItem.action === 'noRestock') note += `｜少貨 ${corrItem.diff} 不補`;
                branchBundles[bName].push({
                  product_id: row.id,
                  product_name: row.name,
                  qty: qty,
                  unit: '件',
                  price: row.storePrice || row.price || 0,
                  cost: row.cost || 0,
                  note: note
                });
              }
            });
          }
        });

        const now = new Date();
        const dateStr = now.toISOString().split('T')[0];
        let successCount = 0;

        // 2. 為每間分店建立銷貨單
        for (const [branch, items] of Object.entries(branchBundles)) {
          // 找尋對應的客戶 ID (名稱包含分店名)
          const cust = allCustomers.find(c => c.name.includes(branch)) || { id: 'MOCK-CUST', name: `模擬-${branch}`, tax_type: '免稅' };

          const subtotal = items.reduce((s, i) => s + (i.qty * i.price), 0);
          const taxRate = cust.tax_type === '外加5%' ? 0.05 : 0;
          const tax_amount = Math.round(subtotal * taxRate);
          const grand_total = subtotal + tax_amount;

          const orderData = {
            order_id: 'SO-MOCK-' + Math.floor(Math.random()*9000),
            order_date: dateStr,
            customer_id: cust.id,
            customer_name: cust.name,
            subtotal: subtotal,
            tax_amount: tax_amount,
            grand_total: grand_total,
            items: items
          };

          if (MOCK_MODE) {
            // 寫入 mockSalesOrders，讓銷貨單管理可以看到
            const soId = `SO-${dateStr.replace(/-/g,'')}-${String(mockSalesOrders.length + 1).padStart(3,'0')}`;
            const issuedTime = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            mockSalesOrders.push({
              id: soId,
              waveId: waveId,
              storeName: branch,
              createdAt: issuedTime,
              storeConfirmedAt: null,
              status: 'issued',
              issuedAt: issuedTime,
              finalAmount: grand_total,
              note: `來自揀貨單 ${waveId}`,
              items: items.map(it => ({
                productId: it.product_id,
                name: it.product_name,
                qty: it.qty,
                unitPrice: it.price,
                returnQty: 0,
                returnStatus: 'none',
                returnReason: '',
                returnDate: '',
                damaged: false,
                note: it.note
              }))
            });
            successCount++;
          } else {
            const res = await fetch(`${SB_URL}/rpc/web_save_sales_order`, {
              method: 'POST',
              headers: HEADERS,
              body: JSON.stringify({ p_order_data: orderData })
            });
            if (res.ok) successCount++;
          }
        }

        if (successCount === 0) throw new Error('所有分店開立均失敗，請檢查客戶資料對接。');

        // 3. 更新揀貨單狀態
        wave.status = 'completed';
        wave.converted = true;
        wave.salesOrderGenerated = true;
        wave.salesOrderDate = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

        syncSalesOrdersToPortal();

        // ✨ 紀錄操作：開立銷貨單
        await logActivity('開立銷貨單', waveId, {
          total_branches: Object.keys(branchBundles).length,
          success: successCount
        });

        await Swal.fire({
          icon: successCount === Object.keys(branchBundles).length ? 'success' : 'warning',
