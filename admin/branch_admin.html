  // ============================
  // 陸貨專區：共用 Supabase fetch
  // ============================
  // ============================
  // 共用視窗模式（Shared Window Pattern）
  // ============================
  let sharedWin = null;
  function openSharedLink(url) {
    if (sharedWin && !sharedWin.closed) {
      sharedWin.location.href = url;
      sharedWin.focus();
    } else {
      sharedWin = window.open(url, '_blank');
    }
  }
  document.addEventListener('click', e => {
    const el = e.target.closest('.shared-link');
    if (el && el.dataset.url) { e.preventDefault(); openSharedLink(el.dataset.url); }
  });

  // ============================
  // 表格欄寬列高拖拉調整
  // ============================
  function enableTableResize(table) {
    if (!table) return;
    // 欄寬拖拉
    const ths = table.querySelectorAll('thead th');
    ths.forEach(th => {
      th.style.position = 'relative';
      const handle = document.createElement('div');
      handle.style.cssText = 'position:absolute;right:0;top:0;width:5px;height:100%;cursor:col-resize;z-index:10;';
      handle.addEventListener('mousedown', e => {
        e.preventDefault();
        const startX = e.pageX;
        const startW = th.offsetWidth;
        const onMove = ev => { th.style.width = Math.max(30, startW + ev.pageX - startX) + 'px'; };
        const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); document.body.style.cursor = ''; };
        document.body.style.cursor = 'col-resize';
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
      th.appendChild(handle);
    });
    // 列高拖拉
    const rows = table.querySelectorAll('tbody tr');
    rows.forEach(tr => {
      tr.style.position = 'relative';
      const handle = document.createElement('div');
      handle.style.cssText = 'position:absolute;left:0;bottom:0;width:100%;height:4px;cursor:row-resize;z-index:10;';
      handle.addEventListener('mousedown', e => {
        e.preventDefault();
        const startY = e.pageY;
        const startH = tr.offsetHeight;
        const onMove = ev => { tr.style.height = Math.max(24, startH + ev.pageY - startY) + 'px'; };
        const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); document.body.style.cursor = ''; };
        document.body.style.cursor = 'row-resize';
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
      tr.appendChild(handle);
    });
  }

  async function cnFetchAll(table, order) {
    let all = [], offset = 0;
    while (true) {
      const res = await fetch(`${SB_URL}/${table}?order=${order}&limit=1000&offset=${offset}`, { headers: HEADERS });
      if (!res.ok) return all;
      const data = await res.json();
      all = all.concat(data);
      if (data.length < 1000) break;
      offset += 1000;
    }
    return all;
  }

  // ============================
  // 陸貨專區：團購叫貨區
  // ============================
  let gbOrderRows = [];
  let newGBRows = [];
  let gbPage = 1;
  const GB_PER = 50;

  function gbEsc(v) { return (v || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  async function renderGBOrder() {
    const container = document.getElementById('mainContainer');
    container.innerHTML = '<div class="panel"><p>載入中...</p></div>';
    try { gbOrderRows = await cnFetchAll('xiaolan_gb_orders', 'id.desc'); } catch { gbOrderRows = []; }
    newGBRows = [];
    gbPage = 1;
    renderGBGrid();
  }

  function getFilteredGB() {
    const kw = document.getElementById('gbSearch')?.value?.trim().toLowerCase() || '';
    const month = document.getElementById('gbMonth')?.value || '';
    let data = [...gbOrderRows];
    if (month) data = data.filter(r => (r.close_date || '').startsWith(month));
    if (kw) data = data.filter(r => (r.product_code||'').toLowerCase().includes(kw) || (r.product_name||'').toLowerCase().includes(kw) || (r.url||'').toLowerCase().includes(kw));
    data.sort((a,b) => (b.close_date||'').localeCompare(a.close_date||''));
    return data;
  }

  function buildGBPagination(total, totalPages) {
    if (totalPages <= 1) return '';
    let h = `<span style="color:#718096;font-size:12px;">共 ${total} 筆</span>`;
    h += `<button class="btn" style="padding:3px 8px;font-size:11px;" onclick="gbGoPage(1)" ${gbPage===1?'disabled':''}>«</button>`;
    h += `<button class="btn" style="padding:3px 8px;font-size:11px;" onclick="gbGoPage(${gbPage-1})" ${gbPage===1?'disabled':''}>‹</button>`;
    const pages = [];
    for (let p = 1; p <= totalPages; p++) {
      if (p === 1 || p === totalPages || (p >= gbPage-2 && p <= gbPage+2)) pages.push(p);
      else if (pages[pages.length-1] !== '...') pages.push('...');
    }
    pages.forEach(p => {
      if (p === '...') h += `<span style="padding:0 3px;color:#a0aec0;">…</span>`;
      else h += `<button style="padding:3px 10px;font-size:11px;border:1px solid #e2e8f0;border-radius:4px;cursor:pointer;${p===gbPage?'background:#4a6fa5;color:#fff;':''}" onclick="gbGoPage(${p})">${p}</button>`;
    });
    h += `<button class="btn" style="padding:3px 8px;font-size:11px;" onclick="gbGoPage(${gbPage+1})" ${gbPage===totalPages?'disabled':''}>›</button>`;
    h += `<button class="btn" style="padding:3px 8px;font-size:11px;" onclick="gbGoPage(${totalPages})" ${gbPage===totalPages?'disabled':''}>»</button>`;
    return h;
  }

  function gbGoPage(p) {
    const saved = getFilteredGB();
    const all = [...newGBRows, ...saved];
    const totalPages = Math.max(1, Math.ceil(all.length / GB_PER));
    gbPage = Math.max(1, Math.min(p, totalPages));
    renderGBGrid();
  }

  function renderGBGrid() {
    const container = document.getElementById('mainContainer');
    const kw = document.getElementById('gbSearch')?.value || '';
    const monthVal = document.getElementById('gbMonth')?.value || '';
    const saved = getFilteredGB();
    const newLen = newGBRows.length;
    const all = [...newGBRows, ...saved];
    const totalPages = Math.max(1, Math.ceil(all.length / GB_PER));
    if (gbPage > totalPages) gbPage = totalPages;
    const start = (gbPage - 1) * GB_PER;
    const pageItems = all.slice(start, start + GB_PER);

    const months = [...new Set(gbOrderRows.filter(r=>r.close_date).map(r=>(r.close_date||'').slice(0,7)).filter(Boolean))].sort().reverse();
    const paginationHtml = buildGBPagination(all.length, totalPages);

    let html = `<div class="panel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h3 style="margin:0;">團購商品叫貨區</h3>
        <div style="display:flex;gap:8px;">
          <input type="file" id="gbFileInput" accept=".xlsx,.xls" style="display:none;" onchange="gbImportExcel(this)">
          <button class="btn" style="background:#2e7d32;color:#fff;" onclick="document.getElementById('gbFileInput').click()">匯入 Excel</button>
          <button class="btn" style="background:#27ae60;color:#fff;" onclick="addGBRows(5)">+5 行</button>

        </div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center;flex-wrap:wrap;">
        <select id="gbMonth" onchange="gbPage=1;renderGBGrid();" style="padding:5px 8px;border:1px solid #ddd;border-radius:4px;font-size:13px;">
          <option value="">全部月份</option>${months.map(m=>`<option value="${m}" ${m===monthVal?'selected':''}>${m}</option>`).join('')}
        </select>
        <input id="gbSearch" type="text" placeholder="搜尋商品編號/名稱/網址" value="${gbEsc(kw)}" style="padding:5px 8px;border:1px solid #ddd;border-radius:4px;font-size:13px;width:200px;" onkeydown="if(event.key==='Enter'){gbPage=1;renderGBGrid();}">
        <button class="btn" onclick="gbPage=1;renderGBGrid()">查詢</button>
        <button class="btn" onclick="document.getElementById('gbMonth').value='';document.getElementById('gbSearch').value='';gbPage=1;renderGBGrid();">清除</button>
        <span style="font-size:12px;color:#718096;margin-left:auto;">已存 ${gbOrderRows.length} 筆</span>
      </div>
      <div style="display:flex;gap:4px;margin-bottom:6px;align-items:center;flex-wrap:wrap;">${paginationHtml}</div>
      <div style="overflow-x:auto;">
      <table style="width:100%;border-collapse:collapse;font-size:12px;">
        <thead><tr style="background:#edf2f7;">
          <th style="width:28px;padding:6px;border:1px solid #e2e8f0;"><input type="checkbox" id="gbCheckAll" onchange="document.querySelectorAll('.gb-ck').forEach(c=>c.checked=this.checked)"></th>
          <th style="width:32px;padding:6px;border:1px solid #e2e8f0;">#</th>
          <th style="width:70px;padding:6px;border:1px solid #e2e8f0;">結單日</th>
          <th style="width:100px;padding:6px;border:1px solid #e2e8f0;">商品編號</th>
          <th style="min-width:160px;padding:6px;border:1px solid #e2e8f0;">商品</th>
          <th style="width:80px;padding:6px;border:1px solid #e2e8f0;">進價(估算)</th>
          <th style="width:70px;padding:6px;border:1px solid #e2e8f0;">售價</th>
          <th style="min-width:150px;padding:6px;border:1px solid #e2e8f0;">網址</th>
          <th style="width:100px;padding:6px;border:1px solid #e2e8f0;">包裝</th>
          <th style="width:60px;padding:6px;border:1px solid #e2e8f0;">已訂貨</th>
        </tr></thead><tbody>`;

    pageItems.forEach((r, pi) => {
      const i = start + pi;
      const isNew = i < newLen;
      const idx = isNew ? `n${i}` : `g${r.id}`;
      const bgNew = isNew ? 'background:#fffbeb;' : '';

      if (newLen > 0 && i === newLen && pi > 0) {
        html += `<tr><td colspan="10" style="border:none;padding:8px 0;text-align:center;background:#f0f7ff;">
          <button class="btn" style="background:#2b6cb0;color:#fff;padding:6px 24px;font-size:13px;" onclick="saveGBNewRows()">儲存新增 (${newLen} 筆)</button>
          <button class="btn" style="background:#718096;color:#fff;padding:6px 24px;font-size:13px;margin-left:8px;" onclick="newGBRows=[];renderGBGrid();">取消新增</button>

        </td></tr>`;
      }

      const tdS = 'border:1px solid #e2e8f0;padding:4px;';
      // 網址
      const url = r.url || '';
      let linkHtml = '';
      if (url) linkHtml = `<span class="shared-link" data-url="${gbEsc(url)}" style="color:#4a6fa5;font-size:11px;cursor:pointer;text-decoration:underline;display:inline-block;margin-bottom:2px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${gbEsc(url)}">連結</span><br>`;
      linkHtml += `<input value="${gbEsc(url)}" data-field="url" data-idx="${idx}" onchange="onGBUrlChange(this)" style="width:100%;font-size:10px;color:#4a6fa5;padding:3px 5px;border:1px solid #e2e8f0;border-radius:3px;" placeholder="貼上網址">`;

      html += `<tr style="${bgNew}">`;
      html += `<td style="text-align:center;${tdS}"><input type="checkbox" class="gb-ck" data-idx="${idx}"></td>`;
      html += `<td style="text-align:center;${tdS}color:#a0aec0;font-size:11px;">${i+1}</td>`;

      html += `<td style="${tdS}"><input value="${gbEsc(r.product_code)}" data-field="product_code" data-idx="${idx}" onchange="onGBChange(this)" style="width:100%;font-size:11px;padding:3px 5px;border:1px solid #e2e8f0;border-radius:3px;"></td>`;
      html += `<td style="${tdS}"><input value="${gbEsc(r.product_name)}" data-field="product_name" data-idx="${idx}" onchange="onGBChange(this)" style="width:100%;font-size:11px;padding:3px 5px;border:1px solid #e2e8f0;border-radius:3px;"></td>`;

      html += `<td style="${tdS}"><input type="number" value="${r.selling_price||''}" data-field="selling_price" data-idx="${idx}" onchange="onGBChange(this)" style="width:100%;font-size:12px;padding:3px 5px;border:1px solid #e2e8f0;border-radius:3px;"></td>`;

    </div>`;
    container.innerHTML = html;
    enableTableResize(container.querySelector('table'));
  }

  function getGBRow(idx) {
    if (idx.startsWith('g')) return gbOrderRows.find(r => r.id === parseInt(idx.slice(1)));
    return newGBRows[parseInt(idx.slice(1))];
  }

  function onGBChange(el) {
    const row = getGBRow(el.dataset.idx);
    if (!row) return;
    if (el.dataset.field === 'ordered') row.ordered = el.checked;
    else if (['estimated_cost','selling_price'].includes(el.dataset.field)) row[el.dataset.field] = parseFloat(el.value) || 0;
    else row[el.dataset.field] = el.value;
    row._dirty = true;
    if (el.dataset.idx.startsWith('g')) triggerGBAutoSave();
  }

  function onGBUrlChange(el) {
    onGBChange(el);
    const url = el.value.trim();
    const td = el.closest('td');
    const existing = td.querySelector('.shared-link');
    if (url && !existing) {
      const link = document.createElement('span');
      link.className = 'shared-link';
      link.dataset.url = url;
      link.style.cssText = 'color:#4a6fa5;font-size:11px;cursor:pointer;text-decoration:underline;display:inline-block;margin-bottom:2px;';
      link.textContent = '連結';
      td.insertBefore(link, el);
      td.insertBefore(document.createElement('br'), el);
    } else if (existing) {
      existing.dataset.url = url;
      if (!url) { existing.nextSibling?.remove(); existing.remove(); }
    }
  }

  function gbFormatDate(el) {
    let v = el.value.trim();
    if (!v) return;
    const now = new Date();
    const year = now.getFullYear();
    let m, d;
    const fullMatch = v.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
    if (fullMatch) { el.value = fullMatch[1]+'/'+parseInt(fullMatch[2])+'/'+parseInt(fullMatch[3]); onGBChange(el); return; }
    const mdMatch = v.match(/^(\d{1,2})[\/\-](\d{1,2})$/);
    if (mdMatch) { m = parseInt(mdMatch[1]); d = parseInt(mdMatch[2]); el.value = year+'/'+m+'/'+d; onGBChange(el); return; }
    const numMatch = v.match(/^(\d{1,2})(\d{2})$/);
    if (numMatch) { m = parseInt(numMatch[1]); d = parseInt(numMatch[2]); if (m >= 1 && m <= 12 && d >= 1 && d <= 31) { el.value = year+'/'+m+'/'+d; onGBChange(el); return; } }
    const longMatch = v.match(/^(\d{4})(\d{2})(\d{2})$/);
    if (longMatch) { el.value = parseInt(longMatch[1])+'/'+parseInt(longMatch[2])+'/'+parseInt(longMatch[3]); onGBChange(el); return; }
    onGBChange(el);
  }

  // Excel 匯入：讀「團購商品-叫貨處」工作表
  function gbImportExcel(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async function(e) {
      try {
        const wb = XLSX.read(e.target.result, { type:'array', cellDates:true, cellLinks:true });
        // 找「團購商品-叫貨處」工作表，或用第一張
        let ws = wb.Sheets['團購商品-叫貨處'] || wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { defval:'' });
        if (!rows.length) return Swal.fire('提示','工作表沒有資料','info');

        // 擷取「網址」欄(F欄)的超連結
        const urlLinks = {};
        const range = XLSX.utils.decode_range(ws['!ref'] || 'A1');
        for (let R = range.s.r + 1; R <= range.e.r; R++) {
          const cell = ws[XLSX.utils.encode_cell({r:R, c:5})]; // F欄=index 5
          if (cell && cell.l && cell.l.Target) {
            urlLinks[R] = cell.l.Target.split('?')[0]; // 去掉 query string
          }
        }

        const imported = rows.filter(r => r['商品'] || r['商品編號']).map((r, idx) => {
          let closeDate = '';
          const raw = r['結單日'];
          if (raw instanceof Date && !isNaN(raw)) {
            closeDate = raw.getFullYear() + '/' + (raw.getMonth()+1) + '/' + raw.getDate();
          } else if (raw) { closeDate = String(raw); }
          return {
            close_date: closeDate,
            product_code: r['商品編號'] ? String(r['商品編號']) : '',
            product_name: r['商品'] || '',
            estimated_cost: parseFloat(r['進價(估算)']) || 0,
            selling_price: parseFloat(r['售價']) || 0,
            url: urlLinks[idx + 1] || '',
            packaging: r['包裝'] || '',
            ordered: !!(r['已訂貨'])
          };
        });

        if (!imported.length) return Swal.fire('提示','沒有可匯入的資料','info');

        const confirm = await Swal.fire({title:`匯入 ${imported.length} 筆？`,icon:'question',showCancelButton:true,confirmButtonText:'匯入',cancelButtonText:'取消'});
        if (!confirm.isConfirmed) return;

        // 批次寫入 Supabase
        const batchSize = 200;
        for (let i = 0; i < imported.length; i += batchSize) {
          const batch = imported.slice(i, i + batchSize);
          const res = await fetch(`${SB_URL}/xiaolan_gb_orders`, { method:'POST', headers:{...HEADERS,'Content-Type':'application/json','Prefer':'return=minimal'}, body:JSON.stringify(batch) });
          if (!res.ok) throw new Error(await res.text());
        }
        Swal.fire({icon:'success',title:`已匯入 ${imported.length} 筆`,timer:1500,showConfirmButton:false});
        renderGBOrder();
      } catch(e) { Swal.fire('錯誤','匯入失敗：'+e.message,'error'); }
    };
    reader.readAsArrayBuffer(file);
    input.value = '';
  }

  async function saveGBNewRows() {
    const toInsert = newGBRows.filter(r => r.product_name || r.product_code || r.url);
    if (toInsert.length === 0) return Swal.fire('提示','沒有需要儲存的新增資料','info');
    try {
      const clean = toInsert.map(r => { const {_dirty,...rest} = r; return rest; });
      const res = await fetch(`${SB_URL}/xiaolan_gb_orders`, { method:'POST', headers:{...HEADERS,'Content-Type':'application/json','Prefer':'return=minimal'}, body:JSON.stringify(clean) });
      if (!res.ok) throw new Error(await res.text());
      Swal.fire({icon:'success',title:`已新增 ${toInsert.length} 筆`,timer:1500,showConfirmButton:false});
      renderGBOrder();
    } catch(e) { Swal.fire('錯誤','儲存失敗：'+e.message,'error'); }
  }

  async function saveGB(isAuto) {
    const toUpdate = gbOrderRows.filter(r => r._dirty);
    if (toUpdate.length === 0) return;
    try {
      for (const r of toUpdate) {
        const {_dirty,id,created_at,...rest} = r;
        await fetch(`${SB_URL}/xiaolan_gb_orders?id=eq.${id}`, { method:'PATCH', headers:{...HEADERS,'Content-Type':'application/json'}, body:JSON.stringify(rest) });
      }
      if (isAuto) { gbOrderRows.forEach(r => delete r._dirty); }
      else { Swal.fire({icon:'success',title:'已更新',timer:1500,showConfirmButton:false}); renderGBOrder(); }
    } catch(e) { if (!isAuto) Swal.fire('錯誤','儲存失敗：'+e.message,'error'); }
  }

  async function deleteGBSelected() {
    const checked = Array.from(document.querySelectorAll('.gb-ck:checked'));
    if (!checked.length) return Swal.fire('提示','請先勾選','info');
    const r = await Swal.fire({title:`確認刪除 ${checked.length} 筆？`,icon:'warning',showCancelButton:true,confirmButtonColor:'#c53030',confirmButtonText:'刪除',cancelButtonText:'取消'});
    if (!r.isConfirmed) return;
    for (const cb of checked) {
      const idx = cb.dataset.idx;
      if (idx.startsWith('g')) {
        const id = parseInt(idx.slice(1));
        await fetch(`${SB_URL}/xiaolan_gb_orders?id=eq.${id}`, {method:'DELETE',headers:HEADERS});
      } else { newGBRows[parseInt(idx.slice(1))] = null; }
    }
    newGBRows = newGBRows.filter(r=>r!==null);
    renderGBOrder();
  }

  // 陸貨專區：漂漂館區
  // ============================
  let ppAssistantRows = [];
  let newPPARows = [];
  let ppaPage = 1;
  const PPA_PER = 50;

  function ppaEsc(v) { return (v || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // ===== 匯率 / 運費率（從 supplier_xiaolan.html 漂漂館讀取，唯讀）=====
  function ppaLoadSettings() {
    try { return JSON.parse(localStorage.getItem('xiaolan_pp_settings') || '{}'); } catch { return {}; }
  }

  function ppaCalcUnitCost(row) {
    const s = ppaLoadSettings();
    const sr = s.shipRate || 0, er = s.exRate || 0;
    if (row.cn_price > 0 && er > 0) {
      row.unit_cost = (row.cn_price + (row.weight || 0) * sr) * er;
    }
  }

  async function renderPPAssistant() {
    const container = document.getElementById('mainContainer');
    container.innerHTML = '<div class="panel"><p>載入中...</p></div>';
    try { ppAssistantRows = await cnFetchAll('xiaolan_piaopiao', 'id.desc'); } catch { ppAssistantRows = []; }
    newPPARows = [];
    ppaPage = 1;
    renderPPAGrid();
  }

  function getFilteredPPA() {
    const kw = document.getElementById('ppaSearch')?.value?.trim().toLowerCase() || '';
    const month = document.getElementById('ppaMonth')?.value || '';
    let data = [...ppAssistantRows];
    if (month) data = data.filter(r => (r.close_date || '').startsWith(month));
    if (kw) data = data.filter(r => (r.product_id||'').toLowerCase().includes(kw) || (r.specs||'').toLowerCase().includes(kw) || (r.supplier_url||'').toLowerCase().includes(kw));
    data.sort((a,b) => (b.close_date||'').localeCompare(a.close_date||''));
    return data;
  }

  function buildPPAPagination(total, totalPages, prefix) {
    if (totalPages <= 1) return '';
    let h = `<span style="color:#718096;font-size:12px;">共 ${total} 筆</span>`;
    h += `<button class="btn" style="padding:3px 8px;font-size:11px;" onclick="ppaGoPage(1)" ${ppaPage===1?'disabled':''}>«</button>`;
    h += `<button class="btn" style="padding:3px 8px;font-size:11px;" onclick="ppaGoPage(${ppaPage-1})" ${ppaPage===1?'disabled':''}>‹</button>`;
    const pages = [];
    for (let p = 1; p <= totalPages; p++) {
      if (p === 1 || p === totalPages || (p >= ppaPage-2 && p <= ppaPage+2)) pages.push(p);
      else if (pages[pages.length-1] !== '...') pages.push('...');
    }
    pages.forEach(p => {
      if (p === '...') h += `<span style="padding:0 3px;color:#a0aec0;">…</span>`;
      else h += `<button style="padding:3px 10px;font-size:11px;border:1px solid #e2e8f0;border-radius:4px;cursor:pointer;${p===ppaPage?'background:#4a6fa5;color:#fff;':''}" onclick="ppaGoPage(${p})">${p}</button>`;
    });
    h += `<button class="btn" style="padding:3px 8px;font-size:11px;" onclick="ppaGoPage(${ppaPage+1})" ${ppaPage===totalPages?'disabled':''}>›</button>`;
    h += `<button class="btn" style="padding:3px 8px;font-size:11px;" onclick="ppaGoPage(${totalPages})" ${ppaPage===totalPages?'disabled':''}>»</button>`;
    return h;
  }

  function ppaGoPage(p) {
    const saved = getFilteredPPA();
    const all = [...newPPARows, ...saved];
    const totalPages = Math.max(1, Math.ceil(all.length / PPA_PER));
    ppaPage = Math.max(1, Math.min(p, totalPages));
    renderPPAGrid();
  }

          html += `<td${rs} style="${tdS}background:#f7fafc;font-size:11px;color:#4a5568;${vtop}">${ppaEsc(r.eta)}</td>`;

        html += `</tr>`;
      }
    });

    html += `</tbody></table></div>
      <div style="display:flex;gap:4px;margin-top:6px;align-items:center;flex-wrap:wrap;">${paginationHtml}</div>
      <div style="margin-top:8px;font-size:11px;color:#a0aec0;display:flex;justify-content:space-between;">
        <span>已存 ${ppAssistantRows.length} 筆</span>
        <span>白底＝可編輯 ｜ 藍底＝小瀾填寫（唯讀）</span>
      </div>
    </div>`;
    container.innerHTML = html;
    enableTableResize(container.querySelector('table'));
  }

  function getPPARow(idx) {
    if (idx.startsWith('s')) return ppAssistantRows.find(r => r.id === parseInt(idx.slice(1)));
    return newPPARows[parseInt(idx.slice(1))];
  }
  function onPPASpecChange(el) {
    const row = getPPARow(el.dataset.idx);
    if (!row) return;
    const si = parseInt(el.dataset.si);
    let lines = (row.specs || '').replace(/\r\n/g, '\n').split('\n');
    while (lines.length <= si) lines.push('');
    lines[si] = el.value;
    row.specs = lines.join('\n');
    row._dirty = true;
    if (el.dataset.idx.startsWith('s')) triggerPPAAutoSave();
  }
  function ppaSpecEnter(idx, si, specCount) {
    // 先儲存當前輸入
    const cur = document.querySelector(`input[data-idx="${idx}"][data-si="${si}"][data-field="specs"]`);
    if (cur) { onPPASpecChange(cur); }
    if (si < specCount - 1) {
      // 還有下一行，直接跳過去
      const next = document.querySelector(`input[data-idx="${idx}"][data-si="${si+1}"][data-field="specs"]`);
      if (next) next.focus();
    } else {
      // 最後一行，新增一行並聚焦
      const row = getPPARow(idx);
      if (!row) return;
      let lines = (row.specs || '').replace(/\r\n/g, '\n').split('\n');
      lines.push('');
      row.specs = lines.join('\n');
      row._dirty = true;
      if (idx.startsWith('s')) triggerPPAAutoSave();
      renderPPAGrid();
      setTimeout(() => {
        const newInput = document.querySelector(`input[data-idx="${idx}"][data-si="${lines.length-1}"][data-field="specs"]`);
        if (newInput) newInput.focus();
      }, 50);
    }
  }
  function ppaSpecBtn(idx, si, specCount) {
    const row = getPPARow(idx);
    if (!row) return;
    let lines = (row.specs || '').replace(/\r\n/g, '\n').split('\n');
    if (si === specCount - 1) {
      // 最後一行的 + 按鈕：新增一行
      lines.push('');
    } else {
      // 非最後一行的 − 按鈕：刪除此行
      if (lines.length <= 1) return;
      lines.splice(si, 1);
    }
    row.specs = lines.join('\n');
    row._dirty = true;
    if (idx.startsWith('s')) triggerPPAAutoSave();
    renderPPAGrid();
  }
  // 日期自動格式化：助理隨便寫，自動轉成 YYYY/M/D
  function ppaFormatDate(el) {
    let v = el.value.trim();
    if (!v) return;
    const now = new Date();
    const year = now.getFullYear();
    let m, d;
    // 已有完整年份 "2026/3/7" or "2026-3-7"
    const fullMatch = v.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
    if (fullMatch) { el.value = fullMatch[1]+'/'+parseInt(fullMatch[2])+'/'+parseInt(fullMatch[3]); onPPAChange(el); return; }
    // "3/7" or "03/07" or "3-7"
    const mdMatch = v.match(/^(\d{1,2})[\/\-](\d{1,2})$/);
    if (mdMatch) { m = parseInt(mdMatch[1]); d = parseInt(mdMatch[2]); el.value = year+'/'+m+'/'+d; onPPAChange(el); return; }
    // "0307" or "307"
    const numMatch = v.match(/^(\d{1,2})(\d{2})$/);
    if (numMatch) { m = parseInt(numMatch[1]); d = parseInt(numMatch[2]); if (m >= 1 && m <= 12 && d >= 1 && d <= 31) { el.value = year+'/'+m+'/'+d; onPPAChange(el); return; } }
    // "20260307"
    const longMatch = v.match(/^(\d{4})(\d{2})(\d{2})$/);
    if (longMatch) { el.value = parseInt(longMatch[1])+'/'+parseInt(longMatch[2])+'/'+parseInt(longMatch[3]); onPPAChange(el); return; }
    // 都不符合就原樣保留
    onPPAChange(el);
  }

  function onPPAUrlChange(el) {
    onPPAChange(el);
    const url = el.value.trim();
    const td = el.closest('td');
    const existing = td.querySelector('.shared-link');
    if (url && !existing) {
      const link = document.createElement('span');
      link.className = 'shared-link';
      link.dataset.url = url;
      link.style.cssText = 'color:#4a6fa5;font-size:11px;cursor:pointer;text-decoration:underline;display:inline-block;margin-bottom:2px;';
      link.textContent = '連結';
      td.insertBefore(link, el);
      td.insertBefore(document.createElement('br'), el);
    } else if (existing) {
      existing.dataset.url = url;
      if (!url) { existing.nextSibling?.remove(); existing.remove(); }
    }
  }
  function onPPAChange(el) {
    const row = getPPARow(el.dataset.idx);
    if (!row) return;
    if (el.dataset.field === 'done') row.done = el.checked;
    else if (['cn_price','weight','price'].includes(el.dataset.field)) row[el.dataset.field] = parseFloat(el.value) || 0;
    else row[el.dataset.field] = el.value;
    row._dirty = true;
    // 舊資料自動儲存，新增行不自動（等按儲存）
    if (el.dataset.idx.startsWith('s')) triggerPPAAutoSave();
    // 大陸售價或重量改變時自動計算單件進貨價
    if (el.dataset.field === 'cn_price' || el.dataset.field === 'weight') {
      ppaCalcUnitCost(row);
      const tr = el.closest('tr');
      const calcTd = tr?.querySelectorAll('td')[11]; // 單件進貨價 column (index 11)
      if (calcTd) {
        calcTd.innerHTML = row.unit_cost ? `<div style="text-align:right;font-weight:bold;color:#4a6fa5;">$${Number(row.unit_cost).toFixed(0)}</div>` : '';
      }
    }
  }
  function addPPARows(n) {
    for (let i = 0; i < n; i++) newPPARows.push({ close_date:'', product_id:'', price:0, specs:'', order_status:'', supplier_url:'', done:false, shortage:'', cn_price:0, weight:0, unit_cost:0, order_1688:'', tracking:'', eta:'' });
    ppaPage = 1;
    renderPPAGrid();
  }
  let ppaAutoSaveTimer = null;
  function triggerPPAAutoSave() {
    clearTimeout(ppaAutoSaveTimer);
    ppaAutoSaveTimer = setTimeout(() => savePPA(true), 2000);
  }

  async function savePPANewRows() {
    const toInsert = newPPARows.filter(r => r.supplier_url || r.specs || r.product_id || r.close_date);
    if (toInsert.length === 0) return Swal.fire('提示','沒有需要儲存的新增資料','info');
    try {
      const clean = toInsert.map(r => {
        const {_dirty,order_status,order_1688,tracking,eta,...rest} = r;
        if (rest.cn_price > 0) { ppaCalcUnitCost(rest); }
        return rest;
      });
      const res = await fetch(`${SB_URL}/xiaolan_piaopiao`, { method:'POST', headers:{...HEADERS,'Content-Type':'application/json','Prefer':'return=minimal'}, body:JSON.stringify(clean) });
      if (!res.ok) throw new Error(await res.text());
      Swal.fire({icon:'success',title:`已新增 ${toInsert.length} 筆`,timer:1500,showConfirmButton:false});
      renderPPAssistant();
    } catch(e) { Swal.fire('錯誤','儲存失敗：'+e.message,'error'); }
  }

  async function savePPA(isAuto) {
    const toInsert = newPPARows.filter(r => r.supplier_url || r.specs || r.product_id);
    const toUpdate = ppAssistantRows.filter(r => r._dirty);
    if (toInsert.length === 0 && toUpdate.length === 0) return;
    let saved=0, updated=0;
    try {
      if (toInsert.length > 0) {
        const clean = toInsert.map(r => {
          const {_dirty,order_status,order_1688,tracking,eta,unit_cost,...rest} = r;
          return rest;
        });
        const res = await fetch(`${SB_URL}/xiaolan_piaopiao`, { method:'POST', headers:{...HEADERS,'Content-Type':'application/json','Prefer':'return=minimal'}, body:JSON.stringify(clean) });
        if (!res.ok) throw new Error(await res.text());
        saved = toInsert.length;
      }
      for (const r of toUpdate) {
        const {_dirty,id,created_at,order_status,order_1688,tracking,eta,unit_cost,pp_ship_rate,pp_ex_rate,...rest} = r;
        await fetch(`${SB_URL}/xiaolan_piaopiao?id=eq.${id}`, { method:'PATCH', headers:{...HEADERS,'Content-Type':'application/json'}, body:JSON.stringify(rest) });
        updated++;
      }
      if (isAuto) {
        // 自動儲存：靜默處理，有新增才重載資料（不閃畫面）
        if (saved > 0) {
          try { ppAssistantRows = await cnFetchAll('xiaolan_piaopiao', 'id.desc'); } catch {}
          newPPARows = [];
          renderPPAGrid();
        } else {
          ppAssistantRows.forEach(r => delete r._dirty);
        }
      } else {
        Swal.fire({icon:'success',title:'已儲存',text:`新增 ${saved} 筆，更新 ${updated} 筆`,timer:1500,showConfirmButton:false});
        renderPPAssistant();
      }
    } catch(e) { if (!isAuto) Swal.fire('錯誤','儲存失敗：'+e.message,'error'); }
  }
  async function deletePPASelected() {
    const checked = Array.from(document.querySelectorAll('.ppa-ck:checked'));
    if (!checked.length) return Swal.fire('提示','請先勾選','info');
    const r = await Swal.fire({title:`確認刪除 ${checked.length} 筆？`,icon:'warning',showCancelButton:true,confirmButtonColor:'#c53030',confirmButtonText:'刪除',cancelButtonText:'取消'});
    if (!r.isConfirmed) return;
    for (const cb of checked) {
      const idx = cb.dataset.idx;
      if (idx.startsWith('s')) {
        const id = parseInt(idx.slice(1));
        await fetch(`${SB_URL}/xiaolan_piaopiao?id=eq.${id}`, {method:'DELETE',headers:HEADERS});
      } else { newPPARows[parseInt(idx.slice(1))] = null; }
    }
    newPPARows = newPPARows.filter(r=>r!==null);
    renderPPAssistant();
  }

  // ============================

  function buildCnaPagination(total, totalPages) {
    if (totalPages <= 1) return '';
    let h = `<div style="display:flex;gap:4px;margin:8px 0;align-items:center;flex-wrap:wrap;">`;
    h += `<span style="color:#718096;font-size:12px;">共 ${total} 筆</span>`;
    h += `<button class="btn" style="padding:3px 8px;font-size:11px;" onclick="cnaGoPage(1)" ${cnaPage===1?'disabled':''}>«</button>`;
    h += `<button class="btn" style="padding:3px 8px;font-size:11px;" onclick="cnaGoPage(${cnaPage-1})" ${cnaPage===1?'disabled':''}>‹</button>`;
    const pages = [];
    for (let p = 1; p <= totalPages; p++) {
      if (p === 1 || p === totalPages || (p >= cnaPage-2 && p <= cnaPage+2)) pages.push(p);
      else if (pages[pages.length-1] !== '...') pages.push('...');
    }
    pages.forEach(p => {
      if (p === '...') h += `<span style="padding:0 3px;color:#a0aec0;">…</span>`;
      else h += `<button style="padding:3px 10px;font-size:11px;border:1px solid #e2e8f0;border-radius:4px;cursor:pointer;${p===cnaPage?'background:#4a6fa5;color:#fff;':''}" onclick="cnaGoPage(${p})">${p}</button>`;
    });
    h += `<button class="btn" style="padding:3px 8px;font-size:11px;" onclick="cnaGoPage(${cnaPage+1})" ${cnaPage===totalPages?'disabled':''}>›</button>`;
    h += `<button class="btn" style="padding:3px 8px;font-size:11px;" onclick="cnaGoPage(${totalPages})" ${cnaPage===totalPages?'disabled':''}>»</button>`;
    h += `</div>`;
    return h;
  }

  function cnaGoPage(p) {

    </head><body>
      <h2>陸貨到貨清單</h2>
      <p style="text-align:right;font-size:11px;">列印日期：${new Date().toLocaleDateString('zh-TW')}　共 ${printData.length} 筆</p>
      <table><thead><tr><th>#</th><th>到貨</th><th>快遞單號</th><th>商品編號</th><th>商品名稱</th><th>售價</th><th>進貨價</th></tr></thead>
      <tbody>${rows}</tbody></table>
    </body></html>`);
    w.document.close();
  }

  // ============================
  // 陸貨專區：退換貨處理
  // ============================
  let cnReturnRows = [];
  let newCnReturnRows = [];
  let cnrPage = 1;
  const CNR_PER = 100;

  const CNR_PROGRESS = ['待處理','廠商補寄','已重新訂貨','廠商退款','認賠','已解決'];
  const CNR_STYLES = {
    '待處理':     { bg:'#fef3c7', color:'#92400e' },
    '廠商補寄':   { bg:'#eff6ff', color:'#1e40af' },
    '已重新訂貨': { bg:'#f0fdf4', color:'#166534' },
    '廠商退款':   { bg:'#fdf2f8', color:'#9d174d' },
    '認賠':       { bg:'#fef2f2', color:'#991b1b' },
    '已解決':     { bg:'#ecfdf5', color:'#047857' }
  };

  async function renderCnReturns() {
    const container = document.getElementById('mainContainer');
    container.innerHTML = '<div class="panel"><p>載入中...</p></div>';
    try { [cnReturnRows, cnArrivalRows] = await Promise.all([
      cnFetchAll('xiaolan_returns', 'id.desc'),
      cnFetchAll('xiaolan_arrivals', 'id.desc')
    ]); } catch { cnReturnRows = []; cnArrivalRows = cnArrivalRows || []; }
    newCnReturnRows = [];
    cnrPage = 1;
    renderCnReturnGrid();
  }

  function renderCnReturnGrid() {
    const container = document.getElementById('mainContainer');
    const kw = document.getElementById('cnrSearch')?.value?.trim().toLowerCase() || '';
    const progress = document.getElementById('cnrProgress')?.value || '';
    let data = [...cnReturnRows];
    if (progress) data = data.filter(r => r.progress === progress);
    if (kw) data = data.filter(r => (r.product_name||'').toLowerCase().includes(kw) || (r.product_code||'').toLowerCase().includes(kw) || (r.tracking_number||'').toLowerCase().includes(kw));
    const newLen = newCnReturnRows.length;
    const all = [...newCnReturnRows, ...data];
    const totalPages = Math.max(1, Math.ceil(all.length / CNR_PER));
    if (cnrPage > totalPages) cnrPage = totalPages;
    const start = (cnrPage - 1) * CNR_PER;
    const pageItems = all.slice(start, start + CNR_PER);

    // 快遞單號→出貨日期對照（從到貨清單）
    const trackToShipDate = {};
    cnArrivalRows.forEach(a => { if (a.tracking_number) trackToShipDate[a.tracking_number] = a.ship_date || ''; });

    let html = `<div class="panel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h3 style="margin:0;">退換貨處理</h3>
        <div style="display:flex;gap:8px;">
          <button class="btn" style="background:#27ae60;color:#fff;" onclick="addCnReturnRows(3)">+3 行</button>
          ${newLen > 0 ? '<button class="btn" style="background:#2b6cb0;color:#fff;" onclick="saveCnrNewRows()">儲存新增 ('+newLen+')</button>' : ''}
          <button class="btn" style="background:#c53030;color:#fff;" onclick="deleteCnReturnSelected()">刪除勾選</button>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center;flex-wrap:wrap;">
        <input id="cnrSearch" type="text" placeholder="搜尋商編/品名/運單號" value="${kw}" style="padding:5px 8px;border:1px solid #ddd;border-radius:4px;font-size:13px;width:200px;" onkeydown="if(event.key==='Enter'){cnrPage=1;renderCnReturnGrid();}">
        <select id="cnrProgress" onchange="cnrPage=1;renderCnReturnGrid();" style="padding:5px 8px;border:1px solid #ddd;border-radius:4px;font-size:13px;">
          <option value="">全部進度</option>
          ${CNR_PROGRESS.map(p => `<option value="${p}" ${progress===p?'selected':''}>${p}</option>`).join('')}
        </select>
        <button class="btn" onclick="cnrPage=1;renderCnReturnGrid()">查詢</button>
        <button class="btn" onclick="document.getElementById('cnrSearch').value='';document.getElementById('cnrProgress').value='';cnrPage=1;renderCnReturnGrid();">清除</button>
        <span style="font-size:12px;color:#718096;">共 ${all.length} 筆</span>
      </div>
      <p style="font-size:11px;color:#a0aec0;margin:0 0 8px;">📝 您可填寫：日期、商品編號、商品名稱、內容、備註 ｜ 🔒 處理進度/處理日期/運單號 由採購方更新</p>`;

    html += buildCnrPagination(all.length, totalPages);

    html += `<div style="overflow-x:auto;">
      <table style="width:100%;border-collapse:collapse;font-size:12px;">
        <thead><tr style="background:#edf2f7;">
          <th style="width:30px;padding:6px;border:1px solid #e2e8f0;"><input type="checkbox" id="cnrCheckAll" onchange="document.querySelectorAll('.cnr-ck').forEach(c=>c.checked=this.checked)"></th>
          <th style="width:30px;padding:6px;border:1px solid #e2e8f0;">#</th>
          <th style="width:90px;padding:6px;border:1px solid #e2e8f0;">日期</th>
          <th style="width:90px;padding:6px;border:1px solid #e2e8f0;">商品編號</th>
          <th style="min-width:120px;padding:6px;border:1px solid #e2e8f0;">商品名稱</th>
          <th style="min-width:160px;padding:6px;border:1px solid #e2e8f0;">內容</th>
          <th style="width:130px;padding:6px;border:1px solid #e2e8f0;background:#eef2ff;">處理進度</th>
          <th style="width:90px;padding:6px;border:1px solid #e2e8f0;background:#eef2ff;">處理日期</th>
          <th style="width:130px;padding:6px;border:1px solid #e2e8f0;background:#eef2ff;">包裹運單號</th>
          <th style="width:70px;padding:6px;border:1px solid #e2e8f0;">出貨日期</th>
          <th style="min-width:40px;padding:6px;border:1px solid #e2e8f0;">備註</th>
        </tr></thead><tbody>`;

    pageItems.forEach((r, pi) => {
      const i = start + pi;
      const isNew = i < newLen;
      const idx = isNew ? `cn${i}` : `cs${r.id}`;
      const pSt = CNR_STYLES[r.progress] || CNR_STYLES['待處理'];
      const progressBadge = r.progress ? `<span style="background:${pSt.bg};color:${pSt.color};padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;">${r.progress}</span>` : '<span style="color:#a0aec0;font-size:11px;">待處理</span>';

      // 新增行與舊資料的分隔線 + 儲存按鈕
      if (newLen > 0 && i === newLen && pi > 0) {
        html += `<tr><td colspan="11" style="border:none;padding:8px 0;text-align:center;background:#f0f7ff;">
          <button class="btn" style="background:#2b6cb0;color:#fff;padding:6px 24px;font-size:13px;" onclick="saveCnrNewRows()">儲存新增 (${newLen} 筆)</button>
          <button class="btn" style="background:#718096;color:#fff;padding:6px 24px;font-size:13px;margin-left:8px;" onclick="newCnReturnRows=[];renderCnrGrid();">取消新增</button>
          <span style="font-size:11px;color:#718096;margin-left:8px;">以上為新增行</span>
        </td></tr>`;
      }

      html += `<tr style="${isNew?'background:#fffbeb;':''}">
        <td style="text-align:center;border:1px solid #e2e8f0;padding:4px;"><input type="checkbox" class="cnr-ck" data-idx="${idx}"></td>
        <td style="text-align:center;border:1px solid #e2e8f0;padding:4px;color:#a0aec0;">${i+1}</td>
        <td style="border:1px solid #e2e8f0;padding:4px;"><input type="date" value="${r.return_date||''}" data-field="return_date" data-idx="${idx}" onchange="onCnrChange(this)" style="width:100%;border:1px solid #e2e8f0;padding:3px;font-size:12px;border-radius:3px;"></td>
        <td style="border:1px solid #e2e8f0;padding:4px;"><input value="${r.product_code||''}" data-field="product_code" data-idx="${idx}" onchange="onCnrChange(this)" style="width:100%;border:1px solid #e2e8f0;padding:3px;font-size:12px;border-radius:3px;font-family:monospace;"></td>
        <td style="border:1px solid #e2e8f0;padding:4px;"><input value="${(r.product_name||'').replace(/"/g,'&quot;')}" data-field="product_name" data-idx="${idx}" onchange="onCnrChange(this)" style="width:100%;border:1px solid #e2e8f0;padding:3px;font-size:12px;border-radius:3px;"></td>
        <td style="border:1px solid #e2e8f0;padding:4px;"><input value="${(r.content||'').replace(/\r?\n/g,' ').replace(/"/g,'&quot;')}" data-field="content" data-idx="${idx}" onchange="onCnrChange(this)" style="width:100%;border:1px solid #e2e8f0;padding:3px;font-size:12px;border-radius:3px;" title="${(r.content||'').replace(/"/g,'&quot;')}"></td>
        <td style="border:1px solid #e2e8f0;padding:4px;text-align:center;background:#f7fafc;">${progressBadge}</td>
        <td style="border:1px solid #e2e8f0;padding:4px;background:#f7fafc;color:#4a5568;">${r.process_date||''}</td>
        <td style="border:1px solid #e2e8f0;padding:4px;background:#f7fafc;font-size:11px;color:#4a5568;">${r.tracking_number||''}</td>
        <td style="border:1px solid #e2e8f0;padding:4px;font-size:11px;color:#4a5568;white-space:nowrap;">${r.tracking_number ? (trackToShipDate[r.tracking_number] || '') : ''}</td>
        <td style="border:1px solid #e2e8f0;padding:4px;"><input value="${(r.note||'').replace(/"/g,'&quot;')}" data-field="note" data-idx="${idx}" onchange="onCnrChange(this)" style="width:100%;border:1px solid #e2e8f0;padding:3px;font-size:12px;border-radius:3px;"></td>
      </tr>`;
    });

    html += `</tbody></table></div>`;
    html += buildCnrPagination(all.length, totalPages);
    html += `</div>`;
    container.innerHTML = html;
    enableTableResize(container.querySelector('table'));
  }

  function buildCnrPagination(total, totalPages) {
    if (totalPages <= 1) return '';
    let h = `<div style="display:flex;gap:4px;margin:8px 0;align-items:center;flex-wrap:wrap;">`;
    h += `<span style="color:#718096;font-size:12px;">共 ${total} 筆</span>`;
    h += `<button class="btn" style="padding:3px 8px;font-size:11px;" onclick="cnrGoPage(1)" ${cnrPage===1?'disabled':''}>«</button>`;
    h += `<button class="btn" style="padding:3px 8px;font-size:11px;" onclick="cnrGoPage(${cnrPage-1})" ${cnrPage===1?'disabled':''}>‹</button>`;
    const pages = [];
    for (let p = 1; p <= totalPages; p++) {
      if (p === 1 || p === totalPages || (p >= cnrPage-2 && p <= cnrPage+2)) pages.push(p);
      else if (pages[pages.length-1] !== '...') pages.push('...');
    }
    pages.forEach(p => {
      if (p === '...') h += `<span style="padding:0 3px;color:#a0aec0;">…</span>`;
      else h += `<button style="padding:3px 10px;font-size:11px;border:1px solid #e2e8f0;border-radius:4px;cursor:pointer;${p===cnrPage?'background:#4a6fa5;color:#fff;':''}" onclick="cnrGoPage(${p})">${p}</button>`;
    });
    h += `<button class="btn" style="padding:3px 8px;font-size:11px;" onclick="cnrGoPage(${cnrPage+1})" ${cnrPage===totalPages?'disabled':''}>›</button>`;
    h += `<button class="btn" style="padding:3px 8px;font-size:11px;" onclick="cnrGoPage(${totalPages})" ${cnrPage===totalPages?'disabled':''}>»</button>`;
    h += `</div>`;
    return h;
  }

  function cnrGoPage(p) {
    const all = [...cnReturnRows, ...newCnReturnRows];
    const totalPages = Math.max(1, Math.ceil(all.length / CNR_PER));
    cnrPage = Math.max(1, Math.min(p, totalPages));
    renderCnReturnGrid();
  }

  function getCnrRow(idx) {
    if (idx.startsWith('cs')) return cnReturnRows.find(r => r.id === parseInt(idx.slice(2)));
    if (idx.startsWith('cn')) return newCnReturnRows[parseInt(idx.slice(2))];
    return null;
  }
  function onCnrChange(el) {
    const row = getCnrRow(el.dataset.idx);
    if (!row) return;
    row[el.dataset.field] = el.value;
    row._dirty = true;
    // 舊資料自動儲存，新增行不自動（等按儲存新增）
    if (el.dataset.idx.startsWith('cs')) triggerCnrAutoSave();
  }
  let cnrAutoSaveTimer = null;
  function triggerCnrAutoSave() {
    clearTimeout(cnrAutoSaveTimer);
    cnrAutoSaveTimer = setTimeout(() => saveCnReturns(true), 2000);
  }
  function addCnReturnRows(n) {
    for (let i = 0; i < n; i++) newCnReturnRows.push({ return_date: new Date().toISOString().slice(0,10), product_code:'', product_name:'', content:'', progress:'', process_date:'', order_number:'', tracking_number:'', note:'' });
    cnrPage = 1;
    renderCnReturnGrid();
  }
  async function saveCnrNewRows() {
    const toInsert = newCnReturnRows.filter(r => r.product_name || r.content || r.product_code);
    if (toInsert.length === 0) return Swal.fire('提示','沒有需要儲存的新增資料','info');
    try {
      const clean = toInsert.map(r => {
        const {_dirty,...rest} = r;
        if (rest.return_date === '') rest.return_date = null;
        delete rest.progress; delete rest.process_date; delete rest.tracking_number; delete rest.order_number;
        return rest;
      });
      const res = await fetch(`${SB_URL}/xiaolan_returns`, { method:'POST', headers:{...HEADERS,'Content-Type':'application/json','Prefer':'return=minimal'}, body:JSON.stringify(clean) });
      if (!res.ok) throw new Error(await res.text());
      Swal.fire({icon:'success',title:`已新增 ${toInsert.length} 筆`,timer:1500,showConfirmButton:false});
      newCnReturnRows = [];
      cnReturnRows = await cnFetchAll('xiaolan_returns', 'id.desc');
      renderCnReturnGrid();
    } catch(e) { Swal.fire('錯誤','儲存失敗：'+e.message,'error'); }
  }

  async function saveCnReturns(isAuto) {
    // 自動儲存只處理舊資料更新，新增行由 saveCnrNewRows 處理
    const toUpdate = cnReturnRows.filter(r => r._dirty);
    if (toUpdate.length === 0) return;
    try {
      for (const r of toUpdate) {
        const {_dirty,id,created_at,...rest} = r;
        if (rest.return_date === '') rest.return_date = null;
        const patch = {
          return_date: rest.return_date,
          product_code: rest.product_code,
          product_name: rest.product_name,
          content: rest.content,
          note: rest.note
        };
        await fetch(`${SB_URL}/xiaolan_returns?id=eq.${id}`, { method:'PATCH', headers:{...HEADERS,'Content-Type':'application/json'}, body:JSON.stringify(patch) });
      }
      cnReturnRows.forEach(r => delete r._dirty);
    } catch(e) { /* 靜默 */ }
  }
  async function deleteCnReturnSelected() {
    const checked = Array.from(document.querySelectorAll('.cnr-ck:checked'));
    if (!checked.length) return Swal.fire('提示','請先勾選','info');
    const r = await Swal.fire({title:`確認刪除 ${checked.length} 筆？`,icon:'warning',showCancelButton:true,confirmButtonColor:'#c53030',confirmButtonText:'刪除',cancelButtonText:'取消'});
    if (!r.isConfirmed) return;
    for (const cb of checked) {
      const idx = cb.dataset.idx;
      if (idx.startsWith('cs')) {
        const id = parseInt(idx.slice(2));
        await fetch(`${SB_URL}/xiaolan_returns?id=eq.${id}`, {method:'DELETE',headers:HEADERS});
      } else { newCnReturnRows[parseInt(idx.slice(2))] = null; }
    }
    newCnReturnRows = newCnReturnRows.filter(r=>r!==null);
    renderCnReturns();
  }

  </script>
</body>
</html>
