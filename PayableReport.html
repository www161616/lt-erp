<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <title>應付帳款報表 - 龍潭進銷存系統</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    /* ========== 基礎與報表樣式 ========== */
    * { box-sizing: border-box; }
    body { font-family: 'Microsoft JhengHei', 'Noto Sans TC', sans-serif; margin: 0; padding: 24px; background: #f8f9fb; color: #1e293b; }
    .container { background: white; padding: 20px; border-radius: 12px; }
    h2 { color: #c53030; margin-top: 0; display: flex; align-items: center; gap: 10px; }
    
    .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .card { background: linear-gradient(135deg, #475569 0%, #334155 100%); color: white; padding: 20px; border-radius: 10px; }
    .card-title { font-size: 14px; opacity: 0.9; margin-bottom: 5px; }
    .card-value { font-size: 28px; font-weight: bold; }
    
    .filter-box { background: #f1f5f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    label { font-weight: bold; display: block; margin-bottom: 5px; color: #666; font-size: 13px; }
    input, select { padding: 9px; border: 1px solid #ddd; border-radius: 6px; margin-right: 10px; width: 100%; }
    
    .btn-search { padding: 10px 20px; background: #c53030; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    .btn-search:hover { background: #9b2c2c; }
    .btn-print { padding: 10px 20px; background: #0e7490; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    .btn-print:hover { background: #0e7490; }
    .btn-export { padding: 10px 20px; background: #1D6F42; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    .btn-export:hover { background: #165a36; }
    .btn-export:disabled { background: #ccc; cursor: not-allowed; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th { background: #f5f5f5; padding: 12px; text-align: left; border-bottom: 2px solid #ddd; font-weight: bold; font-size: 14px; color: #555; }
    td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
    tr:hover { background: #f9f9f9; }
    
    .status-paid { color: #276749; font-weight: bold; }
    .status-unpaid { color: #c53030; font-weight: bold; }
    .status-partial { color: #b7791f; font-weight: bold; }
    
    .no-result { text-align: center; padding: 40px; color: #999; }
    .loading { text-align: center; padding: 40px; color: #c53030; font-weight: bold; }

    /* ========== ✨ 移植過來的美顏彈窗專用 CSS ✨ ========== */
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(3px); }
    .overlay-content { background: white; width: 95%; max-width: 800px; max-height: 90vh; border-radius: 12px; padding: 30px; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.2); overflow-y: auto; }
    .close-overlay { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; color: #999; transition: 0.2s; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
    .close-overlay:hover { color: white; background: #c53030; transform: rotate(90deg); }
    
    /* 進貨紅色系明細表頭 */
    .detail-header { background: #fed7d7; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; border: 1px solid #fbc4c4; font-size: 14px; color: #333; }
    
    /* 可點擊的超美單號 */
    .clickable-id { font-weight: 700; color: #c53030; cursor: pointer; text-decoration: underline; text-underline-offset: 4px; transition: 0.2s; }
    .clickable-id:hover { color: #9b2c2c; }
  </style>
</head>
<body>
  <div class="container">
    <h2>📊 應付帳款報表</h2>
    
    <div class="summary-cards">
      <div class="card">
        <div class="card-title">總應付金額</div>
        <div class="card-value" id="totalPayable">$0</div>
      </div>
      <div class="card" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
        <div class="card-title">未付金額</div>
        <div class="card-value" id="totalUnpaid">$0</div>
      </div>
      <div class="card" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
        <div class="card-title">已付金額</div>
        <div class="card-value" id="totalPaid">$0</div>
      </div>
    </div>
    
    <div class="filter-box">
      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr auto auto auto; gap: 15px; align-items: end;">
        <div>
          <label>📅 起始日期</label>
          <input type="date" id="dateFrom">
        </div>
        <div>
          <label>📅 結束日期</label>
          <input type="date" id="dateTo">
        </div>
        <div>
          <label>💰 付款狀態</label>
          <select id="statusFilter">
            <option value="">全部</option>
            <option value="未付款">未付款</option>
            <option value="已付款">已付款</option>
            <option value="部分付款">部分付款</option>
          </select>
        </div>
        <div>
          <label>🏢 供應商</label>
          <input type="text" id="suppSearch" placeholder="快搜供應商..." autocomplete="off"
            oninput="filterSupplierSelect()" style="margin-bottom:4px;">
          <select id="supplierFilter" size="1" onchange="onSuppPick()" style="width:100%;">
            <option value="">— 全部供應商 —</option>
          </select>
        </div>
        <button class="btn-search" onclick="loadReport()">🔍 查詢</button>
        <button id="exportBtn" class="btn-export" onclick="exportToExcel()" disabled>📥 匯出 Excel</button>
        <button class="btn-print" onclick="openPrintModal()">🖨️ 列印月結總表</button>
      </div>
    </div>
    
    <div id="results"></div>
  </div>

  <div id="printModal" class="overlay" style="z-index: 2000;">
    <div class="overlay-content" style="max-width: 450px; overflow: hidden;">
      <span class="close-overlay" onclick="closePrintModal()">&times;</span>
      <h3 style="margin-bottom:20px; color:#c53030; margin-top: 0;">🖨️ 列印每月應付帳款彙總表</h3>
      <div style="margin-bottom: 20px;">
        <label style="font-weight: bold; display: block; margin-bottom: 8px;">📅 選擇月份</label>
        <input type="month" id="printMonth" style="width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px;">
      </div>
      <button onclick="printMonthlySummary(event)" style="width: 100%; padding: 15px; background: #276749; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer;">🖨️ 產生並列印</button>
    </div>
  </div>

  <div id="detailOverlay" class="overlay">
    <div class="overlay-content">
      <span class="close-overlay" onclick="closeDetail()">&times;</span>
      <h3 style="margin-top:0; margin-bottom:20px; color:#c53030; font-size:20px; display:flex; align-items:center; gap:8px;">📄 進貨單明細</h3>
      <div id="detailInner"></div>
    </div>
  </div>

  <script>
    // ========== 1. Supabase API 設定 ==========
    const SB_URL = 'https://gkuwoandmsgvlsxzmrjj.supabase.co/rest/v1';
    const SB_KEY = 'sb_publishable_7K0w9Z8-Wv1dOgLsZkI0rA_WfNei_AS'; 
    const AUTH_TOKEN = sessionStorage.getItem('sb_auth_token') || SB_KEY;
    const HEADERS = {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${AUTH_TOKEN}`,
      'Content-Type': 'application/json'
    };

    var currentData = [];
    var allSuppliers = [];

    window.onload = function() {
      const today = new Date();
      const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
      document.getElementById('dateFrom').value = firstDay.toISOString().split('T')[0];
      document.getElementById('dateTo').value = today.toISOString().split('T')[0];
      document.getElementById('printMonth').value = today.toISOString().substring(0, 7);
      loadSuppliers();
      loadReport();
    };

    async function loadSuppliers() {
      try {
        const res = await fetch(`${SB_URL}/suppliers?select=id,name&order=name`, { headers: HEADERS });
        if (!res.ok) throw new Error('failed');
        allSuppliers = await res.json();
        renderSupplierSelect('');
      } catch (e) {
        document.getElementById('suppSearch').placeholder = '❌ 載入失敗';
      }
    }

    function renderSupplierSelect(kw) {
      const sel = document.getElementById('supplierFilter');
      const filtered = kw ? allSuppliers.filter(s => s.name.toLowerCase().includes(kw.toLowerCase())) : allSuppliers;
      sel.innerHTML = '<option value="">— 全部供應商 —</option>';
      filtered.forEach(s => { sel.innerHTML += `<option value="${s.id}">${s.name}</option>`; });
      if (kw) {
        sel.size = Math.min(filtered.length + 1, 8);
        sel.style.cssText = 'width:100%; background:#fff; border:2px solid #c53030; border-radius:6px; box-shadow:0 4px 12px rgba(229,57,53,0.15); outline:none;';
      } else {
        sel.size = 1;
        sel.style.cssText = 'width:100%;';
      }
    }

    function filterSupplierSelect() {
      renderSupplierSelect(document.getElementById('suppSearch').value.trim());
    }

    function onSuppPick() {
      const sel = document.getElementById('supplierFilter');
      sel.size = 1;
      sel.style.cssText = 'width:100%;';
    }
    
    // ========== 2. 查詢應付帳款明細 ==========
    async function loadReport() {
      const dateFrom = document.getElementById('dateFrom').value;
      const dateTo = document.getElementById('dateTo').value;
      const status = document.getElementById('statusFilter').value;
      const supplierId = document.getElementById('supplierFilter').value;

      document.getElementById('results').innerHTML = '<div class="loading">🔄 載入中...</div>';
      document.getElementById('exportBtn').disabled = true;

      try {
        let query = `${SB_URL}/purchase_orders?select=*&order=order_date.desc,id.desc`;
        if (dateFrom) query += `&order_date=gte.${dateFrom}`;
        if (dateTo) query += `&order_date=lte.${dateTo}`;
        if (status) query += `&payment_status=eq.${status}`;
        if (supplierId) query += `&supplier_id=eq.${supplierId}`;

        const orderRes = await fetch(query, { headers: HEADERS });
        if (!orderRes.ok) throw new Error(`HTTP ${orderRes.status}`);
        const orders = await orderRes.json();

        let paymentsMap = {};
        try {
          const payQuery = `${SB_URL}/payment_made?select=ref_id,amount`;
          const payRes = await fetch(payQuery, { headers: HEADERS });
          if (payRes.ok) {
            const payments = await payRes.json();
            payments.forEach(p => {
              if (p.ref_id) paymentsMap[p.ref_id] = (paymentsMap[p.ref_id] || 0) + Number(p.amount || 0);
            });
          }
        } catch (e) { console.warn('payment_made 查詢失敗'); }

        const reportData = orders.map(o => {
          const totalAmount = Number(o.grand_total || o.subtotal || 0);
          let paidAmount = paymentsMap[o.id] || 0;
          if (paidAmount === 0 && (o.payment_status === '已付款' || o.payment_status === '已結清')) {
            paidAmount = totalAmount;
          }
          const unpaidAmount = Math.max(0, totalAmount - paidAmount);
          let finalStatus = '未付款';
          if (unpaidAmount === 0 && totalAmount > 0) finalStatus = '已付款';
          else if (paidAmount > 0 && unpaidAmount > 0) finalStatus = '部分付款';

          return {
            purchaseId: o.id,
            date: o.order_date || o.date,
            supplierName: o.supplier_name || '未知供應商',
            totalAmount: totalAmount,
            paidAmount: paidAmount,
            unpaidAmount: unpaidAmount,
            status: finalStatus
          };
        });

        displayReport(reportData);

      } catch (error) {
        document.getElementById('results').innerHTML = '<div class="no-result">❌ 載入失敗：' + error.message + '</div>';
        updateSummary(0, 0, 0);
      }
    }
    
    function displayReport(data) {
      const exportBtn = document.getElementById('exportBtn');
      if (!data || data.length === 0) {
        document.getElementById('results').innerHTML = '<div class="no-result">😕 找不到符合條件的資料</div>';
        updateSummary(0, 0, 0);
        currentData = [];
        exportBtn.disabled = true;
        return;
      }
      
      currentData = data; 
      exportBtn.disabled = false; 
      
      let totalPayable = 0, totalPaid = 0, totalUnpaid = 0;
      let html = '<table><thead><tr><th>進貨單號</th><th>日期</th><th>供應商</th><th>應付金額</th><th>已付金額</th><th>未付金額</th><th>付款狀態</th></tr></thead><tbody>';
      
      data.forEach(function(row) {
        totalPayable += row.totalAmount;
        totalPaid += row.paidAmount;
        totalUnpaid += row.unpaidAmount;
        
        let statusClass = 'status-unpaid';
        if (row.status === '已付款' || row.status === '已結清') statusClass = 'status-paid';
        else if (row.status === '部分付款') statusClass = 'status-partial';
        
        html += '<tr>';
        // ✨ 修改這裡：改呼叫 openDetail，完全複製應收帳款的寫法 ✨
        html += `<td class="clickable-id" onclick="openDetail('${row.purchaseId}')">${row.purchaseId}</td>`;
        html += `<td>${row.date}</td>`;
        html += `<td>${row.supplierName}</td>`;
        html += `<td>$${row.totalAmount.toLocaleString()}</td>`;
        html += `<td>$${row.paidAmount.toLocaleString()}</td>`;
        html += `<td style="font-weight:bold;">$${row.unpaidAmount.toLocaleString()}</td>`;
        html += `<td class="${statusClass}">${row.status}</td>`;
        html += '</tr>';
      });
      
      html += '</tbody></table>';
      document.getElementById('results').innerHTML = html;
      updateSummary(totalPayable, totalPaid, totalUnpaid);
    }
    
    function updateSummary(payable, paid, unpaid) {
      document.getElementById('totalPayable').textContent = '$' + payable.toLocaleString();
      document.getElementById('totalPaid').textContent = '$' + paid.toLocaleString();
      document.getElementById('totalUnpaid').textContent = '$' + unpaid.toLocaleString();
    }

    // ========== ✨ 開啟原生超美明細彈窗 ✨ ==========
    async function openDetail(orderId) {
      document.getElementById('detailOverlay').style.display = 'flex';
      const inner = document.getElementById('detailInner');
      inner.innerHTML = '<div style="text-align:center; padding:40px; color:#c53030; font-weight:700;">⏳ 正在讀取明細資料...</div>';
      
      try {
        // 同時抓取 主單 與 明細
        const [orderRes, detailRes] = await Promise.all([
          fetch(`${SB_URL}/purchase_orders?id=eq.${orderId}&select=*`, { headers: HEADERS }),
          fetch(`${SB_URL}/purchase_details?order_id=eq.${orderId}&select=*`, { headers: HEADERS })
        ]);

        if (!orderRes.ok || !detailRes.ok) throw new Error('無法讀取單據資料');
        
        const orderData = await orderRes.json();
        const detailData = await detailRes.json();

        if (orderData.length === 0) throw new Error('找不到該筆進貨單');
        
        const o = orderData[0];
        const gTotal = Number(o.grand_total || o.total_amount || o.subtotal || 0);
        const tAmount = Number(o.tax_amount || 0);

        // 畫出超美 HTML 結構
        inner.innerHTML = `
          <div class="detail-header">
            <div><b>單號：</b> ${o.id}</div>
            <div><b>日期：</b> ${o.order_date || o.date || ''}</div>
            <div><b>廠商：</b> ${o.supplier_name || o.supplier_id}</div>
            <div><b>備註：</b> ${o.note || '無'}</div>
          </div>
          <table style="width:100%; border-collapse:collapse; margin-bottom:20px; border:1px solid #ddd;">
            <thead style="background:#f5f5f5;">
              <tr>
                <th style="padding:10px 14px; border-bottom:1px solid #ddd;">品名</th>
                <th style="text-align:right; padding:10px 14px; border-bottom:1px solid #ddd;">數量</th>
                <th style="text-align:right; padding:10px 14px; border-bottom:1px solid #ddd;">進價</th>
                <th style="text-align:right; padding:10px 14px; border-bottom:1px solid #ddd;">小計</th>
              </tr>
            </thead>
            <tbody>
              ${detailData.map(i => {
                const price = Number(i.cost || i.unit_price || 0);
                const qty = Number(i.qty || i.quantity || 0);
                const subtotal = Number(i.subtotal || (qty * price));
                return `
                <tr>
                  <td style="padding:10px 14px; border-bottom:1px solid #eee; font-weight:700;">
                    ${i.product_name || i.product_id}
                    ${i.note ? `<div style="font-size:11px; color:#999; font-weight:normal; margin-top:2px;">${i.note}</div>` : ''}
                  </td>
                  <td style="text-align:right; padding:10px 14px; border-bottom:1px solid #eee;">${qty} ${i.unit || ''}</td>
                  <td style="text-align:right; padding:10px 14px; border-bottom:1px solid #eee; font-family:monospace;">$${price.toLocaleString()}</td>
                  <td style="text-align:right; padding:10px 14px; border-bottom:1px solid #eee; font-family:monospace; color:#c53030; font-weight:bold;">$${subtotal.toLocaleString()}</td>
                </tr>
              `}).join('')}
            </tbody>
          </table>
          <div style="text-align:right; font-size:16px; border-top:2px solid #ddd; padding-top:16px;">
            ${tAmount > 0 ? `<div style="font-size:14px; color:#666; margin-bottom:8px;">稅額：$${tAmount.toLocaleString()}</div>` : ''}
            <div style="font-weight:900; color:#c53030; font-size:24px; font-family:monospace;">含稅總計：$${gTotal.toLocaleString()}</div>
          </div>
        `;

      } catch (error) {
        inner.innerHTML = `<div style="text-align:center; padding:30px; color:#c53030;">❌ ${error.message}</div>`;
      }
    }
    
    function closeDetail() {
      document.getElementById('detailOverlay').style.display = 'none';
    }

    // ========== 3. 列印月結總表 ==========
    function openPrintModal() { document.getElementById('printModal').style.display = 'flex'; }
    function closePrintModal() { document.getElementById('printModal').style.display = 'none'; }

    async function printMonthlySummary(event) {
      const month = document.getElementById('printMonth').value;
      if (!month) { alert('請選擇月份！'); return; }
      
      const btn = event.target;
      btn.disabled = true;
      btn.innerText = '🔄 產生中...';

      try {
        const [year, mon] = month.split('-');
        const startDate = `${year}-${mon}-01`;
        const endDate = new Date(year, mon, 0).toISOString().split('T')[0];

        const orderQuery = `${SB_URL}/purchase_orders?select=id,supplier_id,supplier_name,grand_total,subtotal,payment_status&order_date=gte.${startDate}&order_date=lte.${endDate}`;
        const orderRes = await fetch(orderQuery, { headers: HEADERS });
        if (!orderRes.ok) throw new Error('查詢進貨單失敗');
        const orders = await orderRes.json();

        if (orders.length === 0) {
          btn.disabled = false;
          btn.innerText = '🖨️ 產生並列印';
          alert('該月份尚無帳務紀錄');
          return;
        }

        let paymentsMap = {};
        try {
          const payQuery = `${SB_URL}/payment_made?select=ref_id,amount&payment_date=gte.${startDate}&payment_date=lte.${endDate}`;
          const payRes = await fetch(payQuery, { headers: HEADERS });
          if (payRes.ok) {
            const payments = await payRes.json();
            payments.forEach(p => {
              if (p.ref_id) paymentsMap[p.ref_id] = (paymentsMap[p.ref_id] || 0) + Number(p.amount || 0);
            });
          }
        } catch (e) { console.warn('payment_made 表查詢失敗'); }

        const supplierMap = {};
        orders.forEach(o => {
          const supplierId = o.supplier_id || o.supplier_name; 
          const supplierName = o.supplier_name || '未知供應商';
          const totalAmount = Number(o.grand_total || o.subtotal || 0);
          
          let paidAmount = paymentsMap[o.id] || 0;
          if (paidAmount === 0 && (o.payment_status === '已付款' || o.payment_status === '已結清')) {
            paidAmount = totalAmount;
          }

          if (!supplierMap[supplierId]) {
            supplierMap[supplierId] = { supplierName: supplierName, purchase: 0, paid: 0, unpaid: 0 };
          }
          supplierMap[supplierId].purchase += totalAmount;
          supplierMap[supplierId].paid += paidAmount;
          supplierMap[supplierId].unpaid += Math.max(0, totalAmount - paidAmount);
        });

        const summaryData = Object.values(supplierMap).sort((a, b) => b.unpaid - a.unpaid);

        btn.disabled = false;
        btn.innerText = '🖨️ 產生並列印';
        closePrintModal();
        openPrintWindow(summaryData, month);

      } catch (err) {
        btn.disabled = false;
        btn.innerText = '🖨️ 產生並列印';
        alert('系統錯誤：' + err.message);
      }
    }

    // ⭐ 專業列印格式 (原汁原味)
    function openPrintWindow(data, month) {
      let sumPurchase = 0, sumPaid = 0, sumUnpaid = 0;
      data.forEach(row => { sumPurchase += row.purchase; sumPaid += row.paid; sumUnpaid += row.unpaid; });

      let printContent = `
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>每月應付帳款彙總表-${month}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif; padding: 20px 30px; font-size: 13px; color: #333; margin: 0; }
    .header { text-align: center; margin-bottom: 14px; border-bottom: 2px solid #000; padding-bottom: 10px; }
    .header h1 { font-size: 20px; margin-bottom: 6px; }
    .header h2 { font-size: 16px; margin-bottom: 6px; }
    .header p { font-size: 12px; color: #333; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th { background: #f0f0f0; padding: 6px 8px; border: 1px solid #999; text-align: center; font-size: 12px; font-weight: bold; white-space: nowrap; }
    td { padding: 5px 8px; border: 1px solid #ccc; font-size: 12px; line-height: 1.3; }
    .text-right { text-align: right; }
    .total-row { background: #e8e8e8; font-weight: bold; }
    .unpaid { color: #c00; font-weight: bold; }
    .paid { color: #060; }
    .footer { margin-top: 15px; padding-top: 8px; border-top: 2px solid #000; text-align: right; font-size: 13px; line-height: 1.8; }
    .footer-row { margin: 2px 0; }
    .footer-total { font-size: 16px; font-weight: bold; margin-top: 6px; }
    @page { margin: 10mm; size: A4; }
    @media print{ body{padding:10px 15px;} *{-webkit-print-color-adjust:exact !important; print-color-adjust:exact !important;} }
  </style>
</head>
<body>
  <div style="text-align:center; font-size:22px; font-weight:bold; margin-bottom:6px;">丸十水產股份有限公司</div>
  <div style="text-align:center; font-size:15px; letter-spacing:8px; margin-bottom:16px;">應 付 帳 款 報 表（龍潭總倉）</div>
  <div class="header">
    <h1>丸十水產股份有限公司</h1>
    <h2>每月應付帳款彙總表</h2>
    <p>統計月份：${month}</p>
  </div>
  <table>
    <thead>
      <tr><th width="25%">供應商名稱</th><th width="25%">本月總進貨 (含稅)</th><th width="25%">本月已付款</th><th width="25%">結餘未付款</th></tr>
    </thead>
    <tbody>
      `;
      data.forEach(row => {
        printContent += `<tr><td>${row.supplierName}</td><td class="text-right">$${row.purchase.toLocaleString()}</td><td class="text-right paid">$${row.paid.toLocaleString()}</td><td class="text-right unpaid">$${row.unpaid.toLocaleString()}</td></tr>`;
      });
      printContent += `
      <tr class="total-row"><td>全體供應商總計</td><td class="text-right">$${sumPurchase.toLocaleString()}</td><td class="text-right paid">$${sumPaid.toLocaleString()}</td><td class="text-right unpaid">$${sumUnpaid.toLocaleString()}</td></tr>
    </tbody>
  </table>
  <div class="footer">
    <div class="footer-row">供應商數：${data.length} 家</div>
    <div class="footer-row">本月總進貨：$${sumPurchase.toLocaleString()}</div>
    <div class="footer-row">本月已付款：$${sumPaid.toLocaleString()}</div>
    <div class="footer-row footer-total">應付總計：$${sumUnpaid.toLocaleString()}</div>
  </div>
  <div class="no-print" style="position:fixed;top:10px;right:10px;z-index:9999;">
    <button onclick="window.print()" style="padding:10px 24px;font-size:16px;background:#1976d2;color:#fff;border:none;border-radius:6px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3);">🖨️ 列印</button>
  </div>
  <style>@media print{.no-print{display:none!important;}}</style>
</body>
</html>`;
      const blob = new Blob([printContent], { type: 'text/html; charset=utf-8' });
      window.open(URL.createObjectURL(blob), '_blank');
    }

    // ========== 4. 匯出 Excel 功能 ==========
    function exportToExcel() {
      if (currentData.length === 0) return;
      const btn = document.getElementById('exportBtn');
      btn.disabled = true;
      btn.innerText = '⏳ 匯出中...';
      const dateFrom = document.getElementById('dateFrom').value;
      const dateTo = document.getElementById('dateTo').value;
      
      let csvContent = '\uFEFF應付帳款報表\n' + `查詢期間,${dateFrom} ~ ${dateTo}\n\n` + '進貨單號,日期,供應商,應付金額,已付金額,未付金額,付款狀態\n';
      let totalPayable = 0, totalPaid = 0, totalUnpaid = 0;
      
      [...currentData].sort((a, b) => (a.date || '').localeCompare(b.date || '')).forEach(function(row) {
        totalPayable += row.totalAmount || 0; totalPaid += row.paidAmount || 0; totalUnpaid += row.unpaidAmount || 0;
        csvContent += `"${row.purchaseId}","${row.date}","${row.supplierName}",${row.totalAmount},${row.paidAmount},${row.unpaidAmount},"${row.status}"\n`;
      });
      
      csvContent += `\n"","","合計",${totalPayable},${totalPaid},${totalUnpaid},""\n"","","共 ${currentData.length} 筆","","","",""\n`;
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.setAttribute('href', url);
      link.setAttribute('download', `應付帳款報表_${dateFrom}_${dateTo}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      
      btn.disabled = false;
      btn.innerText = '📥 匯出 Excel';
    }
  </script>
</body>
</html>
