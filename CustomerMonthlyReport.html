<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>龍潭進銷存系統 - 客戶月結報表</title>
  <script src="libs/sweetalert2.min.js"></script>
  <script src="libs/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  
  <style>
    /* ========== 石板灰護眼主題 ========== */
    :root {
      --bg: #f8f9fb;             
      --surface: #ffffff;        
      --surface2: #f1f5f9;       
      --border: #e2e8f0;         
      --accent: #475569;         /* 石板灰 */
      --accent-hover: #334155;
      --text: #1e293b;           
      --text2: #64748b;          
      --danger: #c53030;         
      --warning: #b7791f;        
      --blue: #0e7490;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      font-family: 'Noto Sans TC', system-ui, -apple-system, sans-serif; 
      padding: 20px; 
      background: var(--bg); 
      color: var(--text);
    }
    
    .container { 
      background: var(--surface); 
      padding: 30px; 
      border-radius: 12px; 
      max-width: 1000px; 
      margin: 0 auto; 
      box-shadow: 0 4px 20px rgba(30,41,59,0.07);
      border-top: 5px solid var(--accent);
    }

    h2 { 
      color: var(--accent); 
      margin-bottom: 24px; 
      display: flex; 
      align-items: center; 
      gap: 10px;
      font-size: 24px;
    }
    
    label { font-weight: 700; display: block; margin-bottom: 8px; color: var(--text2); font-size: 14px; }
    
    select, input { 
      width: 100%; 
      padding: 12px 16px; 
      border: 1px solid var(--border); 
      border-radius: 8px; 
      font-size: 15px; 
      margin-bottom: 20px; 
      outline: none;
      transition: border-color 0.2s;
    }
    select:focus, input:focus { border-color: var(--accent); }

    .date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    
    /* 快速操作按鈕 */
    .quick-btns { display: flex; gap: 12px; margin-bottom: 20px; }
    .quick-btn { 
      flex: 1; 
      padding: 10px; 
      background: var(--surface2); 
      border: 1px solid var(--border); 
      border-radius: 6px; 
      cursor: pointer; 
      text-align: center; 
      font-weight: 700; 
      font-size: 14px;
      color: var(--text);
      transition: all 0.2s;
    }
    .quick-btn:hover { background: #e2e8f0; border-color: var(--accent); color: var(--accent); }
    
    .btn-generate { 
      width: 100%; 
      padding: 16px; 
      background: var(--accent); 
      color: white; 
      border: none; 
      border-radius: 8px; 
      font-size: 18px; 
      font-weight: 900; 
      cursor: pointer; 
      transition: 0.2s;
    }
    .btn-generate:hover { background: var(--accent-hover); box-shadow: 0 4px 12px rgba(71,85,105,0.2); }
    
    /* 報表顯示區 */
    .report-box { margin-top: 30px; display: none; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .summary-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
    .card { 
      background: var(--surface2); 
      padding: 20px; 
      border-radius: 10px; 
      border-left: 5px solid var(--accent); 
      border: 1px solid var(--border);
      border-left-width: 5px;
      border-left-color: var(--accent);
    }
    .card-title { font-size: 13px; color: var(--text2); margin-bottom: 8px; font-weight: 700; }
    .card-value { font-size: 22px; font-weight: 900; color: var(--accent); font-family: monospace; }
    
    /* 表格樣式 */
    .table-container { width: 100%; overflow-x: auto; border: 1px solid var(--border); border-radius: 8px; }
    .orders-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 800px; }
    .orders-table th { background: #f1f5f9; color: var(--accent); padding: 14px 10px; text-align: left; font-weight: 700; border-bottom: 2px solid var(--accent); }
    .orders-table td { padding: 12px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .orders-table tr:hover { background: #fafafa; }
    
    .btn-print { 
      width: 100%; 
      padding: 16px; 
      background: var(--blue); 
      color: white; 
      border: none; 
      border-radius: 8px; 
      font-size: 18px; 
      font-weight: 900; 
      cursor: pointer; 
      margin-top: 25px; 
      transition: 0.2s;
    }
    .btn-print:hover { background: #0c6b82; }
    
    .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); display: flex; justify-content: center; align-items: center; z-index: 2000; font-size: 16px; color: var(--accent); font-weight: 700; flex-direction: column; gap: 12px;}
    .hidden { display: none !important; }
    
    .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; color: white; }
    .text-right { text-align: right; font-family: monospace; }
  </style>
</head>
<body>

  <div id="loadingOverlay" class="loading-overlay hidden">
    <div>🔄 正在彙整月結數據...</div>
  </div>

  <div class="container">
    <h2>📊 客戶月結報表查詢</h2>
    
    <label>👤 選擇查詢客戶</label>
    <input type="text" id="custSearch" placeholder="快搜客戶..." autocomplete="off"
      oninput="filterCustomerSelect()" style="margin-bottom:6px;">
    <select id="customer" size="1" onchange="onCustPick(); resetReport()">
      <option value="">🔄 載入客戶名單中...</option>
    </select>
    
    <div class="quick-btns">
      <div class="quick-btn" onclick="setThisMonth()">本月</div>
      <div class="quick-btn" onclick="setLastMonth()">上個月</div>
      <div class="quick-btn" onclick="setThisYear()">今年度</div>
    </div>
    
    <div class="date-row">
      <div>
        <label>📅 起始日期</label>
        <input type="date" id="dateFrom" onchange="resetReport()">
      </div>
      <div>
        <label>📅 結束日期</label>
        <input type="date" id="dateTo" onchange="resetReport()">
      </div>
    </div>
    
    <button class="btn-generate" onclick="generateReport()">📊 產生報表</button>
    
    <div id="reportBox" class="report-box">
      <div id="reportContent"></div>
      <button class="btn-print" onclick="printReport()">🖨️ 列印 A4 對帳單</button>
      <button class="btn-print" style="background:#2d6a4f; margin-top:10px;" onclick="exportToExcel()">📥 匯出 Excel</button>
    </div>
  </div>

<script>
  // ========== 1. Supabase API 設定 ==========
  const SB_URL = 'https://asugjynpocwygggttxyo.supabase.co/rest/v1';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzdWdqeW5wb2N3eWdnZ3R0eHlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNzU3MjksImV4cCI6MjA4ODk1MTcyOX0.LzcRQAl80rZxKKD8NIYWGvylfwCbs1ek5LtKpmZodBc'; 
    const AUTH_TOKEN = sessionStorage.getItem('sb_auth_token') || SB_KEY;
  const HEADERS = {
    'apikey': SB_KEY,
    'Authorization': `Bearer ${AUTH_TOKEN}`,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation'
  };

  let allCustomers = [];
  let reportData = null;
  
  window.onload = function() {
    setThisMonth();
    loadCustomers();
  };

  // ========== 2. 基礎資料載入 ==========
  async function loadCustomers() {
    try {
      const res = await fetch(`${SB_URL}/customers?select=id,name&order=name.asc`, { headers: HEADERS });
      if (!res.ok) throw new Error('無法連線至資料庫');
      allCustomers = await res.json();
      renderCustomerSelect('');
    } catch (error) {
      document.getElementById('custSearch').placeholder = '❌ 載入失敗';
      document.getElementById('customer').innerHTML = '<option value="">❌ 載入失敗</option>';
    }
  }

  function renderCustomerSelect(kw) {
    const sel = document.getElementById('customer');
    const filtered = kw ? allCustomers.filter(c => c.name.toLowerCase().includes(kw.toLowerCase())) : allCustomers;
    sel.innerHTML = '<option value="">-- 請選擇客戶 --</option>';
    filtered.forEach(c => { sel.innerHTML += `<option value="${c.id}">${c.name}</option>`; });
    if (kw) {
      sel.size = Math.min(filtered.length + 1, 8);
      sel.style.cssText = 'width:100%; background:#fff; border:2px solid #0e7490; border-radius:6px; box-shadow:0 4px 12px rgba(14,116,144,0.15); outline:none; margin-bottom:20px;';
    } else {
      sel.size = 1;
      sel.style.cssText = '';
    }
  }

  function filterCustomerSelect() {
    renderCustomerSelect(document.getElementById('custSearch').value.trim());
  }

  function onCustPick() {
    const sel = document.getElementById('customer');
    sel.size = 1;
    sel.style.cssText = '';
  }

  // ========== 3. 日期快捷功能 ==========
  function formatDate(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function setThisMonth() {
    const today = new Date();
    const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
    const lastDay = new Date(today.getFullYear(), today.getMonth() + 1, 0);
    document.getElementById('dateFrom').value = formatDate(firstDay);
    document.getElementById('dateTo').value = formatDate(lastDay);
    resetReport();
  }
  
  function setLastMonth() {
    const today = new Date();
    const firstDay = new Date(today.getFullYear(), today.getMonth() - 1, 1);
    const lastDay = new Date(today.getFullYear(), today.getMonth(), 0);
    document.getElementById('dateFrom').value = formatDate(firstDay);
    document.getElementById('dateTo').value = formatDate(lastDay);
    resetReport();
  }

  function setThisYear() {
    const today = new Date();
    document.getElementById('dateFrom').value = today.getFullYear() + '-01-01';
    document.getElementById('dateTo').value = today.getFullYear() + '-12-31';
    resetReport();
  }

  function resetReport() {
    document.getElementById('reportBox').style.display = 'none';
    reportData = null;
  }

  // ========== 4. 產生報表邏輯 ==========
  async function generateReport() {
    const id = document.getElementById('customer').value;
    const from = document.getElementById('dateFrom').value;
    const to = document.getElementById('dateTo').value;
    
    if (!id) { Swal.fire('提示', '請先選擇客戶', 'warning'); return; }
    if (!from || !to) { Swal.fire('提示', '請選擇日期區間', 'warning'); return; }

    const loader = document.getElementById('loadingOverlay');
    const reportBox = document.getElementById('reportBox');
    const reportContent = document.getElementById('reportContent');
    
    loader.classList.remove('hidden');
    reportBox.style.display = 'none';

    try {
      // 1. 抓取該客戶在此區間的所有銷貨單
      const orderRes = await fetch(`${SB_URL}/sales_orders?customer_id=eq.${id}&order_date=gte.${from}&order_date=lte.${to}&select=*&order=order_date.asc`, { headers: HEADERS });
      if (!orderRes.ok) throw new Error('讀取訂單失敗');
      const rawOrders = await orderRes.json();

      if (rawOrders.length === 0) {
        throw new Error('此區間查無該客戶之訂單紀錄');
      }

      // 2. 獲取所有單號，去抓取明細 (為了列印功能預熱)
      const orderIds = rawOrders.map(o => o.id);
      const detailRes = await fetch(`${SB_URL}/sales_details?order_id=in.("${orderIds.join('","')}")&select=*`, { headers: HEADERS });
      const rawDetails = await detailRes.json();

      // 3. 變數對接與結構轉換 (snake_case -> camelCase)
      const customerObj = allCustomers.find(c => c.id === id);
      
      const orders = rawOrders.map(o => {
        const details = rawDetails.filter(d => d.order_id === o.id).map(d => ({
          productName: d.product_name || d.product_id,
          qty: d.qty || 0,
          unit: d.unit || '個',
          unitPrice: d.unit_price || d.price || 0,
          subtotal: (d.qty || 0) * (d.unit_price || d.price || 0)
        }));

        return {
          orderId: o.id,
          date: o.order_date,
          subtotal: Number(o.subtotal || 0),
          shipping: Number(o.shipping || 0),
          deduction: Number(o.deduction || 0),
          taxAmount: Number(o.tax_amount || 0),
          grandTotal: Number(o.grand_total || o.total || 0),
          paymentStatus: o.payment_status || '未收款',
          note: o.note || '',
          items: details
        };
      });

      // 4. 計算統計摘要
      let totalSales = 0, totalPaid = 0, totalUnpaid = 0;
      orders.forEach(o => {
        totalSales += o.grandTotal;
        if(o.paymentStatus === '已收款') totalPaid += o.grandTotal;
        else totalUnpaid += o.grandTotal;
      });

      reportData = {
        success: true,
        customer: { name: customerObj.name, id: id },
        dateRange: { from, to },
        summary: {
          totalOrders: orders.length,
          totalSales,
          totalPaid,
          totalUnpaid
        },
        orders: orders
      };

      displayReport(reportData);
      reportBox.style.display = 'block';

    } catch (error) {
      Swal.fire('分析失敗', error.message, 'error');
    } finally {
      loader.classList.add('hidden');
    }
  }

  function displayReport(data) {
    const content = document.getElementById('reportContent');
    
    let html = `<h3 style="color:var(--accent); border-bottom:2px solid var(--accent); padding-bottom:12px; margin-bottom:15px;">${data.customer.name} - 月結對帳清單</h3>`;
    html += `<p style="color:var(--text2); margin-bottom:20px; font-weight:700;">📅 報表期間：${data.dateRange.from} 至 ${data.dateRange.to}</p>`;
    
    html += `
      <div class="summary-cards">
        <div class="card"><div class="card-title">📋 訂單總數</div><div class="card-value">${data.summary.totalOrders} 筆</div></div>
        <div class="card"><div class="card-title">💰 應收總額</div><div class="card-value">$${data.summary.totalSales.toLocaleString()}</div></div>
        <div class="card" style="border-left-color:#0e7490;"><div class="card-title">✅ 已收總額</div><div class="card-value" style="color:#0e7490;">$${data.summary.totalPaid.toLocaleString()}</div></div>
        <div class="card" style="border-left-color:var(--danger);"><div class="card-title">⌛ 尚欠餘額</div><div class="card-value" style="color:var(--danger);">$${data.summary.totalUnpaid.toLocaleString()}</div></div>
      </div>
    `;
    
    html += `
      <div class="table-container">
        <table class="orders-table">
          <thead>
            <tr>
              <th>單號</th>
              <th>日期</th>
              <th class="text-right">未稅小計</th>
              <th class="text-right">稅額</th>
              <th class="text-right">運費</th>
              <th class="text-right">扣款</th>
              <th class="text-right">含稅總額</th>
              <th style="text-align:center;">狀態</th>
            </tr>
          </thead>
          <tbody>
    `;
    
    data.orders.forEach(o => {
      const statusColor = o.paymentStatus === '已收款' ? '#0e7490' : (o.paymentStatus === '部分收款' ? 'var(--warning)' : 'var(--danger)');
      html += `
        <tr>
          <td style="font-weight:700; font-family:monospace;">${o.orderId}</td>
          <td>${o.date}</td>
          <td class="text-right">$${o.subtotal.toLocaleString()}</td>
          <td class="text-right">$${o.taxAmount.toLocaleString()}</td>
          <td class="text-right">${o.shipping > 0 ? '$'+o.shipping.toLocaleString() : '-'}</td>
          <td class="text-right">${o.deduction > 0 ? '<span style="color:red;">-$'+o.deduction.toLocaleString()+'</span>' : '-'}</td>
          <td class="text-right" style="font-weight:900; font-size:14px; color:var(--accent);">$${o.grandTotal.toLocaleString()}</td>
          <td style="text-align:center;"><span class="status-badge" style="background:${statusColor};">${o.paymentStatus}</span></td>
        </tr>
        ${o.note ? `<tr><td colspan="8" style="padding:2px 12px 6px; font-size:12px; color:#b45309; border-top:none;">📝 ${o.note}</td></tr>` : ''}
      `;
    });
    
    html += '</tbody></table></div>';
    content.innerHTML = html;
  }

  // ========== 5. 匯出 Excel ==========
  function exportToExcel() {
    if (!reportData) { Swal.fire('提示', '請先產生報表', 'warning'); return; }

    const sorted = [...reportData.orders].sort((a, b) => a.date.localeCompare(b.date));
    const headers = ['單號','日期','品名','數量','單位','單價','小計','未稅小計','稅額','運費','扣款','含稅總額','收款狀態','備註'];

    // 標題列 + 表頭
    const aoa = [];
    aoa.push([`客戶月結對帳單 - ${reportData.customer.name}`]);
    aoa.push([`查詢期間 ${reportData.dateRange.from} ~ ${reportData.dateRange.to}`]);
    aoa.push([]);
    aoa.push(headers);

    sorted.forEach(o => {
      if (o.items.length > 0) {
        o.items.forEach((item, idx) => {
          if (idx === 0) {
            aoa.push([
              o.orderId, o.date, item.productName, item.qty, item.unit,
              item.unitPrice, item.subtotal,
              o.subtotal, o.taxAmount, o.shipping, o.deduction, o.grandTotal,
              o.paymentStatus, o.note || ''
            ]);
          } else {
            aoa.push(['', '', item.productName, item.qty, item.unit, item.unitPrice, item.subtotal, '', '', '', '', '', '', '']);
          }
        });
      } else {
        aoa.push([
          o.orderId, o.date, '', '', '', '', '',
          o.subtotal, o.taxAmount, o.shipping, o.deduction, o.grandTotal,
          o.paymentStatus, o.note || ''
        ]);
      }
    });

    // 合計列
    aoa.push([]);
    aoa.push(['','','','','','','','','','','合計', reportData.summary.totalSales, '', '']);
    aoa.push(['','','','','','','','','','','已收', reportData.summary.totalPaid, '', '']);
    aoa.push(['','','','','','','','','','','未收', reportData.summary.totalUnpaid, '', '']);
    aoa.push(['','','','','','','','','','',`共 ${sorted.length} 筆`,'','','']);

    const ws = XLSX.utils.aoa_to_sheet(aoa);

    // 動態算品名最大寬度（中文字算 2 個寬度）
    let maxNameLen = 8; // 至少 8
    sorted.forEach(o => {
      o.items.forEach(item => {
        const name = String(item.productName || '');
        // 中文字 ×2，其他 ×1
        const len = [...name].reduce((s, ch) => s + (/[\u4e00-\u9fa5]/.test(ch) ? 2 : 1), 0);
        if (len > maxNameLen) maxNameLen = len;
      });
    });
    if (maxNameLen > 60) maxNameLen = 60; // 上限避免太誇張

    // 設定欄寬
    ws['!cols'] = [
      { wch: 18 }, // 單號
      { wch: 12 }, // 日期
      { wch: maxNameLen + 2 }, // 品名（依內容自動）
      { wch: 8 },  // 數量
      { wch: 8 },  // 單位
      { wch: 10 }, // 單價
      { wch: 12 }, // 小計
      { wch: 12 }, // 未稅小計
      { wch: 10 }, // 稅額
      { wch: 10 }, // 運費
      { wch: 10 }, // 扣款
      { wch: 14 }, // 含稅總額
      { wch: 12 }, // 收款狀態
      { wch: 30 }  // 備註
    ];

    // 把單號欄（A 欄）強制設為文字格式，避免 Excel 變科學記號
    // 從第 5 列（index 4）開始才是資料
    for (let r = 4; r < aoa.length; r++) {
      const cellRef = XLSX.utils.encode_cell({ r, c: 0 });
      const cell = ws[cellRef];
      if (cell && cell.v != null && cell.v !== '') {
        cell.t = 's'; // string type
        cell.v = String(cell.v);
        cell.z = '@'; // 文字格式
      }
    }

    // 第 1 列大標題：合併儲存格
    ws['!merges'] = [
      { s: { r: 0, c: 0 }, e: { r: 0, c: 13 } },
      { s: { r: 1, c: 0 }, e: { r: 1, c: 13 } }
    ];

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '對帳單');

    const filename = `月結對帳單_${reportData.customer.name}_${reportData.dateRange.from}_${reportData.dateRange.to}.xlsx`;
    XLSX.writeFile(wb, filename);
  }

  // ========== 6. 列印專業報表 ==========
  function printReport() {
    if (!reportData) return;

    let totalSubtotal = 0, totalTax = 0, totalShipping = 0, totalDeduction = 0, totalGrand = 0;
    reportData.orders.forEach(o => {
      totalSubtotal += o.subtotal;
      totalTax += o.taxAmount;
      totalShipping += o.shipping;
      totalDeduction += o.deduction;
      totalGrand += o.grandTotal;
    });

    const printContent = `
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>月結對帳單-${reportData.customer.name}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif; padding: 20px 30px; font-size: 13px; color: #333; margin: 0; }
    .header { text-align: center; margin-bottom: 14px; border-bottom: 2px solid #000; padding-bottom: 10px; }
    .header h1 { font-size: 22px; margin-bottom: 6px; letter-spacing: 2px;}
    table { width: 100%; border-collapse: collapse; table-layout: fixed; margin-bottom: 10px; }
    th { background: #f0f0f0; padding: 6px 8px; border: 1px solid #999; text-align: center; font-size: 12px; font-weight: bold; white-space: nowrap; }
    td { padding: 5px 8px; border: 1px solid #ccc; font-size: 12px; line-height: 1.3; vertical-align: top; }
    .text-right { text-align: right; }
    .text-center { text-align: center; }
    .item-detail { font-size: 10px; color: #444; line-height: 1.4; margin-top: 4px; }
    .footer { margin-top: 15px; padding-top: 8px; border-top: 2px solid #000; display: flex; justify-content: space-between; }
    .footer-right { text-align: right; line-height: 1.8; width: 60%; }
    .total-row { font-size: 16px; font-weight: bold; border-top: 1px solid #000; margin-top: 4px; padding-top: 4px; color: #c53030; }
    @page { margin: 3mm; size: A4; }
    @media print{ body{padding:10px 15px;} *{-webkit-print-color-adjust:exact !important; print-color-adjust:exact !important;} }
  </style>
</head>
<body>
  <div style="text-align:center; font-size:22px; font-weight:bold; margin-bottom:6px;">丸十水產股份有限公司</div>
  <div style="text-align:center; font-size:15px; letter-spacing:8px; margin-bottom:12px;">客 戶 月 結 對 帳 單（龍潭總倉）</div>
  <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:11px; border-bottom:2px solid #000; padding-bottom:6px;">
    <span>期間：${reportData.dateRange.from} ~ ${reportData.dateRange.to}　|　往來客戶：${reportData.customer.name}</span>
    <span>製表：${new Date().toISOString().split('T')[0]}</span>
  </div>
  
  <table>
    <thead>
      <tr>
        <th width="20%">日期 / 單號</th>
        <th width="12%" class="text-right">單張總額</th>
        <th width="68%">交易內容與明細摘要</th>
      </tr>
    </thead>
    <tbody>
      ${reportData.orders.map(order => {
        const itemLines = order.items.map(i => `${i.productName} x${i.qty}${i.unit} ($${i.subtotal.toLocaleString()})`).join('、');
        let struct = `未稅:$${order.subtotal.toLocaleString()} + 稅:$${order.taxAmount.toLocaleString()}`;
        if(order.shipping > 0) struct += ` + 運費:$${order.shipping.toLocaleString()}`;
        if(order.deduction > 0) struct += ` - 扣款:$${order.deduction.toLocaleString()}`;

        return `
          <tr>
            <td class="text-center" style="white-space:nowrap;"><b>${order.date}</b><br><span style="font-size:9px;word-break:break-all;white-space:normal;">${order.orderId}</span></td>
            <td class="text-right"><b>$${order.grandTotal.toLocaleString()}</b></td>
            <td>
              <div class="item-list" style="line-height:1.5;">${itemLines}</div>
              <div style="margin-top:4px; padding-top:3px; border-top:1px dashed #ccc; font-size:9px; color:#666;">
                金額構成: ${struct} = <b>$${order.grandTotal.toLocaleString()}</b>
              </div>
              ${order.note ? `<div style="margin-top:3px; font-size:10px; color:#b45309;">📝 ${order.note}</div>` : ''}
            </td>
          </tr>
        `;
      }).join('')}
    </tbody>
  </table>
  
  <div class="footer">
    <div style="font-weight:bold;">訂單總計：${reportData.summary.totalOrders} 筆</div>
    <div class="footer-right">
      <div>銷售淨額 (未稅)： $${totalSubtotal.toLocaleString()}</div>
      <div>稅額總計 (+5%)： $${totalTax.toLocaleString()}</div>
      <div>運費總計 (代收)： $${totalShipping.toLocaleString()}</div>
      <div>扣款/折讓總計： -$${totalDeduction.toLocaleString()}</div>
      <div class="total-row">本期應收總計： $${totalGrand.toLocaleString()}</div>
    </div>
  </div>
  <div class="no-print" style="position:fixed;top:10px;right:10px;z-index:9999;">
    <button onclick="window.print()" style="padding:10px 24px;font-size:16px;background:#1976d2;color:#fff;border:none;border-radius:6px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3);">🖨️ 列印</button>
    <button onclick="window.close()" style="padding:10px 24px;font-size:16px;background:#757575;color:#fff;border:none;border-radius:6px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3);margin-left:8px;">✕ 關閉</button>
  </div>
  <style>@media print{.no-print{display:none!important;}}</style>
</body>
</html>
    `;
    const blob = new Blob([printContent], { type: 'text/html; charset=utf-8' });
    window.open(URL.createObjectURL(blob), '_blank');
  }
</script>
</body>
</html>
