<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>龍潭進銷存系統 - 收支統計報表</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  
  <style>
    /* ========== 石板灰護眼主題 ========== */
    :root {
      --bg: #f8f9fb;             
      --surface: #ffffff;        
      --surface2: #f1f5f9;       
      --border: #e2e8f0;         
      --accent: #475569;         /* 石板灰 */
      --accent-hover: #334155;
      --text: #1e293b;           
      --text2: #64748b;          
      --danger: #c53030;         
      --warning: #b7791f;        
      --blue: #0e7490;
      
      /* 收支專屬色系 */
      --income: #0e7490;         /* 綠色代表收入 */
      --expense-color: #c53030;  /* 紅色代表支出 */
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    
    body { 
      font-family: 'Noto Sans TC', system-ui, -apple-system, sans-serif; 
      font-size: 14px; 
      padding: 24px; 
      background: var(--bg); 
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    
    .container { 
      background: var(--surface); 
      padding: 30px; 
      border-radius: 8px; 
      box-shadow: 0 4px 16px rgba(30,41,59,0.07); 
      width: 100%;
      max-width: 850px; 
      border-top: 4px solid var(--accent);
    }
    
    h2 { 
      color: var(--accent); 
      font-size: 22px; 
      margin-bottom: 24px; 
      border-bottom: 2px solid var(--surface2); 
      padding-bottom: 16px; 
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    /* 輸入與按鈕區 */
    .control-group { 
      display: flex; 
      gap: 12px; 
      margin-bottom: 24px; 
      background: var(--surface2);
      padding: 16px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    
    input[type="month"] { 
      flex: 1; padding: 12px 16px; font-size: 15px; border: 1px solid var(--border); 
      border-radius: 4px; font-family: inherit; color: var(--text); outline: none; transition: 0.2s;
    }
    input[type="month"]:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(71,85,105,0.1); }
    
    .btn { 
      padding: 12px 30px; font-size: 15px; font-weight: 700; border: none; 
      border-radius: 4px; cursor: pointer; background: var(--accent); color: white; 
      transition: 0.2s; font-family: inherit; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:active { transform: translateY(1px); }
    
    /* 統計區塊 */
    .summary { 
      background: #f1f5f9; 
      padding: 24px; 
      border-radius: 6px; 
      margin-bottom: 30px; 
      border: 1px solid #cbd5e1; 
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .row { 
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px dashed #e2e8f0; font-size: 15px; color: var(--text); font-weight: 500;
    }
    .row:last-child { border-bottom: none; }
    
    .row-value { font-family: monospace; font-size: 18px; font-weight: 700;}
    .income-val { color: var(--income); }
    .expense-val { color: var(--expense-color); }

    .total { 
      font-size: 18px; font-weight: 700; color: var(--text); 
      padding-top: 16px; border-top: 2px solid var(--accent); margin-top: 8px; 
    }
    .total .row-value { font-size: 32px; color: var(--accent); }
    
    /* 明細表格 */
    .detail-section { display: none; }
    h3 { 
      color: var(--text); font-size: 18px; margin-bottom: 16px; 
      border-left: 4px solid var(--accent); padding-left: 12px; font-weight: 700;
    }
    
    .table-wrapper {
      border-radius: 6px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: var(--surface2); color: var(--text2); padding: 12px 16px; text-align: left; font-weight: 700; border-bottom: 1px solid var(--border); }
    td { padding: 12px 16px; border-bottom: 1px solid var(--border); color: var(--text); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    
    .td-amount { font-weight: 700; color: var(--expense-color); font-family: monospace; font-size: 14px; text-align: right;}
    .td-date { color: var(--text2); }
    
    .category-badge { background: var(--surface2); padding: 2px 6px; border-radius: 4px; font-size: 12px; border: 1px solid var(--border);}

    .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: flex; justify-content: center; align-items: center; z-index: 2000; font-size: 16px; color: var(--accent); font-weight: 700; flex-direction: column; gap: 12px;}
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay hidden">
  <div>⏳ 正在計算各項收支數據，請稍候...</div>
</div>

<div class="container">
  <h2>📊 現金流與收支報表</h2>
  
  <div class="control-group">
    <input type="month" id="monthInput" />
    <button class="btn" onclick="generateReport()">🔍 產生報表</button>
  </div>

  <div id="report" class="summary hidden">
    </div>

  <div id="detailSection" class="detail-section">
    <h3>📋 雜項現金支出明細</h3>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th width="15%">日期</th>
            <th width="15%">類別</th>
            <th width="25%">支出項目</th>
            <th width="15%">對象/供應商</th>
            <th width="15%" style="text-align:right;">金額</th>
            <th width="15%">支付方式</th>
          </tr>
        </thead>
        <tbody id="detailTableBody">
          </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  // ========== 1. Supabase API 設定 ==========
  const SB_URL = 'https://asugjynpocwygggttxyo.supabase.co/rest/v1';
  const SB_KEY = 'sb_publishable_cG0dslg6JnSwOtPSBko2Eg_VB0NtbTW'; 
    const AUTH_TOKEN = sessionStorage.getItem('sb_auth_token') || SB_KEY;
  const HEADERS = {
    'apikey': SB_KEY,
    'Authorization': `Bearer ${AUTH_TOKEN}`,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation'
  };

  // 預設帶入當前月份 (處理時區)
  window.onload = function() {
    const today = new Date();
    const offset = today.getTimezoneOffset() * 60000;
    document.getElementById('monthInput').value = (new Date(today - offset)).toISOString().substring(0, 7);
  };

  // 數字格式化工具
  function fmt(num) {
    return (Number(num) || 0).toLocaleString();
  }

  // ========== 2. 獲取資料與計算 (GET) ==========
  async function generateReport() {
    const monthVal = document.getElementById('monthInput').value;
    if (!monthVal) { Swal.fire('提示', '請選擇月份', 'warning'); return; }

    const loader = document.getElementById('loadingOverlay');
    const reportDiv = document.getElementById('report');
    const detailSec = document.getElementById('detailSection');
    const tbody = document.getElementById('detailTableBody');
    
    loader.classList.remove('hidden');
    reportDiv.classList.add('hidden');
    detailSec.style.display = 'none';

    // 算出月份起迄
    const [year, month] = monthVal.split('-');
    const startDate = `${year}-${month}-01`;
    const lastDay = new Date(year, month, 0).getDate();
    const endDate = `${year}-${month}-${lastDay}`;

    try {
      // 🔥 同時抓取 收款(PR)、付款(PM) 與 雜項支出(Expense)
      // 注意：現金流報表應該看「實際收付款紀錄」，而不是訂單建立日期
      const [prRes, pmRes, expRes] = await Promise.all([
        fetch(`${SB_URL}/payment_received?payment_date=gte.${startDate}&payment_date=lte.${endDate}&select=*`, { headers: HEADERS }),
        fetch(`${SB_URL}/payment_made?payment_date=gte.${startDate}&payment_date=lte.${endDate}&select=*`, { headers: HEADERS }),
        fetch(`${SB_URL}/expenses?expense_date=gte.${startDate}&expense_date=lte.${endDate}&select=*&order=expense_date.asc`, { headers: HEADERS })
      ]);

      if (!prRes.ok || !pmRes.ok || !expRes.ok) throw new Error('無法讀取收支紀錄');

      const prData = await prRes.json();
      const pmData = await pmRes.json();
      const expData = await expRes.json();

      // 計算總額
      let salesRevenue = 0;
      prData.forEach(r => salesRevenue += Number(r.amount || 0));

      let supplierPayment = 0;
      pmData.forEach(p => supplierPayment += Number(p.amount || 0));

      let cashExpense = 0;
      const expensesList = expData.map(e => {
        const amt = Number(e.amount || 0);
        cashExpense += amt;
        return {
          date: e.expense_date,
          category: e.category || '未分類',
          item: e.item || '無',
          amount: amt,
          payee: e.payee || '',
          paymentMethod: e.payment_method || '現金'
        };
      });

      // 淨現金流
      const balance = salesRevenue - supplierPayment - cashExpense;

      // 渲染統計摘要
      reportDiv.innerHTML = `
        <div class="row">
          <span>💰 銷售收款 <small style="color:var(--text2); font-weight:normal;">(來自客戶)</small></span>
          <span class="row-value income-val">+$${fmt(salesRevenue)}</span>
        </div>
        <div class="row">
          <span>💸 進貨付款 <small style="color:var(--text2); font-weight:normal;">(付給供應商)</small></span>
          <span class="row-value expense-val">-$${fmt(supplierPayment)}</span>
        </div>
        <div class="row">
          <span>💵 雜項支出 <small style="color:var(--text2); font-weight:normal;">(水電、雜費等)</small></span>
          <span class="row-value expense-val">-$${fmt(cashExpense)}</span>
        </div>
        <div class="row total">
          <span>💎 本月淨現金流</span>
          <span class="row-value" style="color: ${balance >= 0 ? 'var(--income)' : 'var(--expense-color)'};">
            ${balance >= 0 ? '+' : ''}$${fmt(balance)}
          </span>
        </div>
      `;
      reportDiv.classList.remove('hidden');

      // 渲染支出明細
      tbody.innerHTML = ''; 
      if (expensesList.length > 0) {
        expensesList.forEach(item => {
          // 只顯示月/日，讓畫面乾淨點
          const shortDate = item.date ? item.date.substring(5) : ''; 
          
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td class="td-date">${shortDate}</td> 
            <td><span class="category-badge">${item.category}</span></td>
            <td style="font-weight:700;">${item.item}</td>
            <td>${item.payee}</td>
            <td class="td-amount">$${fmt(item.amount)}</td>
            <td>${item.paymentMethod}</td>
          `;
          tbody.appendChild(tr);
        });
      } else {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:30px; color:var(--text2);">本月無雜項支出紀錄</td></tr>';
      }
      
      detailSec.style.display = 'block';

    } catch (error) {
      Swal.fire('❌ 產生失敗', error.message, 'error');
    } finally {
      loader.classList.add('hidden');
    }
  }
</script>

</body>
</html>
