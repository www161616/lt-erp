<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>龍潭進銷存系統 - 庫存查詢</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ========== 石板灰護眼主題變數 ========== */
    :root {
      --bg: #f8f9fb;             
      --surface: #ffffff;        
      --surface2: #f1f5f9;       
      --border: #e2e8f0;         
      --accent: #475569;         /* 石板灰 */
      --accent-hover: #334155;
      --text: #1e293b;           
      --text2: #64748b;          
      --danger: #c53030;         
      --danger-bg: #fed7d7;
      --warning: #b7791f;        
      --warning-bg: #fdf6ec;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans TC', sans-serif; font-size: 14px; padding: 20px; background: var(--bg); color: var(--text); }
    
    .container {
      background: var(--surface);
      padding: 24px;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(30,41,59,0.07);
      max-width: 850px;
      margin: 0 auto;
      border-top: 4px solid var(--accent);
    }

    /* 頂部標題與工具列 */
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 12px;
    }
    h2 { color: var(--accent); font-size: 20px; font-weight: 700; margin: 0; display: flex; align-items: center; gap: 8px;}
    
    .btn-refresh {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      padding: 8px 16px; border-radius: 4px; font-size: 13px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px; font-weight: 600; transition: 0.2s;
    }
    .btn-refresh:hover { background: var(--surface2); border-color: var(--text2); }

    /* 搜尋框區塊 */
    .search-box {
      background: var(--surface2);
      padding: 16px;
      border-radius: 6px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }
    
    .search-input-wrapper { display: flex; gap: 10px; }
    .search-input-wrapper input {
      flex: 1; padding: 12px 16px; font-size: 15px; border: 1px solid var(--border);
      border-radius: 4px; transition: border-color 0.2s; outline: none; font-family: inherit; color: var(--text);
    }
    .search-input-wrapper input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(71,85,105,0.1); }

    /* 庫存卡片列表 */
    .inventory-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .inventory-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      transition: all 0.2s;
      border-left: 4px solid var(--accent);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .inventory-item:hover { box-shadow: 0 4px 12px rgba(30,41,59,0.07); transform: translateY(-2px); }
    
    /* 庫存警告樣式 */
    .inventory-item.low-stock { border-color: #f8cda6; border-left-color: var(--warning); background: var(--warning-bg); }
    .inventory-item.out-of-stock { border-color: #fbc4c4; border-left-color: var(--danger); background: var(--danger-bg); }
    
    .item-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .item-name { font-size: 16px; font-weight: 700; color: var(--text); line-height: 1.4; }
    .item-id { font-size: 12px; color: var(--text2); font-family: monospace; }
    
    .status-badge {
      font-size: 11px; padding: 2px 6px; border-radius: 4px; font-weight: 600; color: white; white-space: nowrap;
    }
    .badge-normal { background: var(--accent); }
    .badge-low { background: var(--warning); }
    .badge-out { background: var(--danger); }

    .item-body {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-top: 4px;
      padding-top: 12px;
      border-top: 1px dashed rgba(30,41,59,0.1);
    }

    .stock-info { display: flex; flex-direction: column; gap: 4px; }
    .safety-stock { font-size: 12px; color: var(--text2); }
    
    .current-stock { font-size: 24px; font-weight: 700; color: var(--accent); font-family: monospace; line-height: 1;}
    .current-stock.low { color: var(--warning); }
    .current-stock.out { color: var(--danger); }
    .unit { font-size: 14px; font-weight: normal; color: var(--text2); }

    .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: flex; justify-content: center; align-items: center; z-index: 2000; font-size: 16px; color: var(--accent); font-weight: 700; flex-direction: column; gap: 12px;}
    .hidden { display: none !important; }

    /* RWD 適應手機版 (轉為單欄) */
    @media (max-width: 650px) {
      .inventory-list { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div id="loadingOverlay" class="loading-overlay hidden">
    <div>🔄 正在讀取即時庫存...</div>
  </div>

  <div class="container">
    <div class="header-row">
      <h2>📋 庫存即時查詢</h2>
      <button class="btn-refresh" onclick="loadInventory()">🔄 重新整理</button>
    </div>
    
    <div class="search-box">
      <div class="search-input-wrapper">
        <input type="text" id="search" placeholder="🔍 輸入商品名稱或編號快速過濾..." onkeyup="filterInventory()" autocomplete="off">
      </div>
      <div style="font-size: 12px; color: var(--text2); margin-top: 8px;" id="summaryText">
        載入中...
      </div>
    </div>
    
    <div id="inventoryList" class="inventory-list">
      </div>
  </div>

  <script>
    // ========== 1. Supabase API 設定 ==========
    const SB_URL = 'https://asugjynpocwygggttxyo.supabase.co/rest/v1';
    const SB_KEY = 'sb_publishable_cG0dslg6JnSwOtPSBko2Eg_VB0NtbTW'; 
    const AUTH_TOKEN = sessionStorage.getItem('sb_auth_token') || SB_KEY;
    const HEADERS = {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${AUTH_TOKEN}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };

    let allInventory = [];

    window.onload = function() {
      loadInventory();
    };

    // ========== 2. 載入並組合庫存資料 ==========
    async function loadInventory() {
      const loader = document.getElementById('loadingOverlay');
      loader.classList.remove('hidden');

      try {
        // 🔥 無敵防呆：改用 select=*，就算你少建了某個欄位也不會 400 崩潰
        const [prodRes, invRes] = await Promise.all([
          fetch(`${SB_URL}/products?select=*`, { headers: HEADERS }),
          fetch(`${SB_URL}/inventory?select=*`, { headers: HEADERS })
        ]);

        if (!prodRes.ok) {
           const err = await prodRes.json();
           throw new Error(`商品表讀取失敗: ${err.message}`);
        }
        
        const productsData = await prodRes.json();
        const inventoryData = invRes.ok ? await invRes.json() : [];

        // 將兩張表的資料合併成前端需要的格式
        allInventory = productsData
          .filter(p => p.status !== '停用') // 假設有 status 欄位，沒有的話這行也不會報錯
          .map(p => {
            const invRecord = inventoryData.find(i => i.product_id === p.id);
            const currentQty = invRecord ? Number(invRecord.qty || 0) : 0;
            
            // 防呆：找尋可能的安全庫存欄位名稱 (min_stock, safety_stock 等)
            const safeStock = Number(p.min_stock || p.safety_stock || p.alert_stock || 10);
            
            // 防呆：找尋規格與單位
            const specStr = p.spec || '';
            const unitStr = p.unit || '個';
            
            return {
              productId: p.id,
              productName: specStr ? `${p.name} (${specStr})` : p.name,
              unit: unitStr,
              safetyStock: safeStock,
              currentStock: currentQty
            };
        });

        // 依據庫存狀態排序 (缺貨優先 -> 低於安全庫存 -> 正常庫存 -> 名稱)
        allInventory.sort((a, b) => {
           let statusA = a.currentStock <= 0 ? 0 : (a.currentStock < a.safetyStock ? 1 : 2);
           let statusB = b.currentStock <= 0 ? 0 : (b.currentStock < b.safetyStock ? 1 : 2);
           if (statusA !== statusB) return statusA - statusB;
           return a.productName.localeCompare(b.productName);
        });

        document.getElementById('search').value = ''; 
        renderInventory(allInventory);

      } catch (error) {
        Swal.fire('❌ 讀取失敗', error.message, 'error');
        document.getElementById('inventoryList').innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding:30px; color:var(--danger);">系統發生錯誤：<br>${error.message}</div>`;
      } finally {
        loader.classList.add('hidden');
      }
    }

    // ========== 3. 渲染畫面 ==========
    function renderInventory(items) {
      const listDiv = document.getElementById('inventoryList');
      const summaryText = document.getElementById('summaryText');
      
      summaryText.textContent = `共顯示 ${items.length} 筆商品`;

      if (items.length === 0) {
        listDiv.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#999; font-size: 16px;">找不到符合的商品 🍃</div>';
        return;
      }

      const html = items.map(item => {
        let cssClass = 'inventory-item';
        let stockClass = 'current-stock';
        let badgeHtml = '<span class="status-badge badge-normal">庫存正常</span>';

        if (item.currentStock <= 0) {
          cssClass += ' out-of-stock';
          stockClass += ' out';
          badgeHtml = '<span class="status-badge badge-out">已缺貨</span>';
        } else if (item.currentStock < item.safetyStock) {
          cssClass += ' low-stock';
          stockClass += ' low';
          badgeHtml = '<span class="status-badge badge-low">低於安全存量</span>';
        }

        return `
          <div class="${cssClass}">
            <div class="item-header">
              <div>
                <div class="item-name">${item.productName}</div>
                <div class="item-id">${item.productId}</div>
              </div>
              ${badgeHtml}
            </div>
            
            <div class="item-body">
              <div class="stock-info">
                <span class="safety-stock">安全庫存水位：${item.safetyStock} ${item.unit}</span>
              </div>
              <div class="${stockClass}">
                ${item.currentStock} <span class="unit">${item.unit}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
      
      listDiv.innerHTML = html;
    }

    // ========== 4. 搜尋與過濾 ==========
    function filterInventory() {
      const keyword = document.getElementById('search').value.toLowerCase().trim();
      
      if (!keyword) {
        renderInventory(allInventory);
        return;
      }

      const filtered = allInventory.filter(item => 
        item.productName.toLowerCase().includes(keyword) || 
        item.productId.toLowerCase().includes(keyword)
      );
      
      renderInventory(filtered);
    }
  </script>
</body>
</html>
