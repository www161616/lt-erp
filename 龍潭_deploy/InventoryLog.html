<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>龍潭進銷存系統 - 庫存異動記錄</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  
  <style>
    /* ========== 石板灰護眼主題變數 ========== */
    :root {
      --bg: #f8f9fb;             
      --surface: #ffffff;        
      --surface2: #f1f5f9;       
      --border: #e2e8f0;         
      --accent: #475569;         /* 石板灰 (一般/入庫) */
      --text: #1e293b;           
      --text2: #64748b;          
      --danger: #c53030;         /* 出庫紅 */
      --danger-bg: #fed7d7;
      --success-bg: #f0f9eb;
      --blue: #0e7490;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      font-family: 'Noto Sans TC', system-ui, -apple-system, sans-serif; 
      font-size: 14px; 
      padding: 24px; 
      background: var(--bg); 
      color: var(--text); 
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    
    .container {
      background: var(--surface);
      padding: 24px 30px;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(30,41,59,0.07);
      width: 100%;
      max-width: 800px;
      border-top: 4px solid var(--blue); /* 用藍色區分這是一般查詢表單 */
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 2px solid var(--surface2);
      padding-bottom: 16px;
    }

    h2 { 
      color: var(--blue); 
      font-size: 22px; 
      font-weight: 700; 
      margin: 0; 
      display: flex; 
      align-items: center; 
      gap: 8px;
    }

    /* 搜尋與控制區 */
    .control-panel {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }
    
    .search-box {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 15px;
      outline: none;
      transition: 0.2s;
      font-family: inherit;
    }
    .search-box:focus { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(14,116,144,0.1); }
    
    .btn-refresh {
      padding: 0 20px;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      font-weight: 700;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-refresh:hover { background: var(--surface2); border-color: var(--text2); }

    /* 列表區 */
    .log-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 65vh;
      overflow-y: auto;
      padding-right: 5px;
    }

    /* 異動卡片設計 */
    .log-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: 0.2s;
      position: relative;
    }
    .log-item:hover { transform: translateX(2px); box-shadow: 0 2px 8px rgba(30,41,59,0.07); }

    /* 入庫樣式 (正數) */
    .log-in { border-left: 4px solid var(--accent); }
    .log-in .qty-change { color: var(--accent); }
    
    /* 出庫樣式 (負數) */
    .log-out { border-left: 4px solid var(--danger); background: var(--surface); }
    .log-out .qty-change { color: var(--danger); }

    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    
    .item-title { font-size: 15px; font-weight: 700; color: var(--text); }
    .item-date { font-size: 12px; color: var(--text2); font-family: monospace; }
    
    .qty-change { font-size: 20px; font-weight: 900; font-family: monospace; }

    .item-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 4px;
      padding-top: 12px;
      border-top: 1px dashed var(--border);
      font-size: 13px;
    }
    
    .tag-type { 
      background: var(--surface2); border: 1px solid var(--border); 
      padding: 2px 8px; border-radius: 12px; font-size: 12px; color: var(--text2);
    }
    .doc-no { color: var(--blue); font-family: monospace; }
    .after-qty { color: var(--text2); font-weight: 700; font-size: 12px; }

    /* 滾動條美化 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }

    .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); display: flex; justify-content: center; align-items: center; z-index: 2000; font-size: 16px; color: var(--blue); font-weight: 700; flex-direction: column; gap: 12px;}
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="loadingOverlay" class="loading-overlay hidden">
    <div>🔄 正在載入最新異動記錄...</div>
  </div>

  <div class="container">
    <div class="header-row">
      <h2>📊 庫存異動記錄 (Log)</h2>
      <div style="font-size: 12px; color: var(--text2);">預設顯示最新 200 筆</div>
    </div>
    
    <div class="control-panel">
      <input type="text" id="searchInput" class="search-box" placeholder="🔍 輸入商品名稱、編號或單號進行過濾..." onkeyup="filterLogs()">
      <button class="btn-refresh" onclick="fetchLogs()">🔄 更新</button>
    </div>
    
    <div id="list" class="log-list">
      </div>
  </div>

  <script>
    // ========== 1. Supabase API 設定 ==========
    const SB_URL = 'https://asugjynpocwygggttxyo.supabase.co/rest/v1';
    const SB_KEY = 'sb_publishable_cG0dslg6JnSwOtPSBko2Eg_VB0NtbTW'; 
    const AUTH_TOKEN = sessionStorage.getItem('sb_auth_token') || SB_KEY;
    const HEADERS = {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${AUTH_TOKEN}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };

    let allLogs = [];

    window.onload = function() {
      fetchLogs();
    };

    // ========== 2. 獲取資料 (GET) ==========
    async function fetchLogs() {
      const listDiv = document.getElementById('list');
      const loader = document.getElementById('loadingOverlay');
      loader.classList.remove('hidden');

      try {
        // 🔥 無敵防呆讀取：抓取 inventory_logs 表，限制 200 筆避免卡頓，依時間倒序
        const res = await fetch(`${SB_URL}/inventory_logs?select=*&order=log_date.desc&limit=200`, { headers: HEADERS });
        
        if (!res.ok) throw new Error('無法讀取異動紀錄表');
        const data = await res.json();
        
        // 將資料整理存入全域變數供搜尋使用
        allLogs = data.map(item => {
          const qtyChange = Number(item.qty_change || 0);
          return {
            id: item.id,
            date: item.log_date ? item.log_date.substring(0, 16).replace('T', ' ') : '', // 截斷秒數
            productId: item.product_id || '',
            productName: item.product_name || item.product_id || '未知商品',
            type: item.log_type || '未分類',
            qtyChange: qtyChange,
            unit: item.unit || '個',
            docNo: item.doc_no || '無單號',
            afterQty: item.after_qty !== null ? item.after_qty : '?'
          };
        });

        document.getElementById('searchInput').value = '';
        renderLogs(allLogs);

      } catch (error) {
        listDiv.innerHTML = `<div style="text-align:center; padding:30px; color:var(--danger);">❌ 讀取失敗：<br>${error.message}</div>`;
      } finally {
        loader.classList.add('hidden');
      }
    }

    // ========== 3. 渲染清單 ==========
    function renderLogs(data) {
      const listDiv = document.getElementById('list');

      if (data.length === 0) {
        listDiv.innerHTML = '<div style="text-align:center; padding:40px; color:var(--text2); font-size:15px;">查無相符的異動資料 🍃</div>';
        return;
      }

      const html = data.map(item => {
        // 判斷是入庫(+)還是出庫(-)
        const isPositive = item.qtyChange > 0;
        const cssClass = isPositive ? 'log-in' : (item.qtyChange < 0 ? 'log-out' : '');
        const sign = isPositive ? '+' : ''; // 負數自帶減號，正數手動補加號
        
        return `
          <div class="log-item ${cssClass}">
            <div class="item-header">
              <div>
                <div class="item-title">${item.productName}</div>
                <div class="item-date">${item.date}</div>
              </div>
              <div class="qty-change">${sign}${item.qtyChange} <span style="font-size:13px; font-weight:normal; color:var(--text2);">${item.unit}</span></div>
            </div>
            
            <div class="item-footer">
              <div style="display:flex; gap:8px; align-items:center;">
                <span class="tag-type">${item.type}</span>
                <span class="doc-no">${item.docNo !== '無單號' ? `單據: ${item.docNo}` : ''}</span>
              </div>
              <div class="after-qty">餘額: ${item.afterQty}</div>
            </div>
          </div>
        `;
      }).join('');
      
      listDiv.innerHTML = html;
    }

    // ========== 4. 前端快搜過濾 ==========
    function filterLogs() {
      const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
      
      if (!keyword) {
        renderLogs(allLogs);
        return;
      }

      const filtered = allLogs.filter(item => 
        item.productName.toLowerCase().includes(keyword) || 
        item.productId.toLowerCase().includes(keyword) ||
        item.docNo.toLowerCase().includes(keyword) ||
        item.type.toLowerCase().includes(keyword)
      );
      
      renderLogs(filtered);
    }
  </script>
</body>
</html>
