<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>龍潭 ERP - 一鍵資料庫備份</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #1e40af;
      --accent-light: #eff6ff;
      --success: #059669;
      --danger: #dc2626;
      --border: #e5e7eb;
      --text: #1f2937;
      --text2: #6b7280;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans TC', system-ui, sans-serif;
      background: #f1f5f9; min-height: 100vh;
      display: flex; justify-content: center; padding: 40px 20px;
    }
    .container { width: 100%; max-width: 860px; }

    .header {
      background: white; border-radius: 12px; padding: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px;
      border-left: 6px solid var(--accent); text-align: center;
    }
    .header h1 { font-size: 24px; color: var(--accent); margin-bottom: 6px; }
    .header p { font-size: 14px; color: var(--text2); }

    .actions {
      display: flex; gap: 12px; justify-content: center;
      margin-bottom: 24px; flex-wrap: wrap;
    }
    .btn {
      padding: 12px 28px; font-size: 15px; font-weight: 700;
      border: none; border-radius: 8px; cursor: pointer; color: white;
      display: inline-flex; align-items: center; gap: 8px;
      transition: 0.2s; font-family: inherit;
    }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-primary { background: var(--accent); }
    .btn-success { background: var(--success); }
    .btn-danger { background: var(--danger); }

    .card {
      background: white; border-radius: 10px; padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 16px;
    }
    .card-title {
      font-size: 15px; font-weight: 700; color: var(--text);
      margin-bottom: 14px; padding-bottom: 8px;
      border-bottom: 2px solid var(--accent-light);
      display: flex; align-items: center; gap: 8px;
    }

    .table-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 10px;
    }
    .table-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border: 1px solid var(--border);
      border-radius: 6px; font-size: 13px; transition: 0.2s;
    }
    .table-item.done { border-color: #a7f3d0; background: #f0fdf4; }
    .table-item.fail { border-color: #fca5a5; background: #fef2f2; }
    .table-item.loading { border-color: #93c5fd; background: #eff6ff; }

    .table-item .icon { font-size: 18px; flex-shrink: 0; width: 22px; text-align: center; }
    .table-item .name { font-weight: 500; color: var(--text); flex: 1; }
    .table-item .count { font-size: 12px; color: var(--text2); white-space: nowrap; }

    .progress-bar {
      width: 100%; height: 8px; background: #e5e7eb;
      border-radius: 4px; overflow: hidden; margin-bottom: 12px;
    }
    .progress-fill {
      height: 100%; background: var(--accent); border-radius: 4px;
      transition: width 0.3s ease;
    }

    .log-area {
      background: #1e293b; color: #e2e8f0; border-radius: 8px;
      padding: 16px; font-family: 'Consolas', monospace; font-size: 12px;
      max-height: 200px; overflow-y: auto; line-height: 1.6;
    }
    .log-area .ok { color: #4ade80; }
    .log-area .err { color: #f87171; }
    .log-area .info { color: #60a5fa; }
    .log-area .warn { color: #fbbf24; }

    .summary {
      display: flex; gap: 20px; justify-content: center;
      margin-top: 16px; flex-wrap: wrap;
    }
    .summary-item {
      text-align: center; padding: 12px 20px;
      background: var(--accent-light); border-radius: 8px; min-width: 120px;
    }
    .summary-item .num { font-size: 24px; font-weight: 700; color: var(--accent); }
    .summary-item .label { font-size: 12px; color: var(--text2); margin-top: 2px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>龍潭 ERP 資料庫備份工具</h1>
      <p>一鍵從 Supabase 下載全部資料表，匯出成 Excel 檔保存</p>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="btnBackup" onclick="startBackup()">
        💾 一鍵備份全部資料表
      </button>
      <button class="btn btn-success" id="btnDownload" onclick="downloadExcel()" disabled>
        📥 下載 Excel 備份檔
      </button>
    </div>

    <div class="card">
      <div class="card-title">📊 資料表狀態（共 18 張表）</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%;"></div></div>
      <div class="table-grid" id="tableGrid"></div>
      <div class="summary" id="summaryArea" style="display:none;"></div>
    </div>

    <div class="card">
      <div class="card-title">📋 備份紀錄</div>
      <div class="log-area" id="logArea">
        <div class="info">等待開始備份...</div>
      </div>
    </div>
  </div>

  <script>
    const SB_URL = 'https://asugjynpocwygggttxyo.supabase.co/rest/v1';
    const SB_KEY = 'sb_publishable_cG0dslg6JnSwOtPSBko2Eg_VB0NtbTW';
    const HEADERS = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` };

    const TABLES = [
      { key: 'products',            label: '商品主檔' },
      { key: 'suppliers',           label: '供應商' },
      { key: 'customers',           label: '客戶' },
      { key: 'sales_orders',        label: '銷貨單' },
      { key: 'sales_details',       label: '銷貨明細' },
      { key: 'purchase_orders',     label: '進貨單' },
      { key: 'purchase_details',    label: '進貨明細' },
      { key: 'inventory',           label: '庫存' },
      { key: 'inventory_logs',      label: '庫存異動' },
      { key: 'accounts_receivable', label: '應收帳款' },
      { key: 'accounts_payable',    label: '應付帳款' },
      { key: 'payment_received',    label: '收款紀錄' },
      { key: 'payment_made',        label: '付款紀錄' },
      { key: 'petty_cash',          label: '零用金' },
      { key: 'expenses',            label: '支出紀錄' },
      { key: 'special_prices',      label: '客戶特價' },
      { key: 'supplier_prices',     label: '供應商報價' },
      { key: 'br_stores',           label: '分店資料' },
    ];

    let backupData = {};
    let isRunning = false;

    // 初始化表格狀態
    function initGrid() {
      const grid = document.getElementById('tableGrid');
      grid.innerHTML = TABLES.map(t => `
        <div class="table-item" id="tbl-${t.key}">
          <span class="icon">⬜</span>
          <span class="name">${t.label}</span>
          <span class="count" id="cnt-${t.key}">—</span>
        </div>`).join('');
    }
    initGrid();

    function log(msg, cls) {
      const area = document.getElementById('logArea');
      const time = new Date().toLocaleTimeString('zh-TW');
      area.innerHTML += `<div class="${cls || ''}">[${time}] ${msg}</div>`;
      area.scrollTop = area.scrollHeight;
    }

    function setTableStatus(key, status, count) {
      const el = document.getElementById(`tbl-${key}`);
      const cnt = document.getElementById(`cnt-${key}`);
      el.className = 'table-item ' + status;
      if (status === 'loading') el.querySelector('.icon').textContent = '🔄';
      else if (status === 'done') el.querySelector('.icon').textContent = '✅';
      else if (status === 'fail') el.querySelector('.icon').textContent = '❌';
      if (count !== undefined) cnt.textContent = `${count} 筆`;
    }

    // 分頁抓取（突破 1000 筆限制）
    async function fetchAll(table) {
      let all = [];
      let offset = 0;
      const limit = 1000;
      while (true) {
        const url = `${SB_URL}/${table}?select=*&limit=${limit}&offset=${offset}`;
        const res = await fetch(url, { headers: HEADERS });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        all = all.concat(data);
        if (data.length < limit) break;
        offset += limit;
      }
      return all;
    }

    // 開始備份
    async function startBackup() {
      if (isRunning) return;
      isRunning = true;
      backupData = {};

      const btn = document.getElementById('btnBackup');
      const dlBtn = document.getElementById('btnDownload');
      btn.disabled = true;
      btn.innerHTML = '🔄 備份進行中...';
      dlBtn.disabled = true;

      document.getElementById('logArea').innerHTML = '';
      document.getElementById('summaryArea').style.display = 'none';
      initGrid();

      log('開始備份所有資料表...', 'info');

      let doneCount = 0;
      let failCount = 0;
      let totalRows = 0;

      for (let i = 0; i < TABLES.length; i++) {
        const t = TABLES[i];
        setTableStatus(t.key, 'loading');
        log(`正在讀取 [${t.label}] (${t.key})...`);

        try {
          const data = await fetchAll(t.key);
          backupData[t.key] = data;
          setTableStatus(t.key, 'done', data.length);
          totalRows += data.length;
          doneCount++;
          log(`${t.label} — ${data.length} 筆 ✔`, 'ok');
        } catch (err) {
          setTableStatus(t.key, 'fail');
          backupData[t.key] = [];
          failCount++;
          log(`${t.label} — 讀取失敗: ${err.message}`, 'err');
        }

        // 更新進度條
        const pct = Math.round(((i + 1) / TABLES.length) * 100);
        document.getElementById('progressFill').style.width = pct + '%';
      }

      // 完成
      log('————————————————', 'info');
      log(`備份完成！成功 ${doneCount} 表，失敗 ${failCount} 表，共 ${totalRows.toLocaleString()} 筆資料`, doneCount === TABLES.length ? 'ok' : 'warn');

      document.getElementById('summaryArea').style.display = 'flex';
      document.getElementById('summaryArea').innerHTML = `
        <div class="summary-item"><div class="num">${doneCount}</div><div class="label">成功</div></div>
        <div class="summary-item"><div class="num" style="color:${failCount?'#dc2626':'#059669'}">${failCount}</div><div class="label">失敗</div></div>
        <div class="summary-item"><div class="num">${totalRows.toLocaleString()}</div><div class="label">總筆數</div></div>
      `;

      btn.disabled = false;
      btn.innerHTML = '💾 重新備份';
      if (doneCount > 0) dlBtn.disabled = false;
      isRunning = false;
    }

    // 下載 Excel
    function downloadExcel() {
      const wb = XLSX.utils.book_new();
      let sheetCount = 0;

      TABLES.forEach(t => {
        const data = backupData[t.key];
        if (!data || data.length === 0) return;
        const ws = XLSX.utils.json_to_sheet(data);
        // sheet name 最多 31 字元
        const name = t.label.substring(0, 31);
        XLSX.utils.book_append_sheet(wb, ws, name);
        sheetCount++;
      });

      if (sheetCount === 0) {
        alert('沒有可匯出的資料');
        return;
      }

      const now = new Date();
      const ts = now.getFullYear()
        + String(now.getMonth() + 1).padStart(2, '0')
        + String(now.getDate()).padStart(2, '0')
        + '_'
        + String(now.getHours()).padStart(2, '0')
        + String(now.getMinutes()).padStart(2, '0');

      const fileName = `龍潭ERP完整備份_${ts}.xlsx`;
      XLSX.writeFile(wb, fileName);
      log(`已下載備份檔：${fileName}`, 'ok');
    }
  </script>
</body>
</html>
