<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>龍潭進銷存系統 - 發票紀錄</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    /* ========== 石板灰護眼主題 ========== */
    :root {
      --bg: #f8f9fb;             
      --surface: #ffffff;        
      --surface2: #f1f5f9;       
      --border: #e2e8f0;         
      --accent: #475569;         /* 石板灰 */
      --accent-hover: #334155;
      --text: #1e293b;           
      --text2: #64748b;          
      --danger: #c53030;         
      --blue: #0e7490;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      font-family: 'Noto Sans TC', sans-serif; 
      padding: 20px; 
      background: var(--bg); 
      color: var(--text);
      display: flex;
      justify-content: center;
    }
    
    .container { 
      background: var(--surface); 
      padding: 30px; 
      border-radius: 12px; 
      max-width: 700px; 
      width: 100%;
      box-shadow: 0 4px 20px rgba(30,41,59,0.07);
      border-top: 5px solid var(--accent);
    }

    h2 { 
      color: var(--accent); 
      margin-bottom: 24px; 
      font-size: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .full-width { grid-column: 1 / -1; }

    .form-group { margin-bottom: 20px; }
    label { font-weight: 700; display: block; margin-bottom: 8px; color: var(--text2); font-size: 14px; }
    
    input, select, textarea { 
      width: 100%; 
      padding: 12px 14px; 
      border: 1px solid var(--border); 
      border-radius: 8px; 
      font-size: 15px; 
      outline: none;
      background: var(--surface);
      transition: all 0.2s;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(71,85,105,0.1); }
    
    /* 發票號碼專屬樣式 */
    #invoiceNo { 
      text-transform: uppercase; 
      font-weight: 900; 
      color: var(--blue); 
      letter-spacing: 1px;
    }

    hr { border: none; border-top: 1px solid var(--border); margin: 10px 0 25px 0; }

    .amount-box {
      background: var(--surface2);
      padding: 20px;
      border-radius: 8px;
      border: 1px solid var(--border);
      margin-bottom: 20px;
    }

    .btn-row {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 10px;
    }

    .btn { 
      padding: 12px 24px; 
      border: none; 
      border-radius: 6px; 
      font-size: 16px; 
      font-weight: 700; 
      cursor: pointer; 
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn:disabled { background: var(--border); cursor: not-allowed; }

    .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); display: flex; justify-content: center; align-items: center; z-index: 2000; font-size: 16px; color: var(--accent); font-weight: 700; flex-direction: column; gap: 12px;}
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="loadingOverlay" class="loading-overlay hidden">
    <div>🔄 正在處理發票紀錄...</div>
  </div>

  <div class="container">
    <h2>📄 發票紀錄系統</h2>
    
    <form id="invoiceForm">
      <div class="form-grid">
        <div class="form-group">
          <label>📅 發票日期</label>
          <input type="date" id="date" required>
        </div>
        <div class="form-group">
          <label>🧾 發票號碼 (2英+8數)</label>
          <input type="text" id="invoiceNo" placeholder="例: GU12345678" maxlength="10" 
                 oninput="this.value = this.value.toUpperCase()" required>
        </div>

        <div class="form-group">
          <label>👤 對象名稱 (客戶/供應商)</label>
          <input type="text" id="targetName" placeholder="請輸入對象名稱" required>
        </div>
        <div class="form-group">
          <label>🆔 統一編號 (選填)</label>
          <input type="text" id="taxId" maxlength="8" placeholder="8位數字統編">
        </div>

        <div class="form-group">
          <label>💰 課稅別</label>
          <select id="taxType" onchange="calculateTax()">
            <option value="應稅">應稅 (5%)</option>
            <option value="零稅率">零稅率</option>
            <option value="免稅">免稅</option>
          </select>
        </div>
        <div class="form-group">
          <label>🔗 關連單號 (選填)</label>
          <input type="text" id="refNo" placeholder="如: SO001 或 EXP001">
        </div>
      </div>

      <hr>

      <div class="amount-box">
        <div class="form-grid">
          <div class="form-group">
            <label>未稅金額</label>
            <input type="number" id="amount" step="1" oninput="calculateTax()" required>
          </div>
          <div class="form-group">
            <label>稅額 (5%)</label>
            <input type="number" id="taxAmount" step="1" oninput="calculateTotal()">
          </div>
          <div class="form-group full-width">
            <label>含稅總計</label>
            <input type="number" id="totalAmount" step="1" required 
                   style="font-size: 20px; font-weight: 900; color: var(--accent);">
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>📝 備註</label>
        <textarea id="note" rows="2" placeholder="其他說明事項..."></textarea>
      </div>

      <div class="btn-row">
        <button type="button" class="btn btn-secondary" onclick="window.history.back()">取消回上頁</button>
        <button type="submit" id="saveBtn" class="btn btn-primary">✅ 確認儲存發票</button>
      </div>
    </form>
  </div>

  <script>
    // ========== 1. Supabase API 設定 ==========
    const SB_URL = 'https://asugjynpocwygggttxyo.supabase.co/rest/v1';
    const SB_KEY = 'sb_publishable_cG0dslg6JnSwOtPSBko2Eg_VB0NtbTW'; 
    const AUTH_TOKEN = sessionStorage.getItem('sb_auth_token') || SB_KEY;
    const HEADERS = {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${AUTH_TOKEN}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };

    // ========== 2. 自動計算邏輯 ==========
    function calculateTax() {
      const amount = parseFloat(document.getElementById('amount').value) || 0;
      const taxType = document.getElementById('taxType').value;
      let tax = 0;
      if (taxType === '應稅') {
        tax = Math.round(amount * 0.05);
      }
      document.getElementById('taxAmount').value = tax;
      calculateTotal();
    }

    function calculateTotal() {
      const amount = parseFloat(document.getElementById('amount').value) || 0;
      const tax = parseFloat(document.getElementById('taxAmount').value) || 0;
      document.getElementById('totalAmount').value = amount + tax;
    }

    // ========== 3. 初始化頁面 (處理參數自動帶入) ==========
    window.onload = async function() {
      // 預設日期
      document.getElementById('date').value = new Date().toISOString().split('T')[0];
      
      const urlParams = new URLSearchParams(window.location.search);
      const expenseId = urlParams.get('expense_id');
      const orderId = urlParams.get('order_id');

      if (expenseId) {
        loadLinkedData('expenses', expenseId);
      } else if (orderId) {
        loadLinkedData('sales_orders', orderId);
      }
    };

    // 透過單號自動從資料庫抓取基本資訊
    async function loadLinkedData(table, id) {
      const loader = document.getElementById('loadingOverlay');
      loader.classList.remove('hidden');
      try {
        const res = await fetch(`${SB_URL}/${table}?id=eq.${id}&select=*`, { headers: HEADERS });
        const data = await res.json();
        if (data && data.length > 0) {
          const item = data[0];
          document.getElementById('refNo').value = id;
          document.getElementById('targetName').value = item.customer_name || item.payee || '';
          document.getElementById('amount').value = item.subtotal || item.amount || 0;
          document.getElementById('date').value = item.order_date || item.expense_date || document.getElementById('date').value;
          calculateTax();
        }
      } catch (e) {
        console.error('關聯資料讀取失敗', e);
      } finally {
        loader.classList.add('hidden');
      }
    }

    // ========== 4. 儲存邏輯 (POST) ==========
    document.getElementById('invoiceForm').onsubmit = async function(e) {
      e.preventDefault();
      
      const saveBtn = document.getElementById('saveBtn');
      const loader = document.getElementById('loadingOverlay');
      
      saveBtn.disabled = true;
      loader.classList.remove('hidden');

      const refNo = document.getElementById('refNo').value.trim().toUpperCase();
      // 邏輯：有 EXP 開頭的視為 RECEIVED (進項)，其餘為 ISSUED (銷項)
      const type = (refNo.indexOf('EXP') > -1 || refNo.indexOf('PUR') > -1) ? 'RECEIVED' : 'ISSUED';

      const payload = {
        invoice_date: document.getElementById('date').value,
        invoice_no: document.getElementById('invoiceNo').value.trim().toUpperCase(),
        target_name: document.getElementById('targetName').value,
        tax_id: document.getElementById('taxId').value,
        tax_type: document.getElementById('taxType').value,
        amount: Number(document.getElementById('amount').value),
        tax_amount: Number(document.getElementById('taxAmount').value),
        total_amount: Number(document.getElementById('totalAmount').value),
        ref_no: refNo,
        type: type,
        note: document.getElementById('note').value
      };

      try {
        const res = await fetch(`${SB_URL}/invoices`, {
          method: 'POST',
          headers: HEADERS,
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const errData = await res.json();
          throw new Error(errData.message || '無法儲存至資料庫');
        }

        await Swal.fire({
          icon: 'success',
          title: '儲存成功！',
          text: `發票 ${payload.invoice_no} 已紀錄完成`,
          timer: 2000,
          showConfirmButton: false
        });

        // 成功後跳回上一頁或重置表單
        window.history.back();

      } catch (error) {
        Swal.fire('❌ 儲存失敗', error.message, 'error');
        saveBtn.disabled = false;
      } finally {
        loader.classList.add('hidden');
      }
    };
  </script>
</body>
</html>
