<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>龍潭進銷存系統 - 客戶分析</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  
  <style>
    /* ========== 石板灰護眼主題 ========== */
    :root {
      --bg: #f8f9fb;             
      --surface: #ffffff;        
      --surface2: #f1f5f9;       
      --border: #e2e8f0;         
      --accent: #475569;         /* 石板灰 */
      --accent-hover: #334155;
      --text: #1e293b;           
      --text2: #64748b;          
      --danger: #c53030;         
      --warning: #b7791f;        
      --blue: #0e7490;
      
      /* 排行榜專屬色 */
      --gold: #F5A623;
      --silver: #9E9E9E;
      --bronze: #8D6E63;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      font-family: 'Noto Sans TC', system-ui, -apple-system, sans-serif; 
      font-size: 14px; 
      padding: 24px; 
      background: var(--bg); 
      color: var(--text); 
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    
    .container {
      background: var(--surface);
      padding: 24px 30px;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(30,41,59,0.07);
      width: 100%;
      max-width: 800px;
      border-top: 4px solid var(--accent);
    }

    /* 頂部標題與工具列 */
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      border-bottom: 2px solid var(--surface2);
      padding-bottom: 16px;
    }
    h2 { color: var(--accent); font-size: 22px; font-weight: 700; margin: 0; display: flex; align-items: center; gap: 8px;}

    .control-panel {
      display: flex;
      gap: 12px;
      background: var(--surface2);
      padding: 16px;
      border-radius: 6px;
      border: 1px solid var(--border);
      margin-bottom: 24px;
    }
    
    input[type="month"] { 
      flex: 1; padding: 10px 16px; border: 1px solid var(--border); 
      border-radius: 4px; font-size: 15px; font-family: inherit; color: var(--text);
      outline: none; transition: 0.2s;
    }
    input[type="month"]:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(71,85,105,0.1); }
    
    .btn { 
      padding: 10px 24px; border: none; border-radius: 4px; cursor: pointer; 
      font-weight: 700; font-size: 15px; font-family: inherit; transition: 0.2s;
      background: var(--accent); color: white; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:active { transform: translateY(1px); }

    /* ========== 排行榜卡片 ========== */
    .result-list { display: flex; flex-direction: column; gap: 12px; }

    .item-card { 
      background: var(--surface); border: 1px solid var(--border); 
      padding: 16px 20px; border-radius: 6px; display: flex; align-items: center; gap: 20px;
      transition: all 0.2s; position: relative; overflow: hidden;
    }
    .item-card:hover { border-color: #cbd5e1; box-shadow: 0 4px 12px rgba(30,41,59,0.07); transform: translateX(4px); }
    
    /* 名次徽章 */
    .rank-badge { 
      font-size: 24px; font-weight: 900; color: var(--text2); 
      min-width: 45px; text-align: center; font-style: italic;
    }
    .rank-1 .rank-badge { color: var(--gold); font-size: 32px; }
    .rank-2 .rank-badge { color: var(--silver); font-size: 28px; }
    .rank-3 .rank-badge { color: var(--bronze); font-size: 26px; }

    /* 客戶名稱 */
    .customer-info { flex: 1; }
    .customer-name { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    
    /* 數據網格 */
    .data-grid { 
      display: grid; grid-template-columns: repeat(3, auto); gap: 16px; 
      font-size: 13px; color: var(--text2);
    }
    .data-item span { font-weight: 700; color: var(--text); font-size: 15px; font-family: monospace; }
    .data-item.highlight span { color: var(--warning); }
    .data-item.profit span { color: var(--accent); }

    /* 業績進度條 (背景裝飾) */
    .progress-bg {
      position: absolute; left: 0; bottom: 0; height: 4px; background: var(--accent);
      opacity: 0.8; border-radius: 0 4px 4px 0; transition: width 1s ease-out;
    }
    .rank-1 .progress-bg { background: var(--gold); height: 6px; }
    .rank-2 .progress-bg { background: var(--silver); }
    .rank-3 .progress-bg { background: var(--bronze); }

    .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: flex; justify-content: center; align-items: center; z-index: 2000; font-size: 16px; color: var(--accent); font-weight: 700; flex-direction: column; gap: 12px;}
    .hidden { display: none !important; }

    @media (max-width: 600px) {
      .item-card { flex-direction: column; align-items: flex-start; gap: 12px; }
      .data-grid { grid-template-columns: 1fr; gap: 8px; }
      .rank-badge { position: absolute; top: 12px; right: 20px; font-size: 36px !important; opacity: 0.2; }
    }
  </style>
</head>
<body>

  <div id="loadingOverlay" class="loading-overlay hidden">
    <div>📊 正在運算客戶貢獻度，請稍候...</div>
  </div>

  <div class="container">
    <div class="header-row">
      <h2>👥 客戶價值分析</h2>
    </div>

    <div class="control-panel">
      <input type="month" id="monthInput">
      <button class="btn" onclick="analyzeCustomers()">📊 開始分析</button>
    </div>

    <div id="resultList" class="result-list">
      <div style="text-align:center; padding:40px; color:var(--text2);">👆 請選擇月份並點擊分析</div>
    </div>
  </div>

  <script>
    // ========== 1. Supabase API 設定 ==========
    const SB_URL = 'https://asugjynpocwygggttxyo.supabase.co/rest/v1';
    const SB_KEY = 'sb_publishable_cG0dslg6JnSwOtPSBko2Eg_VB0NtbTW'; 
    const AUTH_TOKEN = sessionStorage.getItem('sb_auth_token') || SB_KEY;
    const HEADERS = {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${AUTH_TOKEN}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };

    window.onload = function() {
      // 預設月份為當月 (處理時區)
      const today = new Date();
      const offset = today.getTimezoneOffset() * 60000;
      document.getElementById('monthInput').value = (new Date(today - offset)).toISOString().substring(0, 7);
    };

    // ========== 2. 獲取資料與聚合運算 ==========
    async function analyzeCustomers() {
      const monthVal = document.getElementById('monthInput').value;
      if (!monthVal) { Swal.fire('提示', '請選擇月份', 'warning'); return; }

      const loader = document.getElementById('loadingOverlay');
      const listDiv = document.getElementById('resultList');
      loader.classList.remove('hidden');

      // 算出月份的起迄日
      const [year, month] = monthVal.split('-');
      const startDate = `${year}-${month}-01`;
      const lastDay = new Date(year, month, 0).getDate();
      const endDate = `${year}-${month}-${lastDay}`;

      try {
        // 1. 抓取當月所有銷貨單 (無敵防呆讀取 select=*)
        const salesRes = await fetch(`${SB_URL}/sales_orders?order_date=gte.${startDate}&order_date=lte.${endDate}&select=*`, { headers: HEADERS });
        if (!salesRes.ok) throw new Error('無法讀取銷貨單');
        const orders = await salesRes.json();

        if (orders.length === 0) {
          listDiv.innerHTML = '<div style="text-align:center; padding:40px; color:var(--text2); font-size:16px;">此月份無任何銷貨紀錄 🍃</div>';
          loader.classList.add('hidden');
          return;
        }

        // 2. 抓取這些銷貨單的「所有明細」，以計算精準毛利
        // 將 order_id 組合起來，如果單量很大，需要分批抓，這裡用迴圈分批處理 (防網址過長)
        const orderIds = orders.map(o => o.id);
        let allDetails = [];
        const chunkSize = 80; // 每次抓 80 張單的明細
        
        for (let i = 0; i < orderIds.length; i += chunkSize) {
          const chunk = orderIds.slice(i, i + chunkSize);
          const idsString = chunk.map(id => `"${id}"`).join(',');
          
          const detailRes = await fetch(`${SB_URL}/sales_details?order_id=in.(${idsString})&select=*`, { headers: HEADERS });
          if (detailRes.ok) {
            const detailChunk = await detailRes.json();
            allDetails = allDetails.concat(detailChunk);
          }
        }

        // 3. 在前端使用 JavaScript 進行資料聚合 (Group By Customer)
        const customerMap = {};

        orders.forEach(o => {
          // 防呆：尋找客戶名稱與總金額的欄位
          const custName = o.customer_name || o.customer_id || '未知客戶';
          const revenue = Number(o.grand_total || o.total_amount || o.total || 0);

          if (!customerMap[custName]) {
            customerMap[custName] = { customerName: custName, revenue: 0, cost: 0, orderCount: 0 };
          }
          
          customerMap[custName].revenue += revenue;
          customerMap[custName].orderCount += 1;

          // 找出這張單的所有明細，累加成本
          const orderDetails = allDetails.filter(d => d.order_id === o.id);
          let orderCost = 0;
          orderDetails.forEach(d => {
            // 防呆：明細表可能沒有 cost 欄位，預設為 0
            orderCost += Number(d.qty || 0) * Number(d.cost || 0);
          });
          customerMap[custName].cost += orderCost;
        });

        // 4. 計算毛利與毛利率，並轉為陣列排序
        const resultData = Object.values(customerMap).map(c => {
          c.profit = c.revenue - c.cost;
          c.profitRate = c.revenue > 0 ? ((c.profit / c.revenue) * 100).toFixed(1) : 0;
          return c;
        });

        // 依據銷售額 (Revenue) 由高到低排序
        resultData.sort((a, b) => b.revenue - a.revenue);

        // 顯示結果
        renderAnalysis(resultData);

      } catch (error) {
        Swal.fire('❌ 分析失敗', error.message, 'error');
        listDiv.innerHTML = `<div style="text-align:center; padding:20px; color:var(--danger);">系統錯誤：<br>${error.message}</div>`;
      } finally {
        loader.classList.add('hidden');
      }
    }

    // ========== 3. 渲染排行榜畫面 ==========
    function renderAnalysis(data) {
      const listDiv = document.getElementById('resultList');
      
      if (data.length === 0) {
        listDiv.innerHTML = '<div style="text-align:center; padding:40px; color:var(--text2);">查無資料</div>';
        return;
      }

      // 找出最高銷售額當作進度條的 100% 基準
      const maxRevenue = data[0].revenue;

      const html = data.map((item, index) => {
        const rank = index + 1;
        let rankClass = '';
        if (rank === 1) rankClass = 'rank-1';
        else if (rank === 2) rankClass = 'rank-2';
        else if (rank === 3) rankClass = 'rank-3';

        // 計算業績進度條寬度 (最低給 2% 避免看不到)
        const percent = Math.max(2, (item.revenue / maxRevenue) * 100);

        return `
          <div class="item-card ${rankClass}">
            <div class="rank-badge">#${rank}</div>
            
            <div class="customer-info">
              <div class="customer-name">${item.customerName}</div>
              <div class="data-grid">
                <div class="data-item highlight">銷售業績: <span>$${item.revenue.toLocaleString()}</span></div>
                <div class="data-item profit">貢獻毛利: <span>$${item.profit.toLocaleString()}</span> <small style="color:var(--text2);">(${item.profitRate}%)</small></div>
                <div class="data-item">交易次數: <span>${item.orderCount} 次</span></div>
              </div>
            </div>

            <div class="progress-bg" style="width: ${percent}%;"></div>
          </div>
        `;
      }).join('');
      
      listDiv.innerHTML = html;
    }
  </script>
</body>
</html>
