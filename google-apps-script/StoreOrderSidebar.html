<!DOCTYPE html>
<html>
<head>
<base target="_top">
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
    margin: 0;
    padding: 14px;
    font-size: 14px;
    background: #f5f7fa;
    color: #2c3e50;
  }
  h3 { margin: 0 0 12px 0; font-size: 16px; color: #1565c0; }

  .header-card {
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 10px;
  }
  .order-no {
    font-family: monospace;
    font-size: 16px;
    font-weight: bold;
    color: #1565c0;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
  }
  .meta {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    font-size: 13px;
    margin-top: 6px;
  }
  .meta-item {
    background: #eceff1;
    padding: 3px 8px;
    border-radius: 4px;
  }

  .badge {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: bold;
  }
  .b-pending  { background: #fff3e0; color: #e65100; }
  .b-issued   { background: #e3f2fd; color: #1565c0; }
  .b-received { background: #e8f5e9; color: #2e7d32; }
  .b-issue    { background: #ffebee; color: #c62828; }
  .b-draft    { background: #fff8e1; color: #e65100; border: 1px solid #ffb300; }

  /* 暫存單大警示框（header card 下方） */
  .draft-warn {
    background: #fff8e1;
    border: 2px solid #ffa000;
    color: #bf360c;
    padding: 12px 14px;
    border-radius: 6px;
    margin-bottom: 12px;
    font-size: 14px;
    line-height: 1.6;
  }
  .draft-warn b { color: #d84315; }

  /* 暫存單底部禁用提示 */
  .draft-locked {
    flex: 1;
    background: #fff8e1;
    border: 1px solid #ffa000;
    color: #bf360c;
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 14px;
    text-align: center;
    font-weight: bold;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    margin-bottom: 10px;
    font-size: 13px;
  }
  th, td { border: 1px solid #ddd; padding: 5px 6px; text-align: left; }
  th { background: #f5f5f5; }
  td.r { text-align: right; }
  td.c { text-align: center; }

  tr.return-row { background: #fff3e0; }

  .actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  button {
    padding: 10px 16px;
    font-size: 14px;
    border: 0;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    flex: 1;
  }
  .btn-confirm { background: #4caf50; color: white; }
  .btn-confirm:hover { background: #43a047; }
  .btn-revoke  { background: #ff9800; color: white; }
  .btn-revoke:hover  { background: #f57c00; }
  button:disabled { background: #aaa !important; cursor: not-allowed; }

  #status {
    padding: 8px;
    margin-bottom: 8px;
    border-radius: 4px;
    font-size: 13px;
    text-align: center;
  }
  .status-info    { background: #e3f2fd; color: #1565c0; }
  .status-success { background: #e8f5e9; color: #2e7d32; }
  .status-error   { background: #ffebee; color: #c62828; }
  .loading        { text-align: center; color: #1976d2; padding: 30px; }

  .info-warning {
    background: #fff3e0;
    color: #e65100;
    padding: 8px 10px;
    border-radius: 4px;
    margin-bottom: 8px;
    font-size: 12px;
  }

  .btn-return {
    background: #e91e63;
    color: white;
    padding: 4px 10px;
    font-size: 12px;
    border: 0;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
  }
  .btn-return:hover { background: #c2185b; }

  tr.return-form-row td {
    background: #fff8e1;
    padding: 12px;
  }
  .return-form-title {
    font-weight: bold;
    color: #e65100;
    margin-bottom: 8px;
  }
  .return-form-grid {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 8px 12px;
    align-items: center;
  }
  .return-form-grid label { font-weight: bold; color: #555; }
  .return-form-grid select,
  .return-form-grid input,
  .return-form-grid textarea {
    padding: 6px 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 13px;
    font-family: inherit;
    width: 100%;
    box-sizing: border-box;
  }
  .return-form-grid textarea { resize: vertical; min-height: 50px; }
  .return-form-actions {
    margin-top: 10px;
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  .return-form-actions button {
    flex: 0 0 auto;
    padding: 8px 16px;
    font-size: 13px;
  }
  .btn-cancel { background: #999; color: white; }
  .btn-cancel:hover { background: #777; }
  .btn-submit { background: #4caf50; color: white; }
  .btn-submit:hover { background: #43a047; }
</style>
</head>
<body>

<h3>📦 單號明細</h3>

<div id="status" style="display:none;"></div>

<div id="content">
  <div class="loading">⏳ 載入中...</div>
</div>

<script>
  var ORDER_NO = '<?= orderNo ?>';
  var currentOrder = null;
  var currentItems = [];
  var pendingSuccessMsg = '';

  function setStatus(msg, type) {
    var el = document.getElementById('status');
    if (!msg) { el.style.display = 'none'; return; }
    el.className = 'status-' + (type || 'info');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function load() {
    setStatus('', '');
    document.getElementById('content').innerHTML = '<div class="loading">⏳ 載入中...</div>';
    google.script.run
      .withSuccessHandler(function (json) {
        var data;
        try { data = JSON.parse(json); } catch (e) { data = { error: '回傳格式錯誤' }; }
        if (data.error) {
          setStatus(data.error, 'error');
          document.getElementById('content').innerHTML = '<div class="loading">❌ 無法載入</div>';
          return;
        }
        currentOrder = data.order;
        render(data);
        if (pendingSuccessMsg) {
          setStatus(pendingSuccessMsg, 'success');
          pendingSuccessMsg = '';
        }
      })
      .withFailureHandler(function (err) {
        setStatus('讀取失敗：' + err.message, 'error');
        document.getElementById('content').innerHTML = '<div class="loading">❌ 無法載入</div>';
      })
      .getOrderDetailsForSidebar(ORDER_NO);
  }

  function render(data) {
    var o = data.order || {};
    var items = data.items || [];
    var isLegacy = !!data.is_legacy;
    var html = '';

    var isDraft = !!o.is_draft;

    var statusCls = 'b-issued';
    if (isLegacy) statusCls = 'b-pending';     // 舊單灰黃色 badge
    else if (isDraft) statusCls = 'b-draft';
    else if (o.status === '待處理') statusCls = 'b-pending';
    else if (o.status === '已收到') statusCls = 'b-received';
    else if (o.status === '有問題') statusCls = 'b-issue';

    html += '<div class="header-card">';
    html += '<div class="order-no">' + escHtml(o.order_no);
    html += '<span class="badge ' + statusCls + '">' +
            (isLegacy ? '📜 歷史' : (isDraft ? '📝 暫存' : escHtml(o.status || '?'))) +
            '</span>';
    html += '</div>';
    html += '<div class="meta">';
    if (o.order_date)    html += '<span class="meta-item">📅 訂單：' + escHtml(o.order_date) + '</span>';
    if (o.delivery_date) html += '<span class="meta-item">🚚 出貨：' + escHtml(o.delivery_date) + '</span>';
    html += '<span class="meta-item">📦 ' + (o.total_qty || 0) + ' 件</span>';
    html += '<span class="meta-item">💰 $' + (Number(o.total_amount) || 0).toLocaleString() + '</span>';
    if (o.has_return)    html += '<span class="meta-item" style="background:#ffcdd2;color:#c62828;">⚠️ 退貨：' + escHtml(o.return_status) + '</span>';
    if (o.received_at)   html += '<span class="meta-item">✅ 收貨：' + escHtml(formatTs(o.received_at)) + '</span>';
    if (isLegacy && o.order_type === 'return' && o.ref_order_no) {
      html += '<span class="meta-item" style="background:#ffe0b2;color:#bf360c;">↩️ 原單：' + escHtml(o.ref_order_no) + '</span>';
    }
    html += '</div>';
    if (o._outOfRange) {
      html += '<div class="info-warning" style="margin-top:8px;">⚠️ 此單超過清單顯示範圍，主表資訊不完整（明細仍可正常顯示）</div>';
    }
    html += '</div>';

    // 舊單唯讀提示
    if (isLegacy) {
      html += '<div class="info-warning" style="margin-bottom:10px;">';
      html +=   '📜 <b>此為舊系統歷史單</b>，僅供查閱對帳，<b>無法執行確認收貨 / 退貨 / 撤銷等操作</b>。';
      html += '</div>';
    }

    // ⚡ 任務 4.1 C 段：暫存單大警示框
    if (isDraft) {
      html += '<div class="draft-warn">';
      html +=   '<b>⚠️ 此單為暫存單，數量與品項仍可能調整</b><br/>';
      html +=   '請等狀態變「<b>已建單</b>」後再確認收貨。<br/>';
      html +=   '<small style="color:#6d4c41;">（此單尚未由撿貨員確認送出，目前僅供預覽）</small>';
      html += '</div>';
    }

    currentItems = items;

    if (items.length === 0) {
      html += '<div class="info-warning">⚠️ 無明細，可能單號不存在或不屬於本店</div>';
    } else {
      html += '<table>';
      html += '<thead><tr>';
      html += '<th>編號</th><th>商品</th><th class="r">數量</th>';
      html += '<th class="r">單價</th><th class="r">小計</th><th class="c">動作</th>';
      html += '</tr></thead>';
      html += '<tbody>';
      var isReturnOrder = isLegacy && o.order_type === 'return';
      for (var i = 0; i < items.length; i++) {
        var it = items[i];
        // 過濾掉舊資料的 'none' / 'NULL' / 空白等無意義值
        var rsRaw = String(it.return_status || '').trim();
        var rsLow = rsRaw.toLowerCase();
        var rsValid = rsRaw && rsRaw !== '無' && rsLow !== 'none' && rsLow !== 'null';
        // RT 退貨單整張就是退貨，明細不重複標「↳ 退貨」
        var hasReturn = rsValid && !isReturnOrder;
        html += '<tr' + (hasReturn ? ' class="return-row"' : '') + '>';
        html += '<td style="font-family:monospace;font-size:12px;">' + escHtml(it.product_id) + '</td>';
        html += '<td>' + escHtml(it.product_name);
        if (hasReturn) {
          html += '<br/><small style="color:#c62828;">↳ '
               + escHtml(translateReportType(it.report_type)) + ' x' + (it.return_qty || 0)
               + '（' + escHtml(translateReturnStatus(it.return_status)) + '）</small>';
          if (it.return_reason) {
            html += '<br/><small style="color:#555;">原因：' + escHtml(it.return_reason) + '</small>';
          }
          if (it.admin_response) {
            html += '<br/><small style="color:#555;">admin：' + escHtml(it.admin_response) + '</small>';
          }
        }
        html += '</td>';
        html += '<td class="r">' + (it.qty || 0) + '</td>';
        html += '<td class="r">$' + (Number(it.unit_price) || 0).toLocaleString() + '</td>';
        html += '<td class="r">$' + (Number(it.subtotal)   || 0).toLocaleString() + '</td>';
        html += '<td class="c">';
        if (isLegacy) {
          // 舊單唯讀，不能退貨
          html += '<small style="color:#999;">-</small>';
        } else if (isDraft) {
          // ⚡ 任務 4.1 C 段：暫存單禁用退貨
          html += '<small style="color:#bf360c;" title="暫存單尚未確認，無法申請退貨">⏳ 暫存中</small>';
        } else if (!hasReturn && (it.qty || 0) > 0 && (o.status === '已建單' || o.status === '有問題')) {
          html += '<button class="btn-return" onclick="openReturnForm(' + i + ')">📤 退貨</button>';
        } else if (hasReturn) {
          html += '<small style="color:#c62828;">已申請</small>';
        } else if (o.status === '已收到') {
          html += '<small style="color:#999;">已收貨</small>';
        } else {
          html += '<small style="color:#999;">-</small>';
        }
        html += '</td>';
        html += '</tr>';

        // 退貨表單行（預設隱藏）
        html += '<tr id="return-form-' + i + '" class="return-form-row" style="display:none;">';
        html += '<td colspan="6">';
        html += '<div class="return-form-title">📤 申請退貨：' + escHtml(it.product_name) + '（訂購 ' + (it.qty || 0) + '）</div>';
        html += '<div class="return-form-grid">';
        html += '<label>類型</label>';
        html += '<select id="rf-type-' + i + '">';
        html +=   '<option value="損">損 — 商品損壞</option>';
        html +=   '<option value="少">少 — 數量不足</option>';
        html +=   '<option value="缺">缺 — 完全沒到</option>';
        html +=   '<option value="退">退 — 不需要</option>';
        html += '</select>';
        html += '<label>數量</label>';
        html += '<input type="number" id="rf-qty-' + i + '" min="1" max="' + (it.qty || 1) + '" step="1" value="' + (it.qty || 1) + '"/>';
        html += '<label>原因</label>';
        html += '<textarea id="rf-reason-' + i + '" placeholder="說明退貨原因（admin 處理時會看，請盡量填寫）"></textarea>';
        html += '</div>';
        html += '<div class="return-form-actions">';
        html += '<button class="btn-cancel" onclick="closeReturnForm(' + i + ')">✕ 取消</button>';
        html += '<button class="btn-submit" onclick="doSubmitReturn(' + i + ')">✅ 送出申請</button>';
        html += '</div>';
        html += '</td>';
        html += '</tr>';
      }
      html += '</tbody></table>';
    }

    html += '<div class="actions">';
    if (isLegacy) {
      // 舊單沒有底部操作按鈕
      html += '<div class="info-warning" style="flex:1;margin-bottom:0;">📜 歷史單僅供對帳查閱</div>';
    } else if (isDraft) {
      // ⚡ 任務 4.1 C 段：暫存單鎖所有操作
      html += '<div class="draft-locked">✋ 暫存單尚未確認，待撿貨員按「確認送出」後才能操作</div>';
    } else if (o.status === '已建單') {
      html += '<button class="btn-confirm" onclick="doConfirm()">✅ 確認收貨</button>';
    } else if (o.status === '已收到') {
      html += '<button class="btn-revoke" onclick="doRevoke()">↩️ 撤銷收貨</button>';
    } else if (o.status === '有問題') {
      html += '<div class="info-warning" style="flex:1;margin-bottom:0;">退貨處理中，需先處理完退貨才能確認收貨</div>';
    } else if (o.status === '待處理') {
      html += '<div class="info-warning" style="flex:1;margin-bottom:0;">尚未建單完成，請等撿貨員處理</div>';
    }
    html += '</div>';

    document.getElementById('content').innerHTML = html;
  }

  function doConfirm() {
    if (!currentOrder) return;
    if (!confirm('確定要標記「' + currentOrder.order_no + '」已收到貨品嗎？')) return;
    setButtonsDisabled(true);
    setStatus('傳送中...', 'info');
    google.script.run
      .withSuccessHandler(function (json) {
        var r; try { r = JSON.parse(json); } catch (e) { r = {}; }
        if (r && r.success) { pendingSuccessMsg = '✅ 已確認收貨'; load(); }
        else { setStatus('❌ ' + (r && r.error ? r.error : '失敗'), 'error'); setButtonsDisabled(false); }
      })
      .withFailureHandler(function (err) {
        setStatus('❌ ' + err.message, 'error');
        setButtonsDisabled(false);
      })
      .confirmReceivedFromSidebar(currentOrder.order_no);
  }

  function doRevoke() {
    if (!currentOrder) return;
    if (!confirm('確定要撤銷「' + currentOrder.order_no + '」的收貨確認嗎？')) return;
    setButtonsDisabled(true);
    setStatus('傳送中...', 'info');
    google.script.run
      .withSuccessHandler(function (json) {
        var r; try { r = JSON.parse(json); } catch (e) { r = {}; }
        if (r && r.success) { pendingSuccessMsg = '✅ 已撤銷收貨'; load(); }
        else { setStatus('❌ ' + (r && r.error ? r.error : '失敗'), 'error'); setButtonsDisabled(false); }
      })
      .withFailureHandler(function (err) {
        setStatus('❌ ' + err.message, 'error');
        setButtonsDisabled(false);
      })
      .revokeReceivedFromSidebar(currentOrder.order_no);
  }

  function openReturnForm(idx) {
    var row = document.getElementById('return-form-' + idx);
    if (row) {
      row.style.display = '';
      var qtyEl = document.getElementById('rf-qty-' + idx);
      if (qtyEl) { qtyEl.focus(); qtyEl.select(); }
    }
  }

  function closeReturnForm(idx) {
    var row = document.getElementById('return-form-' + idx);
    if (row) row.style.display = 'none';
  }

  function doSubmitReturn(idx) {
    var it = currentItems[idx];
    if (!it) return;

    var typeEl   = document.getElementById('rf-type-' + idx);
    var qtyEl    = document.getElementById('rf-qty-' + idx);
    var reasonEl = document.getElementById('rf-reason-' + idx);
    if (!typeEl || !qtyEl || !reasonEl) return;

    var reportType = typeEl.value;
    var returnQty  = parseInt(qtyEl.value, 10);
    var reason     = (reasonEl.value || '').trim();

    // 前端驗證
    if (['少','損','缺','退'].indexOf(reportType) < 0) {
      alert('請選擇退貨類型'); return;
    }
    if (isNaN(returnQty) || returnQty < 1) {
      alert('退貨數量必須是 >= 1 的整數'); qtyEl.focus(); return;
    }
    var maxQty = it.qty || 0;
    if (returnQty > maxQty) {
      alert('退貨數量不能超過訂購量（' + maxQty + '）'); qtyEl.focus(); return;
    }
    if (returnQty !== Number(qtyEl.value) || qtyEl.value.indexOf('.') >= 0) {
      alert('退貨數量必須是整數'); qtyEl.focus(); return;
    }

    var msg = '確定要申請退貨嗎？\n\n'
            + '商品：' + it.product_name + '\n'
            + '類型：' + reportType + '\n'
            + '數量：' + returnQty + ' / ' + maxQty + '\n'
            + '原因：' + (reason || '（未填寫）') + '\n\n'
            + '⚠️ 申請送出後無法撤回，須由 admin 處理（同意 / 拒絕 / 已收到 / 免退）';
    if (!confirm(msg)) return;

    setButtonsDisabled(true);
    setStatus('退貨申請傳送中...', 'info');
    google.script.run
      .withSuccessHandler(function (json) {
        var r; try { r = JSON.parse(json); } catch (e) { r = {}; }
        if (r && r.success) {
          pendingSuccessMsg = '✅ 退貨申請已送出，等待 admin 處理';
          load(); // reload 整個 dialog，會看到該筆變成「已申請」狀態
        } else {
          setStatus('❌ ' + (r && r.error ? r.error : '申請失敗'), 'error');
          setButtonsDisabled(false);
        }
      })
      .withFailureHandler(function (err) {
        setStatus('❌ ' + err.message, 'error');
        setButtonsDisabled(false);
      })
      .submitReturnFromSidebar(currentOrder.order_no, it.detail_id, returnQty, reason, reportType);
  }

  function setButtonsDisabled(b) {
    var btns = document.querySelectorAll('button');
    for (var i = 0; i < btns.length; i++) btns[i].disabled = !!b;
  }

  // 舊系統 sales_details 用英文字串存退貨類型 / 狀態，這裡翻譯成中文顯示
  // 新系統值已是中文，會直接 fallback 回原值（不會被誤翻）
  function translateReportType(t) {
    var s = String(t || '').toLowerCase();
    if (s === 'return')   return '退';
    if (s === 'shortage' || s === 'short') return '少';
    if (s === 'damaged'  || s === 'damage') return '損';
    if (s === 'missing')  return '缺';
    return t || '';
  }
  function translateReturnStatus(s) {
    var x = String(s || '').toLowerCase();
    if (x === 'requested')  return '申請中';
    if (x === 'accepted')   return '已同意';
    if (x === 'rejected')   return '已拒絕';
    if (x === 'received')   return '已收到';
    if (x === 'waived')     return '免退';
    if (x === 'processing') return '處理中';
    return s || '';
  }

  function escHtml(s) {
    if (s === null || s === undefined) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function formatTs(ts) {
    try {
      var d = new Date(ts);
      var pad = function (n) { return n < 10 ? '0' + n : n; };
      return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate())
           + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    } catch (e) { return ts; }
  }

  load();
</script>
</body>
</html>
