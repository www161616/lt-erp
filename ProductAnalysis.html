<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <title>商品銷售分析</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="libs/sweetalert2.min.js"></script>
  <style>
    :root {
      --bg: #f8f9fb;
      --surface: #ffffff;
      --border: #e2e8f0;
      --accent: #475569;
      --accent-hover: #334155;
      --accent-light: #e2e8f0;
      --accent-glow: rgba(71,85,105,0.12);
      --text: #1e293b;
      --text2: #64748b;
      --danger: #c53030;
      --warning: #b7791f;
      --blue: #0e7490;
      --shadow: 0 2px 12px rgba(30,41,59,0.07);
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans TC', 'Microsoft JhengHei', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 22px 18px;
    }

    .container {
      background: var(--surface);
      padding: 26px 28px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      max-width: 920px;
      margin: 0 auto;
      border: 1px solid var(--border);
    }

    /* ── 標題 ── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--accent);
    }

    .page-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon {
      width: 42px; height: 42px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 3px 10px rgba(71,85,105,0.35);
    }

    .page-header h2 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }

    .page-header p {
      font-size: 12px;
      color: var(--text2);
      margin-top: 2px;
    }

    /* ── 控制列 ── */
    .controls {
      display: flex;
      gap: 14px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .input-group { display: flex; flex-direction: column; gap: 5px; }

    .input-group label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="date"] {
      padding: 9px 12px;
      font-size: 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: #fafafa;
      color: var(--text);
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="date"]:focus {
      border-color: var(--accent);
      background: #fff;
      outline: none;
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* ── 按鈕 ── */
    .btn-group { display: flex; gap: 10px; }

    .btn {
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.18s;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .btn-search {
      background: var(--accent);
      color: white;
      box-shadow: 0 2px 8px rgba(71,85,105,0.28);
    }
    .btn-search:hover { background: var(--accent-hover); transform: translateY(-1px); }

    .btn-export {
      background: #fff;
      color: var(--accent);
      border: 1.5px solid var(--accent);
      display: none;
    }
    .btn-export:hover {
      background: var(--accent);
      color: #fff;
      transform: translateY(-1px);
    }

    /* ── 摘要列 ── */
    .summary-bar {
      display: none;
      background: var(--accent-light);
      border: 1px solid rgba(71,85,105,0.2);
      padding: 14px 20px;
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
      gap: 30px;
      flex-wrap: wrap;
    }

    .summary-item { display: flex; flex-direction: column; gap: 2px; }

    .summary-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .summary-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
    }

    /* ── 結果列表 ── */
    .list-header {
      display: flex;
      padding: 10px 14px;
      background: #f1f5f9;
      font-size: 11px;
      font-weight: 700;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      border: 1.5px solid var(--border);
      border-bottom: none;
    }

    .list-body {
      max-height: 520px;
      overflow-y: auto;
      border: 1.5px solid var(--border);
      border-radius: 0 0 var(--radius-sm) var(--radius-sm);
    }

    .item {
      display: flex;
      padding: 13px 14px;
      border-bottom: 1px solid var(--border);
      align-items: center;
      transition: background 0.15s;
    }

    .item:last-child { border-bottom: none; }
    .item:nth-child(even) { background: #fafafa; }
    .item:hover { background: var(--accent-light); }

    /* 欄位寬度 */
    .col-rank  { width: 52px; text-align: center; }
    .col-info  { flex: 1; padding-right: 12px; }
    .col-qty   { width: 110px; text-align: right; }
    .col-profit{ width: 130px; text-align: right; }

    /* 排名徽章 */
    .rank-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px; height: 28px;
      border-radius: 50%;
      font-size: 13px;
      font-weight: 700;
    }

    .rank-1 { background: #FFD700; color: #7a5c00; }
    .rank-2 { background: #C0C0C0; color: #555; }
    .rank-3 { background: #CD7F32; color: #5a3000; }
    .rank-other { background: var(--accent-light); color: var(--accent); font-size: 12px; }

    /* 商品資訊 */
    .prod-meta {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 3px;
    }

    .prod-id {
      font-size: 11px;
      color: var(--text2);
    }

    .prod-cat {
      font-size: 11px;
      background: var(--border);
      color: var(--text2);
      padding: 2px 7px;
      border-radius: 4px;
      font-weight: 600;
    }

    .prod-name {
      font-size: 15px;
      color: var(--text);
      font-weight: 600;
    }

    /* 數字欄 */
    .qty-main  { font-size: 14px; font-weight: 600; color: var(--blue); }
    .qty-sub   { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .profit-main { font-size: 14px; font-weight: 700; color: var(--accent); }
    .profit-rate { font-size: 12px; margin-top: 2px; }

    /* ── Loading ── */
    .loader {
      display: none;
      text-align: center;
      padding: 36px;
    }

    .loader .spinner {
      width: 38px; height: 38px;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    .loader p { font-size: 14px; color: var(--text2); }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="container">

  <!-- 標題 -->
  <div class="page-header">
    <div class="page-header-left">
      <div class="header-icon">📦</div>
      <div>
        <h2>商品銷售分析</h2>
        <p>依日期區間彙整銷量、銷售額與毛利排行</p>
      </div>
    </div>
    <div class="btn-group">
      <button class="btn btn-export" id="btnExport" onclick="exportCSV()">📥 匯出 CSV</button>
    </div>
  </div>

  <!-- 控制列 -->
  <div class="controls">
    <div class="input-group">
      <label>開始日期</label>
      <input type="date" id="dateFrom">
    </div>
    <div class="input-group">
      <label>結束日期</label>
      <input type="date" id="dateTo">
    </div>
    <button class="btn btn-search" onclick="analyze()">📊 開始分析</button>
  </div>

  <!-- 摘要列 -->
  <div id="summaryBar" class="summary-bar">
    <div class="summary-item">
      <span class="summary-label">總銷售額</span>
      <span class="summary-value" id="sumRevenue">$0</span>
    </div>
    <div class="summary-item">
      <span class="summary-label">總毛利</span>
      <span class="summary-value" id="sumProfit">$0</span>
    </div>
    <div class="summary-item">
      <span class="summary-label">平均毛利率</span>
      <span class="summary-value" id="sumMargin">0%</span>
    </div>
    <div class="summary-item">
      <span class="summary-label">商品種類</span>
      <span class="summary-value" id="sumProducts">0</span>
    </div>
  </div>

  <!-- Loading -->
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <p>分析中，請稍候...</p>
  </div>

  <!-- 結果 -->
  <div id="resultContainer" style="display:none;">
    <div class="list-header">
      <div class="col-rank">排名</div>
      <div class="col-info">商品資訊</div>
      <div class="col-qty">銷量 / 銷售額</div>
      <div class="col-profit">毛利 / 毛利率</div>
    </div>
    <div class="list-body" id="resultList"></div>
  </div>

</div>

<script>
  // ========== 1. Supabase API 設定 ==========
  const SB_URL = 'https://asugjynpocwygggttxyo.supabase.co/rest/v1';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzdWdqeW5wb2N3eWdnZ3R0eHlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNzU3MjksImV4cCI6MjA4ODk1MTcyOX0.LzcRQAl80rZxKKD8NIYWGvylfwCbs1ek5LtKpmZodBc';
    const AUTH_TOKEN = sessionStorage.getItem('sb_auth_token') || SB_KEY;
  const HEADERS = {
    'apikey': SB_KEY,
    'Authorization': `Bearer ${AUTH_TOKEN}`,
    'Content-Type': 'application/json'
  };

  let currentData = [];

  // ========== 2. 初始化日期 ==========
  window.onload = function() {
    const now = new Date();
    const yyyy = now.getFullYear();
    const mm = String(now.getMonth() + 1).padStart(2, '0');
    document.getElementById('dateFrom').value = `${yyyy}-${mm}-01`;
    document.getElementById('dateTo').value = now.toISOString().split('T')[0];
  };

  // ========== 3. 主分析函式 (改呼叫強大的 SQL 函數) ==========
  async function analyze() {
    const dateFrom = document.getElementById('dateFrom').value;
    const dateTo   = document.getElementById('dateTo').value;
    if (!dateFrom || !dateTo) { Swal.fire({ icon:'warning', title:'請選擇日期範圍' }); return; }

    // 重置 UI
    document.getElementById('loader').style.display = 'block';
    document.getElementById('resultContainer').style.display = 'none';
    document.getElementById('summaryBar').style.display = 'none';
    document.getElementById('btnExport').style.display = 'none';
    document.getElementById('resultList').innerHTML = '';
    currentData = [];

    try {
      // 傳送日期給 Supabase，讓資料庫負責加總運算 (突破 1000 筆限制，且毛利絕對正確)
      const res = await fetch(`${SB_URL}/rpc/web_get_product_analysis`, {
        method: 'POST',
        headers: HEADERS,
        body: JSON.stringify({ p_date_from: dateFrom, p_date_to: dateTo })
      });

      if (!res.ok) {
        const e = await res.json().catch(() => ({}));
        throw new Error(e.message || `HTTP ${res.status}`);
      }

      const rawData = await res.json();

      // 計算毛利率並整理資料
      currentData = rawData.map(p => {
        const revenue = Number(p.total_revenue) || 0;
        const profit = Number(p.total_profit) || 0;
        const profitRate = revenue > 0 ? parseFloat(((profit / revenue) * 100).toFixed(1)) : 0;
        return {
          productId: p.product_id,
          productName: p.product_name,
          category: p.category,
          unit: p.unit,
          qty: Number(p.total_qty) || 0,
          revenue: revenue,
          profit: profit,
          profitRate: profitRate
        };
      });

      display(currentData);
    } catch (e) {
      Swal.fire({ icon:'error', title:'讀取失敗', text: e.message });
    } finally {
      document.getElementById('loader').style.display = 'none';
    }
  }

  // ========== 4. 渲染結果 (保留原版優美 UI) ==========
  function display(data) {
    if (data.length === 0) {
      document.getElementById('resultList').innerHTML =
        '<p style="text-align:center;padding:30px;color:var(--text2);">查無資料</p>';
      document.getElementById('resultContainer').style.display = 'block';
      return;
    }

    // KPI 加總
    const totalRevenue = data.reduce((s, d) => s + d.revenue, 0);
    const totalProfit  = data.reduce((s, d) => s + d.profit, 0);
    const avgMargin    = totalRevenue > 0
      ? ((totalProfit / totalRevenue) * 100).toFixed(1)
      : '0.0';

    document.getElementById('sumRevenue').textContent  = 'NT$' + Math.round(totalRevenue).toLocaleString();
    document.getElementById('sumProfit').textContent   = 'NT$' + Math.round(totalProfit).toLocaleString();
    document.getElementById('sumMargin').textContent   = avgMargin + '%';
    document.getElementById('sumProducts').textContent = data.length + ' 種';
    document.getElementById('summaryBar').style.display = 'flex';

    // 列表 HTML
    const html = data.map((item, i) => {
      const rank = i + 1;
      const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-other';
      const rateColor = item.profitRate < 0 ? 'color:var(--danger);'
                      : item.profitRate < 20 ? 'color:var(--warning);'
                      : 'color:var(--accent);';

      return `
        <div class="item">
          <div class="col-rank">
            <span class="rank-badge ${rankClass}">${rank}</span>
          </div>
          <div class="col-info">
            <div class="prod-meta">
              <span class="prod-cat">${item.category}</span>
              <span class="prod-id">${item.productId}</span>
            </div>
            <span class="prod-name">${item.productName}</span>
          </div>
          <div class="col-qty">
            <div class="qty-main">${item.qty.toLocaleString()} ${item.unit}</div>
            <div class="qty-sub">NT$${Math.round(item.revenue).toLocaleString()}</div>
          </div>
          <div class="col-profit">
            <div class="profit-main">NT$${Math.round(item.profit).toLocaleString()}</div>
            <div class="profit-rate" style="${rateColor}font-weight:600;">${item.profitRate}%</div>
          </div>
        </div>
      `;
    }).join('');

    document.getElementById('resultList').innerHTML = html;
    document.getElementById('resultContainer').style.display = 'block';
    document.getElementById('btnExport').style.display = 'inline-flex';
  }

  // ========== 5. 匯出 CSV ==========
  function exportCSV() {
    if (currentData.length === 0) { Swal.fire({ icon:'warning', title:'無資料可匯出' }); return; }

    let csv = '\uFEFF'; // BOM
    csv += '排名,類別,商品編號,商品名稱,數量,單位,銷售額,毛利,毛利率\n';

    currentData.forEach((item, i) => {
      const safeName = `"${item.productName.replace(/"/g, '""')}"`;
      csv += [
        i + 1,
        item.category,
        item.productId,
        safeName,
        item.qty,
        item.unit,
        Math.round(item.revenue),
        Math.round(item.profit),
        item.profitRate + '%'
      ].join(',') + '\n';
    });

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const link = document.createElement('a');
    const dFrom = document.getElementById('dateFrom').value;
    const dTo   = document.getElementById('dateTo').value;
    link.href     = url;
    link.download = `商品分析_${dFrom}_${dTo}.csv`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }
</script>
</body>
</html>
