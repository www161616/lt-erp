<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>龍潭進銷存系統 - 簡易月結報表</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    /* ========== 石板灰護眼主題 ========== */
    :root {
      --bg: #f8f9fb;             
      --surface: #ffffff;        
      --surface2: #f1f5f9;       
      --border: #e2e8f0;         
      --accent: #475569;         /* 石板灰 */
      --text: #1e293b;           
      --text2: #64748b;          
      --sales: #0e7490;          /* 藍色代表收入 */
      --purchase: #c53030;       /* 紅色代表進貨支出 */
      --expense: #c05621;        /* 橘色代表費用 */
      --meal: #553c9a;           /* 紫色代表餐費 */
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      font-family: 'Noto Sans TC', system-ui, -apple-system, sans-serif; 
      font-size: 14px; 
      padding: 24px; 
      background: var(--bg); 
      color: var(--text);
    }
    
    /* 頂部控制列 */
    .header-box { 
      background: var(--surface); 
      padding: 20px 24px; 
      border-radius: 8px; 
      box-shadow: 0 2px 12px rgba(30,41,59,0.07); 
      margin-bottom: 24px; 
      display: flex; 
      align-items: center; 
      gap: 16px;
      border-top: 4px solid var(--accent);
    }
    
    h2 { color: var(--accent); margin: 0; flex-grow: 1; font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    
    input[type="month"] { 
      padding: 10px 16px; border: 1px solid var(--border); border-radius: 6px; 
      font-size: 15px; outline: none; font-family: inherit; color: var(--text);
    }
    input[type="month"]:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(71,85,105,0.1); }
    
    .btn { 
      padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; 
      font-weight: 700; font-size: 14px; font-family: inherit; transition: 0.2s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn:active { transform: translateY(1px); }
    
    .btn-query { background: var(--accent); color: white; }
    .btn-query:hover { background: #334155; }
    
    .btn-export { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-export:hover { background: #e2e8f0; }
    .btn-export:disabled { background: var(--bg); color: var(--text2); cursor: not-allowed; }
    
    .btn-print { background: var(--text2); color: white; }
    .btn-print:hover { background: #7a7e85; }
    
    /* 四大卡片區塊 */
    .summary-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    
    .card {
      background: var(--surface); padding: 20px; border-radius: 8px; 
      box-shadow: 0 2px 8px rgba(30,41,59,0.07); border-top: 4px solid var(--border);
    }
    
    .card-title { font-size: 13px; color: var(--text2); margin-bottom: 8px; font-weight: 600; display: flex; justify-content: space-between;}
    .card-value { font-size: 28px; font-weight: 700; margin-bottom: 4px; font-family: monospace; }
    .card-count { font-size: 12px; color: var(--text2); }
    
    .card-sales { border-color: var(--sales); }
    .card-sales .card-value { color: var(--sales); }
    
    .card-purchase { border-color: var(--purchase); }
    .card-purchase .card-value { color: var(--purchase); }
    
    .card-expense { border-color: var(--expense); }
    .card-expense .card-value { color: var(--expense); }
    
    .card-meal { border-color: var(--meal); }
    .card-meal .card-value { color: var(--meal); }
    
    /* 損益卡片 */
    .profit-card {
      background: var(--surface); padding: 30px; border-radius: 8px; 
      box-shadow: 0 4px 16px rgba(30,41,59,0.07); margin-bottom: 24px; text-align: center;
      border: 1px solid var(--border);
    }
    
    .profit-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 12px; }
    .profit-value { font-size: 48px; font-weight: 700; margin-bottom: 12px; font-family: monospace; line-height: 1; }
    .profit-positive { color: var(--sales); }
    .profit-negative { color: var(--purchase); }
    
    .profit-formula { font-size: 14px; color: var(--text2); font-weight: 500; background: var(--surface2); display: inline-block; padding: 8px 16px; border-radius: 20px;}
    
    /* 明細表格區塊 */
    .section { background: var(--surface); padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(30,41,59,0.07); margin-bottom: 24px; }
    .section-header { margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid var(--border); }
    .section-title { font-size: 16px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 6px;}
    
    table { width: 100%; border-collapse: collapse; }
    th { background: var(--surface2); color: var(--text2); padding: 12px 16px; text-align: left; font-weight: 700; border-bottom: 1px solid var(--border); font-size: 13px; }
    td { padding: 12px 16px; border-bottom: 1px solid var(--border); color: var(--text); font-size: 13px; vertical-align: middle; }
    tr:hover { background: #fafafa; }
    
    .total-row { background: var(--surface2); font-weight: 700; font-size: 15px; }
    .text-right { text-align: right; font-family: monospace; font-size: 14px; }
    
    .loading { text-align: center; padding: 60px; color: var(--accent); font-size: 18px; font-weight: 700; }
    .empty-state { text-align: center; padding: 60px; color: var(--text2); font-size: 16px; border: 2px dashed var(--border); border-radius: 8px; background: var(--surface); }

    /* 列印樣式 */
    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      body { background: white; padding: 10px 15px; }
      .print-header { display: block !important; }
      .header-box { box-shadow: none; border: 1px solid #000; border-top: 1px solid #000; }
      .btn { display: none !important; }
      .summary-cards { grid-template-columns: repeat(4, 1fr); gap: 10px; }
      .card, .profit-card, .section { box-shadow: none; border: 1px solid #333; page-break-inside: avoid; padding: 15px; }
      .profit-formula { border: 1px solid #ccc; }
      th { background: #eee !important; color: #000; border-bottom: 2px solid #000; }
      td { border-bottom: 1px solid #ccc; }
    }
    .print-header { display: none; }

    @media (max-width: 1024px) {
      .summary-cards { grid-template-columns: repeat(2, 1fr); }
      .header-box { flex-wrap: wrap; }
      .btn { flex: 1; justify-content: center; }
    }
  </style>
</head>
<body>

  <div class="print-header" style="text-align:center; margin-bottom:16px;">
    <div style="font-size:22px; font-weight:bold; margin-bottom:6px;">丸十水產股份有限公司</div>
    <div style="font-size:15px; letter-spacing:8px;">簡 易 月 結 報 表（龍潭總倉）</div>
  </div>

  <div class="header-box">
    <h2>📊 簡易月結報表</h2>
    <input type="month" id="monthInput">
    <button class="btn btn-query" onclick="fetchData()">🔍 產生報表</button>
    <button id="exportBtn" class="btn btn-export" onclick="exportToExcel()" disabled>📥 匯出 Excel</button>
    <button class="btn btn-print" onclick="window.print()">🖨️ 列印此頁</button>
  </div>

  <div id="reportArea">
    <div class="empty-state">👆 請選擇月份並點擊產生報表</div>
  </div>

  <script>
    // ========== 1. Supabase API 設定 ==========
    const SB_URL = 'https://gkuwoandmsgvlsxzmrjj.supabase.co/rest/v1';
    const SB_KEY = 'sb_publishable_7K0w9Z8-Wv1dOgLsZkI0rA_WfNei_AS'; 
    const AUTH_TOKEN = sessionStorage.getItem('sb_auth_token') || SB_KEY;
    const HEADERS = {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${AUTH_TOKEN}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };

    let currentData = null;
    let currentMonth = '';
    
    window.onload = function() {
      const today = new Date();
      // 處理時區，確保顯示正確的當地月份
      const offset = today.getTimezoneOffset() * 60000;
      const localMonth = (new Date(today - offset)).toISOString().substring(0, 7);
      document.getElementById('monthInput').value = localMonth;
    };

    // ========== 2. 獲取資料 (GET) ==========
    async function fetchData() {
      const monthVal = document.getElementById('monthInput').value;
      if (!monthVal) {
        Swal.fire('提示', '請先選擇月份', 'warning');
        return;
      }
      
      currentMonth = monthVal;
      const area = document.getElementById('reportArea');
      area.innerHTML = '<div class="loading">🔄 正在匯總各項數據，請稍候...</div>';
      document.getElementById('exportBtn').disabled = true;

      // 計算月份的起迄日期
      const [year, month] = monthVal.split('-');
      const startDate = `${year}-${month}-01`;
      const lastDay = new Date(year, month, 0).getDate();
      const endDate = `${year}-${month}-${lastDay}`;

      try {
        // 🔥 無敵防呆版：全部改用 select=*，並支援多種常見欄位命名
        const [salesRes, purRes, expRes, mealRes] = await Promise.all([
          fetch(`${SB_URL}/sales_orders?order_date=gte.${startDate}&order_date=lte.${endDate}&select=*&order=order_date.asc`, { headers: HEADERS }),
          fetch(`${SB_URL}/purchase_orders?order_date=gte.${startDate}&order_date=lte.${endDate}&select=*&order=order_date.asc`, { headers: HEADERS }),
          fetch(`${SB_URL}/expenses?expense_date=gte.${startDate}&expense_date=lte.${endDate}&select=*&order=expense_date.asc`, { headers: HEADERS }),
          fetch(`${SB_URL}/employee_meals?meal_date=gte.${startDate}&meal_date=lte.${endDate}&select=*&order=meal_date.asc`, { headers: HEADERS })
        ]);

        if (!salesRes.ok || !purRes.ok || !expRes.ok || !mealRes.ok) throw new Error('部分資料表讀取失敗 (請檢查欄位名稱)');

        // 解析 JSON

        if (!salesRes.ok || !purRes.ok || !expRes.ok || !mealRes.ok) throw new Error('部分資料表讀取失敗');

        // 解析 JSON
        const rawSales = await salesRes.json();
        const rawPurchase = await purRes.json();
        const rawExpense = await expRes.json();
        const rawMeal = await mealRes.json();

        // 整理資料並計算總額
        let totalSales = 0, totalPurchase = 0, totalExpense = 0, totalMeal = 0;

        const salesList = rawSales.map(s => {
          // 自動抓取可能是 grand_total 或 total_amount 的欄位
          const amt = Number(s.grand_total || s.total_amount || s.total || 0);
          totalSales += amt;
          // 簡易判斷已收/未收 (基於狀態，因為沒有串 accounts_receivable，這裡做展示用推算)
          let paid = 0, unpaid = amt;
          let color = 'red';
          if(s.payment_status === '已收款') { paid = amt; unpaid = 0; color = 'green'; }
          
          return {
            customerName: s.customer_name || '未知',
            date: s.order_date,
            orderId: s.id,
            amount: amt,
            paidAmount: paid,
            unpaidAmount: unpaid,
            note: s.payment_status + (s.note ? ` / ${s.note}` : ''),
            statusColor: color
          };
        });

        // 🔥 防呆：進貨表可能沒有 supplier_name，這裡盡可能呈現
        const purchaseList = rawPurchase.map(p => {
          // 自動抓取可能是 total_amount 或 grand_total 的欄位
          const amt = Number(p.total_amount || p.grand_total || p.total || 0);
          totalPurchase += amt;
          return {
            supplierName: p.supplier_id || '未知供應商',
            date: p.order_date,
            orderId: p.id,
            amount: amt,
            note: p.note || ''
          };
        });

        const expenseList = rawExpense.map(e => {
          const amt = Number(e.amount || 0);
          totalExpense += amt;
          return {
            date: e.expense_date,
            category: e.category,
            item: e.item,
            payee: e.payee || '',
            amount: amt,
            paymentMethod: e.payment_method || ''
          };
        });

        // 🔥 防呆：容錯處理 meal 表 (可能未建立)
        const mealList = Array.isArray(rawMeal) ? rawMeal.map(m => {
          const amt = Number(m.amount || 0);
          totalMeal += amt;
          return {
            date: m.meal_date,
            headcount: m.headcount || 0,
            amount: amt,
            paymentMethod: m.payment_method || '',
            note: m.note || ''
          };
        }) : [];

        currentData = {
          success: true,
          totals: { sales: totalSales, purchase: totalPurchase, expense: totalExpense, meals: totalMeal },
          salesList, purchaseList, expenseList, mealList
        };

        renderReport(currentData);

      } catch (error) {
        area.innerHTML = `<div style="text-align:center; padding:40px; color:var(--danger); border: 2px dashed var(--danger); border-radius: 8px;">❌ 查詢失敗：<br>${error.message}</div>`;
      }
    }

    // ========== 3. 渲染報表畫面 ==========
    function renderReport(data) {
      const area = document.getElementById('reportArea');
      document.getElementById('exportBtn').disabled = false;
      
      const profit = data.totals.sales - data.totals.purchase - data.totals.expense - data.totals.meals;
      const profitClass = profit >= 0 ? 'profit-positive' : 'profit-negative';
      const profitIcon = profit >= 0 ? '📈' : '📉';
      
      let html = '';
      
      // 1. 四大卡片
      html += '<div class="summary-cards">';
      html += `
        <div class="card card-sales">
          <div class="card-title"><span>💰 銷貨收入</span><span>(1)</span></div>
          <div class="card-value">$${data.totals.sales.toLocaleString()}</div>
          <div class="card-count">本月共成立 ${data.salesList.length} 筆訂單</div>
        </div>
        <div class="card card-purchase">
          <div class="card-title"><span>📦 進貨成本</span><span>(2)</span></div>
          <div class="card-value">$${data.totals.purchase.toLocaleString()}</div>
          <div class="card-count">本月共紀錄 ${data.purchaseList.length} 筆進貨</div>
        </div>
        <div class="card card-expense">
          <div class="card-title"><span>💸 雜項費用</span><span>(3)</span></div>
          <div class="card-value">$${data.totals.expense.toLocaleString()}</div>
          <div class="card-count">本月共報支 ${data.expenseList.length} 筆費用</div>
        </div>
        <div class="card card-meal">
          <div class="card-title"><span>🍱 員工餐費</span><span>(4)</span></div>
          <div class="card-value">$${data.totals.meals.toLocaleString()}</div>
          <div class="card-count">本月共紀錄 ${data.mealList.length} 筆餐費</div>
        </div>
      `;
      html += '</div>';
      
      // 2. 損益卡片
      html += `
        <div class="profit-card">
          <div class="profit-title">${profitIcon} 本月粗估淨利 (損益)</div>
          <div class="profit-value ${profitClass}">$${profit.toLocaleString()}</div>
          <div class="profit-formula">
            算式： 銷貨 $${data.totals.sales.toLocaleString()} - 進貨 $${data.totals.purchase.toLocaleString()} - 費用 $${data.totals.expense.toLocaleString()} - 餐費 $${data.totals.meals.toLocaleString()}
          </div>
        </div>
      `;
      
      // 3. 銷貨明細
      html += '<div class="section">';
      html += '<div class="section-header"><div class="section-title" style="color:var(--sales);">💰 銷貨收入明細</div></div>';
      html += '<table><thead><tr>';
      html += '<th width="15%">客戶名稱</th><th width="12%">日期</th><th width="15%">單號</th>';
      html += '<th width="15%" class="text-right">總金額</th>';
      html += '<th width="10%" class="text-right">已收</th>';
      html += '<th width="10%" class="text-right">未收</th>';
      html += '<th width="23%">收款狀態 / 備註</th>';
      html += '</tr></thead><tbody>';

      if (data.salesList.length === 0) {
        html += '<tr><td colspan="7" style="text-align:center; color:var(--text2); padding:20px;">本月無銷貨紀錄</td></tr>';
      } else {
        data.salesList.forEach(s => {
          let statusStyle = s.statusColor === 'green' ? 'color:var(--sales); font-weight:700;' : 'color:var(--danger); font-weight:700;';
          html += `<tr>
            <td>${s.customerName}</td>
            <td>${s.date}</td>
            <td><code style="background:var(--bg); padding:2px 4px; border-radius:4px;">${s.orderId}</code></td>
            <td class="text-right" style="font-weight:700;">$${s.amount.toLocaleString()}</td>
            <td class="text-right" style="color:var(--sales);">$${s.paidAmount.toLocaleString()}</td>
            <td class="text-right" style="color:var(--danger);">$${s.unpaidAmount.toLocaleString()}</td>
            <td style="font-size:12px; ${statusStyle}">${s.note}</td>
          </tr>`;
        });
        html += `<tr class="total-row">
          <td colspan="3">銷貨總計</td>
          <td class="text-right" style="color:var(--sales); font-size:16px;">$${data.totals.sales.toLocaleString()}</td>
          <td colspan="3"></td>
        </tr>`;
      }
      html += '</tbody></table></div>';

      // 4. 進貨明細
      html += '<div class="section">';
      html += '<div class="section-header"><div class="section-title" style="color:var(--purchase);">📦 進貨成本明細</div></div>';
      html += '<table><thead><tr>';
      html += '<th width="25%">供應商</th><th width="15%">日期</th><th width="20%">單號</th><th width="15%" class="text-right">金額</th><th width="25%">備註</th>';
      html += '</tr></thead><tbody>';

      if (data.purchaseList.length === 0) {
        html += '<tr><td colspan="5" style="text-align:center; color:var(--text2); padding:20px;">本月無進貨紀錄</td></tr>';
      } else {
        data.purchaseList.forEach(p => {
          html += `<tr>
            <td>${p.supplierName}</td>
            <td>${p.date}</td>
            <td><code style="background:var(--bg); padding:2px 4px; border-radius:4px;">${p.orderId}</code></td>
            <td class="text-right" style="font-weight:700;">$${p.amount.toLocaleString()}</td>
            <td style="font-size:12px;">${p.note}</td>
          </tr>`;
        });
        html += `<tr class="total-row">
          <td colspan="3">進貨總計</td>
          <td class="text-right" style="color:var(--purchase); font-size:16px;">$${data.totals.purchase.toLocaleString()}</td>
          <td></td>
        </tr>`;
      }
      html += '</tbody></table></div>';

      // 5. 費用明細
      html += '<div class="section">';
      html += '<div class="section-header"><div class="section-title" style="color:var(--expense);">💸 費用支出明細</div></div>';
      html += '<table><thead><tr>';
      html += '<th width="15%">日期</th><th width="15%">類別</th><th width="20%">項目摘要</th><th width="15%">對象</th><th width="15%" class="text-right">金額</th><th width="20%">付款方式</th>';
      html += '</tr></thead><tbody>';

      if (data.expenseList.length === 0) {
        html += '<tr><td colspan="6" style="text-align:center; color:var(--text2); padding:20px;">本月無費用紀錄</td></tr>';
      } else {
        data.expenseList.forEach(e => {
          html += `<tr>
            <td>${e.date}</td>
            <td><span style="background:var(--surface2); padding:2px 6px; border-radius:4px; font-size:12px; border:1px solid var(--border);">${e.category}</span></td>
            <td>${e.item}</td>
            <td>${e.payee}</td>
            <td class="text-right" style="font-weight:700; color:var(--expense);">$${e.amount.toLocaleString()}</td>
            <td style="font-size:12px;">${e.paymentMethod}</td>
          </tr>`;
        });
        html += `<tr class="total-row">
          <td colspan="4">費用總計</td>
          <td class="text-right" style="color:var(--expense); font-size:16px;">$${data.totals.expense.toLocaleString()}</td>
          <td></td>
        </tr>`;
      }
      html += '</tbody></table></div>';
      
      // 6. 員工餐費明細
      html += '<div class="section">';
      html += '<div class="section-header"><div class="section-title" style="color:var(--meal);">🍱 員工餐費明細</div></div>';
      html += '<table><thead><tr>';
      html += '<th width="20%">日期</th><th width="15%" style="text-align:center;">人數</th><th width="20%" class="text-right">金額</th><th width="20%">付款方式</th><th width="25%">備註</th>';
      html += '</tr></thead><tbody>';
      
      if (data.mealList.length === 0) {
        html += '<tr><td colspan="5" style="text-align:center; color:var(--text2); padding:20px;">本月無餐費紀錄</td></tr>';
      } else {
        data.mealList.forEach(m => {
          html += `<tr>
            <td>${m.date}</td>
            <td style="text-align:center;">${m.headcount} 人</td>
            <td class="text-right" style="font-weight:700; color:var(--meal);">$${m.amount.toLocaleString()}</td>
            <td style="font-size:12px;">${m.paymentMethod}</td>
            <td style="font-size:12px; color:var(--text2);">${m.note}</td>
          </tr>`;
        });
        html += `<tr class="total-row">
          <td colspan="2">餐費總計</td>
          <td class="text-right" style="color:var(--meal); font-size:16px;">$${data.totals.meals.toLocaleString()}</td>
          <td colspan="2"></td>
        </tr>`;
      }
      html += '</tbody></table></div>';
      
      area.innerHTML = html;
    }

    // ========== 4. 匯出 Excel (CSV) ==========
    function exportToExcel() {
      if (!currentData) return;
      
      const btn = document.getElementById('exportBtn');
      btn.disabled = true;
      btn.innerText = '⏳ 匯出中...';
      
      let csv = '\uFEFF'; // BOM 解決中文亂碼
      csv += `龍潭進銷存 - 簡易月結報表 (${currentMonth})\n\n`;
      
      const profit = currentData.totals.sales - currentData.totals.purchase - currentData.totals.expense - currentData.totals.meals;
      csv += `本月粗估淨利 (損益),$${profit}\n\n`;
      
      // 銷貨
      csv += '【(1) 銷貨收入明細】\n客戶名稱,訂單日期,單號,金額,已收,未收,收款狀態與備註\n';
      [...currentData.salesList].sort((a, b) => (a.date || '').localeCompare(b.date || '')).forEach(s => {
        csv += `"${s.customerName}","${s.date}","${s.orderId}",${s.amount},${s.paidAmount},${s.unpaidAmount},"${s.note}"\n`;
      });
      csv += `,,,小計：,${currentData.totals.sales},,\n\n`;
      
      // 進貨
      csv += '【(2) 進貨成本明細】\n供應商,進貨日期,單號,金額,備註\n';
      [...currentData.purchaseList].sort((a, b) => (a.date || '').localeCompare(b.date || '')).forEach(p => csv += `"${p.supplierName}","${p.date}","${p.orderId}",${p.amount},"${p.note}"\n`);
      csv += `,,,小計：,${currentData.totals.purchase}\n\n`;
      
      // 費用
      csv += '【(3) 費用支出明細】\n日期,類別,項目,對象,金額,付款方式\n';
      [...currentData.expenseList].sort((a, b) => (a.date || '').localeCompare(b.date || '')).forEach(e => csv += `"${e.date}","${e.category}","${e.item}","${e.payee}",${e.amount},"${e.paymentMethod}"\n`);
      csv += `,,,,小計：,${currentData.totals.expense}\n\n`;
      
      // 餐費
      csv += '【(4) 員工餐費明細】\n日期,人數,金額,付款方式,備註\n';
      [...currentData.mealList].sort((a, b) => (a.date || '').localeCompare(b.date || '')).forEach(m => csv += `"${m.date}",${m.headcount},${m.amount},"${m.paymentMethod}","${m.note}"\n`);
      csv += `,,小計：,${currentData.totals.meals},\n`;
      
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.setAttribute('href', url);
      link.setAttribute('download', `月結報表_${currentMonth}.csv`);
      link.style.display = 'none';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      
      btn.disabled = false;
      btn.innerText = '📥 匯出 Excel';
    }
  </script>
