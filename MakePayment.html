<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>龍潭進銷存系統 - 供應商付款核銷</title>
  <script src="libs/sweetalert2.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ========== 石板灰護眼主題 ========== */
    :root {
      --bg: #f8f9fb;
      --surface: #ffffff;
      --surface2: #f1f5f9;
      --border: #e2e8f0;
      --accent: #475569;         /* 石板灰 */
      --accent-hover: #334155;
      --text: #1e293b;
      --text2: #64748b;
      --danger: #c53030;
      --warning: #b7791f;
      --success: #276749;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      font-family: 'Noto Sans TC', system-ui, -apple-system, sans-serif; 
      font-size: 14px; 
      padding: 20px; 
      background: var(--bg); 
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    
    .container { 
      background: var(--surface); 
      padding: 25px 30px; 
      border-radius: 8px; 
      box-shadow: 0 4px 12px rgba(30,41,59,0.07); 
      width: 100%;
      max-width: 650px; 
      border-top: 4px solid var(--accent);
    }
    
    h2 { 
      color: var(--accent); 
      font-size: 22px; 
      margin-bottom: 24px; 
      border-bottom: 2px solid var(--border);
      padding-bottom: 12px; 
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .form-group { margin-bottom: 20px; }
    label { display: block; font-weight: 700; font-size: 14px; margin-bottom: 8px; color: var(--text); }
    
    input, select { 
      width: 100%; padding: 10px 14px; font-size: 14px; border: 1px solid var(--border); 
      border-radius: 6px; background: var(--surface); color: var(--text);
      transition: all 0.2s; outline: none; font-family: inherit;
    }
    input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(71, 85, 105, 0.1); }
    
    .btn { 
      padding: 12px 24px; font-size: 15px; font-weight: 700; border: none; 
      border-radius: 6px; cursor: pointer; width: 100%; margin-bottom: 12px; 
      transition: all 0.2s; font-family: inherit; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:active { transform: translateY(1px); }
    .btn-danger { background: var(--accent); color: white; }
    .btn-danger:hover { background: var(--accent-hover); }
    .btn-danger:disabled { background: #94a3b8; cursor: not-allowed; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: #e2e8f0; }

    /* 📦 進貨單清單樣式 */
    .payables-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 24px; }
    .payables-list { max-height: 320px; overflow-y: auto; margin-top: 10px; padding-right: 4px;}
    
    .payable-item { 
      background: var(--surface); padding: 14px; margin-bottom: 8px; border-radius: 6px; 
      border: 1px solid var(--border); cursor: pointer; display: flex; flex-direction: column; gap: 6px; 
      transition: all 0.2s; position: relative;
    }
    .payable-item:hover { border-color: var(--danger); box-shadow: 0 2px 6px rgba(30,41,59,0.07);}
    .payable-item.selected { border-color: var(--accent); background: #f1f5f9; box-shadow: 0 0 0 1px var(--accent); }
    
    .order-header { display: flex; justify-content: space-between; font-weight: 700; align-items: center; color: var(--text);}
    
    .status-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; color: white; }
    .status-badge.unpaid { background: var(--accent); } 
    .status-badge.partial { background: var(--warning); } 

    .amount-display { background: var(--surface2); padding: 20px; border-radius: 8px; text-align: center; margin: 20px 0; border: 1px dashed var(--accent); }
    .amount-display .value { font-size: 32px; font-weight: 700; color: var(--accent); font-family: monospace; margin-top: 8px;}
    
    .hidden { display: none !important; }
    
    /* ⭐ 成功畫面樣式 */
    .success-screen { text-align: center; padding: 40px 20px; }
    .success-screen .icon { font-size: 70px; margin-bottom: 20px; animation: bounce 0.5s ease; }
    .success-screen h3 { color: var(--success); font-size: 24px; margin-bottom: 12px; font-weight: 700;}
    .success-screen p { color: var(--text2); font-size: 15px; margin-bottom: 30px; }
    @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

    .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: flex; justify-content: center; align-items: center; z-index: 2000; font-size: 16px; color: var(--accent); font-weight: 700; flex-direction: column; gap: 12px;}
  </style>
</head>
<body>

  <div id="loadingOverlay" class="loading-overlay hidden">
    <div>🔄 處理中，請稍候...</div>
  </div>

  <div class="container">
    <h2>💸 供應商付款核銷</h2>
    
    <div id="formArea">
      <form id="paymentForm">
        <div class="form-group">
          <label>🏢 第一步：選擇供應商 *</label>
          <input type="text" id="suppSearch" placeholder="快搜供應商..." autocomplete="off"
            oninput="filterSupplierSelect()" style="margin-bottom:6px;">
          <select id="supplier" size="1" required onchange="onSuppPick(); loadPayables()">
            <option value="">-- 載入供應商中... --</option>
          </select>
        </div>
        
        <div id="payablesBox" class="payables-box hidden">
          <label style="color:var(--accent); margin-bottom: 4px;">📋 第二步：待付進貨單 <small style="font-weight:normal; color:var(--text2);">(點選單據自動帶入金額)</small></label>
          <div class="payables-list" id="payablesList"></div>
        </div>
        
        <div class="form-group">
          <label>📅 付款日期 *</label>
          <input type="date" id="paymentDate" required>
        </div>
        
        <div class="form-group">
          <label>💵 本次付款金額 * <small style="font-weight:normal; color:var(--text2);">(手動輸入或由上方點選帶入)</small></label>
          <input type="number" id="amount" min="0" step="1" required 
                 placeholder="請輸入金額"
                 style="text-align: right; font-size: 24px; font-weight: bold; color: var(--accent);">
        </div>
        
        <div class="amount-display">
          <div style="font-size: 14px; color: var(--text2); font-weight:600;">付款核銷總計</div>
          <div class="value">$<span id="amountDisplay">0</span></div>
        </div>
        
        <div class="form-group">
          <label>💳 付款方式 *</label>
          <select id="paymentMethod">
             <option value="零用金(我代墊)">零用金(我代墊)</option>
             <option value="老闆付款">老闆付款</option>
             <option value="匯款">轉帳匯款</option>
             <option value="支票">支票</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>📝 付款備註 (選填)</label>
          <input type="text" id="note" placeholder="例如：結清1月貨款、訂金...">
        </div>
        
        <button type="submit" class="btn btn-danger" id="submitBtn">✅ 確認完成付款</button>
        <button type="button" class="btn btn-secondary" onclick="resetForm()">🔄 清除重填</button>
      </form>
    </div>
    
    <div id="successScreen" class="success-screen hidden">
      <div class="icon">✅</div>
      <h3>付款紀錄成功！</h3>
      <p id="successMessage">款項已完成核銷並更新帳款狀態</p>
      <button type="button" class="btn btn-danger" onclick="continuePayment()">繼續處理其他付款</button>
    </div>
  </div>

<script>
  // ========== 1. Supabase API 設定 ==========
  const SB_URL = 'https://asugjynpocwygggttxyo.supabase.co/rest/v1';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzdWdqeW5wb2N3eWdnZ3R0eHlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNzU3MjksImV4cCI6MjA4ODk1MTcyOX0.LzcRQAl80rZxKKD8NIYWGvylfwCbs1ek5LtKpmZodBc'; 
    const AUTH_TOKEN = sessionStorage.getItem('sb_auth_token') || SB_KEY;
  const HEADERS = {
    'apikey': SB_KEY,
    'Authorization': `Bearer ${AUTH_TOKEN}`,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation'
  };

  let selectedOrderId = '';
  
  window.onload = function() {
    setTodayDate();
    loadSuppliers();
    document.getElementById('amount').addEventListener('input', updateAmountDisplay);
  };
  
  function setTodayDate() {
    const today = new Date();
    const offset = today.getTimezoneOffset() * 60000;
    const localToday = (new Date(today - offset)).toISOString().split('T')[0];
    document.getElementById('paymentDate').value = localToday;
  }
  
  let allSuppliers = [];

  // ========== 2. 載入供應商清單 ==========
  async function loadSuppliers() {
    try {
      const res = await fetch(`${SB_URL}/suppliers?select=id,name&order=name`, { headers: HEADERS });
      if (!res.ok) throw new Error('讀取失敗');
      allSuppliers = await res.json();
      renderSupplierSelect('');
    } catch (error) {
      document.getElementById('suppSearch').placeholder = '❌ 載入失敗';
    }
  }

  function renderSupplierSelect(kw) {
    const sel = document.getElementById('supplier');
    const filtered = kw ? allSuppliers.filter(s => s.name.toLowerCase().includes(kw.toLowerCase())) : allSuppliers;
    sel.innerHTML = '<option value="">-- 請選擇供應商 --</option>';
    filtered.forEach(s => { sel.innerHTML += `<option value="${s.id}">${s.name}</option>`; });
    if (kw) {
      sel.size = Math.min(filtered.length + 1, 8);
      sel.style.cssText = 'width:100%; background:#fff; border:2px solid #E53935; border-radius:6px; box-shadow:0 4px 12px rgba(229,57,53,0.15); outline:none;';
    } else {
      sel.size = 1;
      sel.style.cssText = 'width:100%;';
    }
  }

  function filterSupplierSelect() {
    renderSupplierSelect(document.getElementById('suppSearch').value.trim());
  }

  function onSuppPick() {
    const sel = document.getElementById('supplier');
    sel.size = 1;
    sel.style.cssText = 'width:100%;';
  }
  
  // ========== 3. 載入該供應商的待付帳款 ==========
  async function loadPayables() {
    const supplierId = document.getElementById('supplier').value;
    const box = document.getElementById('payablesBox');
    const list = document.getElementById('payablesList');
    
    // 重置選擇
    selectedOrderId = '';
    document.getElementById('amount').value = '';
    updateAmountDisplay();

    if (!supplierId) {
      box.classList.add('hidden');
      return;
    }
    
    list.innerHTML = '<div style="text-align:center; padding:20px; color:var(--accent);">🔍 查詢帳單中...</div>';
    box.classList.remove('hidden');
    
    try {
      // 抓取 accounts_payable 表中該供應商且 unpaid_amount > 0 的紀錄
      const res = await fetch(`${SB_URL}/accounts_payable?supplier_id=eq.${supplierId}&unpaid_amount=gt.0&order=order_date.asc`, { headers: HEADERS });
      if (!res.ok) throw new Error('讀取帳單失敗');
      const data = await res.json();

      if (data.length === 0) {
        list.innerHTML = '<div style="text-align:center; padding:30px; color:var(--text2); font-weight:700;">🎉 此供應商目前無待付進貨款！</div>';
        return;
      }
      
      list.innerHTML = data.map(r => {
        let statusClass = (r.paid_amount > 0) ? 'partial' : 'unpaid';
        let statusText = r.status || '未付款';
        if (r.paid_amount > 0 && r.status !== '部分付款') statusText = '部分付款'; // 防呆
        
        return `
          <div class="payable-item" id="item_${r.order_id}" onclick="selectPayable('${r.order_id}', ${r.unpaid_amount})">
            <div class="order-header">
              <span>單號：${r.order_id}</span>
              <span class="status-badge ${statusClass}">${statusText}</span>
            </div>
            <div style="font-size:12px; color:var(--text2); margin-top:4px;">進貨日期：${r.order_date}</div>
            <div style="display:flex; justify-content:space-between; font-size:13px; margin-top:8px;">
              <span>總額：$${Number(r.total_amount).toLocaleString()}</span>
              <span>已付：<span style="color:var(--success); font-weight:700;">$${Number(r.paid_amount).toLocaleString()}</span></span>
            </div>
            <div style="text-align:right; font-size:14px; margin-top:6px; padding-top:6px; border-top:1px dashed var(--border);">
              本次待付：<span style="color:var(--accent); font-weight:700; font-size:16px;">$${Number(r.unpaid_amount).toLocaleString()}</span>
            </div>
          </div>
        `;
      }).join('');
    } catch (error) {
      list.innerHTML = `<div style="text-align:center; padding:20px; color:var(--danger);">❌ 系統錯誤：${error.message}</div>`;
    }
  }
  
  function selectPayable(orderId, amount) {
    // 點擊第二次同一個單據時，取消選取
    if (selectedOrderId === orderId) {
      selectedOrderId = '';
      document.getElementById('amount').value = '';
      document.getElementById('item_' + orderId).classList.remove('selected');
    } else {
      selectedOrderId = orderId;
      document.getElementById('amount').value = amount;
      document.querySelectorAll('.payable-item').forEach(el => el.classList.remove('selected'));
      document.getElementById('item_' + orderId).classList.add('selected');
    }
    updateAmountDisplay();
  }
  
  function updateAmountDisplay() {
    const amount = parseFloat(document.getElementById('amount').value) || 0;
    document.getElementById('amountDisplay').textContent = amount.toLocaleString();
  }
  
  // ========== 4. 提交付款紀錄 (RPC) ==========
  document.getElementById('paymentForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const submitBtn = document.getElementById('submitBtn');
    const supplierId = document.getElementById('supplier').value;
    const amount = parseFloat(document.getElementById('amount').value);
    
    if (!supplierId || !amount || amount <= 0) {
      Swal.fire('提示', '請確認供應商與付款金額', 'warning');
      return;
    }

    // 取得選單中的供應商名稱
    const supplierSelect = document.getElementById('supplier');
    const supplierName = supplierSelect.options[supplierSelect.selectedIndex].text;

    // 準備傳送給後端的資料
    const payload = {
      supplier_id: supplierId,
      supplier_name: supplierName,
      order_id: selectedOrderId || null, // 允許未指定單據的預付款
      payment_date: document.getElementById('paymentDate').value,
      amount: amount,
      payment_method: document.getElementById('paymentMethod').value,
      note: document.getElementById('note').value.trim()
    };

    if (!selectedOrderId) {
      const confirm = await Swal.fire({
        title: '未指定進貨單',
        text: '您沒有點選上方任何單據，這筆款項將被記錄為「預付款」或「無單據支出」，確定要儲存嗎？',
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: 'var(--accent)',
        confirmButtonText: '確定',
        cancelButtonText: '取消'
      });
      if (!confirm.isConfirmed) return;
    }

    document.getElementById('loadingOverlay').classList.remove('hidden');
    submitBtn.disabled = true;
    
    try {
      // 呼叫 Supabase RPC 進行付款核銷與紀錄
      const res = await fetch(`${SB_URL}/rpc/web_make_payment`, {
        method: 'POST',
        headers: HEADERS,
        body: JSON.stringify({ p_data: payload })
      });

      if (!res.ok) {
        const errData = await res.json();
        throw new Error(errData.message || '寫入資料庫失敗');
      }

      showSuccessScreen(payload.amount, payload.order_id);

    } catch (error) {
      Swal.fire('❌ 付款紀錄失敗', error.message, 'error');
    } finally {
      document.getElementById('loadingOverlay').classList.add('hidden');
      submitBtn.disabled = false;
    }
  });
  
  function showSuccessScreen(amount, orderId) {
    document.getElementById('formArea').classList.add('hidden');
    document.getElementById('successScreen').classList.remove('hidden');
    
    let msg = `已成功紀錄付款 $${amount.toLocaleString()}`;
    if (orderId) msg += `<br><span style="font-size:14px; color:var(--text2);">(核銷進貨單號: ${orderId})</span>`;
    
    document.getElementById('successMessage').innerHTML = msg;
  }
  
  function continuePayment() {
    document.getElementById('successScreen').classList.add('hidden');
    document.getElementById('formArea').classList.remove('hidden');
    resetForm();
  }
  
  function resetForm() {
    document.getElementById('paymentForm').reset();
    selectedOrderId = '';
    setTodayDate();
    updateAmountDisplay();
    document.getElementById('payablesBox').classList.add('hidden');
    document.querySelectorAll('.payable-item').forEach(el => el.classList.remove('selected'));
  }
</script>
</body>
</html>
