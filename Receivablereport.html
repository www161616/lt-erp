<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>龍潭進銷存系統 - 應收帳款報表</title>
  <script src="libs/sweetalert2.min.js"></script>
  <script src="libs/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    /* ========== 石板灰護眼主題 ========== */
    :root {
      --bg: #f8f9fb;
      --surface: #ffffff;
      --surface2: #f1f5f9;
      --border: #e2e8f0;
      --accent: #475569;
      --text: #1e293b;
      --text2: #64748b;
      --danger: #c53030;
      --warning: #b7791f;
      --blue: #0e7490;
      --purple-grad: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      --pink-grad: linear-gradient(135deg, #ff7eb3 0%, #ff758c 100%);
      --blue-grad: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); padding: 24px; color: var(--text); }

    .header { display: flex; align-items: center; margin-bottom: 24px; border-bottom: 3px solid var(--accent); padding-bottom: 12px; }
    .header h2 { color: var(--accent); font-size: 24px; flex-grow: 1; margin: 0; display: flex; align-items: center; gap: 8px;}

    /* 統計字卡 */
    .summary-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 24px; }
    .card { padding: 24px; border-radius: 12px; color: white; text-align: left; box-shadow: 0 4px 16px rgba(0,0,0,0.1); position: relative; overflow: hidden;}
    .card::after { content: ''; position: absolute; top: -50%; right: -20%; width: 150px; height: 150px; background: rgba(255,255,255,0.1); border-radius: 50%; transform: rotate(45deg); }
    .card-purple { background: var(--purple-grad); }
    .card-pink { background: var(--pink-grad); }
    .card-blue { background: var(--blue-grad); }
    .card-label { font-size: 15px; opacity: 0.9; margin-bottom: 12px; font-weight: 500;}
    .card-value { font-size: 36px; font-weight: 900; font-family: monospace; letter-spacing: -1px;}

    /* 篩選區 */
    .filter-bar { background: var(--surface); padding: 20px; border-radius: 8px; display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; margin-bottom: 24px; box-shadow: 0 2px 12px rgba(30,41,59,0.05); border: 1px solid var(--border);}
    .filter-group { display: flex; flex-direction: column; gap: 8px; }
    .filter-group label { font-size: 13px; font-weight: 700; color: var(--text2); }
    input, select { padding: 10px 14px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; outline: none; font-family: inherit; color: var(--text); background: var(--surface);}
    input:focus, select:focus { border-color: var(--accent); }

    .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; display: inline-flex; align-items: center; gap: 6px; font-size: 14px; transition: 0.2s; font-family: inherit;}
    .btn:active { transform: translateY(1px); }
    .btn-search { background: var(--accent); color: white; }
    .btn-search:hover { background: #334155; }
    .btn-export { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-export:hover { background: #e2e8f0; }
    .btn-export:disabled { background: var(--bg); color: var(--text2); cursor: not-allowed; }
    .btn-print { background: var(--blue); color: white; }
    .btn-print:hover { background: #0c6b82; }

    /* 表格 - 分組格式 */
    .table-container { background: var(--surface); border-radius: 8px; overflow: hidden; box-shadow: 0 2px 12px rgba(30,41,59,0.05); border: 1px solid var(--border);}
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: var(--surface2); padding: 10px 12px; text-align: center; color: var(--text2); font-weight: 700; border-bottom: 2px solid var(--accent); font-size: 12px; }
    td { padding: 6px 10px; border-bottom: 1px solid var(--border); color: var(--text); font-size: 13px; }

    .cust-header-row { background: #e8f0fe; }
    .cust-header-row td { font-weight: 900; color: var(--accent); border-bottom: 1px solid #b0c4de; padding: 8px 10px; }
    .cust-subtotal-row { background: #f0f4f8; }
    .cust-subtotal-row td { font-weight: 700; border-top: 1px solid #b0c4de; border-bottom: 2px solid #94a3b8; padding: 7px 10px; }
    .detail-row:hover { background: #fafafa; }
    .text-right { text-align: right; font-family: monospace; }
    .text-center { text-align: center; }
    .unpaid-val { color: var(--danger); font-weight: 700; }

    /* 狀態標籤 */
    .status-badge { padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; color: white; display: inline-block; text-align: center; min-width: 55px;}
    .status-unpaid { background: var(--danger); }
    .status-partial { background: var(--warning); }
    .status-paid { background: var(--accent); }

    /* 明細蓋板 */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(2px);}
    .overlay-content { background: var(--surface); width: 95%; max-width: 800px; max-height: 90vh; border-radius: 12px; padding: 30px; overflow-y: auto; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    .close-overlay { position: absolute; top: 20px; right: 24px; font-size: 28px; cursor: pointer; color: var(--text2); transition: 0.2s; line-height: 1;}
    .close-overlay:hover { color: var(--danger); transform: scale(1.1);}

    .detail-header { background: #f0f9eb; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; border: 1px solid #c2e7b0;}
    .detail-header div { font-size: 14px; color: var(--text); }
    .detail-header b { color: var(--accent); }

    .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); display: flex; justify-content: center; align-items: center; z-index: 2000; font-size: 16px; color: var(--accent); font-weight: 700; flex-direction: column; gap: 12px;}
    .hidden { display: none !important; }

    .clickable-id { font-weight: 700; color: var(--blue); cursor: pointer; text-decoration: underline; text-underline-offset: 3px; font-family: monospace; font-size: 12px; }
    .clickable-id:hover { color: #66b1ff; }
  </style>
</head>
<body>

  <div id="loadingOverlay" class="loading-overlay hidden">
    <div>🔄 處理中，請稍候...</div>
  </div>

  <div class="header">
    <h2>📊 應收帳款彙總表</h2>
  </div>

  <div class="summary-container">
    <div class="card card-purple">
      <div class="card-label">總應收金額</div>
      <div class="card-value" id="totalAR">$0</div>
    </div>
    <div class="card card-pink">
      <div class="card-label">未收結餘</div>
      <div class="card-value" id="totalUnpaid">$0</div>
    </div>
    <div class="card card-blue">
      <div class="card-label">已收金額</div>
      <div class="card-value" id="totalPaid">$0</div>
    </div>
  </div>

  <div class="filter-bar">
    <div class="filter-group">
      <label>📅 起始日期</label>
      <input type="date" id="dateFrom">
    </div>
    <div class="filter-group">
      <label>📅 結束日期</label>
      <input type="date" id="dateTo">
    </div>
    <div class="filter-group">
      <label>💰 付款狀態</label>
      <select id="statusFilter">
        <option value="全部">全部顯示</option>
        <option value="未收款">❌ 未收款</option>
        <option value="部分收款">⚠️ 部分收款</option>
        <option value="已收款">✅ 已收款</option>
      </select>
    </div>
    <div class="filter-group">
      <label>👤 客戶</label>
      <input type="text" id="custSearch" placeholder="快搜客戶..." autocomplete="off"
        oninput="filterCustomerSelect()" style="margin-bottom:6px;">
      <select id="customerFilter" size="1" onchange="onCustPick()">
        <option value="">-- 全部客戶 --</option>
      </select>
    </div>
    <button class="btn btn-search" onclick="fetchData()">🔍 查詢帳款</button>
    <button id="exportBtn" class="btn btn-export" onclick="exportToExcel()" disabled>📥 匯出 Excel</button>
    <button class="btn btn-print" onclick="printGroupedReport()">🖨️ 列印</button>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th width="13%">請款客戶</th>
          <th width="9%">單據日期</th>
          <th width="14%">來源單號</th>
          <th width="9%" style="text-align:right;">金額</th>
          <th width="8%" style="text-align:right;">稅額</th>
          <th width="8%" style="text-align:right;">運費</th>
          <th width="8%" style="text-align:right;">扣款</th>
          <th width="10%" style="text-align:right;">應收金額</th>
          <th width="9%" style="text-align:right;">已收金額</th>
          <th width="9%" style="text-align:right;">未收金額</th>
          <th width="6%" style="text-align:center;">狀態</th>
        </tr>
      </thead>
      <tbody id="reportList">
        <tr><td colspan="11" style="text-align:center; padding:40px; color:var(--text2);">👆 請設定條件後點擊查詢</td></tr>
      </tbody>
    </table>
  </div>

  <!-- 銷貨單明細彈窗 -->
  <div id="detailOverlay" class="overlay">
    <div class="overlay-content">
      <span class="close-overlay" onclick="closeDetail()">&times;</span>
      <h3 style="margin-bottom:20px; color:var(--accent); font-size:20px; display:flex; align-items:center; gap:8px;">📄 銷貨單明細</h3>
      <div id="detailInner"></div>
    </div>
  </div>

  <script>
    // ========== 1. Supabase API 設定 ==========
    const SB_URL = 'https://asugjynpocwygggttxyo.supabase.co/rest/v1';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzdWdqeW5wb2N3eWdnZ3R0eHlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNzU3MjksImV4cCI6MjA4ODk1MTcyOX0.LzcRQAl80rZxKKD8NIYWGvylfwCbs1ek5LtKpmZodBc';
    const AUTH_TOKEN = sessionStorage.getItem('sb_auth_token') || SB_KEY;
    const HEADERS = {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${AUTH_TOKEN}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };

    var currentData = [];        // flat list
    var groupedData = [];        // grouped by customer
    var currentSummary = { total: 0, paid: 0, unpaid: 0 };
    var allCustomers = [];

    window.onload = function() {
      const today = new Date();
      const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
      const offset = today.getTimezoneOffset() * 60000;
      const localToday = (new Date(today - offset)).toISOString().split('T')[0];
      const localFirstDay = (new Date(firstDay - offset)).toISOString().split('T')[0];

      document.getElementById('dateFrom').value = localFirstDay;
      document.getElementById('dateTo').value = localToday;

      loadCustomers();
      fetchData();
    };

    async function loadCustomers() {
      try {
        const res = await fetch(`${SB_URL}/customers?select=id,name&order=name`, { headers: HEADERS });
        if (!res.ok) throw new Error();
        allCustomers = await res.json();
        renderCustomerSelect('');
      } catch (e) {
        document.getElementById('custSearch').placeholder = '❌ 載入失敗';
      }
    }

    function renderCustomerSelect(kw) {
      const sel = document.getElementById('customerFilter');
      const filtered = kw ? allCustomers.filter(c => c.name.toLowerCase().includes(kw.toLowerCase())) : allCustomers;
      sel.innerHTML = '<option value="">-- 全部客戶 --</option>';
      filtered.forEach(c => { sel.innerHTML += `<option value="${c.id}">${c.name}</option>`; });
      if (kw) {
        sel.size = Math.min(filtered.length + 1, 8);
        sel.style.cssText = 'width:100%; background:#fff; border:2px solid #1565C0; border-radius:6px; box-shadow:0 4px 12px rgba(21,101,192,0.15); outline:none;';
      } else {
        sel.size = 1;
        sel.style.cssText = '';
      }
    }

    function filterCustomerSelect() {
      renderCustomerSelect(document.getElementById('custSearch').value.trim());
    }

    function onCustPick() {
      const sel = document.getElementById('customerFilter');
      sel.size = 1;
      sel.style.cssText = '';
    }

    // ========== 2. 查詢應收帳款 ==========
    async function fetchData() {
      const from = document.getElementById('dateFrom').value;
      const to = document.getElementById('dateTo').value;
      const status = document.getElementById('statusFilter').value;
      const customerId = document.getElementById('customerFilter').value;

      const listBody = document.getElementById('reportList');
      listBody.innerHTML = '<tr><td colspan="9" style="text-align:center; padding:40px; color:var(--accent); font-weight:700;">🔄 正在讀取帳務資料...</td></tr>';
      document.getElementById('exportBtn').disabled = true;

      try {
        let query = `${SB_URL}/sales_orders?select=*&order=order_date.asc,id.asc`;
        if (from) query += `&order_date=gte.${from}`;
        if (to) query += `&order_date=lte.${to}`;
        if (customerId) query += `&customer_id=eq.${customerId}`;

        const orderRes = await fetch(query, { headers: HEADERS, cache: 'no-store' });
        if (!orderRes.ok) throw new Error('無法讀取銷貨單: HTTP ' + orderRes.status);
        const orders = await orderRes.json();

        // 讀取收款紀錄
        let paymentsMap = {};
        let payLoadFailed = false;
        try {
          // BUG-AUDIT-010 + 021 + 030 fix:
          //   030: ref_id → order_id（payment_received 表沒有 ref_id 欄位，正確是 order_id）
          //   010: 加 while loop 分頁（預防未來筆數 >1000）
          //   021: 失敗時不再靜默（throw 讓 catch 捕獲並在 console.error 印 HTTP 狀態 + Swal 警告會計）
          // 已知歷史髒資料：payment_received 有 4 筆（PY00001-04）order_id 欄位存了 customer_id
          //   值（如 C00015），無法 match sales_orders.id → 那些單的收款不會被算入。
          //   金額合計 $6,600，列為已知風險，待另行 SQL migration 修。
          let offset = 0;
          const limit = 1000;
          while (true) {
            const payRes = await fetch(`${SB_URL}/payment_received?select=order_id,amount&limit=${limit}&offset=${offset}`, { headers: HEADERS, cache: 'no-store' });
            if (!payRes.ok) {
              throw new Error('收款紀錄讀取失敗: HTTP ' + payRes.status);
            }
            const payments = await payRes.json();
            payments.forEach(p => {
              if (p.order_id) paymentsMap[p.order_id] = (paymentsMap[p.order_id] || 0) + Number(p.amount || 0);
            });
            if (payments.length < limit) break;
            offset += limit;
          }
        } catch (e) {
          console.error('載入收款紀錄失敗:', e);
          payLoadFailed = true;
        }
        if (payLoadFailed) {
          Swal.fire('⚠️ 警告', '無法載入收款紀錄，本次報表的已收/未收以 payment_status 欄位估算，可能不準確。請稍後重試。', 'warning');
        }

        let sumTotal = 0, sumPaid = 0, sumUnpaid = 0;

        const formattedData = orders.map(o => {
          const grandTotal = Number(o.grand_total || o.total_amount || 0);
          const subtotal = Number(o.subtotal || grandTotal);
          const taxAmount = Number(o.tax_amount || 0);
          const shipping = Number(o.shipping_fee || o.shipping || 0);
          const deduction = Number(o.deduction || 0);
          let paid = paymentsMap[o.id] || 0;
          if (paid === 0 && (o.payment_status === '已收款' || o.payment_status === '已結清')) paid = grandTotal;
          // 退貨單 grand_total 為負數，未收金額也應為負，才能正確扣減總計
          // 不再用 Math.max(0,...)，否則退貨會被吃掉
          const unpaid = grandTotal - paid;

          let finalStatus = '未收款';
          if (grandTotal < 0) finalStatus = '退貨';
          else if (unpaid === 0 && grandTotal > 0) finalStatus = '已收款';
          else if (paid > 0 && unpaid > 0) finalStatus = '部分收款';

          sumTotal += grandTotal;
          sumPaid += paid;
          sumUnpaid += unpaid;

          return {
            orderId: o.id,
            date: o.order_date || o.date,
            customerName: o.customer_name || o.customer_id || '未指定',
            customerId: o.customer_id || '',
            subtotal: subtotal,
            taxAmount: taxAmount,
            shipping: shipping,
            deduction: deduction,
            total: grandTotal,
            paid: paid,
            unpaid: unpaid,
            status: finalStatus
          };
        });

        // 前端篩選付款狀態
        // 退貨單視為應收的減項，未收款 / 部分收款 篩選時都應包含退貨
        let filtered;
        if (status === '全部') {
          filtered = formattedData;
        } else if (status === '未收款' || status === '部分收款') {
          filtered = formattedData.filter(r => r.status === status || r.status === '退貨');
        } else {
          filtered = formattedData.filter(r => r.status === status);
        }

        // 重新計算
        let fTotal = 0, fPaid = 0, fUnpaid = 0, fSubtotal = 0, fTax = 0, fShipping = 0, fDeduction = 0;
        filtered.forEach(r => {
          fTotal += r.total;
          fPaid += r.paid;
          fUnpaid += r.unpaid;
          fSubtotal += r.subtotal;
          fTax += r.taxAmount;
          fShipping += (r.shipping || 0);
          fDeduction += (r.deduction || 0);
        });

        currentData = filtered;
        currentSummary = { total: fTotal, paid: fPaid, unpaid: fUnpaid, subtotal: fSubtotal, tax: fTax, shipping: fShipping, deduction: fDeduction };

        // 按客戶分組
        groupedData = buildGroupedData(filtered);

        renderReport();

      } catch (error) {
        listBody.innerHTML = `<tr><td colspan="9" style="text-align:center; padding:40px; color:var(--danger);">❌ 讀取失敗：${error.message}</td></tr>`;
      }
    }

    // ========== 分組邏輯 ==========
    function buildGroupedData(list) {
      const map = {};
      const order = [];
      list.forEach(r => {
        const key = r.customerName;
        if (!map[key]) {
          map[key] = { customerName: key, customerId: r.customerId, orders: [], sumSubtotal: 0, sumTax: 0, sumShipping: 0, sumDeduction: 0, sumTotal: 0, sumPaid: 0, sumUnpaid: 0 };
          order.push(key);
        }
        map[key].orders.push(r);
        map[key].sumSubtotal += r.subtotal;
        map[key].sumTax += r.taxAmount;
        map[key].sumShipping += (r.shipping || 0);
        map[key].sumDeduction += (r.deduction || 0);
        map[key].sumTotal += r.total;
        map[key].sumPaid += r.paid;
        map[key].sumUnpaid += r.unpaid;
      });
      return order.map(k => map[k]);
    }

    // ========== 3. 渲染分組報表 ==========
    function renderReport() {
      document.getElementById('totalAR').innerText = '$' + currentSummary.total.toLocaleString();
      document.getElementById('totalUnpaid').innerText = '$' + currentSummary.unpaid.toLocaleString();
      document.getElementById('totalPaid').innerText = '$' + currentSummary.paid.toLocaleString();

      const tbody = document.getElementById('reportList');
      if (groupedData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="11" style="text-align:center; padding:40px; color:var(--text2);">查無符合條件的帳務資料 🍃</td></tr>';
        return;
      }

      document.getElementById('exportBtn').disabled = false;

      let html = '';
      groupedData.forEach(g => {
        // 客戶標題行
        html += `<tr class="cust-header-row">
          <td colspan="7" style="font-size:14px;">${g.customerName}</td>
          <td class="text-right" style="font-size:11px; color:var(--text2);">應收</td>
          <td class="text-right" style="font-size:11px; color:var(--text2);">已收</td>
          <td class="text-right unpaid-val">${g.sumUnpaid.toLocaleString()}</td>
          <td></td>
        </tr>`;

        // 明細行
        g.orders.forEach(r => {
          let badgeClass = 'status-unpaid';
          if (r.status === '已收款') badgeClass = 'status-paid';
          else if (r.status === '部分收款') badgeClass = 'status-partial';
          else if (r.status === '退貨') badgeClass = 'status-partial';

          html += `<tr class="detail-row">
            <td></td>
            <td>${r.date}</td>
            <td><span class="clickable-id" onclick="openDetail('${r.orderId}')">銷貨 ${r.orderId}</span></td>
            <td class="text-right">${r.subtotal.toLocaleString()}</td>
            <td class="text-right">${r.taxAmount.toLocaleString()}</td>
            <td class="text-right" style="color:${(r.shipping||0)>0?'#0e7490':'var(--text2)'};">${(r.shipping||0).toLocaleString()}</td>
            <td class="text-right" style="color:${(r.deduction||0)>0?'#c00':'var(--text2)'};">${(r.deduction||0).toLocaleString()}</td>
            <td class="text-right">${r.total.toLocaleString()}</td>
            <td class="text-right" style="color:var(--accent);">${r.paid.toLocaleString()}</td>
            <td class="text-right unpaid-val">${r.unpaid.toLocaleString()}</td>
            <td class="text-center"><span class="status-badge ${badgeClass}">${r.status}</span></td>
          </tr>`;
        });

        // 合計行
        html += `<tr class="cust-subtotal-row">
          <td></td>
          <td colspan="2" style="text-align:right;">合計：</td>
          <td class="text-right">${g.sumSubtotal.toLocaleString()}</td>
          <td class="text-right">${g.sumTax.toLocaleString()}</td>
          <td class="text-right">${(g.sumShipping||0).toLocaleString()}</td>
          <td class="text-right">${(g.sumDeduction||0).toLocaleString()}</td>
          <td class="text-right" style="font-weight:900;">${g.sumTotal.toLocaleString()}</td>
          <td class="text-right">${g.sumPaid.toLocaleString()}</td>
          <td class="text-right unpaid-val" style="font-size:14px;">${g.sumUnpaid.toLocaleString()}</td>
          <td></td>
        </tr>`;
      });

      // 全部合計
      html += `<tr style="background:#e2e8f0; font-weight:900;">
        <td colspan="3" style="text-align:center; font-size:14px; padding:10px; border-top:3px solid var(--accent);">全部合計（${groupedData.length} 家客戶，${currentData.length} 筆）</td>
        <td class="text-right" style="border-top:3px solid var(--accent); padding:10px;">${(currentSummary.subtotal||0).toLocaleString()}</td>
        <td class="text-right" style="border-top:3px solid var(--accent); padding:10px;">${(currentSummary.tax||0).toLocaleString()}</td>
        <td class="text-right" style="border-top:3px solid var(--accent); padding:10px;">${(currentSummary.shipping||0).toLocaleString()}</td>
        <td class="text-right" style="border-top:3px solid var(--accent); padding:10px;">${(currentSummary.deduction||0).toLocaleString()}</td>
        <td class="text-right" style="border-top:3px solid var(--accent); padding:10px; font-size:14px;">${currentSummary.total.toLocaleString()}</td>
        <td class="text-right" style="border-top:3px solid var(--accent); padding:10px;">${currentSummary.paid.toLocaleString()}</td>
        <td class="text-right unpaid-val" style="border-top:3px solid var(--accent); padding:10px; font-size:15px;">${currentSummary.unpaid.toLocaleString()}</td>
        <td style="border-top:3px solid var(--accent);"></td>
      </tr>`;

      tbody.innerHTML = html;
    }

    // ========== 4. 銷貨單明細彈窗 ==========
    async function openDetail(orderId) {
      document.getElementById('detailOverlay').style.display = 'flex';
      const inner = document.getElementById('detailInner');
      inner.innerHTML = '<div style="text-align:center; padding:40px; color:var(--accent); font-weight:700;">⏳ 正在讀取明細資料...</div>';

      try {
        const [orderRes, detailRes] = await Promise.all([
          fetch(`${SB_URL}/sales_orders?id=eq.${orderId}&select=*`, { headers: HEADERS }),
          fetch(`${SB_URL}/sales_details?order_id=eq.${orderId}&select=*`, { headers: HEADERS })
        ]);

        if (!orderRes.ok || !detailRes.ok) throw new Error('無法讀取單據資料');

        const orderData = await orderRes.json();
        const detailData = await detailRes.json();

        if (orderData.length === 0) throw new Error('找不到該筆銷貨單');

        const o = orderData[0];
        const gTotal = Number(o.grand_total || o.total || o.total_amount || 0);
        const tAmount = Number(o.tax_amount || o.tax || 0);
        const subtotal = Number(o.subtotal || 0);
        const shipping = Number(o.shipping_fee || o.shipping || 0);
        const deduction = Number(o.deduction || 0);

        inner.innerHTML = `
          <div class="detail-header">
            <div><b>單號：</b> ${o.id}</div>
            <div><b>日期：</b> ${o.order_date}</div>
            <div><b>客戶：</b> ${o.customer_name || o.customer_id}</div>
            <div><b>稅制：</b> ${o.tax_type || '免稅'}</div>
          </div>
          <table style="width:100%; border-collapse:collapse; margin-bottom:20px; border:1px solid var(--border);">
            <thead style="background:var(--surface2);">
              <tr>
                <th style="padding:10px 14px;">品名</th>
                <th style="text-align:right; padding:10px 14px;">數量</th>
                <th style="text-align:right; padding:10px 14px;">單價</th>
                <th style="text-align:right; padding:10px 14px;">小計</th>
              </tr>
            </thead>
            <tbody>
              ${detailData.map(i => {
                const price = Number(i.unit_price || i.price || 0);
                const qty = Number(i.qty || 0);
                return `
                <tr>
                  <td style="padding:10px 14px; border-bottom:1px solid var(--border); font-weight:700;">${i.product_name || i.product_id}</td>
                  <td style="text-align:right; padding:10px 14px; border-bottom:1px solid var(--border);">${qty} ${i.unit || ''}</td>
                  <td style="text-align:right; padding:10px 14px; border-bottom:1px solid var(--border); font-family:monospace;">$${price.toLocaleString()}</td>
                  <td style="text-align:right; padding:10px 14px; border-bottom:1px solid var(--border); font-family:monospace;">$${(qty*price).toLocaleString()}</td>
                </tr>
              `}).join('')}
            </tbody>
          </table>
          <div style="text-align:right; font-size:14px; border-top:2px solid var(--border); padding-top:16px;">
            <div style="color:var(--text2); margin-bottom:4px;">未稅小計：<span style="font-family:monospace;">$${subtotal.toLocaleString()}</span></div>
            <div style="color:var(--text2); margin-bottom:4px;">稅額：<span style="font-family:monospace;">$${tAmount.toLocaleString()}</span></div>
            ${shipping > 0 ? `<div style="color:#0e7490; margin-bottom:4px;">運費：<span style="font-family:monospace;">+$${shipping.toLocaleString()}</span></div>` : ''}
            ${deduction > 0 ? `<div style="color:#c00; margin-bottom:4px;">扣款：<span style="font-family:monospace;">-$${deduction.toLocaleString()}</span></div>` : ''}
            <div style="font-weight:900; color:var(--danger); font-size:24px; font-family:monospace; margin-top:10px;">含稅總計：$${gTotal.toLocaleString()}</div>
          </div>
        `;
      } catch (error) {
        inner.innerHTML = `<div style="text-align:center; padding:30px; color:var(--danger);">❌ ${error.message}</div>`;
      }
    }

    function closeDetail() {
      document.getElementById('detailOverlay').style.display = 'none';
    }

    // ========== 5. 列印分組報表 ==========
    function printGroupedReport() {
      if (groupedData.length === 0) { Swal.fire('提示', '請先查詢資料', 'warning'); return; }

      const from = document.getElementById('dateFrom').value;
      const to = document.getElementById('dateTo').value;

      let tableRows = '';
      groupedData.forEach(g => {
        // 客戶標題
        tableRows += `<tr class="cust-hdr"><td colspan="7" style="font-weight:bold; font-size:13px;">${g.customerName}</td><td></td><td></td><td class="text-right" style="font-weight:bold;">${g.sumUnpaid.toLocaleString()}</td><td></td></tr>`;
        // 明細
        g.orders.forEach(r => {
          tableRows += `<tr>
            <td></td>
            <td style="white-space:nowrap;">${r.date}</td>
            <td style="white-space:nowrap;">銷貨 ${r.orderId}</td>
            <td class="text-right">${r.subtotal.toLocaleString()}</td>
            <td class="text-right">${r.taxAmount.toLocaleString()}</td>
            <td class="text-right">${(r.shipping||0).toLocaleString()}</td>
            <td class="text-right">${(r.deduction||0).toLocaleString()}</td>
            <td class="text-right">${r.total.toLocaleString()}</td>
            <td class="text-right">${r.paid.toLocaleString()}</td>
            <td class="text-right">${r.unpaid.toLocaleString()}</td>
            <td class="text-center">${r.status}</td>
          </tr>`;
        });
        // 合計
        tableRows += `<tr class="sub-total"><td></td><td colspan="2" style="text-align:right; font-weight:bold;">合計：</td><td class="text-right">${g.sumSubtotal.toLocaleString()}</td><td class="text-right">${g.sumTax.toLocaleString()}</td><td class="text-right">${(g.sumShipping||0).toLocaleString()}</td><td class="text-right">${(g.sumDeduction||0).toLocaleString()}</td><td class="text-right" style="font-weight:bold;">${g.sumTotal.toLocaleString()}</td><td class="text-right">${g.sumPaid.toLocaleString()}</td><td class="text-right" style="font-weight:bold; color:#c00;">${g.sumUnpaid.toLocaleString()}</td><td></td></tr>`;
      });

      // 全部合計
      tableRows += `<tr class="grand-total"><td colspan="3" style="text-align:center; font-weight:bold;">全部合計（${groupedData.length} 家，${currentData.length} 筆）</td><td class="text-right">${(currentSummary.subtotal||0).toLocaleString()}</td><td class="text-right">${(currentSummary.tax||0).toLocaleString()}</td><td class="text-right">${(currentSummary.shipping||0).toLocaleString()}</td><td class="text-right">${(currentSummary.deduction||0).toLocaleString()}</td><td class="text-right" style="font-weight:bold;">${currentSummary.total.toLocaleString()}</td><td class="text-right">${currentSummary.paid.toLocaleString()}</td><td class="text-right" style="font-weight:bold; color:#c00; font-size:14px;">${currentSummary.unpaid.toLocaleString()}</td><td></td></tr>`;

      const printContent = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>應收帳款彙總表</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif; padding:20px 30px; font-size:13px; color:#333; margin:0; }
  table { width:100%; border-collapse:collapse; }
  th { background:#f0f0f0; padding:6px 8px; border:1px solid #999; text-align:center; font-size:11px; font-weight:bold; white-space:nowrap; }
  td { padding:4px 6px; border:1px solid #ccc; font-size:11px; line-height:1.3; }
  .text-right { text-align:right; font-family:monospace; }
  .text-center { text-align:center; }
  .cust-hdr { background:#e8f0fe; }
  .cust-hdr td { border-bottom:1px solid #8ba8d0; }
  .sub-total { background:#f0f4f8; }
  .sub-total td { border-top:1px solid #8ba8d0; border-bottom:2px solid #94a3b8; }
  .grand-total { background:#dde5ed; }
  .grand-total td { border-top:3px solid #333; padding:6px; }
  @page { margin:3mm; size:A4; }
  @media print { body{padding:10px 15px;} *{-webkit-print-color-adjust:exact !important; print-color-adjust:exact !important;} }
</style></head><body>
  <div style="text-align:center; font-size:22px; font-weight:bold; margin-bottom:6px;">丸十水產股份有限公司</div>
  <div style="text-align:center; font-size:15px; letter-spacing:8px; margin-bottom:12px;">應 收 帳 款 彙 總 表（龍潭總倉）</div>
  <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:11px; border-bottom:2px solid #000; padding-bottom:6px;">
    <span>單據日期：${from} ~ ${to}</span>
    <span>製表：${new Date().toISOString().split('T')[0]}</span>
  </div>
  <table>
    <thead><tr>
      <th width="9%">請款客戶</th>
      <th width="9%" style="white-space:nowrap;">單據日期</th>
      <th width="14%" style="white-space:nowrap;">來源單號</th>
      <th width="9%">金額</th>
      <th width="7%">稅額</th>
      <th width="7%">運費</th>
      <th width="7%">扣款</th>
      <th width="10%">應收金額</th>
      <th width="10%">已收金額</th>
      <th width="10%">未收金額</th>
      <th width="8%">狀態</th>
    </tr></thead>
    <tbody>${tableRows}</tbody>
  </table>
  <div class="no-print" style="position:fixed;top:10px;right:10px;z-index:9999;">
    <button onclick="window.print()" style="padding:10px 24px;font-size:16px;background:#1976d2;color:#fff;border:none;border-radius:6px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3);">🖨️ 列印</button>
    <button onclick="window.close()" style="padding:10px 24px;font-size:16px;background:#757575;color:#fff;border:none;border-radius:6px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3);margin-left:8px;">✕ 關閉</button>
  </div>
  <style>@media print{.no-print{display:none!important;}}</style>
</body></html>`;
      const blob = new Blob([printContent], { type: 'text/html; charset=utf-8' });
      window.open(URL.createObjectURL(blob), '_blank');
    }

    // ========== 6. 匯出 Excel（分組格式） ==========
    function exportToExcel() {
      if (groupedData.length === 0) return;

      const btn = document.getElementById('exportBtn');
      btn.disabled = true;
      btn.innerText = '⏳ 匯出中...';

      const dateFrom = document.getElementById('dateFrom').value;
      const dateTo = document.getElementById('dateTo').value;

      const headers = ['請款客戶','單據日期','來源單號','金額','稅額','運費','扣款','應收金額','已收金額','未收金額'];
      const aoa = [];
      aoa.push(['丸十水產股份有限公司']);
      aoa.push(['應收帳款彙總表']);
      aoa.push([`單據日期：${dateFrom} ~ ${dateTo}`]);
      aoa.push([]);
      aoa.push(headers);

      // 動態算來源單號最大寬度（單號通常是英數字，1 字 = 1 寬）
      let maxOrderIdLen = 12;

      groupedData.forEach(g => {
        // 客戶標題行
        aoa.push([g.customerName, '', '', '', '', '', '', '', '', g.sumUnpaid]);
        // 明細行
        g.orders.forEach(r => {
          const sourceId = `銷貨 ${r.orderId}`;
          if (sourceId.length > maxOrderIdLen) maxOrderIdLen = sourceId.length;
          aoa.push(['', r.date, sourceId, r.subtotal, r.taxAmount, r.shipping||0, r.deduction||0, r.total, r.paid, r.unpaid]);
        });
        // 合計行
        aoa.push(['', '', '合計：', g.sumSubtotal, g.sumTax, g.sumShipping||0, g.sumDeduction||0, g.sumTotal, g.sumPaid, g.sumUnpaid]);
      });

      aoa.push([]);
      aoa.push([`全部合計（${groupedData.length} 家客戶，${currentData.length} 筆）`, '', '', currentSummary.subtotal||0, currentSummary.tax||0, currentSummary.shipping||0, currentSummary.deduction||0, currentSummary.total, currentSummary.paid, currentSummary.unpaid]);

      const ws = XLSX.utils.aoa_to_sheet(aoa);

      // 設定欄寬
      ws['!cols'] = [
        { wch: 24 }, // 請款客戶
        { wch: 12 }, // 單據日期
        { wch: maxOrderIdLen + 2 }, // 來源單號（依內容自動）
        { wch: 12 }, // 金額
        { wch: 10 }, // 稅額
        { wch: 10 }, // 運費
        { wch: 10 }, // 扣款
        { wch: 12 }, // 應收金額
        { wch: 12 }, // 已收金額
        { wch: 12 }  // 未收金額
      ];

      // 把來源單號欄（C 欄，index 2）強制設為文字格式，避免長數字變科學記號
      // 從第 6 列（index 5）開始才是資料
      for (let r = 5; r < aoa.length; r++) {
        const cellRef = XLSX.utils.encode_cell({ r, c: 2 });
        const cell = ws[cellRef];
        if (cell && cell.v != null && cell.v !== '') {
          cell.t = 's';
          cell.v = String(cell.v);
          cell.z = '@';
        }
      }

      // 第 1~3 列大標題：合併儲存格（10 欄）
      ws['!merges'] = [
        { s: { r: 0, c: 0 }, e: { r: 0, c: 9 } },
        { s: { r: 1, c: 0 }, e: { r: 1, c: 9 } },
        { s: { r: 2, c: 0 }, e: { r: 2, c: 9 } }
      ];

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, '應收帳款');
      XLSX.writeFile(wb, `應收帳款彙總表_${dateFrom}_${dateTo}.xlsx`);

      btn.disabled = false;
      btn.innerText = '📥 匯出 Excel';
    }
  </script>
</body>
</html>
