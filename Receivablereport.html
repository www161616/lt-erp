<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>龍潭進銷存系統 - 應收帳款報表</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    /* ========== 鼎新風格主題變數 ========== */
    :root {
      --bg: #f8f9fb;             
      --surface: #ffffff;        
      --surface2: #f1f5f9;       
      --border: #e2e8f0;         
      --accent: #475569;         /* 石板灰 */
      --text: #1e293b;           
      --text2: #64748b;          
      --danger: #c53030;         
      --warning: #b7791f;        
      --blue: #0e7490;
      
      --purple-grad: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      --pink-grad: linear-gradient(135deg, #ff7eb3 0%, #ff758c 100%);
      --blue-grad: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); padding: 24px; color: var(--text); }
    
    .header { display: flex; align-items: center; margin-bottom: 24px; border-bottom: 3px solid var(--accent); padding-bottom: 12px; }
    .header h2 { color: var(--accent); font-size: 24px; flex-grow: 1; margin: 0; display: flex; align-items: center; gap: 8px;}

    /* 📊 統計字卡區 */
    .summary-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 24px; }
    .card { padding: 24px; border-radius: 12px; color: white; text-align: left; box-shadow: 0 4px 16px rgba(0,0,0,0.1); position: relative; overflow: hidden;}
    .card::after { content: ''; position: absolute; top: -50%; right: -20%; width: 150px; height: 150px; background: rgba(255,255,255,0.1); border-radius: 50%; transform: rotate(45deg); }
    .card-purple { background: var(--purple-grad); }
    .card-pink { background: var(--pink-grad); }
    .card-blue { background: var(--blue-grad); }
    .card-label { font-size: 15px; opacity: 0.9; margin-bottom: 12px; font-weight: 500;}
    .card-value { font-size: 36px; font-weight: 900; font-family: monospace; letter-spacing: -1px;}

    /* 🔍 篩選區 */
    .filter-bar { background: var(--surface); padding: 20px; border-radius: 8px; display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; margin-bottom: 24px; box-shadow: 0 2px 12px rgba(30,41,59,0.05); border: 1px solid var(--border);}
    .filter-group { display: flex; flex-direction: column; gap: 8px; }
    .filter-group label { font-size: 13px; font-weight: 700; color: var(--text2); }
    input, select { padding: 10px 14px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; outline: none; font-family: inherit; color: var(--text); background: var(--surface);}
    input:focus, select:focus { border-color: var(--accent); }
    
    .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; display: inline-flex; align-items: center; gap: 6px; font-size: 14px; transition: 0.2s; font-family: inherit;}
    .btn:active { transform: translateY(1px); }
    .btn-search { background: var(--accent); color: white; }
    .btn-search:hover { background: var(--accent-hover); }
    .btn-print { background: var(--blue); color: white; }
    .btn-print:hover { background: #66b1ff; }
    .btn-export { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-export:hover { background: #e2e8f0; }
    .btn-export:disabled { background: var(--bg); color: var(--text2); cursor: not-allowed; }

    /* 📋 表格區 */
    .table-container { background: var(--surface); border-radius: 8px; overflow: hidden; box-shadow: 0 2px 12px rgba(30,41,59,0.05); border: 1px solid var(--border);}
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: var(--surface2); padding: 14px 16px; text-align: left; color: var(--text2); font-weight: 700; border-bottom: 1px solid var(--border); }
    td { padding: 14px 16px; border-bottom: 1px solid var(--border); color: var(--text); }
    tr:hover { background: #fafafa; }

    /* 🏷️ 狀態標籤 */
    .status-badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 700; color: white; display: inline-block; text-align: center; min-width: 60px;}
    .status-unpaid { background: var(--danger); }
    .status-partial { background: var(--warning); }
    .status-paid { background: var(--accent); }

    /* 📄 明細蓋板 */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(2px);}
    .overlay-content { background: var(--surface); width: 95%; max-width: 800px; max-height: 90vh; border-radius: 12px; padding: 30px; overflow-y: auto; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    .close-overlay { position: absolute; top: 20px; right: 24px; font-size: 28px; cursor: pointer; color: var(--text2); transition: 0.2s; line-height: 1;}
    .close-overlay:hover { color: var(--danger); transform: scale(1.1);}
    
    .detail-header { background: #f0f9eb; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; border: 1px solid #c2e7b0;}
    .detail-header div { font-size: 14px; color: var(--text); }
    .detail-header b { color: var(--accent); }

    .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); display: flex; justify-content: center; align-items: center; z-index: 2000; font-size: 16px; color: var(--accent); font-weight: 700; flex-direction: column; gap: 12px;}
    .hidden { display: none !important; }

    .clickable-id { font-weight: 700; color: var(--blue); cursor: pointer; text-decoration: underline; text-underline-offset: 4px; }
    .clickable-id:hover { color: #66b1ff; }
    .text-right { text-align: right; font-family: monospace; font-size: 14px;}
  </style>
</head>
<body>

  <div id="loadingOverlay" class="loading-overlay hidden">
    <div>🔄 處理中，請稍候...</div>
  </div>

  <div class="header">
    <h2>📊 應收帳款報表</h2>
  </div>

  <div class="summary-container">
    <div class="card card-purple">
      <div class="card-label">總應收金額</div>
      <div class="card-value" id="totalAR">$0</div>
    </div>
    <div class="card card-pink">
      <div class="card-label">未收結餘</div>
      <div class="card-value" id="totalUnpaid">$0</div>
    </div>
    <div class="card card-blue">
      <div class="card-label">已收金額</div>
      <div class="card-value" id="totalPaid">$0</div>
    </div>
  </div>

  <div class="filter-bar">
    <div class="filter-group">
      <label>📅 起始日期</label>
      <input type="date" id="dateFrom">
    </div>
    <div class="filter-group">
      <label>📅 結束日期</label>
      <input type="date" id="dateTo">
    </div>
    <div class="filter-group">
      <label>💰 付款狀態</label>
      <select id="statusFilter">
        <option value="全部">全部顯示</option>
        <option value="未收款">❌ 未收款</option>
        <option value="部分收款">⚠️ 部分收款</option>
        <option value="已收款">✅ 已收款</option>
      </select>
    </div>
    <div class="filter-group">
      <label>👤 客戶</label>
      <input type="text" id="custSearch" placeholder="快搜客戶..." autocomplete="off"
        oninput="filterCustomerSelect()" style="margin-bottom:6px;">
      <select id="customerFilter" size="1" onchange="onCustPick()">
        <option value="">-- 全部客戶 --</option>
      </select>
    </div>
    <button class="btn btn-search" onclick="fetchData()">🔍 查詢帳款</button>
    <button id="exportBtn" class="btn btn-export" onclick="exportToExcel()" disabled>📥 匯出 Excel</button>
    <button class="btn btn-print" onclick="openPrintModal()">🖨️ 列印月結對帳單</button>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th width="15%">銷貨單號</th>
          <th width="12%">日期</th>
          <th width="20%">客戶名稱</th>
          <th width="13%" style="text-align:right;">應收金額</th>
          <th width="13%" style="text-align:right;">已收金額</th>
          <th width="13%" style="text-align:right;">未收金額</th>
          <th width="14%" style="text-align:center;">付款狀態</th>
        </tr>
      </thead>
      <tbody id="reportList">
        <tr><td colspan="7" style="text-align:center; padding:40px; color:var(--text2);">👆 請設定條件後點擊查詢</td></tr>
      </tbody>
    </table>
  </div>

  <div id="detailOverlay" class="overlay">
    <div class="overlay-content">
      <span class="close-overlay" onclick="closeDetail()">&times;</span>
      <h3 style="margin-bottom:20px; color:var(--accent); font-size:20px; display:flex; align-items:center; gap:8px;">📄 銷貨單明細</h3>
      <div id="detailInner"></div>
    </div>
  </div>

  <div id="printModal" class="overlay">
    <div class="overlay-content" style="max-width: 450px;">
      <span class="close-overlay" onclick="closePrintModal()">&times;</span>
      <h3 style="margin-bottom:24px; color:var(--blue); font-size:20px;">🖨️ 列印每月應收帳款彙總表</h3>
      <div style="margin-bottom: 24px;">
        <label style="font-weight: 700; display: block; margin-bottom: 8px; color:var(--text);">📅 選擇統計月份</label>
        <input type="month" id="printMonth" style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 16px; outline:none;">
      </div>
      <button onclick="printMonthlySummary()" class="btn" style="width: 100%; padding: 14px; background: var(--blue); font-size: 16px;">產生並列印報表</button>
    </div>
  </div>

  <script>
    // ========== 1. Supabase API 設定 ==========
    const SB_URL = 'https://gkuwoandmsgvlsxzmrjj.supabase.co/rest/v1';
    const SB_KEY = 'sb_publishable_7K0w9Z8-Wv1dOgLsZkI0rA_WfNei_AS'; 
    const AUTH_TOKEN = sessionStorage.getItem('sb_auth_token') || SB_KEY;
    const HEADERS = {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${AUTH_TOKEN}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };

    var currentData = [];
    var currentSummary = { total: 0, paid: 0, unpaid: 0 };
    var allCustomers = [];

    window.onload = function() {
      const today = new Date();
      const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
      
      const offset = today.getTimezoneOffset() * 60000;
      const localToday = (new Date(today - offset)).toISOString().split('T')[0];
      const localFirstDay = (new Date(firstDay - offset)).toISOString().split('T')[0];
      const localMonth = (new Date(today - offset)).toISOString().substring(0, 7);
      
      document.getElementById('dateFrom').value = localFirstDay;
      document.getElementById('dateTo').value = localToday;
      document.getElementById('printMonth').value = localMonth;

      loadCustomers();
      fetchData();
    };

    async function loadCustomers() {
      try {
        const res = await fetch(`${SB_URL}/customers?select=id,name&order=name`, { headers: HEADERS });
        if (!res.ok) throw new Error();
        allCustomers = await res.json();
        renderCustomerSelect('');
      } catch (e) {
        document.getElementById('custSearch').placeholder = '❌ 載入失敗';
      }
    }

    function renderCustomerSelect(kw) {
      const sel = document.getElementById('customerFilter');
      const filtered = kw ? allCustomers.filter(c => c.name.toLowerCase().includes(kw.toLowerCase())) : allCustomers;
      sel.innerHTML = '<option value="">-- 全部客戶 --</option>';
      filtered.forEach(c => { sel.innerHTML += `<option value="${c.id}">${c.name}</option>`; });
      if (kw) {
        sel.size = Math.min(filtered.length + 1, 8);
        sel.style.cssText = 'width:100%; background:#fff; border:2px solid #1565C0; border-radius:6px; box-shadow:0 4px 12px rgba(21,101,192,0.15); outline:none;';
      } else {
        sel.size = 1;
        sel.style.cssText = '';
      }
    }

    function filterCustomerSelect() {
      renderCustomerSelect(document.getElementById('custSearch').value.trim());
    }

    function onCustPick() {
      const sel = document.getElementById('customerFilter');
      sel.size = 1;
      sel.style.cssText = '';
    }

    // ========== 2. 查詢應收帳款明細（直接讀 sales_orders + payment_received） ==========
    async function fetchData() {
      const from = document.getElementById('dateFrom').value;
      const to = document.getElementById('dateTo').value;
      const status = document.getElementById('statusFilter').value;
      const customerId = document.getElementById('customerFilter').value;

      const listBody = document.getElementById('reportList');
      listBody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:40px; color:var(--accent); font-weight:700;">🔄 正在讀取帳務資料...</td></tr>';
      document.getElementById('exportBtn').disabled = true;

      try {
        // 從 sales_orders 直接讀取所有銷貨單
        let query = `${SB_URL}/sales_orders?select=*&order=order_date.desc,id.desc`;
        if (from) query += `&order_date=gte.${from}`;
        if (to) query += `&order_date=lte.${to}`;
        if (customerId) query += `&customer_id=eq.${customerId}`;

        console.log('[應收帳款] 查詢URL:', query);
        const orderRes = await fetch(query, { headers: HEADERS, cache: 'no-store' });
        if (!orderRes.ok) {
          const errText = await orderRes.text();
          throw new Error('無法讀取銷貨單: HTTP ' + orderRes.status + ' ' + errText);
        }
        const orders = await orderRes.json();
        console.log('[應收帳款] 讀到', orders.length, '筆銷貨單');

        // 讀取收款紀錄，計算每張單已收多少
        let paymentsMap = {};
        try {
          const payRes = await fetch(`${SB_URL}/payment_received?select=ref_id,amount`, { headers: HEADERS, cache: 'no-store' });
          if (payRes.ok) {
            const payments = await payRes.json();
            payments.forEach(p => {
              if (p.ref_id) paymentsMap[p.ref_id] = (paymentsMap[p.ref_id] || 0) + Number(p.amount || 0);
            });
          }
        } catch (e) { console.warn('payment_received 查詢失敗'); }

        let sumTotal = 0, sumPaid = 0, sumUnpaid = 0;

        const formattedData = orders.map(o => {
          const total = Number(o.grand_total || o.total_amount || 0);
          let paid = paymentsMap[o.id] || 0;
          if (paid === 0 && (o.payment_status === '已收款' || o.payment_status === '已結清')) paid = total;
          const unpaid = Math.max(0, total - paid);

          let finalStatus = '未收款';
          if (unpaid === 0 && total > 0) finalStatus = '已收款';
          else if (paid > 0 && unpaid > 0) finalStatus = '部分收款';

          sumTotal += total;
          sumPaid += paid;
          sumUnpaid += unpaid;

          return {
            orderId: o.id,
            date: o.order_date || o.date,
            customerName: o.customer_name || o.customer_id || '未指定',
            total: total,
            paid: paid,
            unpaid: unpaid,
            status: finalStatus
          };
        });

        // 前端篩選付款狀態
        const filtered = (status === '全部') ? formattedData : formattedData.filter(r => r.status === status);

        // 重新計算篩選後的合計
        let fTotal = 0, fPaid = 0, fUnpaid = 0;
        filtered.forEach(r => { fTotal += r.total; fPaid += r.paid; fUnpaid += r.unpaid; });

        renderReport({ list: filtered, summary: { total: fTotal, paid: fPaid, unpaid: fUnpaid } });

      } catch (error) {
        console.error('[應收帳款] 錯誤:', error);
        listBody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:40px; color:var(--danger);">❌ 讀取失敗：${error.message}</td></tr>`;
      }
    }

    function renderReport(res) {
      document.getElementById('totalAR').innerText = '$' + res.summary.total.toLocaleString();
      document.getElementById('totalUnpaid').innerText = '$' + res.summary.unpaid.toLocaleString();
      document.getElementById('totalPaid').innerText = '$' + res.summary.paid.toLocaleString();

      currentData = res.list;
      currentSummary = res.summary;

      const tbody = document.getElementById('reportList');
      if (res.list.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:40px; color:var(--text2);">查無符合條件的帳務資料 🍃</td></tr>';
        return;
      }
      
      document.getElementById('exportBtn').disabled = false;

      tbody.innerHTML = res.list.map(r => {
        let badgeClass = 'status-unpaid';
        if (r.status === '已收款' || r.unpaid <= 0) badgeClass = 'status-paid';
        else if (r.paid > 0) badgeClass = 'status-partial';
        
        return `
          <tr>
            <td class="clickable-id" onclick="openDetail('${r.orderId}')">${r.orderId}</td>
            <td>${r.date}</td>
            <td style="font-weight:700;">${r.customerName}</td>
            <td class="text-right">$${r.total.toLocaleString()}</td>
            <td class="text-right" style="color:var(--accent);">$${r.paid.toLocaleString()}</td>
            <td class="text-right" style="color:var(--danger); font-weight:700;">$${r.unpaid.toLocaleString()}</td>
            <td style="text-align:center;"><span class="status-badge ${badgeClass}">${r.status}</span></td>
          </tr>
        `;
      }).join('');
    }

    // ========== 3. 銷貨單明細彈窗 ==========
    async function openDetail(orderId) {
      document.getElementById('detailOverlay').style.display = 'flex';
      const inner = document.getElementById('detailInner');
      inner.innerHTML = '<div style="text-align:center; padding:40px; color:var(--accent); font-weight:700;">⏳ 正在讀取明細資料...</div>';
      
      try {
        // 同時抓取 主單 與 明細
        const [orderRes, detailRes] = await Promise.all([
          fetch(`${SB_URL}/sales_orders?id=eq.${orderId}&select=*`, { headers: HEADERS }),
          fetch(`${SB_URL}/sales_details?order_id=eq.${orderId}&select=*`, { headers: HEADERS })
        ]);

        if (!orderRes.ok || !detailRes.ok) throw new Error('無法讀取單據資料');
        
        const orderData = await orderRes.json();
        const detailData = await detailRes.json();

        if (orderData.length === 0) throw new Error('找不到該筆銷貨單');
        
        const o = orderData[0];
        const gTotal = Number(o.grand_total || o.total || o.total_amount || 0);
        const tAmount = Number(o.tax_amount || o.tax || 0);

        inner.innerHTML = `
          <div class="detail-header">
            <div><b>單號：</b> ${o.id}</div>
            <div><b>日期：</b> ${o.order_date}</div>
            <div><b>客戶：</b> ${o.customer_name || o.customer_id}</div>
            <div><b>稅制：</b> ${o.tax_type || '免稅'}</div>
          </div>
          <table style="width:100%; border-collapse:collapse; margin-bottom:20px; border:1px solid var(--border);">
            <thead style="background:var(--surface2);">
              <tr>
                <th style="padding:10px 14px;">品名</th>
                <th style="text-align:right; padding:10px 14px;">數量</th>
                <th style="text-align:right; padding:10px 14px;">單價</th>
                <th style="text-align:right; padding:10px 14px;">小計</th>
              </tr>
            </thead>
            <tbody>
              ${detailData.map(i => {
                const price = Number(i.unit_price || i.price || 0);
                const qty = Number(i.qty || 0);
                return `
                <tr>
                  <td style="padding:10px 14px; border-bottom:1px solid var(--border); font-weight:700;">${i.product_name || i.product_id}</td>
                  <td style="text-align:right; padding:10px 14px; border-bottom:1px solid var(--border);">${qty} ${i.unit || ''}</td>
                  <td style="text-align:right; padding:10px 14px; border-bottom:1px solid var(--border); font-family:monospace;">$${price.toLocaleString()}</td>
                  <td style="text-align:right; padding:10px 14px; border-bottom:1px solid var(--border); font-family:monospace;">$${(qty*price).toLocaleString()}</td>
                </tr>
              `}).join('')}
            </tbody>
          </table>
          <div style="text-align:right; font-size:16px; border-top:2px solid var(--border); padding-top:16px;">
            <div style="font-size:14px; color:var(--text2); margin-bottom:8px;">稅額：$${tAmount.toLocaleString()}</div>
            <div style="font-weight:900; color:var(--danger); font-size:24px; font-family:monospace;">含稅總計：$${gTotal.toLocaleString()}</div>
          </div>
        `;

      } catch (error) {
        inner.innerHTML = `<div style="text-align:center; padding:30px; color:var(--danger);">❌ ${error.message}</div>`;
      }
    }

    function closeDetail() {
      document.getElementById('detailOverlay').style.display = 'none';
    }

    // ========== 4. 🖨️ 列印月結總表 ==========
    function openPrintModal() {
      document.getElementById('printModal').style.display = 'flex';
    }

    function closePrintModal() {
      document.getElementById('printModal').style.display = 'none';
    }

    async function printMonthlySummary() {
      const month = document.getElementById('printMonth').value;
      if (!month) { Swal.fire('提示','請選擇月份！','warning'); return; }
      
      const btn = event.target;
      btn.disabled = true;
      btn.innerText = '🔄 報表產生中...';

      // 算出月份起迄
      const [y, m] = month.split('-');
      const startDate = `${y}-${m}-01`;
      const lastDay = new Date(y, m, 0).getDate();
      const endDate = `${y}-${m}-${lastDay}`;

      try {
        // 從 sales_orders 讀取該月銷貨單
        const orderRes = await fetch(`${SB_URL}/sales_orders?select=*&order_date=gte.${startDate}&order_date=lte.${endDate}`, { headers: HEADERS });
        if (!orderRes.ok) throw new Error('讀取資料失敗');
        const orders = await orderRes.json();

        if (orders.length === 0) {
          Swal.fire('提示', '該月份尚無帳務紀錄', 'info');
          btn.disabled = false;
          btn.innerText = '產生並列印報表';
          return;
        }

        // 讀取收款紀錄
        let paymentsMap = {};
        try {
          const payRes = await fetch(`${SB_URL}/payment_received?select=ref_id,amount&payment_date=gte.${startDate}&payment_date=lte.${endDate}`, { headers: HEADERS });
          if (payRes.ok) {
            const payments = await payRes.json();
            payments.forEach(p => { if (p.ref_id) paymentsMap[p.ref_id] = (paymentsMap[p.ref_id] || 0) + Number(p.amount || 0); });
          }
        } catch (e) {}

        // 依據客戶名稱 Group By 加總
        const custMap = {};
        orders.forEach(o => {
          const cName = o.customer_name || o.customer_id || '未指定';
          if (!custMap[cName]) custMap[cName] = { custName: cName, sales: 0, paid: 0, unpaid: 0 };
          const total = Number(o.grand_total || o.total_amount || 0);
          let paid = paymentsMap[o.id] || 0;
          if (paid === 0 && (o.payment_status === '已收款' || o.payment_status === '已結清')) paid = total;
          const unpaid = Math.max(0, total - paid);
          custMap[cName].sales += total;
          custMap[cName].paid += paid;
          custMap[cName].unpaid += unpaid;
        });

        const printData = Object.values(custMap);
        closePrintModal();
        openPrintWindow(printData, month);

      } catch (error) {
        Swal.fire('錯誤', error.message, 'error');
      } finally {
        btn.disabled = false;
        btn.innerText = '產生並列印報表';
      }
    }

    // ⭐ 專業列印格式（對帳單）
    function openPrintWindow(data, month) {
      let sumSales = 0, sumPaid = 0, sumUnpaid = 0;
      data.forEach(row => {
        sumSales += row.sales;
        sumPaid += row.paid;
        sumUnpaid += row.unpaid;
      });

      const w = window.open('', '_blank');
      w.document.write(`
        <!DOCTYPE html>
        <html>
        <head>
          <meta charset="UTF-8">
          <title>每月應收帳款彙總表-${month}</title>
          <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body { font-family: "Microsoft JhengHei", sans-serif; padding: 8mm; font-size: 12px; }
            .header { text-align: center; margin-bottom: 6mm; border-bottom: 2px solid #000; padding-bottom: 4mm; }
            .header h1 { font-size: 22px; margin-bottom: 3mm; letter-spacing: 2px;}
            .header h2 { font-size: 16px; margin-bottom: 3mm; }
            .header p { font-size: 13px; color: #333; }
            table { width: 100%; border-collapse: collapse; margin-top: 5mm; }
            th { background: #f0f0f0; padding: 3mm; border: 1px solid #000; text-align: center; font-size: 13px; font-weight: bold; }
            td { padding: 3mm; border: 1px solid #666; font-size: 13px; }
            .text-right { text-align: right; font-family: monospace; font-size: 14px;}
            .text-center { text-align: center; }
            .total-row { background: #e8e8e8; font-weight: bold; }
            .total-row td { border-top: 2px solid #000;}
            .unpaid { color: #c00; font-weight: bold; }
            .footer { margin-top: 8mm; padding-top: 4mm; border-top: 2px solid #000; text-align: right; font-size: 13px; }
            .footer-row { margin: 2mm 0; }
            .footer-total { font-size: 18px; font-weight: bold; margin-top: 4mm; }
            @page { margin: 8mm; size: A4; }
            @media print{ *{-webkit-print-color-adjust:exact !important; print-color-adjust:exact !important;} }
          </style>
        </head>
        <body>
          <div style="text-align:center; font-size:22px; font-weight:bold; margin-bottom:6px;">丸十水產股份有限公司</div>
          <div style="text-align:center; font-size:15px; letter-spacing:8px; margin-bottom:16px;">應 收 帳 款 報 表（龍潭總倉）</div>
          <div class="header">
            <h1>龍潭進銷存總倉</h1>
            <h2>每月應收帳款彙總表</h2>
            <p>統計月份：${month}</p>
          </div>
          
          <table>
            <thead>
              <tr>
                <th width="30%">客戶名稱</th>
                <th width="20%">本月總銷售 (含稅)</th>
                <th width="25%">本月已實收</th>
                <th width="25%">結餘未收款</th>
              </tr>
            </thead>
            <tbody>
              ${data.map(row => `
              <tr>
                <td style="font-weight:bold;">${row.custName}</td>
                <td class="text-right">$${row.sales.toLocaleString()}</td>
                <td class="text-right">$${row.paid.toLocaleString()}</td>
                <td class="text-right unpaid">$${row.unpaid.toLocaleString()}</td>
              </tr>
              `).join('')}
              <tr class="total-row">
                <td class="text-center">全體客戶總計</td>
                <td class="text-right">$${sumSales.toLocaleString()}</td>
                <td class="text-right">$${sumPaid.toLocaleString()}</td>
                <td class="text-right unpaid" style="font-size:16px;">$${sumUnpaid.toLocaleString()}</td>
              </tr>
            </tbody>
          </table>
          
          <div class="footer">
            <div class="footer-row">交易客戶數：${data.length} 家</div>
            <div class="footer-row">本月總銷售：$${sumSales.toLocaleString()}</div>
            <div class="footer-row">本月已收款：$${sumPaid.toLocaleString()}</div>
            <div class="footer-row footer-total">應收總計：$${sumUnpaid.toLocaleString()}</div>
          </div>
          <script>
            window.onload = function() { setTimeout(function() { window.print(); window.close(); }, 500); };
          <\/script>
        </body>
        </html>
      `);
      w.document.close();
    }

    // ========== 5. 匯出 Excel 功能 ==========
    function exportToExcel() {
      if (currentData.length === 0) return;
      
      const btn = document.getElementById('exportBtn');
      btn.disabled = true;
      btn.innerText = '⏳ 匯出中...';
      
      const dateFrom = document.getElementById('dateFrom').value;
      const dateTo = document.getElementById('dateTo').value;
      
      let csvContent = '\uFEFF'; 
      csvContent += '應收帳款報表\n';
      csvContent += `查詢期間,${dateFrom} ~ ${dateTo}\n\n`;
      csvContent += '銷貨單號,日期,客戶名稱,應收金額,已收金額,未收金額,付款狀態\n';
      
      currentData.forEach(row => {
        csvContent += `"${row.orderId}","${row.date}","${row.customerName}",${row.total},${row.paid},${row.unpaid},"${row.status}"\n`;
      });
      
      csvContent += '\n';
      csvContent += `"","","合計",${currentSummary.total},${currentSummary.paid},${currentSummary.unpaid},""\n`;
      csvContent += `"","","共 ${currentData.length} 筆","","","",""\n`;
      
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      
      link.setAttribute('href', url);
      link.setAttribute('download', `應收帳款報表_${dateFrom}_${dateTo}.csv`);
      link.style.display = 'none';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      
      btn.disabled = false;
      btn.innerText = '📥 匯出 Excel';
    }
  </script>
</body>
</html>
