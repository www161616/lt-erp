<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>龍潭進銷存系統 - 支出明細與發票補錄</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ========== 石板灰護眼主題變數 ========== */
    :root {
      --bg: #f8f9fb;             
      --surface: #ffffff;        
      --surface2: #f1f5f9;       
      --border: #e2e8f0;         
      --accent: #475569;         /* 石板灰 */
      --accent-hover: #334155;
      --text: #1e293b;           
      --text2: #64748b;          
      --danger: #c53030;         
      --warning: #b7791f;

      /* 專屬色 */
      --expense: #475569;        /* 石板灰 */
      --invoice: #553c9a;        /* 發票紫 */
      --invoice-hover: #44337a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      font-family: 'Noto Sans TC', system-ui, -apple-system, sans-serif; 
      font-size: 14px; 
      padding: 24px; 
      background: var(--bg); 
      color: var(--text); 
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    
    .container {
      background: var(--surface);
      padding: 24px 30px;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(30,41,59,0.07);
      width: 100%;
      max-width: 600px;
      border-top: 4px solid var(--expense); /* 支出明細使用橘色頂條 */
    }

    h2 { 
      color: var(--expense); 
      font-size: 20px; 
      font-weight: 700; 
      margin-bottom: 20px;
      border-bottom: 2px solid var(--border);
      padding-bottom: 12px;
      display: flex; 
      align-items: center; 
      gap: 8px;
    }

    /* 搜尋控制區 */
    .control-group { 
      display: flex; 
      gap: 12px; 
      margin-bottom: 24px; 
    }
    
    input[type="month"] { 
      flex: 1; padding: 12px 16px; font-size: 15px; border: 1px solid var(--border); 
      border-radius: 6px; font-family: inherit; color: var(--text); outline: none; transition: 0.2s;
    }
    input[type="month"]:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(71,85,105,0.1); }
    
    .btn { 
      padding: 12px 24px; font-size: 15px; font-weight: 700; border: none; 
      border-radius: 6px; cursor: pointer; background: var(--expense); color: white; 
      transition: 0.2s; font-family: inherit; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn:hover { background: #334155; }
    .btn:active { transform: translateY(1px); }

    /* 支出明細卡片清單 */
    .item-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .item-card { 
      background: var(--surface); 
      border: 1px solid var(--border); 
      border-left: 4px solid var(--warning); 
      padding: 16px; 
      border-radius: 6px; 
      transition: all 0.2s;
    }
    .item-card:hover { border-color: var(--accent); box-shadow: 0 4px 12px rgba(30,41,59,0.07); }

    .item-header { display: flex; justify-content: space-between; margin-bottom: 8px; align-items: center; }
    .item-title { font-size: 15px; font-weight: 700; color: var(--text); }
    .item-amount { font-size: 18px; font-weight: 900; color: var(--expense); font-family: monospace; }
    
    .item-desc { font-size: 14px; color: var(--text2); margin-bottom: 12px; }

    .item-footer { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      border-top: 1px dashed var(--border);
      padding-top: 12px;
    }
    
    .item-id { font-size: 12px; color: var(--text2); font-family: monospace; background: var(--surface2); padding: 2px 6px; border-radius: 4px;}

    /* 紫色補錄發票按鈕 */
    .btn-invoice { 
      padding: 8px 16px; background: var(--invoice); color: white; border: none; 
      border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 700; 
      transition: 0.2s; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-invoice:hover { background: var(--invoice-hover); transform: translateY(-1px); box-shadow: 0 2px 6px rgba(85,60,154,0.3);}
    .btn-invoice:active { transform: translateY(1px); }
    .btn-invoice:disabled { background: var(--border); color: var(--text2); cursor: not-allowed; box-shadow: none;}

    .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); display: flex; justify-content: center; align-items: center; z-index: 2000; font-size: 16px; color: var(--expense); font-weight: 700; flex-direction: column; gap: 12px;}
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="loadingOverlay" class="loading-overlay hidden">
    <div>🔄 正在載入支出資料...</div>
  </div>

  <div class="container">
    <h2>📋 支出明細與發票補錄</h2>
    
    <div class="control-group">
      <input type="month" id="monthInput" />
      <button class="btn" onclick="fetchExpenses()">🔍 查詢</button>
    </div>
    
    <div id="list" class="item-list">
      <div style="text-align:center; padding:40px; color:var(--text2);">👆 請選擇月份並點擊查詢</div>
    </div>
  </div>

  <script>
    // ========== 1. Supabase API 設定 ==========
    const SB_URL = 'https://gkuwoandmsgvlsxzmrjj.supabase.co/rest/v1';
    const SB_KEY = 'sb_publishable_7K0w9Z8-Wv1dOgLsZkI0rA_WfNei_AS'; 
    const AUTH_TOKEN = sessionStorage.getItem('sb_auth_token') || SB_KEY;
    const HEADERS = {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${AUTH_TOKEN}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };

    window.onload = function() {
      // 預設帶入當前月份 (處理時區)
      const today = new Date();
      const offset = today.getTimezoneOffset() * 60000;
      document.getElementById('monthInput').value = (new Date(today - offset)).toISOString().substring(0, 7);
      
      // 自動載入當月資料
      fetchExpenses();
    };

    // ========== 2. 獲取資料 (GET) ==========
    async function fetchExpenses() {
      const monthVal = document.getElementById('monthInput').value;
      if (!monthVal) return;

      const listDiv = document.getElementById('list');
      const loader = document.getElementById('loadingOverlay');
      loader.classList.remove('hidden');

      // 算出月份起迄
      const [year, month] = monthVal.split('-');
      const startDate = `${year}-${month}-01`;
      const lastDay = new Date(year, month, 0).getDate();
      const endDate = `${year}-${month}-${lastDay}`;

      try {
        // 🔥 無敵防呆讀取：select=*
        const res = await fetch(`${SB_URL}/expenses?expense_date=gte.${startDate}&expense_date=lte.${endDate}&select=*&order=expense_date.desc`, { headers: HEADERS });
        
        if (!res.ok) throw new Error('讀取資料庫失敗');
        const data = await res.json();

        renderExpenses(data);

      } catch (error) {
        listDiv.innerHTML = `<div style="text-align:center; padding:30px; color:var(--danger);">❌ 查詢錯誤：<br>${error.message}</div>`;
      } finally {
        loader.classList.add('hidden');
      }
    }

    // ========== 3. 渲染清單 ==========
    function renderExpenses(data) {
      const listDiv = document.getElementById('list');

      if (data.length === 0) {
        listDiv.innerHTML = '<div style="text-align:center; padding:40px; color:var(--text2); font-size:15px;">本月尚無任何支出紀錄 🍃</div>';
        return;
      }

      const html = data.map(item => {
        // 防呆欄位讀取
        const date = item.expense_date || item.date || '未知日期';
        const category = item.category || '未分類';
        const amount = Number(item.amount || 0);
        const itemName = item.item || '未填寫項目';
        const payMethod = item.payment_method || '現金';
        const expId = item.id;

        return `
          <div class="item-card">
            <div class="item-header">
              <div class="item-title">${date} | ${category}</div>
              <div class="item-amount">$${amount.toLocaleString()}</div>
            </div>
            <div class="item-desc">${itemName} | 支付：${payMethod}</div>
            
            <div class="item-footer">
              <span class="item-id">編號：${expId}</span>
              <button class="btn-invoice" onclick="linkToInvoice('${expId}', this)">
                🧾 補錄發票
              </button>
            </div>
          </div>
        `;
      }).join('');
      
      listDiv.innerHTML = html;
    }

    // ========== 4. 跳轉補錄發票邏輯 ==========
    function linkToInvoice(expId, btnElement) {
      btnElement.disabled = true;
      btnElement.innerHTML = '🔄 轉跳中...';

      // 由於是純網頁環境，我們直接把支出單號 (expId) 當作 URL 參數傳遞到發票頁面
      // 假設你的進項發票頁面叫做 add_invoice.html
      
      Swal.fire({
        title: '準備補錄發票',
        text: '即將為您導向進項發票登錄頁面，並自動帶入此筆支出紀錄。',
        icon: 'info',
        showCancelButton: true,
        confirmButtonColor: 'var(--invoice)',
        confirmButtonText: '前往登錄',
        cancelButtonText: '取消'
      }).then((result) => {
        if (result.isConfirmed) {
          // 🛑 這裡請替換成你真實的「新增進項發票」的 HTML 檔案名稱
          window.location.href = `add_invoice.html?expense_id=${expId}`;
        } else {
          btnElement.disabled = false;
          btnElement.innerHTML = '🧾 補錄發票';
        }
      });
    }
  </script>
</body>
</html>
