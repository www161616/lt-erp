<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>商品管理</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="libs/sweetalert2.min.js"></script>
  <style>
    :root {
      --primary: #475569;
      --bg: #f8f9fb;
      --border: #e2e8f0;
      --text: #1e293b;
    }
    body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); padding: 20px; color: var(--text); }

    /* 工具列 */
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; background: #fff; padding: 15px 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(30,41,59,0.07); flex-wrap: wrap; gap: 10px; }
    .filter-area { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .filter-area input, .filter-area select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 4px; font-size: 14px; outline: none; font-family: inherit; color: var(--text); }
    .filter-area input { width: 220px; }
    .filter-area input:focus, .filter-area select:focus { border-color: var(--primary); }

    .btn { padding: 8px 15px; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 6px; font-size: 14px; text-decoration: none; white-space: nowrap; }
    .btn:hover { background: #334155; }
    .btn-secondary { background: #64748b; }
    .btn-secondary:hover { background: #73767a; }
    .btn-danger { background: #c53030; }
    .btn-danger:hover { background: #9b2c2c; }
    .btn-warning { background: #b7791f; }
    .btn-warning:hover { background: #975a16; }
    .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-outline:hover { background: #f0f0f0; }

    /* 批次操作列 */
    .bulk-bar { display: none; align-items: center; gap: 12px; background: #fefcbf; border: 1px solid #ecc94b; border-radius: 8px; padding: 12px 20px; margin-bottom: 12px; }
    .bulk-bar.active { display: flex; }
    .bulk-count { font-weight: 700; color: #c05621; flex: 1; }

    /* 表格 */
    .table-wrapper { overflow-x: auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(30,41,59,0.07); }
    table { width: 100%; min-width: 1350px; border-collapse: collapse; font-size: 13px; }
    th { background: #f1f5f9; padding: 11px 12px; text-align: left; font-weight: 600; color: #475569; border-bottom: 2px solid var(--border); white-space: nowrap; }
    td { padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:hover { background-color: #f1f5f9; }
    tr.selected-row { background: #fffde7 !important; }

    .status-badge { padding: 3px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; cursor: pointer; user-select: none; transition: 0.2s; white-space: nowrap; }
    .status-badge:hover { opacity: 0.75; }
    .status-active { background: #e2e8f0; color: var(--primary); }
    .status-inactive { background: #fed7d7; color: #c53030; }

    .num { text-align: right; font-family: monospace; font-size: 13px; }
    .date-text { font-size: 12px; color: #64748b; white-space: nowrap; }
    .supplier-text { font-size: 12px; color: #475569; max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--primary); }

    .result-count { font-size: 13px; color: #64748b; padding: 8px 0 4px 4px; }

    /* 批次編輯 */
    .edit-input { width: 100%; padding: 4px 6px; border: 1px solid #93c5fd; border-radius: 3px; font-size: 13px; font-family: inherit; background: #eff6ff; color: var(--text); box-sizing: border-box; }
    .edit-input:focus { border-color: var(--primary); outline: none; background: #fff; }
    .edit-num { text-align: right; font-family: monospace; }
    tr.editing-row { background: #eff6ff !important; }
    tr.editing-row:hover { background: #dbeafe !important; }
    .edit-changed { background: #fef3c7 !important; border-color: #f59e0b !important; }
    .bulk-edit-btns { display: inline-flex; gap: 8px; align-items: center; }

    /* 排序 */
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { background: #eef0f3; color: var(--primary); }
    th.sort-asc, th.sort-desc { color: var(--primary); background: #f0f9eb; }
    .sort-icon { font-size: 11px; margin-left: 3px; opacity: 0.5; }
    th.sort-asc .sort-icon, th.sort-desc .sort-icon { opacity: 1; }

    /* 分頁列 */
    .pagination { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 14px 16px; background: #fff; border-top: 1px solid var(--border); border-radius: 0 0 8px 8px; flex-wrap: wrap; }
    .page-btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: 4px; background: #fff; cursor: pointer; font-size: 13px; color: var(--text); transition: 0.2s; font-family: inherit; }
    .page-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }
    .page-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); font-weight: 700; }
    .page-btn:disabled { color: #94a3b8; cursor: not-allowed; }
    .page-info { font-size: 13px; color: #475569; padding: 0 4px; }
    .jump-area { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #475569; border-left: 1px solid var(--border); padding-left: 12px; margin-left: 4px; }
    .jump-area input { width: 52px; padding: 5px 6px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; text-align: center; outline: none; font-family: inherit; }
    .jump-area input:focus { border-color: var(--primary); }
  </style>
</head>
<body>

  <div class="toolbar">
    <div class="filter-area">
      <select id="categoryFilter" onchange="filterTable()">
        <option value="">全部類別</option>
      </select>
      <input type="text" id="searchInput" placeholder="搜尋商品編號或名稱..." oninput="filterTable()">
      <button class="btn btn-secondary" onclick="fetchProducts()"><i class="fas fa-sync-alt"></i> 重新整理</button>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-secondary" onclick="exportProducts()"><i class="fas fa-file-excel"></i> 匯出 Excel</button>
      <button class="btn btn-warning" onclick="document.getElementById('importFile').click()"><i class="fas fa-file-import"></i> 匯入價格</button>
      <input type="file" id="importFile" accept=".xlsx,.xls" style="display:none" onchange="importPrices(this)">
      <a href="ProductForm.html" onclick="event.preventDefault(); if(window.parent&&window.parent.loadPage) window.parent.loadPage('ProductForm.html','新增商品'); else window.location.href='ProductForm.html';" class="btn"><i class="fas fa-plus"></i> 新增商品</a>
    </div>
  </div>

  <!-- 批次操作列（勾選後顯示） -->
  <div class="bulk-bar" id="bulkBar">
    <span class="bulk-count" id="bulkCount">已選取 0 個商品</span>
    <span id="bulkNormalBtns">
      <button class="btn" onclick="enterEditMode()"><i class="fas fa-edit"></i> 批次編輯</button>
      <button class="btn" style="background:#047857;" onclick="bulkEnable()"><i class="fas fa-check"></i> 批次啟用</button>
      <button class="btn btn-warning" onclick="bulkDisable()"><i class="fas fa-ban"></i> 批次停用</button>
      <button class="btn btn-danger" onclick="bulkDelete()"><i class="fas fa-trash"></i> 批次刪除</button>
      <button class="btn btn-outline" onclick="clearSelection()"><i class="fas fa-times"></i> 取消選取</button>
    </span>
    <span id="bulkEditBtns" class="bulk-edit-btns" style="display:none;">
      <button class="btn" onclick="saveBulkEdits()"><i class="fas fa-save"></i> 儲存修改</button>
      <button class="btn btn-outline" onclick="exitEditMode()"><i class="fas fa-undo"></i> 取消編輯</button>
    </span>
  </div>

  <div id="resultCount" class="result-count"></div>

  <div class="table-wrapper">
    <table id="productTable" style="border-radius: 8px 8px 0 0;">
      <thead id="tableHead">
        <tr>
          <th style="width:36px;"><input type="checkbox" id="selectAll" onchange="toggleSelectAll(this.checked)" title="全選"></th>
          <th class="sortable" data-field="id" onclick="sortBy('id')">商品編號 <span class="sort-icon">↕</span></th>
          <th class="sortable" data-field="category" onclick="sortBy('category')">類別 <span class="sort-icon">↕</span></th>
          <th class="sortable" data-field="name" onclick="sortBy('name')">商品名稱 <span class="sort-icon">↕</span></th>
          <th class="sortable" data-field="spec" onclick="sortBy('spec')">規格 <span class="sort-icon">↕</span></th>
          <th>單位</th>
          <th class="num sortable" data-field="price" onclick="sortBy('price')">售價 <span class="sort-icon">↕</span></th>
          <th class="num sortable" data-field="price_branch" onclick="sortBy('price_branch')">分店價 <span class="sort-icon">↕</span></th>
          <th class="num sortable" data-field="price_wholesale" onclick="sortBy('price_wholesale')">批發價 <span class="sort-icon">↕</span></th>
          <th class="num sortable" data-field="price_group" onclick="sortBy('price_group')">團購價 <span class="sort-icon">↕</span></th>
          <th class="num sortable" data-field="cost" onclick="sortBy('cost')">成本 <span class="sort-icon">↕</span></th>
          <th class="sortable" data-field="supplier" onclick="sortBy('supplier')">供應商 <span class="sort-icon">↕</span></th>
          <th class="sortable" data-field="created_at" onclick="sortBy('created_at')">建立日期 <span class="sort-icon">↕</span></th>
          <th class="sortable" data-field="status" onclick="sortBy('status')">狀態 <span class="sort-icon">↕</span></th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="15" style="text-align:center; padding:30px;"><i class="fas fa-spinner fa-spin"></i> 載入中...</td></tr>
      </tbody>
    </table>
    <div class="pagination" id="paginationBar"></div>
  </div>

<script>
  const SB_URL = 'https://asugjynpocwygggttxyo.supabase.co/rest/v1';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzdWdqeW5wb2N3eWdnZ3R0eHlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNzU3MjksImV4cCI6MjA4ODk1MTcyOX0.LzcRQAl80rZxKKD8NIYWGvylfwCbs1ek5LtKpmZodBc';
    const AUTH_TOKEN = sessionStorage.getItem('sb_auth_token') || SB_KEY;
  const HEADERS = { 'apikey': SB_KEY, 'Authorization': `Bearer ${AUTH_TOKEN}` };

  const PAGE_SIZE = 100;
  let currentPage = 1;
  let sortField = 'id';
  let sortDir = 'asc';
  let allProducts = [];
  let selectedIds = new Set();

  window.onload = () => {
    const autoKeyword = sessionStorage.getItem('productListKeyword');
    if (autoKeyword) {
      document.getElementById('searchInput').value = autoKeyword;
      sessionStorage.removeItem('productListKeyword');
    }
    fetchProducts();
  };

  // ========== 1. 讀取商品（分頁抓取，突破 1000 筆限制）==========
  async function fetchProducts() {
    document.getElementById('tableBody').innerHTML = '<tr><td colspan="15" style="text-align:center; padding:30px;"><i class="fas fa-spinner fa-spin"></i> 載入中...</td></tr>';
    try {
      let all = [], offset = 0, limit = 1000, hasMore = true;
      while (hasMore) {
        const res = await fetch(`${SB_URL}/products?order=id.asc&limit=${limit}&offset=${offset}`, { headers: HEADERS });
        if (!res.ok) throw new Error('讀取失敗');
        const data = await res.json();
        all = all.concat(data);
        if (data.length < limit) hasMore = false;
        else offset += limit;
      }
      allProducts = all;
      selectedIds.clear();
      updateBulkBar();
      buildCategoryFilter();
      filterTable();
    } catch (err) {
      Swal.fire('錯誤', err.message, 'error');
      document.getElementById('tableBody').innerHTML = `<tr><td colspan="15" style="text-align:center;color:red;">載入失敗</td></tr>`;
    }
  }

  // ========== 2. 建立類別下拉 ==========
  function buildCategoryFilter() {
    const sel = document.getElementById('categoryFilter');
    const current = sel.value;
    const cats = [...new Set(allProducts.map(p => p.category || '未分類').filter(Boolean))].sort();
    sel.innerHTML = '<option value="">全部類別</option>';
    cats.forEach(c => { sel.innerHTML += `<option value="${c}">${c}</option>`; });
    sel.value = current; // 保留先前選的
  }

  // ========== 3. 渲染表格 ==========
  function renderTable(data) {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';

    const totalPages = Math.max(1, Math.ceil(data.length / PAGE_SIZE));
    currentPage = Math.min(currentPage, totalPages);
    const pageData = data.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);

    const countLabel = data.length === allProducts.length
      ? `共 ${data.length} 筆`
      : `篩選結果：${data.length} / ${allProducts.length} 筆`;
    document.getElementById('resultCount').textContent =
      totalPages > 1 ? `${countLabel}，第 ${currentPage} / ${totalPages} 頁` : countLabel;

    if (data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="15" style="text-align:center; padding:30px; color:#64748b;">查無符合條件的商品</td></tr>';
      document.getElementById('paginationBar').innerHTML = '';
      updateSelectAllState([]);
      return;
    }

    renderPagination(data.length, totalPages);

    pageData.forEach(p => {
      const isActive = !p.status || p.status === '啟用';
      const statusClass = isActive ? 'status-active' : 'status-inactive';
      const statusText = isActive ? '啟用' : '停用';
      const isSelected = selectedIds.has(p.id);
      const createdDate = p.created_at ? p.created_at.split('T')[0] : '-';

      const fmt = v => v ? '$' + Number(v).toLocaleString() : '-';

      const tr = document.createElement('tr');
      if (isSelected) tr.classList.add('selected-row');
      tr.innerHTML = `
        <td><input type="checkbox" class="row-check" value="${p.id}" ${isSelected ? 'checked' : ''} onchange="toggleSelect('${p.id}', this.checked)"></td>
        <td><strong style="font-family:monospace;">${p.id}</strong></td>
        <td><span style="font-size:12px; background:#f0f9eb; color:var(--primary); padding:2px 7px; border-radius:10px;">${p.category || '未分類'}</span></td>
        <td>${p.name}</td>
        <td style="color:#64748b; font-size:12px;">${p.spec || '-'}</td>
        <td style="font-size:12px;">${p.unit || '個'}</td>
        <td class="num">${fmt(p.price)}</td>
        <td class="num" style="color:#1976D2;">${fmt(p.price_branch)}</td>
        <td class="num" style="color:#7B1FA2;">${fmt(p.price_wholesale)}</td>
        <td class="num" style="color:#E65100;">${fmt(p.price_group)}</td>
        <td class="num" style="color:#64748b;">${fmt(p.cost)}</td>
        <td class="supplier-text" title="${p.supplier || ''}">${p.supplier || '-'}</td>
        <td class="date-text">${createdDate}</td>
        <td><span class="status-badge ${statusClass}" onclick="toggleStatus('${p.id}', '${statusText}')" title="點擊切換狀態">${statusText}</span></td>
        <td>
          <button class="btn" style="padding:4px 8px; font-size:12px;" onclick="editProduct('${p.id}')">
            <i class="fas fa-edit"></i> 編輯
          </button>
        </td>
      `;
      tbody.appendChild(tr);
    });

    updateSelectAllState(pageData);
  }

  function renderPagination(total, totalPages) {
    const bar = document.getElementById('paginationBar');
    if (totalPages <= 1) { bar.innerHTML = ''; return; }

    let html = `<button class="page-btn" onclick="gotoPage(1)" ${currentPage === 1 ? 'disabled' : ''}>«</button>`;
    html += `<button class="page-btn" onclick="gotoPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹</button>`;

    const start = Math.max(1, currentPage - 2);
    const end = Math.min(totalPages, start + 4);
    for (let i = start; i <= end; i++) {
      html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="gotoPage(${i})">${i}</button>`;
    }

    html += `<button class="page-btn" onclick="gotoPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>›</button>`;
    html += `<button class="page-btn" onclick="gotoPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>»</button>`;
    html += `<span class="page-info">共 <b>${totalPages}</b> 頁 / ${total} 筆</span>`;
    html += `<div class="jump-area">跳至 <input type="number" id="jumpInput" min="1" max="${totalPages}" placeholder="${currentPage}" onkeydown="if(event.key==='Enter') doJump(${totalPages})"> 頁 <button class="page-btn" onclick="doJump(${totalPages})">前往</button></div>`;
    bar.innerHTML = html;
  }

  function gotoPage(n) {
    if (editMode) { Swal.fire('提示', '請先儲存或取消編輯', 'info'); return; }
    currentPage = n;
    renderTable(getFiltered());
    document.getElementById('productTable').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function doJump(totalPages) {
    const val = parseInt(document.getElementById('jumpInput').value);
    if (!val || val < 1 || val > totalPages) return;
    gotoPage(val);
  }

  function updateSelectAllState(visibleData) {
    const cb = document.getElementById('selectAll');
    const visibleIds = visibleData.map(p => p.id);
    const checkedCount = visibleIds.filter(id => selectedIds.has(id)).length;
    cb.checked = visibleIds.length > 0 && checkedCount === visibleIds.length;
    cb.indeterminate = checkedCount > 0 && checkedCount < visibleIds.length;
  }

  // ========== 4. 篩選 + 排序 ==========
  function getFiltered() {
    const kw = document.getElementById('searchInput').value.toLowerCase().trim();
    const cat = document.getElementById('categoryFilter').value;
    const filtered = allProducts.filter(p => {
      const matchCat = !cat || (p.category || '未分類') === cat;
      const matchKw = !kw || (p.id && p.id.toLowerCase().includes(kw)) || (p.name && p.name.toLowerCase().includes(kw));
      return matchCat && matchKw;
    });
    return getSorted(filtered);
  }

  function getSorted(data) {
    const numFields = ['price', 'price_branch', 'price_wholesale', 'price_group', 'cost'];
    return [...data].sort((a, b) => {
      let va = a[sortField] ?? '';
      let vb = b[sortField] ?? '';
      if (numFields.includes(sortField)) {
        va = Number(va) || 0; vb = Number(vb) || 0;
        return sortDir === 'asc' ? va - vb : vb - va;
      }
      va = String(va).toLowerCase(); vb = String(vb).toLowerCase();
      if (va < vb) return sortDir === 'asc' ? -1 : 1;
      if (va > vb) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });
  }

  function sortBy(field) {
    if (editMode) { Swal.fire('提示', '請先儲存或取消編輯', 'info'); return; }
    if (sortField === field) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    else { sortField = field; sortDir = 'asc'; }
    updateSortHeaders();
    renderTable(getFiltered());
  }

  function updateSortHeaders() {
    document.querySelectorAll('th.sortable').forEach(th => {
      const f = th.dataset.field;
      th.classList.remove('sort-asc', 'sort-desc');
      const icon = th.querySelector('.sort-icon');
      if (f === sortField) {
        th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
        if (icon) icon.textContent = sortDir === 'asc' ? '▲' : '▼';
      } else {
        if (icon) icon.textContent = '↕';
      }
    });
  }

  function filterTable() {
    if (editMode) return;
    currentPage = 1;
    renderTable(getFiltered());
  }

  // ========== 5. 勾選邏輯 ==========
  function toggleSelectAll(checked) {
    // 只影響本頁顯示的商品
    const data = getFiltered();
    const totalPages = Math.max(1, Math.ceil(data.length / PAGE_SIZE));
    const cp = Math.min(currentPage, totalPages);
    const pageData = data.slice((cp - 1) * PAGE_SIZE, cp * PAGE_SIZE);
    pageData.forEach(p => { checked ? selectedIds.add(p.id) : selectedIds.delete(p.id); });
    filterTable();
    updateBulkBar();
  }

  function toggleSelect(id, checked) {
    checked ? selectedIds.add(id) : selectedIds.delete(id);
    const tr = document.querySelector(`.row-check[value="${id}"]`)?.closest('tr');
    if (tr) tr.classList.toggle('selected-row', checked);
    updateSelectAllState(getFiltered());
    updateBulkBar();
  }

  function updateBulkBar() {
    const bar = document.getElementById('bulkBar');
    bar.classList.toggle('active', selectedIds.size > 0);
    document.getElementById('bulkCount').textContent = `已選取 ${selectedIds.size} 個商品`;
  }

  function clearSelection() {
    selectedIds.clear();
    filterTable();
    updateBulkBar();
  }

  // ========== 6a. 批次啟用 ==========
  async function bulkEnable() {
    const ids = [...selectedIds];
    if (ids.length === 0) return;
    const confirmed = await Swal.fire({
      title: `批次啟用 ${ids.length} 個商品？`,
      icon: 'question', showCancelButton: true,
      confirmButtonColor: '#047857', confirmButtonText: '確定啟用', cancelButtonText: '取消'
    });
    if (!confirmed.isConfirmed) return;
    try {
      const idList = ids.map(id => `"${id}"`).join(',');
      const res = await fetch(`${SB_URL}/products?id=in.(${idList})`, {
        method: 'PATCH',
        headers: { ...HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
        body: JSON.stringify({ status: '啟用' })
      });
      if (!res.ok) throw new Error('啟用失敗');
      ids.forEach(id => { const p = allProducts.find(x => x.id === id); if (p) p.status = '啟用'; });
      selectedIds.clear();
      filterTable();
      updateBulkBar();
      Swal.fire({ icon: 'success', title: '完成', text: `已啟用 ${ids.length} 個商品`, timer: 1500, showConfirmButton: false });
    } catch (err) { Swal.fire('錯誤', err.message, 'error'); }
  }

  // ========== 6b. 批次停用 ==========
  async function bulkDisable() {
    const ids = [...selectedIds];
    if (ids.length === 0) return;
    const confirmed = await Swal.fire({
      title: `批次停用 ${ids.length} 個商品？`,
      text: '這些商品將被標記為停用，之後仍可手動重新啟用。',
      icon: 'warning', showCancelButton: true,
      confirmButtonColor: '#b7791f', confirmButtonText: '確定停用', cancelButtonText: '取消'
    });
    if (!confirmed.isConfirmed) return;
    try {
      const idList = ids.map(id => `"${id}"`).join(',');
      const res = await fetch(`${SB_URL}/products?id=in.(${idList})`, {
        method: 'PATCH',
        headers: { ...HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
        body: JSON.stringify({ status: '停用' })
      });
      if (!res.ok) throw new Error('停用失敗');
      ids.forEach(id => { const p = allProducts.find(x => x.id === id); if (p) p.status = '停用'; });
      selectedIds.clear();
      filterTable();
      updateBulkBar();
      Swal.fire({ icon: 'success', title: '完成', text: `已停用 ${ids.length} 個商品`, timer: 1500, showConfirmButton: false });
    } catch (err) { Swal.fire('錯誤', err.message, 'error'); }
  }

  // ========== 7. 批次刪除（含防呆：有銷售紀錄改停用）==========
  async function bulkDelete() {
    const ids = [...selectedIds];
    if (ids.length === 0) return;
    try {
      const idList = ids.map(id => `"${id}"`).join(',');
      const checkRes = await fetch(`${SB_URL}/sales_details?product_id=in.(${idList})&select=product_id`, { headers: HEADERS });
      const usedData = checkRes.ok ? await checkRes.json() : [];
      const usedIds = new Set(usedData.map(d => d.product_id));
      const canDelete = ids.filter(id => !usedIds.has(id));
      const cannotDelete = ids.filter(id => usedIds.has(id));

      if (canDelete.length === 0) {
        const result = await Swal.fire({
          title: '無法刪除', icon: 'warning',
          html: `所選 <b>${ids.length}</b> 個商品均有銷售紀錄，<br>是否改為<b>批次停用</b>？`,
          showCancelButton: true, confirmButtonColor: '#b7791f',
          confirmButtonText: '改為停用', cancelButtonText: '取消'
        });
        if (result.isConfirmed) await bulkDisable();
        return;
      }

      let htmlMsg = '';
      if (canDelete.length > 0) htmlMsg += `<div style="margin-bottom:8px;">✅ 可刪除：<b>${canDelete.length} 個</b>（無銷售紀錄）</div>`;
      if (cannotDelete.length > 0) htmlMsg += `<div style="color:#b7791f;">⚠️ <b>${cannotDelete.length} 個</b>有銷售紀錄 → 自動改為停用</div>`;
      htmlMsg += `<div style="color:#c53030; margin-top:12px; font-size:13px;">刪除後無法復原！</div>`;

      const confirmed = await Swal.fire({
        title: '確認批次刪除？', html: htmlMsg, icon: 'warning', showCancelButton: true,
        confirmButtonColor: '#c53030', confirmButtonText: `刪除 ${canDelete.length} 個`, cancelButtonText: '取消'
      });
      if (!confirmed.isConfirmed) return;

      const deleteList = canDelete.map(id => `"${id}"`).join(',');
      const delRes = await fetch(`${SB_URL}/products?id=in.(${deleteList})`, { method: 'DELETE', headers: HEADERS });
      if (!delRes.ok) throw new Error('刪除失敗');

      if (cannotDelete.length > 0) {
        const disableList = cannotDelete.map(id => `"${id}"`).join(',');
        await fetch(`${SB_URL}/products?id=in.(${disableList})`, {
          method: 'PATCH',
          headers: { ...HEADERS, 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: '停用' })
        });
        cannotDelete.forEach(id => { const p = allProducts.find(x => x.id === id); if (p) p.status = '停用'; });
      }

      allProducts = allProducts.filter(p => !canDelete.includes(p.id));
      selectedIds.clear();
      filterTable();
      updateBulkBar();

      let doneMsg = `已刪除 ${canDelete.length} 個商品`;
      if (cannotDelete.length > 0) doneMsg += `，${cannotDelete.length} 個有銷售紀錄者已改為停用`;
      Swal.fire({ icon: 'success', title: '完成', text: doneMsg });
    } catch (err) { Swal.fire('錯誤', err.message, 'error'); }
  }

  // ========== 8. 單筆編輯 ==========
  function editProduct(id) {
    if (window.parent && window.parent.loadPage) {
      window.parent.loadPage('ProductForm.html?id=' + id, '編輯商品');
    } else {
      window.location.href = `ProductForm.html?id=${id}`;
    }
  }

  // ========== 9. 點擊切換啟用/停用 ==========
  async function toggleStatus(id, currentStatus) {
    const newStatus = currentStatus === '啟用' ? '停用' : '啟用';
    const confirmed = await Swal.fire({
      title: `確認${newStatus}？`, text: `商品 ${id} 將變更為「${newStatus}」`,
      icon: 'question', showCancelButton: true,
      confirmButtonColor: newStatus === '啟用' ? '#475569' : '#c53030',
      confirmButtonText: `確定${newStatus}`, cancelButtonText: '取消'
    });
    if (!confirmed.isConfirmed) return;
    try {
      const res = await fetch(`${SB_URL}/products?id=eq.${id}`, {
        method: 'PATCH',
        headers: { ...HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
        body: JSON.stringify({ status: newStatus })
      });
      if (!res.ok) throw new Error('更新失敗');
      const p = allProducts.find(x => x.id === id);
      if (p) p.status = newStatus;
      filterTable();
    } catch (err) { Swal.fire('錯誤', err.message, 'error'); }
  }

  // ========== 10. 匯入價格 ==========
  async function importPrices(input) {
    const file = input.files[0];
    if (!file) return;
    input.value = '';

    // Load ExcelJS
    if (typeof ExcelJS === 'undefined') {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js';
      document.head.appendChild(s);
      await new Promise(r => s.onload = r);
    }

    Swal.fire({ title: '讀取 Excel 中...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

    try {
      const buf = await file.arrayBuffer();
      const wb = new ExcelJS.Workbook();
      await wb.xlsx.load(buf);
      const ws = wb.worksheets[0];

      // 找欄位位置（by header name）
      const headerRow = ws.getRow(1);
      let colId = -1, colBranch = -1, colCost = -1;
      headerRow.eachCell((cell, colNum) => {
        const v = String(cell.value || '').trim();
        if (v === '商品編號') colId = colNum;
        else if (v === '分店價') colBranch = colNum;
        else if (v === '成本') colCost = colNum;
      });

      if (colId < 0) { Swal.fire('錯誤', '找不到「商品編號」欄位', 'error'); return; }
      if (colBranch < 0 && colCost < 0) { Swal.fire('錯誤', '找不到「分店價」或「成本」欄位', 'error'); return; }

      // 讀取 Excel 資料
      const importData = {};
      ws.eachRow((row, rowNum) => {
        if (rowNum <= 1) return;
        const pid = String(row.getCell(colId).value || '').trim();
        if (!pid) return;
        const branch = colBranch > 0 ? Number(row.getCell(colBranch).value) || 0 : null;
        const cost = colCost > 0 ? Number(row.getCell(colCost).value) || 0 : null;
        importData[pid] = { branch, cost };
      });

      const importCount = Object.keys(importData).length;

      // 比對現有商品
      const existingIds = new Set(allProducts.map(p => p.id));
      const matched = [];
      const notFound = [];

      for (const [pid, vals] of Object.entries(importData)) {
        if (existingIds.has(pid)) {
          const existing = allProducts.find(p => p.id === pid);
          const changes = {};
          if (vals.branch !== null && vals.branch !== Number(existing.price_branch ?? 0)) changes.price_branch = vals.branch;
          if (vals.cost !== null && vals.cost !== Number(existing.cost ?? 0)) changes.cost = vals.cost;
          if (Object.keys(changes).length > 0) matched.push({ id: pid, name: existing.name, changes, old: { price_branch: existing.price_branch || 0, cost: existing.cost || 0 } });
        } else {
          notFound.push(pid);
        }
      }

      Swal.close();

      // 預覽確認
      let html = `<div style="text-align:left;font-size:13px;max-height:400px;overflow-y:auto;">`;
      html += `<p>Excel 共 <b>${importCount}</b> 筆，比對到系統商品中有 <b>${matched.length}</b> 筆需更新</p>`;
      if (notFound.length > 0) html += `<p style="color:#b7791f;">⚠ ${notFound.length} 筆商品編號在系統中不存在（略過）</p>`;
      if (matched.length > 0) {
        html += `<table style="width:100%;border-collapse:collapse;margin-top:8px;font-size:12px;">
          <tr style="background:#f1f5f9;"><th style="padding:4px 6px;border:1px solid #ddd;">商品編號</th><th style="padding:4px 6px;border:1px solid #ddd;">商品名稱</th><th style="padding:4px 6px;border:1px solid #ddd;">變更</th></tr>`;
        matched.slice(0, 50).forEach(m => {
          const parts = [];
          if (m.changes.price_branch !== undefined) parts.push(`分店價: ${m.old.price_branch}→${m.changes.price_branch}`);
          if (m.changes.cost !== undefined) parts.push(`成本: ${m.old.cost}→${m.changes.cost}`);
          html += `<tr><td style="padding:3px 6px;border:1px solid #ddd;">${m.id}</td><td style="padding:3px 6px;border:1px solid #ddd;">${m.name || ''}</td><td style="padding:3px 6px;border:1px solid #ddd;">${parts.join('、')}</td></tr>`;
        });
        if (matched.length > 50) html += `<tr><td colspan="3" style="padding:4px 6px;border:1px solid #ddd;text-align:center;color:#666;">... 還有 ${matched.length - 50} 筆 ...</td></tr>`;
        html += `</table>`;
      }
      html += `</div>`;

      if (matched.length === 0) {
        Swal.fire('無需更新', '所有商品的分店價和成本都已相同', 'info');
        return;
      }

      const confirm = await Swal.fire({
        title: `確認更新 ${matched.length} 筆商品？`,
        html,
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: '確認更新',
        cancelButtonText: '取消',
        width: 700
      });

      if (!confirm.isConfirmed) return;

      // 批次更新（每 50 筆一批）
      Swal.fire({ title: '更新中...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

      let updated = 0, failed = 0;
      const batchSize = 50;
      for (let i = 0; i < matched.length; i += batchSize) {
        const batch = matched.slice(i, i + batchSize);
        const promises = batch.map(m =>
          fetch(`${SB_URL}/products?id=eq.${encodeURIComponent(m.id)}`, {
            method: 'PATCH',
            headers: { ...HEADERS, 'Prefer': 'return=minimal' },
            body: JSON.stringify(m.changes)
          }).then(r => { if (r.ok) updated++; else failed++; })
            .catch(() => failed++)
        );
        await Promise.all(promises);
        Swal.update({ title: `更新中... ${Math.min(i + batchSize, matched.length)}/${matched.length}` });
      }

      await fetchProducts();
      Swal.fire({
        icon: failed ? 'warning' : 'success',
        title: '匯入完成',
        html: `成功更新 <b>${updated}</b> 筆` + (failed ? `<br>失敗 <b>${failed}</b> 筆` : '')
      });
    } catch (err) {
      Swal.fire('錯誤', '讀取 Excel 失敗：' + err.message, 'error');
    }
  }

  // ========== 11. 批次編輯（inline） ==========
  let editMode = false;
  let editOriginalData = {};

  const FIELD_LABELS = { category:'類別', name:'名稱', spec:'規格', unit:'單位', price:'售價', price_branch:'分店價', price_wholesale:'批發價', price_group:'團購價', cost:'成本', supplier:'供應商', status:'狀態' };
  const NUM_FIELDS = ['price','price_branch','price_wholesale','price_group','cost'];

  function enterEditMode() {
    editMode = true;
    editOriginalData = {};

    document.querySelectorAll('#tableBody tr').forEach(tr => {
      const cb = tr.querySelector('.row-check');
      if (!cb || !cb.checked) return;
      const id = cb.value;
      const p = allProducts.find(x => x.id === id);
      if (!p) return;

      editOriginalData[id] = { ...p };
      tr.classList.add('editing-row');
      cb.disabled = true;

      const makeTxt = (field, val) => {
        const inp = document.createElement('input');
        inp.type = 'text'; inp.className = 'edit-input';
        inp.dataset.field = field; inp.dataset.id = id;
        inp.value = val || '';
        inp.addEventListener('input', markChanged);
        return inp;
      };
      const makeNum = (field, val) => {
        const inp = document.createElement('input');
        inp.type = 'number'; inp.className = 'edit-input edit-num';
        inp.dataset.field = field; inp.dataset.id = id;
        inp.value = (val !== null && val !== undefined && val !== 0) ? val : '';
        inp.min = '0'; inp.step = '1';
        inp.addEventListener('input', markChanged);
        return inp;
      };

      const c = tr.cells;
      // col 2: category
      c[2].textContent = ''; c[2].appendChild(makeTxt('category', p.category));
      // col 3: name
      c[3].textContent = ''; c[3].appendChild(makeTxt('name', p.name));
      // col 4: spec
      c[4].textContent = ''; c[4].appendChild(makeTxt('spec', p.spec));
      // col 5: unit
      c[5].textContent = ''; c[5].appendChild(makeTxt('unit', p.unit));
      // col 6-10: prices
      NUM_FIELDS.forEach((f, i) => {
        c[6 + i].textContent = ''; c[6 + i].appendChild(makeNum(f, p[f]));
      });
      // col 11: supplier
      c[11].textContent = ''; c[11].appendChild(makeTxt('supplier', p.supplier));
      // col 13: status
      const sel = document.createElement('select');
      sel.className = 'edit-input'; sel.dataset.field = 'status'; sel.dataset.id = id;
      sel.innerHTML = '<option value="啟用">啟用</option><option value="停用">停用</option>';
      sel.value = p.status === '停用' ? '停用' : '啟用';
      sel.addEventListener('change', markChanged);
      c[13].textContent = ''; c[13].appendChild(sel);
      // col 14: hide edit button
      c[14].textContent = '';
    });

    // 切換按鈕列
    document.getElementById('bulkNormalBtns').style.display = 'none';
    document.getElementById('bulkEditBtns').style.display = 'inline-flex';
    // 停用全選 checkbox
    document.getElementById('selectAll').disabled = true;
    // 停用工具列
    document.querySelectorAll('.toolbar button, .toolbar select, .toolbar input, .toolbar a').forEach(el => el.style.pointerEvents = 'none');
  }

  function markChanged(e) {
    const inp = e.target;
    const id = inp.dataset.id;
    const field = inp.dataset.field;
    const orig = editOriginalData[id];
    if (!orig) return;
    let origVal, newVal;
    if (NUM_FIELDS.includes(field)) {
      origVal = (orig[field] !== null && orig[field] !== undefined) ? Number(orig[field]) : null;
      newVal = inp.value.trim() === '' ? null : Number(inp.value);
    } else {
      origVal = orig[field] || '';
      newVal = inp.value.trim();
    }
    inp.classList.toggle('edit-changed', newVal !== origVal && String(newVal) !== String(origVal));
  }

  function exitEditMode() {
    editMode = false;
    editOriginalData = {};
    // 恢復工具列
    document.querySelectorAll('.toolbar button, .toolbar select, .toolbar input, .toolbar a').forEach(el => el.style.pointerEvents = '');
    document.getElementById('selectAll').disabled = false;
    document.getElementById('bulkNormalBtns').style.display = '';
    document.getElementById('bulkEditBtns').style.display = 'none';
    // 重新渲染還原表格
    filterTable();
  }

  async function saveBulkEdits() {
    // 收集變更
    const changes = [];
    document.querySelectorAll('#tableBody tr.editing-row').forEach(tr => {
      const cb = tr.querySelector('.row-check');
      const id = cb ? cb.value : null;
      const orig = editOriginalData[id];
      if (!orig) return;

      const fields = {};
      const oldFields = {};
      tr.querySelectorAll('.edit-input').forEach(inp => {
        const field = inp.dataset.field;
        let newVal, oldVal;
        if (NUM_FIELDS.includes(field)) {
          newVal = inp.value.trim() === '' ? null : Number(inp.value);
          oldVal = (orig[field] !== null && orig[field] !== undefined) ? Number(orig[field]) : null;
        } else {
          newVal = inp.value.trim() || null;
          oldVal = orig[field] || null;
        }
        if (String(newVal) !== String(oldVal)) {
          fields[field] = newVal;
          oldFields[field] = oldVal;
        }
      });
      if (Object.keys(fields).length > 0) {
        changes.push({ id, name: orig.name, fields, oldFields });
      }
    });

    if (changes.length === 0) {
      Swal.fire('提示', '沒有任何欄位被修改', 'info');
      return;
    }

    // 驗證：商品名稱不可為空
    const emptyName = changes.find(c => c.fields.name === null || c.fields.name === '');
    if (emptyName) {
      Swal.fire('錯誤', `商品 ${emptyName.id} 的名稱不可為空`, 'error');
      return;
    }

    // 預覽變更
    let html = `<div style="text-align:left;font-size:13px;max-height:400px;overflow-y:auto;">`;
    html += `<p>共 <b>${changes.length}</b> 筆商品有修改：</p>`;
    html += `<table style="width:100%;border-collapse:collapse;font-size:12px;">`;
    html += `<tr style="background:#f1f5f9;"><th style="padding:4px 6px;border:1px solid #ddd;">商品</th><th style="padding:4px 6px;border:1px solid #ddd;">變更內容</th></tr>`;
    changes.forEach(c => {
      const parts = Object.keys(c.fields).map(f => {
        const lbl = FIELD_LABELS[f] || f;
        const ov = c.oldFields[f] ?? '(空)';
        const nv = c.fields[f] ?? '(空)';
        return `${lbl}: ${ov} → ${nv}`;
      });
      html += `<tr><td style="padding:3px 6px;border:1px solid #ddd;white-space:nowrap;">${c.id}</td><td style="padding:3px 6px;border:1px solid #ddd;">${parts.join('、')}</td></tr>`;
    });
    html += `</table></div>`;

    const confirmed = await Swal.fire({
      title: `確認儲存 ${changes.length} 筆修改？`,
      html, icon: 'question', showCancelButton: true,
      confirmButtonText: '確認儲存', cancelButtonText: '取消', width: 700
    });
    if (!confirmed.isConfirmed) return;

    // 批次 PATCH
    Swal.fire({ title: '儲存中...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
    let ok = 0, fail = 0;
    const batchSize = 50;
    for (let i = 0; i < changes.length; i += batchSize) {
      const batch = changes.slice(i, i + batchSize);
      await Promise.all(batch.map(c =>
        fetch(`${SB_URL}/products?id=eq.${encodeURIComponent(c.id)}`, {
          method: 'PATCH',
          headers: { ...HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
          body: JSON.stringify(c.fields)
        }).then(r => {
          if (r.ok) {
            ok++;
            const p = allProducts.find(x => x.id === c.id);
            if (p) Object.assign(p, c.fields);
          } else fail++;
        }).catch(() => fail++)
      ));
    }

    editMode = false;
    editOriginalData = {};
    selectedIds.clear();
    // 恢復工具列
    document.querySelectorAll('.toolbar button, .toolbar select, .toolbar input, .toolbar a').forEach(el => el.style.pointerEvents = '');
    document.getElementById('selectAll').disabled = false;
    document.getElementById('bulkNormalBtns').style.display = '';
    document.getElementById('bulkEditBtns').style.display = 'none';
    filterTable();
    updateBulkBar();

    Swal.fire({
      icon: fail ? 'warning' : 'success',
      title: '批次編輯完成',
      html: `成功更新 <b>${ok}</b> 筆` + (fail ? `<br>失敗 <b>${fail}</b> 筆` : ''),
      timer: fail ? undefined : 2000,
      showConfirmButton: fail > 0
    });
  }

  // ========== 12. 匯出 Excel ==========
  async function exportProducts() {
    if (!allProducts.length) { Swal.fire('提示', '沒有商品資料可匯出', 'info'); return; }
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js';
    script.onload = async () => {
      const wb = new ExcelJS.Workbook();
      const ws = wb.addWorksheet('商品清單');

      // 表頭
      const headers = ['商品編號','類別','商品名稱','規格','單位','售價','分店價','批發價','團購價','成本','供應商','狀態'];
      const headerRow = ws.addRow(headers);
      headerRow.eachCell(c => {
        c.font = { bold: true, size: 11, color: { argb: 'FFFFFFFF' } };
        c.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF475569' } };
        c.alignment = { horizontal: 'center', vertical: 'middle' };
        c.border = { bottom: { style: 'thin', color: { argb: 'FFCCCCCC' } } };
      });

      // 資料
      const sorted = [...allProducts].sort((a, b) => (a.id || '').localeCompare(b.id || ''));
      sorted.forEach(p => {
        const row = ws.addRow([
          p.id || '', p.category || '', p.name || '', p.spec || '', p.unit || '',
          p.price || 0, p.price_branch || 0, p.price_wholesale || 0, p.price_group || 0,
          p.cost || 0, p.supplier || '', p.status || ''
        ]);
        // 數字欄位格式
        for (let i = 6; i <= 10; i++) { row.getCell(i).numFmt = '#,##0'; }
      });

      // 欄寬
      ws.columns = [
        { width: 15 }, { width: 12 }, { width: 40 }, { width: 15 }, { width: 8 },
        { width: 10 }, { width: 10 }, { width: 10 }, { width: 10 }, { width: 10 },
        { width: 15 }, { width: 8 }
      ];

      const buf = await wb.xlsx.writeBuffer();
      const blob = new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `商品清單_${new Date().toISOString().split('T')[0]}.xlsx`;
      a.click();
      Swal.fire({ icon: 'success', title: '匯出成功', text: `共 ${sorted.length} 筆商品`, timer: 2000, showConfirmButton: false });
    };
    document.head.appendChild(script);
  }

</script>
