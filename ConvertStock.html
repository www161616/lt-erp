<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>龍潭進銷存系統 - 商品分裝轉換</title>
  <script src="libs/sweetalert2.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  
  <style>
    /* ========== 石板灰護眼主題變數 ========== */
    :root {
      --bg: #f8f9fb;             
      --surface: #ffffff;        
      --border: #e2e8f0;         
      --accent: #475569;         /* 石板灰 */
      --accent-hover: #334155;
      --text: #1e293b;           
      --text2: #64748b;          
      --raw-bg: #fffde7;         /* 原料區黃色 */
      --target-bg: #f0f9eb;      /* 成品區綠色 */
      --warning: #E64A19;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      font-family: 'Noto Sans TC', sans-serif; 
      padding: 20px; 
      background: var(--bg); 
      color: var(--text);
      display: flex;
      justify-content: center;
    }
    
    .container { 
      background: var(--surface); 
      padding: 24px; 
      border-radius: 12px; 
      max-width: 550px; 
      width: 100%;
      box-shadow: 0 4px 20px rgba(30,41,59,0.07);
      border-top: 5px solid var(--accent);
    }

    h2 { 
      color: var(--accent); 
      margin-bottom: 8px; 
      font-size: 22px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .subtitle { font-size: 14px; color: var(--text2); margin-bottom: 24px; }

    .box { 
      padding: 18px; 
      border-radius: 8px; 
      margin-bottom: 15px; 
      border: 1px solid var(--border);
    }
    
    .box-raw { background: var(--raw-bg); border-color: #ffd54f; }
    .box-target { background: var(--target-bg); border-color: #c2e7b0; }

    label { font-weight: 700; display: block; margin-bottom: 8px; color: var(--text); font-size: 14px; }
    
    select, input { 
      width: 100%; 
      padding: 12px 14px; 
      border: 1px solid var(--border); 
      border-radius: 6px; 
      font-size: 15px; 
      margin-bottom: 12px; 
      outline: none;
      background: var(--surface);
      transition: border-color 0.2s;
    }
    select:focus, input:focus { border-color: var(--accent); }

    .arrow-icon { text-align: center; font-size: 24px; margin: 10px 0; color: var(--text2); }

    .btn { 
      width: 100%; 
      padding: 16px; 
      background: var(--accent); 
      color: white; 
      border: none; 
      border-radius: 8px; 
      font-size: 18px; 
      font-weight: 900; 
      cursor: pointer; 
      transition: 0.2s;
    }
    .btn:hover { background: var(--accent-hover); box-shadow: 0 4px 12px rgba(71,85,105,0.2); }
    .btn:disabled { background: var(--border); cursor: not-allowed; }

    .note { font-size: 12px; color: var(--text2); margin-top: -6px; margin-bottom: 10px; display: flex; align-items: center; gap: 4px; }

    .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); display: flex; justify-content: center; align-items: center; z-index: 2000; font-size: 16px; color: var(--accent); font-weight: 700; flex-direction: column; gap: 12px;}
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="loadingOverlay" class="loading-overlay hidden">
    <div>🔄 庫存轉換處理中...</div>
  </div>

  <div class="container">
    <h2>📦 商品分裝轉換</h2>
    <p class="subtitle">將大包裝原料消耗，轉換為小包裝成品產出</p>

    <div class="box box-raw">
      <label>🔙 1. 消耗原料 (大規格)</label>
      <select id="rawProduct" onchange="validateSelection()"><option value="">🔄 載入中...</option></select>
      <input type="number" id="rawQty" placeholder="消耗數量" value="1" min="1" step="1">
      <div class="note">💡 通常消耗 1 個大規格單位 (如：一箱)</div>
    </div>

    <div class="arrow-icon">⬇️</div>

    <div class="box box-target">
      <label>🆕 2. 產出成品 (小規格)</label>
      <select id="targetProduct" onchange="validateSelection()"><option value="">🔄 載入中...</option></select>
      <input type="number" id="targetQty" placeholder="輸入分裝後的產出數量" min="1" step="1">
      <div class="note" style="color:var(--accent);">✨ 請按實際分裝出的數量填寫 (如：12 或 24)</div>
    </div>

    <button class="btn" id="saveBtn" onclick="submitConversion()">確認執行庫存轉換</button>
  </div>

<script>
  // ========== 1. Supabase API 設定 ==========
  const SB_URL = 'https://asugjynpocwygggttxyo.supabase.co/rest/v1';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzdWdqeW5wb2N3eWdnZ3R0eHlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNzU3MjksImV4cCI6MjA4ODk1MTcyOX0.LzcRQAl80rZxKKD8NIYWGvylfwCbs1ek5LtKpmZodBc'; 
    const AUTH_TOKEN = sessionStorage.getItem('sb_auth_token') || SB_KEY;
  const HEADERS = {
    'apikey': SB_KEY,
    'Authorization': `Bearer ${AUTH_TOKEN}`,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation'
  };

  let allProducts = [];

  window.onload = function() {
    loadProducts();
  };

  // ========== 2. 載入商品資料 (無敵防呆讀取) ==========
  async function loadProducts() {
    try {
      const res = await fetch(`${SB_URL}/products?select=*&status=eq.啟用&order=name.asc`, { headers: HEADERS });
      if (!res.ok) throw new Error('無法讀取商品清單');
      const data = await res.json();
      allProducts = data;

      const rSel = document.getElementById('rawProduct');
      const tSel = document.getElementById('targetProduct');
      
      const optionsHtml = '<option value="">-- 請選擇商品 --</option>' + 
        data.map(i => `<option value="${i.id}">${i.name} [${i.id}] (${i.unit || '個'})</option>`).join('');
      
      rSel.innerHTML = optionsHtml;
      tSel.innerHTML = optionsHtml;
    } catch (error) {
      Swal.fire('錯誤', error.message, 'error');
    }
  }

  function validateSelection() {
    const rawId = document.getElementById('rawProduct').value;
    const targetId = document.getElementById('targetProduct').value;
    if (rawId && targetId && rawId === targetId) {
      Swal.fire('提示', '消耗原料與產出成品不能為同一項商品！', 'warning');
      document.getElementById('targetProduct').value = "";
    }
  }

  // ========== 3. 執行轉換 (呼叫 RPC) ==========
  async function submitConversion() {
    const btn = document.getElementById('saveBtn');
    const loader = document.getElementById('loadingOverlay');
    
    // 變數對齊與資料整理
    const payload = {
      raw_id: document.getElementById('rawProduct').value,
      raw_qty: Number(document.getElementById('rawQty').value),
      target_id: document.getElementById('targetProduct').value,
      target_qty: Number(document.getElementById('targetQty').value)
    };
    
    // 前端防呆
    if (!payload.raw_id || !payload.target_id) { Swal.fire('提示', '請選擇原料與成品！', 'warning'); return; }
    if (payload.raw_qty <= 0 || payload.target_qty <= 0) { Swal.fire('提示', '請填寫正確的數量！', 'warning'); return; }

    const confirm = await Swal.fire({
      title: '確認執行分裝？',
      text: `系統將扣除原料庫存，並增加成品庫存。此動作無法輕易撤回。`,
      icon: 'question',
      showCancelButton: true,
      confirmButtonColor: 'var(--accent)',
      confirmButtonText: '確定執行',
      cancelButtonText: '取消'
    });

    if (!confirm.isConfirmed) return;

    btn.disabled = true;
    loader.classList.remove('hidden');

    try {
      // 🚀 呼叫後端專屬的原子化轉換函數
      const res = await fetch(`${SB_URL}/rpc/web_convert_stock`, {
        method: 'POST',
        headers: HEADERS,
        body: JSON.stringify({ p_data: payload })
      });

      if (!res.ok) {
        const errData = await res.json();
        throw new Error(errData.message || '資料庫執行失敗');
      }

      await Swal.fire({
        icon: 'success',
        title: '轉換成功！',
        text: '庫存已自動扣除原料並撥入成品。',
        timer: 2000,
        showConfirmButton: false
      });

      // 成功後重置產出數量，方便下一次操作
      document.getElementById('targetQty').value = "";
      
    } catch (error) {
      Swal.fire('❌ 轉換失敗', error.message, 'error');
    } finally {
      btn.disabled = false;
      loader.classList.add('hidden');
    }
  }
</script>
</body>
</html>
