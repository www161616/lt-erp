<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>龍潭進銷存系統 - 支出管理</title>
  <script src="libs/sweetalert2.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    /* ========== 石板灰護眼主題變數 ========== */
    :root {
      --bg: #f8f9fb;             
      --surface: #ffffff;        
      --surface2: #f1f5f9;       
      --border: #e2e8f0;         
      --accent: #475569;         /* 石板灰 */
      --accent-hover: #334155;
      --text: #1e293b;           
      --text2: #64748b;          
      --danger: #c53030;         
      --warning: #b7791f;        
      --orange: #c05621;         
      --blue: #0e7490;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      font-family: 'Noto Sans TC', system-ui, -apple-system, sans-serif; 
      font-size: 13px; 
      background: var(--bg); 
      color: var(--text);
      height: 100vh; 
      overflow: hidden; 
      display: flex; 
      flex-direction: column;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }

    /* ========== 頂部導覽列 ========== */
    .header-bar {
      flex: 0 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
      padding: 0 24px;
      height: 56px;
      box-shadow: 0 2px 4px rgba(30,41,59,0.07);
      border-bottom: 3px solid var(--accent);
      z-index: 10;
    }
    .header-title { font-size: 18px; font-weight: 700; color: var(--accent); display: flex; align-items: center; gap: 8px;}

    /* ========== 主佈局 ========== */
    .main-layout {
      display: grid;
      grid-template-columns: 380px 1fr; 
      gap: 16px; 
      padding: 16px;
      flex: 1;
      overflow: hidden;
    }

    .panel {
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: 100%;
      border-radius: 6px;
      box-shadow: 0 1px 4px rgba(30,41,59,0.05);
      border: 1px solid var(--border);
    }

    /* ========== 面板標題 ========== */
    .panel-header {
      padding: 16px 20px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      color: var(--accent);
      font-weight: 700;
      font-size: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* ========== 左側：表單區 ========== */
    .form-scroll { flex: 1; overflow-y: auto; padding: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
    
    input, select, textarea { 
      width: 100%; padding: 10px 12px; border: 1px solid var(--border); 
      border-radius: 4px; font-size: 13px; font-family: inherit; color: var(--text);
      transition: all 0.2s; outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(71,85,105,0.1); }
    
    input[list] { background-color: #fafafa; }
    input[list]:focus { background-color: #fff; }

    .btn { 
      padding: 10px 16px; font-size: 14px; font-weight: 600; 
      border: 1px solid transparent; border-radius: 4px; cursor: pointer; 
      display: inline-flex; align-items: center; justify-content: center; gap: 6px; 
      transition: all 0.2s; font-family: inherit; width: 100%;
    }
    .btn:active { transform: translateY(1px); } 
    .btn-submit { background: var(--accent); color: white; margin-top: 10px;}
    .btn-submit:hover { background: var(--accent-hover); }
    .btn-submit:disabled { background: #a0cfff; cursor: not-allowed; }

    /* ========== 右側：列表區 ========== */
    .list-filter { padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; gap: 12px; align-items: center; }
    .list-filter label { font-size: 13px; font-weight: 600; color: var(--text); }
    .list-filter input[type="month"] { width: auto; padding: 6px 12px; }
    
    .btn-refresh { background: var(--blue); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500; }
    .btn-refresh:hover { background: #0891b2; }

    .list-scroll { flex: 1; overflow-y: auto; padding: 0; background: var(--surface); position: relative;}
    
    table { width: 100%; border-collapse: collapse; }
    th { position: sticky; top: 0; background: #f1f5f9; color: var(--accent); padding: 12px 16px; text-align: left; font-size: 13px; border-bottom: 1px solid #e2e8f0; z-index: 2; font-weight: 600;}
    td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; color: var(--text); transition: 0.15s;}
    tr:hover td { background-color: var(--surface2); }
    
    .amount-col { font-weight: 700; color: var(--orange); text-align: right; font-size: 14px; font-family: monospace;}
    .date-col { color: var(--text2); font-size: 12px; }
    .category-tag { display: inline-block; padding: 2px 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; font-size: 11px; color: var(--text2); margin-top: 4px;}
    
    .btn-delete { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; transition: 0.2s;}
    .btn-delete:hover { background: var(--danger); color: white; }

    .loading-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.8); display: flex; justify-content: center; align-items: center; z-index: 10; font-size: 14px; color: var(--text2); font-weight: 600;}
    .hidden { display: none !important; }

    @media (max-width: 1024px) {
      .main-layout { grid-template-columns: 1fr; display: flex; flex-direction: column; height: auto; overflow-y: auto;}
      .panel:first-child { flex-shrink: 0; }
      body { height: auto; overflow-y: auto; }
    }
  </style>
</head>
<body>

<div class="header-bar">
  <div class="header-title">💸 支出與零用金管理</div>
</div>

<div class="main-layout">

  <div class="panel">
    <div class="panel-header">📝 新增支出</div>
    <div class="form-scroll">
      <form id="expenseForm">
        <div class="form-group">
          <label>📅 日期</label>
          <input type="date" id="date" required>
        </div>

        <div class="form-group">
          <label>💰 付款方式</label>
          <select id="paymentMethod">
            <option value="零用金" selected>零用金 (由我代墊)</option>
            <option value="現金">公司現金</option>
            <option value="轉帳">公司轉帳</option>
          </select>
        </div>

        <div class="form-group">
          <label>📂 類別 (可選或直接輸入)</label>
          <input type="text" id="category" list="categoryList" placeholder="請選擇或輸入類別 (如: 老闆借支)" required>
          <datalist id="categoryList">
            <option value="進貨成本">
            <option value="運費">
            <option value="老闆借支"> 
            <option value="股東往來"> 
            <option value="薪資">
            <option value="伙食費">
            <option value="水電瓦斯">
            <option value="租金">
            <option value="維修費">
            <option value="交通費">
            <option value="交際費">
            <option value="雜支">
            <option value="其他">
          </datalist>
        </div>
        
        <div class="form-group">
          <label>💵 金額</label>
          <input type="number" id="amount" min="0" placeholder="輸入金額" required style="font-weight: bold; color: var(--orange);">
        </div>

        <div class="form-group">
          <label>📝 項目摘要</label>
          <input type="text" id="item" placeholder="例如：購買文具、老闆借款..." required>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
          <div class="form-group">
            <label>👤 對象 (選填)</label>
            <input type="text" id="recipient" placeholder="廠商或收款人">
          </div>
          <div class="form-group">
            <label>🧾 發票號碼 (選填)</label>
            <input type="text" id="invoiceNo" placeholder="例: AB12345678">
          </div>
        </div>

        <div class="form-group">
          <label>📒 備註</label>
          <textarea id="note" rows="2" placeholder="其他補充說明..."></textarea>
        </div>

        <button type="submit" id="submitBtn" class="btn btn-submit">✅ 確認存檔</button>
      </form>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span>📋 本月支出明細</span>
      <span id="totalDisplay" style="font-size:16px; color:var(--orange); font-weight:700;">總計: $0</span>
    </div>
    
    <div class="list-filter">
      <label>查詢月份：</label>
      <input type="month" id="filterMonth" onchange="loadList()">
      <button type="button" class="btn-refresh" onclick="loadList()">🔄 刷新</button>
    </div>

    <div class="list-scroll">
      <div id="loadingMask" class="loading-overlay hidden">🔄 讀取資料中...</div>
      <div id="listArea">
        </div>
    </div>
  </div>

</div>

<script>
  // ========== 1. Supabase API 設定 ==========
  const SB_URL = 'https://asugjynpocwygggttxyo.supabase.co/rest/v1';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzdWdqeW5wb2N3eWdnZ3R0eHlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNzU3MjksImV4cCI6MjA4ODk1MTcyOX0.LzcRQAl80rZxKKD8NIYWGvylfwCbs1ek5LtKpmZodBc'; 
    const AUTH_TOKEN = sessionStorage.getItem('sb_auth_token') || SB_KEY;
  const HEADERS = {
    'apikey': SB_KEY,
    'Authorization': `Bearer ${AUTH_TOKEN}`,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation'
  };

  window.onload = function() {
    // 預設日期為今天
    const today = new Date();
    document.getElementById('date').value = today.toISOString().split('T')[0];
    
    // 預設篩選月份為當月
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    document.getElementById('filterMonth').value = `${yyyy}-${mm}`;

    // 載入列表
    loadList();
  };

  // ========== 2. 載入列表 (GET) ==========
  async function loadList() {
    const monthVal = document.getElementById('filterMonth').value; // 格式 YYYY-MM
    if (!monthVal) return;

    // 計算該月的第一天與最後一天
    const [year, month] = monthVal.split('-');
    const startDate = `${year}-${month}-01`;
    const lastDay = new Date(year, month, 0).getDate();
    const endDate = `${year}-${month}-${lastDay}`;

    const listDiv = document.getElementById('listArea');
    const loadingMask = document.getElementById('loadingMask');
    
    loadingMask.classList.remove('hidden');

    try {
      // 依賴日期區間搜尋，並依照日期降冪排列 (新到舊)
      const res = await fetch(`${SB_URL}/expenses?expense_date=gte.${startDate}&expense_date=lte.${endDate}&order=expense_date.desc`, {
        method: 'GET',
        headers: HEADERS
      });

      if (!res.ok) throw new Error(`讀取失敗 (代碼: ${res.status})`);
      
      const data = await res.json();
      renderTable(data);

    } catch (error) {
      listDiv.innerHTML = `<div style="text-align:center; padding:30px; color:var(--danger);">❌ 錯誤: ${error.message}</div>`;
    } finally {
      loadingMask.classList.add('hidden');
    }
  }

  function renderTable(data) {
    const listDiv = document.getElementById('listArea');
    if (!data || data.length === 0) {
      listDiv.innerHTML = '<div style="text-align:center; padding:40px; color:var(--text2);">本月尚無支出紀錄 🍃</div>';
      document.getElementById('totalDisplay').innerText = '總計: $0';
      return;
    }

    let total = 0;
    let html = `<table>
      <thead>
        <tr>
          <th width="15%">日期</th>
          <th width="40%">類別 / 項目</th>
          <th width="20%" style="text-align:right">金額</th>
          <th width="15%">方式</th>
          <th width="10%">操作</th>
        </tr>
      </thead>
      <tbody>`;

    data.forEach(row => {
      total += Number(row.amount);
      html += `
        <tr>
          <td class="date-col">${row.expense_date}</td>
          <td>
            <div style="font-weight:700; color:var(--text);">${row.item}</div>
            <div class="category-tag">${row.category}</div>
            ${row.payee ? `<span style="font-size:12px; color:var(--text2); margin-left:6px;">👤 ${row.payee}</span>` : ''}
          </td>
          <td class="amount-col">$${Number(row.amount).toLocaleString()}</td>
          <td><span style="font-size:12px; font-weight:600; color:var(--text2);">${row.payment_method}</span></td>
          <td>
            <button class="btn-delete" onclick="deleteItem('${row.id}', '${row.item}')">🗑️ 刪除</button>
          </td>
        </tr>
      `;
    });

    html += '</tbody></table>';
    listDiv.innerHTML = html;
    document.getElementById('totalDisplay').innerText = '總計: $' + total.toLocaleString();
  }

  // ========== 3. 新增支出 (改呼叫 RPC) ==========
  document.getElementById('expenseForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const btn = document.getElementById('submitBtn');
    const originalText = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '⏳ 存檔中...';

    const formData = {
      expense_date: document.getElementById('date').value,
      category: document.getElementById('category').value.trim(),
      item: document.getElementById('item').value.trim(),
      amount: Number(document.getElementById('amount').value),
      payment_method: document.getElementById('paymentMethod').value,
      payee: document.getElementById('recipient').value.trim(),
      invoice_no: document.getElementById('invoiceNo').value.trim(),
      note: document.getElementById('note').value.trim()
    };

    try {
      // 呼叫我們剛剛建立的 RPC 函式
      const res = await fetch(`${SB_URL}/rpc/web_save_expense`, {
        method: 'POST',
        headers: HEADERS,
        body: JSON.stringify({ p_data: formData })
      });

      if (!res.ok) throw new Error('新增失敗');
      
      const resData = await res.json();
      if (!resData.success) throw new Error(resData.message);

      Swal.fire({
        icon: 'success',
        title: '儲存成功！',
        toast: true,
        position: 'top-end',
        timer: 2000,
        showConfirmButton: false
      });

      // 重置表單但保留日期與付款方式
      const curDate = document.getElementById('date').value;
      const curMethod = document.getElementById('paymentMethod').value;
      document.getElementById('expenseForm').reset();
      document.getElementById('date').value = curDate;
      document.getElementById('paymentMethod').value = curMethod;
      
      // 刷新列表
      loadList();

    } catch (error) {
      Swal.fire('❌ 儲存失敗', error.message, 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = originalText;
    }
  });

  // ========== 4. 刪除支出 (改呼叫 RPC) ==========
  function deleteItem(expId, itemName) {
    Swal.fire({
      title: '確定要刪除嗎？',
      html: `即將刪除：<b>${itemName}</b><br><br><span style="font-size:13px; color:var(--danger);">※ 若為零用金支付，刪除後將自動回補至零用金帳戶。</span>`,
      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#c53030',
      cancelButtonColor: '#64748b',
      confirmButtonText: '🗑️ 確定作廢並刪除',
      cancelButtonText: '取消'
    }).then(async (result) => {
      if (result.isConfirmed) {
        
        const loadingMask = document.getElementById('loadingMask');
        loadingMask.classList.remove('hidden');

        try {
          // 呼叫我們建立的刪除 RPC
          const res = await fetch(`${SB_URL}/rpc/web_delete_expense`, {
            method: 'POST',
            headers: HEADERS,
            body: JSON.stringify({ p_exp_id: expId })
          });

          if (!res.ok) throw new Error('刪除失敗');
          
          const resData = await res.json();
          if (!resData.success) throw new Error(resData.message);

          Swal.fire({ icon: 'success', title: '已成功刪除並處理帳務', timer: 1500, showConfirmButton: false });
          loadList();

        } catch (error) {
          loadingMask.classList.add('hidden');
          Swal.fire('❌ 刪除失敗', error.message, 'error');
        }
      }
    });
  }
</script>

</body>
</html>
