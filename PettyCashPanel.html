<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>零用金管理 - 龍潭進銷存系統</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    /* ========== 石板灰護眼主題變數 ========== */
    :root {
      --bg: #f8f9fb;
      --surface: #ffffff;
      --surface2: #f1f5f9;
      --border: #e2e8f0;
      --accent: #475569;
      --accent-hover: #334155;
      --accent-light: #e2e8f0;
      --text: #1e293b;
      --text2: #64748b;
      --danger: #c53030;
      --danger-hover: #9b2c2c;
      --danger-light: #fed7d7;
      --warning: #b7791f;
      --blue: #0e7490;
      --shadow: 0 2px 12px rgba(30,41,59,0.07);
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif; 
      font-size: 14px; 
      background: var(--bg); 
      color: var(--text); 
      padding: 20px; 
      height: 100vh;
      overflow: hidden;
    }

    /* ── 版面配置 (左 35% 右 65%) ── */
    .container { 
      display: flex; 
      gap: 20px; 
      height: calc(100vh - 40px);
      max-width: 1200px;
      margin: 0 auto;
    }

    .left-panel { flex: 3.5; display: flex; flex-direction: column; gap: 16px; }
    .right-panel { 
      flex: 6.5; background: var(--surface); border-radius: var(--radius); 
      box-shadow: var(--shadow); border: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── 結餘卡片 ── */
    .balance-card {
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      color: white; padding: 24px; border-radius: var(--radius);
      text-align: center; box-shadow: 0 4px 15px rgba(71, 85, 105, 0.25);
      position: relative; overflow: hidden;
    }
    .balance-card::after {
      content: '\f53d'; font-family: 'Font Awesome 6 Free'; font-weight: 900;
      position: absolute; right: -20px; bottom: -30px; font-size: 120px; color: rgba(255,255,255,0.1);
    }
    .balance-title { font-size: 13px; font-weight: 600; letter-spacing: 1px; opacity: 0.9; margin-bottom: 8px; text-transform: uppercase; }
    .balance-amount { font-size: 38px; font-weight: 700; letter-spacing: -1px; position: relative; z-index: 2; }
    .balance-negative { color: #ffeaea; }

    /* ── 左側按鈕與表單 ── */
    .btn-danger-action {
      background: var(--danger); color: white; border: none; padding: 14px;
      border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer;
      box-shadow: 0 4px 12px rgba(197, 48, 48, 0.2); transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-danger-action:hover { background: var(--danger-hover); transform: translateY(-2px); }

    .form-card { 
      background: var(--surface); padding: 24px; border-radius: var(--radius); 
      box-shadow: var(--shadow); border: 1px solid var(--border); flex: 1; 
      display: flex; flex-direction: column;
    }
    .section-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    .section-title i { color: var(--accent); }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 6px; }
    .form-control, .form-select { 
      width: 100%; padding: 10px 12px; border: 1px solid var(--border); 
      border-radius: var(--radius-sm); font-size: 14px; background: var(--surface2);
      color: var(--text); transition: all 0.2s; font-family: inherit;
    }
    .form-control:focus, .form-select:focus { border-color: var(--accent); background: #fff; outline: none; box-shadow: 0 0 0 3px var(--accent-light); }

    .btn-submit {
      width: 100%; background-color: var(--accent); color: white; border: none; 
      padding: 12px; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; 
      cursor: pointer; transition: all 0.2s; margin-top: auto;
    }
    .btn-submit:hover { background-color: var(--accent-hover); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── 右側表格 ── */
    .table-header-wrap { padding: 18px 24px; border-bottom: 1.5px solid var(--border); }
    .table-header-wrap h3 { font-size: 16px; font-weight: 700; margin: 0; display: flex; align-items: center; gap: 8px; color: var(--text); }
    .table-header-wrap h3 i { color: var(--blue); }

    .table-wrapper { flex: 1; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; }
    th { position: sticky; top: 0; background: var(--surface2); z-index: 10; padding: 12px 16px; text-align: left; font-size: 12px; font-weight: 700; color: var(--text2); border-bottom: 1px solid var(--border); }
    td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 14px; }
    tbody tr:hover { background: var(--surface2); }
    
    .tag { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 700; display: inline-block; }
    .tag.in { background-color: var(--accent-light); color: var(--accent); }
    .tag.out { background-color: var(--danger-light); color: var(--danger); }
    .amount-in { color: var(--accent); font-weight: 700; }
    .amount-out { color: var(--danger); font-weight: 700; }
    .text-muted { color: var(--text2); font-size: 13px; }

    /* 刪除按鈕 */
    .btn-del-sm { background: transparent; color: var(--danger); border: none; font-size: 14px; cursor: pointer; padding: 6px; border-radius: 4px; transition: 0.2s; }
    .btn-del-sm:hover { background: var(--danger-light); }

    /* ── 自訂確認彈窗 ── */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(30, 41, 59, 0.4); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
    .modal-box { background: var(--surface); width: 340px; padding: 30px 24px; border-radius: var(--radius); text-align: center; box-shadow: 0 10px 30px rgba(30,41,59,0.15); animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .modal-icon { font-size: 48px; color: var(--warning); margin-bottom: 16px; }
    .modal-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 12px; }
    .modal-text { color: var(--text2); margin-bottom: 24px; line-height: 1.6; font-size: 14px; }
    .modal-actions { display: flex; gap: 12px; }
    .btn-modal { padding: 10px 0; border-radius: var(--radius-sm); border: none; font-size: 14px; font-weight: 600; cursor: pointer; flex: 1; transition: 0.2s; }
    .btn-cancel { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
    .btn-cancel:hover { background: #e2e8f0; color: var(--text); }
    .btn-confirm { background: var(--accent); color: white; }
    .btn-confirm:hover { background: var(--accent-hover); }

    @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    @media (max-width: 900px) {
      body { height: auto; overflow: auto; }
      .container { flex-direction: column; height: auto; }
      .left-panel, .right-panel { flex: none; height: 600px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="left-panel">
      <div class="balance-card">
        <div class="balance-title">目前零用金結餘</div>
        <div class="balance-amount" id="currentBalance">載入中...</div>
      </div>

      <div class="form-card">
        <button onclick="goToExpense()" class="btn-danger-action">
          <i class="fas fa-minus-circle"></i> 紀錄營業支出 (扣款)
        </button>

        <hr style="border: 0; border-top: 1px dashed var(--border); margin: 20px 0;">

        <div class="section-title"><i class="fas fa-hand-holding-usd"></i> 零用金撥補 (入金)</div>
        
        <form id="depositForm" style="display: flex; flex-direction: column; flex: 1;">
          <div class="form-group">
            <label>日期</label>
            <input type="date" id="date" class="form-control" required>
          </div>
          
          <div class="form-group">
            <label>撥補金額</label>
            <input type="number" id="amount" class="form-control" min="1" placeholder="輸入金額" required>
          </div>
          
          <div class="form-group">
            <label>資金來源 (摘要)</label>
            <select id="source" class="form-select" required>
              <option value="銀行提領">🏦 銀行提領</option>
              <option value="老闆現付">👤 老闆現付</option>
              <option value="營業收入轉入">💰 營業收入轉入</option>
              <option value="其他">📝 其他</option>
            </select>
          </div>
          
          <div class="form-group">
            <label>備註 (選填)</label>
            <textarea id="note" class="form-control" rows="2" placeholder="例如：從第一銀行領出"></textarea>
          </div>
          
          <button type="submit" class="btn-submit" id="submitBtn">確認撥補入金</button>
        </form>
      </div>
    </div>

    <div class="right-panel">
      <div class="table-header-wrap" style="display:flex; justify-content:space-between; align-items:center;">
        <h3><i class="fas fa-list-ul"></i> 最近交易紀錄</h3>
        <button onclick="recalcBalances()" style="background:var(--blue); color:white; border:none; padding:6px 14px; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer;" title="重新計算所有結餘">
          <i class="fas fa-calculator"></i> 重算結餘
        </button>
      </div>
      <div class="table-wrapper">
        <table id="logTable">
          <thead>
            <tr>
              <th width="12%">日期</th>
              <th width="12%">類型</th>
              <th width="20%">摘要 / 用途</th>
              <th width="15%" style="text-align:right">金額</th>
              <th width="18%" style="text-align:right">結餘</th>
              <th width="15%">備註</th>
              <th width="8%" style="text-align:center;">操作</th>
            </tr>
          </thead>
          <tbody>
            <tr><td colspan="7" style="text-align:center; padding:40px; color:var(--text2);">
              <i class="fas fa-spinner fa-spin"></i> 資料載入中...
            </td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="customModal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-icon"><i class="fas fa-exclamation-circle"></i></div>
      <div class="modal-title">確認執行撥補？</div>
      <div class="modal-text" id="modalMessage">您確定要執行此動作嗎？</div>
      <div class="modal-actions">
        <button class="btn-modal btn-cancel" onclick="closeModal()">取消</button>
        <button class="btn-modal btn-confirm" id="btnRealConfirm">確認入金</button>
      </div>
    </div>
  </div> 

  <script>
    const SB_URL = 'https://gkuwoandmsgvlsxzmrjj.supabase.co/rest/v1';
    const SB_KEY = 'sb_publishable_7K0w9Z8-Wv1dOgLsZkI0rA_WfNei_AS'; 
    const AUTH_TOKEN = sessionStorage.getItem('sb_auth_token') || SB_KEY;
    const HEADERS = {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${AUTH_TOKEN}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };

    let pendingData = null;
    let currentBalance = 0;

    window.onload = function() {
      document.getElementById('date').valueAsDate = new Date();
      loadData();
    };

    async function loadData() {
      try {
        const res = await fetch(`${SB_URL}/petty_cash?select=*&order=id.desc&limit=50`, { headers: HEADERS });
        if (!res.ok) throw new Error('讀取失敗');
        const logs = await res.json();

        currentBalance = logs.length > 0 ? Number(logs[0].balance || 0) : 0;
        renderUI({ success: true, currentBalance: currentBalance, logs: logs });
      } catch (err) {
        console.error(err);
        Swal.fire('錯誤', '無法載入零用金紀錄', 'error');
      }
    }

    function renderUI(data) {
      if (!data.success) return;

      var balanceEl = document.getElementById('currentBalance');
      balanceEl.innerText = '$' + Number(data.currentBalance).toLocaleString();
      if (data.currentBalance < 0) balanceEl.classList.add('balance-negative');
      else balanceEl.classList.remove('balance-negative');

      var tbody = document.querySelector('#logTable tbody');
      tbody.innerHTML = '';

      if (data.logs.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:40px; color:var(--text2);">尚無紀錄</td></tr>';
        return;
      }

      data.logs.forEach(function(row) {
        const type = row.log_type || row.type || '';
        const date = row.log_date || row.date || '';
        var isDeposit = (type === '入金' || type === '撥補');
        var typeClass = isDeposit ? 'in' : 'out';
        var amountClass = isDeposit ? 'amount-in' : 'amount-out';
        var sign = isDeposit ? '+' : '-';
        
        // 判斷是否允許刪除 (關聯支出的不可從這邊刪除)
        let actionHtml = '';
        if (row.note && (row.note.includes('關聯支出單') || row.note.includes('作廢關聯'))) {
          actionHtml = `<span style="font-size:12px; color:var(--text2);" title="請至支出管理頁面進行作廢">🔒 關聯單</span>`;
        } else {
          actionHtml = `<button class="btn-del-sm" onclick="deletePettyCash('${row.id}')" title="刪除此筆入金"><i class="fas fa-trash-alt"></i></button>`;
        }

        var tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${date.substring(5)}</td>
          <td><span class="tag ${typeClass}">${type}</span></td>
          <td style="font-weight:600; color:var(--text);">${row.summary || ''}</td>
          <td class="${amountClass}" style="text-align:right">${sign}$${Number(row.amount || 0).toLocaleString()}</td>
          <td style="text-align:right; color:var(--text2); font-family:monospace; font-size:15px;">$${Number(row.balance || 0).toLocaleString()}</td>
          <td class="text-muted">${row.note || ''}</td>
          <td style="text-align:center;">${actionHtml}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    document.getElementById('depositForm').onsubmit = function(e) {
      e.preventDefault();
      var amt = document.getElementById('amount').value;
      var dateVal = document.getElementById('date').value;

      if (!amt || Number(amt) <= 0) { Swal.fire('提示', '請輸入大於 0 的金額', 'warning'); return; }

      document.getElementById('modalMessage').innerHTML = `
        <div style="text-align:left; background:var(--surface2); padding:15px; border-radius:8px; margin-top:10px;">
          <div>📅 日期：<b>${dateVal}</b></div>
          <div style="margin-top:8px;">💰 金額：<span style="color:var(--accent); font-size:22px; font-weight:900;">$${Number(amt).toLocaleString()}</span></div>
        </div>
      `;

      pendingData = {
        p_log_date: dateVal, p_log_type: '撥補', p_amount: Number(amt),
        p_summary: document.getElementById('source').value, p_handler: 'Admin', p_note: document.getElementById('note').value || ''
      };
      document.getElementById('customModal').style.display = 'flex';
    };

    document.getElementById('btnRealConfirm').onclick = async function() {
      if (!pendingData) return;
      var payload = Object.assign({}, pendingData); 
      closeModal();
      var btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 處理中...';

      try {
        const res = await fetch(`${SB_URL}/rpc/web_add_petty_cash`, {
          method: 'POST', headers: HEADERS, body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error('連線異常');
        Swal.fire({ icon: 'success', title: '撥補成功', timer: 1500, showConfirmButton: false });
        document.getElementById('amount').value = ''; document.getElementById('note').value = '';
        loadData();
      } catch (err) { Swal.fire('入金失敗', err.message, 'error'); } 
      finally { btn.disabled = false; btn.innerText = '確認撥補入金'; }
    };

    function closeModal() { document.getElementById('customModal').style.display = 'none'; pendingData = null; }

    function goToExpense() {
      Swal.fire({
        title: '即將前往支出頁面', text: '請確認您已儲存目前的工作', icon: 'info',
        showCancelButton: true, confirmButtonColor: '#e74c3c', confirmButtonText: '前往紀錄支出', cancelButtonText: '取消'
      }).then((result) => { if (result.isConfirmed) { window.location.href = 'AddExpense.html'; } });
    }

    // ========== 重新計算所有結餘 ==========
    async function recalcBalances() {
      const result = await Swal.fire({
        title: '重新計算所有結餘？',
        text: '系統將依照時間順序，從第一筆開始重新計算每一筆的結餘金額。',
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#0e7490',
        confirmButtonText: '確認重算',
        cancelButtonText: '取消'
      });
      if (!result.isConfirmed) return;

      Swal.fire({ title: '計算中...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

      try {
        const res = await fetch(`${SB_URL}/rpc/recalc_petty_cash_balances`, {
          method: 'POST',
          headers: HEADERS,
          body: JSON.stringify({})
        });
        if (!res.ok) throw new Error('呼叫失敗');
        const data = await res.json();
        if (data && data.success === false) throw new Error(data.message);

        Swal.fire({ icon: 'success', title: '重算完成', text: `已更新結餘`, timer: 1500, showConfirmButton: false });
        loadData();
      } catch (err) {
        Swal.fire('重算失敗', err.message, 'error');
      }
    }

    // ========== 刪除零用金功能 (並重算結餘) ==========
    function deletePettyCash(id) {
      Swal.fire({
        title: '確定要刪除這筆紀錄嗎？',
        text: "系統將會自動重新計算後續所有的零用金結餘。",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#c53030',
        confirmButtonText: '🗑️ 確定刪除',
        cancelButtonText: '取消'
      }).then(async (result) => {
        if (result.isConfirmed) {
          Swal.showLoading();
          try {
            const res = await fetch(`${SB_URL}/rpc/web_delete_petty_cash`, {
              method: 'POST',
              headers: HEADERS,
              body: JSON.stringify({ p_id: id })
            });

            if (!res.ok) throw new Error('刪除失敗');
            const data = await res.json();
            if (!data.success) throw new Error(data.message);

            Swal.fire({ icon: 'success', title: '刪除成功', text: '結餘已重新計算', timer: 1500, showConfirmButton: false });
            loadData(); // 重新讀取資料
          } catch (err) {
            Swal.fire('❌ 刪除失敗', err.message, 'error');
          }
        }
      });
    }
  </script>
</body>
</html>
