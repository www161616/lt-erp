<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <title>原料主檔管理</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    /* ========== 保留另一位 AI 美美的 UI 設定 ========== */
    :root {
      --accent: #c53030;        
      --accent-hover: #9b2c2c;
      --accent-light: #fed7d7;
      --accent-glow: rgba(245,108,108,0.12);
      --success: #475569;
      --success-hover: #334155;
      --success-light: #e2e8f0;
      --border: #e2e8f0;
      --text: #1e293b;
      --text2: #64748b;
      --bg: #f8f9fb;
      --surface: #ffffff;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 22px 18px;
    }

    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .page-header-left { display: flex; align-items: center; gap: 12px; }
    .header-icon { width: 42px; height: 42px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 3px 10px rgba(245,108,108,0.35); flex-shrink: 0; }
    .page-header h4 { font-size: 19px; font-weight: 700; color: var(--text); margin: 0; }
    .page-header p  { font-size: 12px; color: var(--text2); margin: 2px 0 0; }
    .card { border: 1px solid var(--border) !important; border-radius: var(--radius) !important; box-shadow: var(--shadow) !important; }
    .form-label { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
    .form-control, .form-select { font-size: 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: #fafafa; color: var(--text); font-family: inherit; transition: border-color 0.2s, box-shadow 0.2s; }
    .form-control:focus, .form-select:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px var(--accent-glow); }
    .btn-save { background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; padding: 11px; width: 100%; cursor: pointer; transition: all 0.18s; font-family: inherit; }
    .btn-save:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-reset { background: #f8f9fb; color: var(--text2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; padding: 7px 14px; cursor: pointer; font-family: inherit; transition: all 0.18s; }
    .btn-reset:hover { background: #e2e8f0; color: var(--text); }
    .search-wrap .input-group-text { border: 1.5px solid var(--border); border-right: none; background: #fafafa; color: var(--text2); }
    .search-wrap .form-control { border-left: none; }
    #materialList { max-height: 540px; overflow-y: auto; }
    #materialList table { font-size: 13px; }
    #materialList thead th { position: sticky; top: 0; background: #f8fafb; z-index: 10; font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.4px; border-bottom: 1.5px solid var(--border) !important; padding: 9px 10px; }
    #materialList tbody td { padding: 10px; vertical-align: middle; }
    #materialList tbody tr:hover { background: var(--accent-light); }
    .mat-name { font-weight: 600; color: var(--accent); }
    .badge-status-on  { background: var(--success-light); color: var(--success); font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .badge-status-off { background: #f8f9fb; color: var(--text2); font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .btn-edit { font-size: 12px; padding: 4px 10px; border: 1.5px solid var(--accent); color: var(--accent); background: #fff; border-radius: 6px; cursor: pointer; transition: all 0.15s; font-family: inherit; font-weight: 600; }
    .btn-edit:hover { background: var(--accent); color: #fff; }
    .btn-del { font-size: 12px; padding: 4px 10px; border: 1.5px solid #e2e8f0; color: var(--text2); background: #fff; border-radius: 6px; cursor: pointer; transition: all 0.15s; font-family: inherit; font-weight: 600; margin-left: 5px; }
    .btn-del:hover { border-color: var(--accent); color: var(--accent); }
    .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.82); z-index: 9999; display: none; justify-content: center; align-items: center; flex-direction: column; gap: 12px; }
    .loading-overlay.show { display: flex; }
    .loading-spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    .loading-overlay p { font-size: 14px; color: var(--text2); font-weight: 500; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .edit-indicator { display: none; background: #fff3cd; border: 1px solid #ffc107; color: #856404; padding: 7px 12px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; margin-bottom: 10px; align-items: center; gap: 7px; }
    .edit-indicator.show { display: flex; }
  </style>
</head>
<body>

  <div class="loading-overlay" id="loading">
    <div class="loading-spinner"></div>
    <p>載入中...</p>
  </div>

  <div class="container-fluid" style="max-width:1100px;">
    <div class="page-header">
      <div class="page-header-left">
        <div class="header-icon">🍱</div>
        <div>
          <h4>原料主檔管理</h4>
          <p>新增、修改、刪除原料資料</p>
        </div>
      </div>
      <button class="btn-reset" onclick="resetForm()">🔄 清空重填</button>
    </div>

    <div class="row g-3">
      <div class="col-md-5">
        <div class="card p-3">
          <div class="edit-indicator" id="editIndicator">
            ✏️ 編輯模式：<span id="editingId"></span>
          </div>

          <form id="materialForm">
            <input type="hidden" id="editId">
            <div class="row g-2">
              <div class="col-md-6">
                <label class="form-label">原料編號</label>
                <input type="text" class="form-control" id="id" placeholder="留空自動產生">
              </div>
              <div class="col-md-6">
                <label class="form-label">狀態</label>
                <select class="form-select" id="status">
                  <option value="啟用">啟用</option>
                  <option value="停用">停用</option>
                </select>
              </div>

              <div class="col-12">
                <label class="form-label">⭐ 原料名稱 *</label>
                <input type="text" class="form-control" id="name" required placeholder="請輸入原料名稱">
              </div>

              <div class="col-md-6">
                <label class="form-label">類別</label>
                <input type="text" class="form-control" id="category" list="catList" placeholder="肉品、蔬菜...">
                <datalist id="catList">
                  <option value="肉品"></option>
                  <option value="蔬菜"></option>
                  <option value="調味料"></option>
                  <option value="包材"></option>
                </datalist>
              </div>
              <div class="col-md-6">
                <label class="form-label">規格</label>
                <input type="text" class="form-control" id="spec" placeholder="3kg/包">
              </div>

              <div class="col-md-4">
                <label class="form-label">單位</label>
                <input type="text" class="form-control" id="unit" placeholder="包/kg/斤">
              </div>
              <div class="col-md-4">
                <label class="form-label">預設成本</label>
                <input type="number" class="form-control" id="cost" placeholder="0">
              </div>
              <div class="col-md-4">
                <label class="form-label">最低庫存</label>
                <input type="number" class="form-control" id="minStock" placeholder="10">
              </div>

              <div class="col-12">
                <label class="form-label">預設供應商</label>
                <select class="form-select" id="supplier">
                  <option value="">-- 請選擇 --</option>
                </select>
              </div>

              <div class="col-12">
                <label class="form-label">備註</label>
                <input type="text" class="form-control" id="note">
              </div>
            </div>

            <div class="mt-3">
              <button type="button" class="btn-save" onclick="saveData()">💾 儲存原料資料</button>
            </div>
          </form>
        </div>
      </div>

      <div class="col-md-7">
        <div class="card p-3">
          <div class="search-wrap input-group mb-2">
            <span class="input-group-text">🔍</span>
            <input type="text" class="form-control" id="searchInput" placeholder="搜尋名稱或編號..." onkeyup="filterList()">
          </div>
          <div id="materialList">
            <div class="text-center text-muted p-4">載入中...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ========== 1. Supabase API 設定 ==========
    const SB_URL = 'https://gkuwoandmsgvlsxzmrjj.supabase.co/rest/v1';
    const SB_KEY = 'sb_publishable_7K0w9Z8-Wv1dOgLsZkI0rA_WfNei_AS'; 
    const AUTH_TOKEN = sessionStorage.getItem('sb_auth_token') || SB_KEY;
    const HEADERS = {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${AUTH_TOKEN}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };

    let allMaterials = [];

    window.onload = async function() {
      showLoading(true);
      try {
        const [matRes, supRes] = await Promise.all([
          fetch(`${SB_URL}/materials?select=*&order=id.asc`, { headers: HEADERS }),
          fetch(`${SB_URL}/suppliers?select=id,name&status=eq.啟用&order=name.asc`, { headers: HEADERS })
        ]);

        if (!matRes.ok) throw new Error('materials HTTP ' + matRes.status);
        if (!supRes.ok) throw new Error('suppliers HTTP ' + supRes.status);

        const materials  = await matRes.json();
        const suppliers  = await supRes.json();

        // 🔧 修正：選項的 value 必須是 s.id，不能是 name
        let supHtml = '<option value="">-- 無 --</option>';
        suppliers.forEach(s => { supHtml += `<option value="${s.id}">${s.name}</option>`; });
        document.getElementById('supplier').innerHTML = supHtml;

        // 建立一個對照表，方便列表顯示供應商名稱
        const supMap = {};
        suppliers.forEach(s => supMap[s.id] = s.name);

        allMaterials = materials.map(r => mapRow(r, supMap));
        renderList(allMaterials);
      } catch (e) {
        Swal.fire({ icon: 'error', title: '載入失敗', text: e.message });
      } finally {
        showLoading(false);
      }
    };

    function mapRow(r, supMap) {
      return {
        id: r.id || '', 
        name: r.name || '', 
        spec: r.spec || '', 
        category: r.category || '', 
        unit: r.unit || '', 
        cost: r.cost ?? 0,
        supplier_id: r.supplier_id || '', // 🔧 存 ID
        supplier_name: (supMap && supMap[r.supplier_id]) ? supMap[r.supplier_id] : (r.supplier_id || ''), // 顯示名稱
        minStock: r.min_stock ?? 0, 
        status: r.status || '啟用', 
        note: r.note || ''
      };
    }

    function renderList(list) {
      if (list.length === 0) {
        document.getElementById('materialList').innerHTML = '<div class="text-center p-4" style="color:var(--text2);">查無資料</div>';
        return;
      }
      let html = `<table class="table table-bordered table-hover mb-0"><thead><tr><th>編號</th><th>名稱</th><th>規格</th><th>成本</th><th>狀態</th><th>操作</th></tr></thead><tbody>`;
      list.forEach(m => {
        const dataStr   = encodeURIComponent(JSON.stringify(m));
        const badgeCls  = m.status === '啟用' ? 'badge-status-on' : 'badge-status-off';
        html += `<tr id="row-${m.id}">
          <td style="color:var(--text2);font-size:12px;">${m.id}</td>
          <td class="mat-name">${m.name}</td>
          <td style="color:var(--text2);">${m.spec}</td>
          <td>$${Number(m.cost).toLocaleString()}</td>
          <td><span class="${badgeCls}">${m.status}</span></td>
          <td>
            <button class="btn-edit" onclick="editItem('${dataStr}')">編輯</button>
            <button class="btn-del" onclick="deleteItem('${m.id}', '${m.name}')">刪除</button>
          </td>
        </tr>`;
      });
      html += '</tbody></table>';
      document.getElementById('materialList').innerHTML = html;
    }

    function filterList() {
      const k = document.getElementById('searchInput').value.toLowerCase();
      const filtered = allMaterials.filter(m => m.name.toLowerCase().includes(k) || m.id.toLowerCase().includes(k));
      renderList(filtered);
    }

    async function saveData() {
      const inputId = document.getElementById('id').value.trim();
      const name = document.getElementById('name').value.trim();

      if (!name) { Swal.fire({ icon:'error', title:'請填寫原料名稱' }); return; }

      const payload = {
        p_id: inputId,
        p_name: name,
        p_category: document.getElementById('category').value.trim(),
        p_spec: document.getElementById('spec').value.trim(),
        p_unit: document.getElementById('unit').value.trim(),
        p_cost: parseFloat(document.getElementById('cost').value) || 0,
        p_min_stock: parseInt(document.getElementById('minStock').value) || 0,
        p_supplier: document.getElementById('supplier').value, // 這裡現在抓到的是 ID 了
        p_status: document.getElementById('status').value,
        p_note: document.getElementById('note').value.trim()
      };

      showLoading(true);

      try {
        const res = await fetch(`${SB_URL}/rpc/web_save_material`, {
          method: 'POST',
          headers: HEADERS,
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.message || `HTTP ${res.status}`);
        }

        Swal.fire({ icon:'success', title:'儲存成功！', timer: 1500, showConfirmButton: false });
        resetForm();
        // 重新載入頁面資料以更新列表
        window.onload(); 
      } catch (e) {
        Swal.fire({ icon:'error', title:'儲存失敗', text: e.message });
      } finally {
        showLoading(false);
      }
    }

    function editItem(dataStr) {
      const m = JSON.parse(decodeURIComponent(dataStr));
      document.getElementById('editId').value    = m.id;
      document.getElementById('id').value        = m.id;
      document.getElementById('name').value      = m.name;
      document.getElementById('spec').value      = m.spec;
      document.getElementById('category').value  = m.category;
      document.getElementById('unit').value      = m.unit;
      document.getElementById('cost').value      = m.cost;
      document.getElementById('supplier').value  = m.supplier_id; // 🔧 填入 ID
      document.getElementById('minStock').value  = m.minStock;
      document.getElementById('status').value    = m.status;
      document.getElementById('note').value      = m.note;

      document.getElementById('id').disabled = true; 
      document.getElementById('editingId').textContent = m.id + '「' + m.name + '」';
      document.getElementById('editIndicator').classList.add('show');
      document.getElementById('materialForm').scrollIntoView({ behavior: 'smooth' });
    }

    async function deleteItem(id, name) {
      const result = await Swal.fire({
        title: '確定刪除？', text: `原料：${name}（${id}）刪除後無法復原！`,
        icon: 'warning', showCancelButton: true, confirmButtonColor: '#c53030', cancelButtonText: '取消', confirmButtonText: '確定刪除'
      });

      if (!result.isConfirmed) return;

      showLoading(true);
      try {
        const res = await fetch(`${SB_URL}/materials?id=eq.${encodeURIComponent(id)}`, { method: 'DELETE', headers: HEADERS });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const row = document.getElementById('row-' + id);
        if (row) row.remove();
        allMaterials = allMaterials.filter(m => m.id !== id);

        Swal.fire({ icon:'success', title:'已刪除', timer: 1500, showConfirmButton: false });
      } catch (e) {
        Swal.fire({ icon:'error', title:'刪除失敗', text: e.message });
      } finally {
        showLoading(false);
      }
    }

    function resetForm() {
      document.getElementById('materialForm').reset();
      document.getElementById('editId').value = '';
      document.getElementById('id').disabled = false;
      document.getElementById('editIndicator').classList.remove('show');
    }

    function showLoading(show) { document.getElementById('loading').classList.toggle('show', show); }
  </script>
</body>
</html>
